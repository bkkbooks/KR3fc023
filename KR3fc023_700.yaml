body:
  text: 各自為列實以法三十除之合問今有甲乙丙丁四人合米五千七百石內甲米一千三百二十五石乙米一千四百七十八石丙米一千六百二十四石丁米一千二百七十三石顧船共用船腳鈔七千四百一十貫問各該出鈔幾何答曰甲一千七百二十二貫五百文乙一千九百二十一貫四百文丙二千一百一十一貫二百文丁一千六百五十四貫九百文法曰置船腳鈔七千四百一十貫為實以合出米五十七百石為法
