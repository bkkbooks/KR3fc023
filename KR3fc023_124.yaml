body:
  text: 法曰置貴七分從五分相乘得三十五分為法置分子之三之四相乘得一十二為實不滿法以法命之合問問田廣九分步之七縱十一分步之五為田幾何答曰十一分步之七法曰置廣九万縱十一分相乘得九十九為法置分子之七之九相乘得六十三為實不滿法以九約之合問問田廣五分步之四縱九分步之五為田幾何答曰九分步之四法曰置分子之四之五相乘得二十為實以廣五芝九分絲分相乘得四十五為法實不滿法以法命五約之合問
