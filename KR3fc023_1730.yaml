body:
  text: 三百文次曰大僧二十四小僧三十支襯一十五貫九百文問大小每僧各幾何荅曰大僧三百五十文小僧二百五十文法曰列所問數大一十八小十二九貫三百文大二十四小三十一十五貫九百文先以右行大十八爲法遍乗左行小三十得五百四十一十五貫九百得二百八十六貫二百文却一以左行大二十四爲法復遍乗右行小十二得二百八十八以減左行五百四十餘得二百五十二爲法九貫三百得二百二十三貫二百以減左行二百八十六貫二百餘得六十三貫爲實以法除之得小僧二百五十文右行九貫三百以減小僧一十二得三貫餘六貫三百以大僧一十八
