body:
  text: 今有絲五十九斤十一兩六銖每絲二十兩織絹一匹匹法三丈二尺問該絹幾何答曰四十七匹二丈四尺四寸法曰以所求率三十二尺乘絲數五十九斤先以十六通得九百四十四兩加十一兩共六銖該二五分共九百五十五兩二五分以三十二尺乘得三万五百六十八為實以每匹絲二十兩為法除之得一千五百二十八尺四寸以匹法除之合問今有鈔一千四百一十七貫買胡椒三石二鈞一稱七斤十三兩問每石該鈔幾何答曰三百八十四貫法曰以一石計一百二十斤乘鈔一千四百一十七得一十七万四十為實以所買胡椒三石得三百六十斤二釣得六十斤一兩得一十五斤零七斤共十三兩以兩求斤
  hash: sha256:2eecedf7a34bfa8b6dbd04fc774f75d37966dc58cf1518354ca3bbc3d0af1a3b
