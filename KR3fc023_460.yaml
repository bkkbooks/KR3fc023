body:
  text: 今有絲五十九斤十一兩六銖毎絲二十兩織絹一疋疋法三丈二尺問該絹幾何答曰四十七疋二丈四尺四寸法曰以所求率三十二尺乗絲數五十九斤先以十六通得九百四十四兩加十一兩共六銖該二五分共九百五十五兩二五分以三十二尺乗得三万五百六十八爲實以毎疋絲二十兩爲法除之得一千五百二十八尺四寸以疋法除之合問今有鈔一千四百一十七貫買胡椒三石二鈞一秤七斤十三兩問毎石該鈔幾何答曰三百八十四貫法曰以一石計一百二十斤乗鈔一千四百一十七得一十七万四十爲實以所買胡椒三石得三百六十斤二釣得六十斤一兩得一十五斤零七斤共十三兩以兩求斤
  hash: sha256:28f4d60d9bedf102b122894d1490afaa6ff45683596f6e66d36272af6c6dc72c
