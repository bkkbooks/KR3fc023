body:
  text: 丁五斤六兩四錢法曰各列置衰甲乙丙各得七丁得三丙七不可爲宜以三因丙丁数生乙差甲乙各得四十九丙得二十四丁得九乙差不可爲三亦以三因乙丙丁数七因甲生甲差甲得三百四十三乙得一百四十七丙得六十三丁得二十七副併得五百八十爲法以所分銀一百一十六斤以斤求兩得一千八百五十六兩乗未併者甲得六十三万六千六百八乙得二十七万二千八百三十二丙得一十一万六千九百二十八丁得五万一百一十二各自爲列實以法五百八十各除之得数定身减六爲斤减五爲秤合問七秤五斤八兩銀四箇啇人照本分原銀逓該二八出休
