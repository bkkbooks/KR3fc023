body:
  text: 丁五斤六兩四錢法曰各列置衰甲乙丙各得七丁得三丙七不可為宜以三因丙丁數生乙差甲乙各得四十九丙得二十四丁得九乙差不可為三亦以三因乙丙丁數七因甲生甲差甲得三百四十三乙得一百四十七丙得六十三丁得二十七副併得五百八十為法以所分銀一百一十六斤以斤求兩得一千八百五十六兩乘未併者甲得六十三万六千六百八乙得二十七万二千八百三十二丙得一十一万六千九百二十八丁得五万一百一十二各自為列實以法五百八十各除之得數定身减六為斤减五為稱合問七稱五斤八兩銀四箇啇人照本分原銀遞該二八出休
