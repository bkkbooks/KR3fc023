body:
  text: 答曰人參四萬三千五百斤原銀六千兩牙錢三百兩腳錢二百十七兩五錢人參價五千五百八十二兩五錢法曰置牙錢四定以定率五十兩因之得二百兩六分中取二分該原銀六千兩減牙錢二百兩餘剩五千八百兩以買參六斤因之得三万四千八百為實却以七爾七分并腳錢三分共八爾為法除之得人參四万三千五百斤以每六斤歸之得七千二百五十却以每七尓七分乘之得人參價五千五百八分二兩五尓以減原總五千百兩餘得腳錢二百一十七兩六尓合問九百九十九文錢市上梨棗買一千十一買梨得九箇
