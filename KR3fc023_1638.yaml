body:
  text: 一得一左行中空加入得中正一下空乘左三亦得下正三四十石得四十石减左行四十石得空再以中行中正二爲法遍乗左行中正一得正二下正三得正六却以左行中正一爲法復遍乗中行中正二得正二与左行中正二對减尽下正一得正一加左行下正六得正七爲法正四十石得四十石左行原空加入得正四十石爲實以法除之每下馬一匹得五石七分石之五中行四十石內除下馬一匹力五石七分石之五餘重三十四石七分石之二以中馬二除之得一十七石七分石之十右行四十石內除中馬一匹力一十七石七分石之一餘重二十二石七分石之六爲武馬一匹力合問白禾二步青禾三步黄禾四步黑禾五步各不滿斗白取
