body:
  text: 池一箇至弦問池方幾何答曰四步法曰置勾六步乗股一十二步得七十二步爲實併勾股共一十八步爲法除之得池方四步合問今有勾股地一叚勾闊八尺股長一十五尺中開一井與二邊適等問井徑幾何答曰六尺法曰置勾八尺乗股一十五尺得一百二十尺倍之得二百四十尺爲實又置勾自乗得六十四尺股自乗得二百二十五尺併得二百八十九尺爲實以開平方法除之得弦一十七尺併勾股共得四十尺爲法除實二百四十尺得井徑六尺合問今有木不知去遠前有一地方一十二丈爲則較之置四
  hash: sha256:f98a5f0292a56042cb24ce2e6830612aff288e6552e7e8ee77a68f89821ff7be
