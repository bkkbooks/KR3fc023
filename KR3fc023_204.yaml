body:
  text: 三十二步以南闊分毋六通之得一百九十二腰闊一十八步亦以南閣分毋六通之得一百八倍之得二百一十六正長四十一步亦以南闊分毋六通之得二百四十六併三闊得五百六十三以乘正長二百四十六得一十三万八千四百九十八再折半得万四千百二十四步為實以分毋六自乘得三十六為法除之得九百六十一步餘實二十一步半法實皆十五約之合問今有杖鼓田南闊二十五步六分步之五北闊三十二步七分步之六正長四十一步中闊一十八步問為田幾何答曰四畒一十步一百六十八分步之九十七法曰置正長四十一步以南闊分毋六通之得五百四十六又以
