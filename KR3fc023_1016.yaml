body:
  text: 三乘之得九百万爲廉法方法一退得二百七十万廉法再退得九万下法三退得千續啇置第二位以方廉二法共二百七十九万啇寶得一十下法亦置上啇一十進二位得一千自乘亦得一千爲隅法又以上啇一乘廉法得九万以方廉隅三法共二百七十九万一千皆與上啇除寶二百七十九万一千餘寶二百六十七万七百五十九乃二乘廉法得一十八万三乘隅法得三千皆併入方法共二百八十八万三千再置上啇三百一十進二位得三万一千以三乘之得九万三千爲廉法方法一退得二十八万八千三百廉法再退得九百三十下法三退得續啇置第三位以方廉二法共二十八万九千二百三十啇寶得九下法亦置上啇
