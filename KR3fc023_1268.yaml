body:
  text: 十二百寸又以五乘之合問今有金銀銅鉛四色長闊相等被火镕作一塊立方五寸共重九十一斤十二兩七錢五分每立方一寸金重一斤銀重十四兩鉛重九兩五錢銅重七兩五錢問各重幾何答曰金三十一斤四兩銀二十七斤五兩五錢鉛一十八斤八兩八錢七分五厘銅一十四斤十兩三錢七分五厘法曰置方五寸再自乘得一百二十五寸以四除之得三十一寸二分五厘乃一色積寸列四位各以方寸重兩变斤乘之合問今有金銀鉛銅四色被火镕作一塊立方五寸共重九十
