body:
  text: 丁六分乑之五戊六分乑之四法曰各列置衰甲八乙七六丁五戊四副併共得三十爲法以均錢五文乘未併者各自爲實甲得四十乙得三十五丙得三十丁得二十五戊得二十以法三十除之甲得一乑餘一十乙得一乑餘五丙得一乑丁得二十五戊得二十不滿法者皆五約之合問顧夫塩二石行一百里與錢四十今欲塩一石七斗三升三分升之一行八十里合與錢幾何曰二十七錢十五分乑之十一法曰置今負塩一石七斗三升以分毋三乘之加分子一共得五百二十乘今行里八十得四万一千六百與原錢四十相乘得一百六十六万四
  hash: sha256:0c0badbfb5af343ab44d66ea8e91f881252ef4b84626f9415f93669523bba57d
