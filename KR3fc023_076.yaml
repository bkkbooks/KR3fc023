body:
  text: 中長圓相乘為會議角均成相乘併之折半成餘積角田相乘減角眉田所上下周折半以半中徑乘牛角田問乘四以六問船田蛇田併三廣三而一乘正長三角田每靣六因之而一以每靣折半乘六角田每靣自乘三問八角田置一角五因七而一供之所一為置一角數自乘法負餘為幞頭田小長乘小長折之鞋底田二田腰間併八北尾二闊四而乘長曲天田併內曲及一歸各折半相乘欖核田正中長自乘四而一磬田併內外為乘術錠田中長自乘折半錠腰田倍一靣曲周自乘九而一蕭田併一乘長折半墻田問而相乘半梯田併二闊乘長折半二梯田一靣長乘中問車輞田併折半乘闊古問三十八問直田法曰廣縱相乘焉積以畒法二百四十步而甘乃畒二餘少
