body:
  text: 法曰置列上一節下一節容二升容四升互乘上節得四升下節得二升以少减多餘二升爲一差之實併上下二節折半得一以减五節餘四却以一十相乘亦得一乘之亦得四爲一升之法除之得差五合各加差合問今有竹筒七箇節容米二升上三節下二節容三升整各節容米如何説荅曰最下節一升二下七分升之千六最上節二十七分升之十三法曰置列三節二節二升三升毋互乘子三節得九升二節得四升以少减多餘五升爲一差之實併上二下二得五節折半得二節半以减七節除四節半却以三升乘之得一十二節半又以二升乘之得二十七爲一升
