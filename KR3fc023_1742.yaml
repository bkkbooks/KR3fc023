body:
  text: 却以乙行綾七爲法復遍乗甲行綾二同二十一与二十一對減尽絹四得二十八減言行絹六餘得絹二十二爲法價二貫八百文得一十九貫八百文減乙行價二十二貫七百八十文餘得六貫八百二十文爲實以法除得絹價三百一十文甲行絹四以三百一十文乗得一貫二百四十六以減價二貫八百文餘得一貫五百六十以綾三除得綾價七百二十文合問今有硃二兩粉一兩價鈔二貫五百文又粉三兩丹一兩價鈔二貫五百文又硃一兩丹四兩價鈔二貫五百文問三色各價幾何荅曰硃九百文粉七百文鈔丹四百文
