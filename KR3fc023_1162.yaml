body:
  text: 周二丈四尺廣五尺深一丈問積幾何答曰一千八百八十三尺三寸少半寸法曰併上中周二丈外周四丈折半得三十尺爲上袤又併下中周一丈四尺外周二丈四尺折半得一十九尺爲下袤倍上袤爲六十尺加入下袤共得七十九尺以上廣一十尺乗之得七百九十尺倍下袤爲三十八尺加入上袤共六十八尺以下廣五尺乗之得三百四十尺併二位共得一千一百三十尺以深一千尺乗之得一万一千三百尺如六而一得一千八百八十三尺三寸不盡二得六分寸之二合問盤池上廣六尺袤八尺下廣四尺袤六尺深二丈問積幾何答曰七萬六百六十六尺太半尺
