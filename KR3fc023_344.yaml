body:
  text: 無疑今截八百九十三步七分五厘欲從西邊截賣實該長闊要知答曰截長一十三步半北闊二十七步半法曰四因截積八百九十三步七分五厘得三千五百七十五步為實併東西長得三十六步以倍中長一十步得二十步減之餘一十八步為法乘之得六万四千三百五十步却折半北闊一百八十步得九十步除之得七百一十五步又置東西長共三十八步自乘得一千四百四十四步內減積七百一十五步餘七百二十九步以開平方法除之得二十七步折半得截長一十三步半却併原西長一十九步共三十二步半為法除截積八百九十三步七分五厘得截北闊二十七步半合問
  hash: sha256:655adc9d70e7d0d65afc7a24af48f529321a7ac8644bdcb53e516cff3da96bd5
