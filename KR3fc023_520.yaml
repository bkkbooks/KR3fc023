body:
  text: 米二升為率換油三兩若換蜜五兩鹽六兩茶七兩麵九兩欲要換二停油三停蜜四停鹽五停茶六停麵問各該幾何答曰油一十三斤十五兩四錢四分蜜二十斤十五兩一錢六分鹽二十七斤十四兩八錢八分茶三十四斤十四兩六錢麵四十一斤十四兩三錢二分法曰置率米二升為實以各換兩數為法除之油三兩得六合三分合文二蜜五兩得四合鹽六兩得三合六分合之二茶七兩得二合七分合之六麵九兩得二合九分合之二依率併之油二得一升三合三分合之三蜜三得一升二合鹽
