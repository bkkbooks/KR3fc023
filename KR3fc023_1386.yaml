body:
  text: 分戊府上二縣三分得六分中四縣二分得八分下二縣一分得二分併之得三百二十分爲法除之得四千六百八十七石五斗乃一分之數就乗各縣併縣得府数併府得総合問折納米麥今有共納粟二百四十六石粟每斗折納米六升今湏要納粟米兩停問各幾何荅曰九十二石二斗五升法曰置粟二百四十六石以折米六升乗之得一百四十七石六斗爲實併粟一斗米六升共一斗六升爲法除之合問今有納米一百六十三石八斗八升米八升折麥九升今要米麥適等納之問合幾何荅曰八十六石七斗六升
