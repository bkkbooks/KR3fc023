body:
  text: 三十六題內剩一該下三十六九數剩一下一百零不下併該下共得木綿一百七十一斤爲寶以粟四斤麥五斤絹九斤各爲法除之得各數合問今有一疋重絹牙人剪却六尺即將餘絹賣錢訖五貫二百八十疋長減於尺價七十錢數難及疋長尺買果能知堪羡筭中第一右西江月荅曰絹一疋長五尺尺價一百二十文法曰置鈔五貫二百八十文於上以七十約之得長五丈以減六尺餘四丈四尺以除賣鈔得尺價一百二十文合問三十六人入務攢椒共餘傳觥先來三兩莫商量後至增
