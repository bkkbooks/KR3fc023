  text: 直銀一兩得二十四銖加零一十一銖八紫四黍共三十五銖八紫四黍為法乘之合問今有糙米三石每石舂熟米八斗五升問該幾何答曰二石五斗五升法曰置糙米三石為實以春熟米八斗五升為法乘之合問除法今有熟米二石五斗六升每八斗熟米該糙米一石問該糙米幾何答曰三石二斗法曰置熟米二石五斗六升為實以每米八斗為法除之合問今有綿一萬五千七百三十六兩五錢六分每綿六兩賣銀一錢問該銀幾何
