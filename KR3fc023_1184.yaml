body:
  text: 答曰人夫八千九百七十六人榑子木二十一萬二千一百六十條橛六十三萬六千四百八十條草葽六十三萬六千四百八十道用草一萬四千一百四十四束濠深一丈三尺一百七十九分尺之一百二十一法曰求人夫併上下廣半之得三十三尺以乗髙三十六尺得一千一百八十八尺又以長一万六千三百二十尺乗之得一千九百三十八万八千一百六十尺爲城積却以常積二十四尺乗三箇月爲九十四得二千一百六十爲
