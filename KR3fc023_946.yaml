body:
  text: 寫一月多少是答曰四千五字法曰置一月計三十日張二位內一位減一餘得二十九日相乘三十日得八百七十折半得四百三十五以每日加三字乘之得一千三百五字併入一月三十日以九十字乘之得二千七百字共得四千五字合問有箇學生心性巧一部孟子三日了每日增添一倍多問公每日讀多少答曰初一日讀四千九百五十五字初二日讀九千九百一十字初三日讀一萬九千八百二十字
