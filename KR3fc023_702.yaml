body:
  text: 除之每石該一貫三百文以乘各出米得鈔合問今有鈔六百七十三貫六百二十文買生藥修平胃散每料用蒼木八斤甘草三斤陳皮厚朴各五斤其蒼木斤價二百五十文甘草斤價六百文陳皮斤價五百文厚朴斤價八百文問各該幾何答曰蒼木五百二十三斤三兩二錢該價鈔一百三十貫八百文甘草一百九十六斤三兩二錢該價鈔一百一十七貫七百二十文陳皮三百二十七斤該價鈔一百六十三
