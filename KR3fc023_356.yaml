body:
  text: 豉六十三飱九十糵一百七十五菽答麻麥各四十五熟菽一百三半古問四十六問換易乘除法曰以所求率求粟用粟率求用率求錢物者求同乘所有數為實今有物若干是也以所求率乘所有數即今科纂中有要者乘之句以所有率為法所有稻用稻率所有糲用糲率所有求物亦同即今科纂中不要者之句實如法而一如歸以法除之也問粟七斗五升七分升之四為稻幾何答曰九斗三十五分斗之二十四法曰以稻率為題其實示所變迎後各題俱系此意稻率六十乘所有粟七斗五升
