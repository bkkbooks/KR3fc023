body:
  text: 定實逆数法金五上得万兩子上得千兩亥上得百兩戌上得十兩酉上得一兩乃酉上得實首錢百億仍順数回戌上得十億亥上得一億子上得千万丑上得百万寅上得十万合問大除小今有錢三十三萬七千五百文買金毎兩價錢四千五百萬文問該買金幾何荅曰七厘五毫法曰置錢三十三万七千五百文爲實以毎兩價錢四千五百万文爲法除之得数不動亦扵掌上寅位上定實逆数法錢丑上得千万子上得百万亥上得十万戌上得万酉上得千申上得百未上得十午上得一乃午上得實首錢十万復順数回未上得万申上得千酉上得百戌上得十亥
