body:
  text: 之法除之實不滿法一差得二十分升之五上三節容二升乘分母二十七得五十四以求三節差第一節無差第二節差一第三節差二併之得三乘一差之實五得十五以减五十四餘三十九却以三節除之得一十三爲上節得二十七分升之一十三各節遞增合問今有竹筒九箇節下五節容米九升上四節米三升六各節容米問分明荅曰上一節容米六合以次均差二合最下一節容米二升二合法曰置容米三升六合以上四節除之得九合容米九升以下五節除之得一升八合以少减多餘九合倍之得一升八合却以九節除之
