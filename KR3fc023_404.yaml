  text: 答曰二百六十二兩二錢七分六釐法曰置綿一万五千七百三十六兩五糸六分為實以每綿六兩為法除之得二百六十二兩二錢十分六釐合問歸除今有鈔四百一十一貫六百文共糴糯米一百七十一石五斗問每石價幾何答曰二貫四百文法曰置今有鈔四百一十一貫六百文為實以所糴米一百七十一石五斗為法除之合問今有鈔四百一十一貫六百文糴糯米每石二貫四百文
