body:
  text: 法者為賤率餘實一万十九雙減法一万三千九百七十餘三千八百七十一為貴率各乘得數之賤率一万九十九以六銖乘得六万五百九十四銖以銖法而一得一石一鈞七斤十二兩十八銖每六銖得一錢又三千八百七十一以五銖乘得一万九千三百五十五銖以銖法而一得一鈞二十斤六兩一十一銖每五銖得一合問問出錢六百二十買羽二千一百俠羽欲貴賤率之答曰一千一百四十俠羽每三俠羽一錢九百六十俠羽每四俠羽一錢法曰以所買羽二千一百為實以所有錢六百二十為法除之一得三族羽實不滿法不書二百四十為賤率減法六百二十餘三百八十為貴率各乘得數求之賤率二百四十以四朋乘得九百六十每四羽得小貴率三
  hash: sha256:c2457ec19ab353cd535bc9f918af9506d87096c97074a1028bee6a09be4cc277
