body:
  text: 半得八十一折半分二釐一毫為實卻以徑四十二步分母三通之加內子一共為法相乘得二千二百四十八七分又以分母三除之一百一十分步一以法而一合問約分答曰折半之得分母子答可折半不可半者分母分子或以不可可半問置分母子之未餘分母子正能故分母子且草約之以少和減損求其等也以分母子少位減多位互相減遇子數合等約之以等數為法除分母分子之和十四分之四十二約之得幾何答曰九分之七解題除步盡之數法為分母實數分之數故立約分置之滿數也法曰副置分母五十四在上分子四十二在下法云可數者半之此踵分千
