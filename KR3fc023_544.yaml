body:
  text: 豆三石五斗該鈔四十二貫法曰置鈔一千一百四十四貫五百文為實併各價共得三十二貫七百文為法除之得三十五匹半各以匹斗價乘之布匹價六貫得二百一十貫絹匹價七貫二百文得二百五十二貫綾匹價八貫二百文得二百八十七貫羅匹價六貫九百文得二百四十一貫五百文米斗價三貫二百文得一百一十二貫豆斗價一貫二百文得四十二貫合問借寬還窄今有借布一端長五丈二尺闊二尺一寸今無原布還只有常行布闊一尺六寸問合還長幾何答曰六丈八尺二寸五分
