body:
  text: 法曰置鐵一百一十四斤以斤法十六通之加零十五兩六錢四分六厘二毫共得一千八百三十九兩六錢四分六厘二毫為實以煉熟鐵七斤再自乘得三百四十三斤為法除之得五千三百六十二兩四錢以斤法除之合問詩詞六十三問物斛市中價例牙人開說各般小麥八百七十言細米整該一貫五百五十買粟七百八十糴豌三十九貫四百全各物俱停怎算右西江月答曰各得一十二石三斗一升二合五勺法曰置鈔三十九貫四百文為寶併各價小麥八百七十文米一貫粟五百五十文豌七百八十文共三貫二百文為法除之合問
  hash: sha256:598843a2037d9a12a183e780cb394dc360a3d82bf308bb28525344ecaac653f8
