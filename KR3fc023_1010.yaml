body:
  text: 爲一万二千以三乘之得三万六千爲廉法方法一退得四万三千二百廉法再退得三百八十下法三退得一續啇置第三位以方廉二法共四万三千五百六十啇寶得三下法亦置上啇三自乘得九爲隅法又以上啇三乘廉法得一千八十以方廉隅三法共四万四千二百八十九皆與上啇三除寶盡得一百二十三尺合問積千九百五十三尺八分尺之一問與立方幾何答曰一十二尺半法曰置積一千九百五十三尺與八分尺之一作一十二分之厘與寶照前法啇置第一位下法亦置上啇一十進二位爲一千自乘
