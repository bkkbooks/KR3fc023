body:
  text: 法曰置布一千疋爲實以一疋四疋併得五疋爲法除之得二百疋乃官得之數以四因得八百疋以減忘総布一千疋餘二百疋乃軍人之數総人一千減官二百餘得軍人八百合問今有兵士三千五百五十八人每三人用衫綃七十尺四人用袴綃五十尺問共用給幾何答曰三千三十五疋二丈五尺法曰山問乃合率人互換也置列三人七十尺四人五十尺互乗三人得五十疋得一百五十尺四人乗七十尺得二百八十尺併之得四百三十尺以乗兵士得一百五十二万九千九百四十尺爲實以人三四相乗得一十二爲法除之得一十二万七千二百九十五尺以疋法四十二尺約之合問
  hash: sha256:6a69c0f86daaf4a2b48a11d9306edddbd9a400063c4992bf9947a5df58a404fd
