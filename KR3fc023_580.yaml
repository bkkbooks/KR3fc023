body:
  text: 添二兩四三瓶取下都椒交與坊酒錢瓶子數明彰知者請坐於上右西江月答曰椒五稱一十斤半酒一千二十六瓶法曰置總三十六人張二位內一位減一得三十五人相乘得一千二百六十折半得六百三十為實卻以後至增添二兩為法乘之得一千二百六十再置二十六人每人二兩乘之得一百八兩加入前數共得椒一千二百六十八兩以三因四除得酒一百二十六瓶合閣群羊一百四十剪毛不避動勞群中有母有羊羔先剪二羊比較大羊剪毛斤二一十二兩羔毛百五十斤是根苗子母羊羔該多少右西江月
