body:
  text: 法曰置南北闊二十步加中闊二十三步四十三步以半正長得二十五步乘之得一千一百二十五步以法除之合問今有杖鼓田南北闊二十五步中闊二十步正長五十步問為田幾何答曰四畒一百六十五步法曰併南北闊二十五步中闊二十步共四十五步為實半正長得二十五步乘之得一千一百二十五步以畒法除之合問今有杖鼓田南北闊二十五步六分步之五北闊三十二步中闊一十八步正長四十一步問為田幾何答曰九百六十一步二十四分步之十九法曰置南闊二十五步以分毋六通之加分子五共得一百五十五北闊
