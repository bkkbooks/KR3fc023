body:
  text: 上啇數自乘爲隅法又以上啇乘廉法以方廉隅三法皆與上啇數除寶盡得數合問更有不盡之數依第二世休面二乘廉法三乘隅法開入方法再上啇三粟廉法迟而啇之得數積一百八十六萬八百八十七尺問爲立方幾何答曰一百二十三尺法曰方自樂名爲平方又以方栗平方名曰立方壯如于取用勾深至遠之筭今問中第一位是一立方自方百尺二位三平方各方一百尺高二十尺二各長一百尺方一十尺其一隅立方二十尺三位有三平方各方一百二十尺高二尺及三廉各長一百二十尺方三尺其一隅立方三尺置積一百八十六万八百六十七尺爲寶別置一筭名曰下法自末位常超二位約寶一下定一干下定一百万不得百於寶數之上
