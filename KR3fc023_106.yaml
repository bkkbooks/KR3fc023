body:
  text: 課分法曰二分比立多寡母互乘子齊其子也以少減多為實母乘子之分數以少分減多分即是相多之數母相乘為法子雖有數不可無母以命為數實如法而一滿法者以法除之問四分之三減其三分之一尚餘幾何四分之三俞二百八十八斜也三分之一俞一百二十八斜也答曰十二分之五三百八十四為一十二分以一百六十餘約為之五法曰列置置分母子三分四分于右之一之二于左母互乘子四分乘之一得四三分乘之三得九以少減多九減四餘五為實母相乘三分乘四分得十二為法實步滿法以法命之得十二分之五合同問九分之八減其五分之一尚餘幾何
