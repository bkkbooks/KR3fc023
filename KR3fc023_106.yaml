body:
  text: 課分法曰二分比立多寡母互乗子齊其子也以少減多爲實母乘子之分數以少分減多分即是相多之數母相乗爲法子雖有數不可無母以命爲數實如法而一滿法者以法除之問四分之三減其三分之一尚餘幾何四分之三俞二百八十八斜也三分之一俞一百二十八斜也荅曰十二分之五三百八十四爲一十二分以一百六十餘約爲之五法曰列置置分母子三分四分扵右之一之二扵左母互乗子四分乗之一得四三分乗之三得九以少減多九減四餘五爲實母相乗三分乗四分得十二爲法實步滿法以法命之得十二分之五合同問九分之八減其五分之一尚餘幾何
