body:
  text: 十四步半爲實以分毋十九分七分相乗得一百三十三爲法除之得九百一十九步餘實九十七步半法實皆倍及以畒法約合問今有梯田南闊八十一步六十三分步之四十七北闊一百二十步九分步之二長一百五十三步四分步之三問爲田幾何荅曰十四畒六分二十二步四十二分步之十三法曰置南闊八十一步以分毋六十三通之加分子四十七共五千一百五十又以北闊分毋九通之得四万六十三百五十又置北闊一百二十步以分毋九通之加分子二共一千八十二又以南闊分毋六十三通之得六万八千一百六十六併二數半之得五万二百五十扵上又置長一百五十三步以分毋四通之加分子三百一
