body:
  text: 四十四步千戶二十員計四百八員每員一方五步計二十五步共積一萬一百步百戶一百員計二千四十員每員一方四步計一十六步共積三萬二千六百四十步通前共積六十三萬九千三百八十四步爲實以開平方法除之得七百九十九步一千五百九十九分步之九百八十三爲一方面數合問今有鈔八千七百一十七貫五百方買絲不知其數亦不知其價只雲每兩要絡絲鈔二百文爲無鈔還就將絲准還只記得准與絲二百七十八兩九錢六分問絲總數及價鈔並絡絲鈔各幾何答曰絲三千四百八十七兩每兩價鈔二貫五百文共八千七百一十七貫五百文絡絲鈔六百九十七貫四百文該准絲二百七十八兩九錢六分法曰置總鈔以絡絲鈔二百文乘之得一千七百四十三貫七百文卻以准與絲二百七十八兩九方六分除之得六貫二百五十文爲實以開平方法除之得每兩絲價二貫五百文爲法以除原鈔該絲三千四百八十七兩每兩絡絲鈔二百文乘之該鈔六百九十七貫四百文以每兩二貫五百文除之得准絲二百七十八兩九六分合問今有錢一百八十八貫七百文買絲不知其數亦不知其價只雲其絲一兩用絡絲錢六文爲錢還就將絲准還亦不知其數只雲每准絡絲錢絲一要染深青錢四文
