body:
  text: 三貫丁二十九貫戊三十八貫法曰置鈔一百二十貫為實並各差甲差六分乙差四分除之得一分五釐二存率以半之得七釐五毫為一停率再置乙差四分內減一停率七釐五毫餘三分二釐五毫為丙差乙二因乙差得八分內減一停率餘七分二釐五毫為丁差又二因乙差得八分加入二停率一分五毫共得九分五釐為戊差所五停率數共得三十為法除之得四貫為鈔率以乘各差得數合問折半差分法曰置各區數從上折半差乘之為衰副併為法以所輸數乘未並者各自為列實以法除之得一分數今有官輸白綿五千斤令五區以糧多寡又從上減半差出之甲區秋糧米六千八百五十石乙區秋糧米七千二
  hash: sha256:eb91db871bd5574c8470db425c3c6d3c6227a0874b505facc439cdb89ae06bab
