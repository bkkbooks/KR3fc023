body:
  text: 三貫丁二十九貫戊三十八貫法曰置鈔一百二十貫爲實倂各差甲差六分乙差四分除之得一分五厘二存率以半之得七厘五毫爲一停率再置乙差四分內减一停率七厘五毫餘三分二厘五毫爲丙差乙二因乙差得八分內减一停率餘七分二厘五毫爲丁差又二因乙差得八分加入二停率一分五毫共得九分五厘爲戊差所五停率数共得三十爲法除之得四貫爲鈔率以乗各差得数合問折半差分法曰置各區数從上折半差乗之爲衰副併爲法以所輸数乗未倂者各自爲列實以法除之得一分数今有官輸白綿五千斤令五區以粮多寡又從上减半差出之甲區秋粮米六千八百五十石乙區秋粮米七千二
