body:
  text: 廬山山高八十里山峯項上一粒米粒米一轉正三分幾轉至山腳底荅曰四百八十萬轉法曰置山高八十里以三百六十步乘之得二万八千八百步每步以五十寸乘之一百四十四万寸以轉二分除之合問三西去取經一去十萬八千程每日常行七十五問公幾日得回程荅曰一千四百四十日法曰置一十万八千里爲實以每日七十五里爲法除之合問三寸魚兒九里溝口尾相直到頭試問魚兒多少数請君明白説因由荅曰五萬四千箇法曰置溝九里以乘之得三千百四十九每步五十寸乘
