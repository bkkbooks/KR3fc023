body:
  text: 法置一面長三十六步乘中闊一十二步共得四百三十二步以法而一合問今有圭田闊五步二分步之一長八步問為田幾何答曰二十二步法曰闊五步以分毋二通之加分子一共十一又置長八步以闊分毋二通之得一十六長闊相乘得一百七十六折半得八十八為實以分毋二自乘得四為法除之合問今有圭田闊五步長八步三分步之二問為田幾何答曰二十一步三分步之二法曰置八步以分毋三通之加分子二共二一又置闊
