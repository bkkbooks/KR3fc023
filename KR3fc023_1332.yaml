body:
  text: 縣空重車乘除得日行一百加載輸各四日重車二百空車二百八十共五百八十以六人乘得三千四百八十又以一日五文乘得一万七千四百却以一車載二十五石除得六百九十六加粟價一十文以一日重車五十乘得五百共一千一百九十六約一萬九千一百三十六算得一十六爲衰各列置衰甲四十二乙二十四丙一十六丁一十五戊二十巳一十六副併共一百三十三爲法以所賦粟六万石乘未併衰各自为實甲得二百五十二万乙得一百四十四万丙得九十六万丁得九十万戊得一百二十巳得九十六万以法一百三十三除之各得數合問鳥儿起南海七日至北海鳫起北海九日至南海今鳥儿鳫俱起問何日相逢答曰三日十六分之一十五法曰置日數七日九日琴得六十三日爲實併日數
