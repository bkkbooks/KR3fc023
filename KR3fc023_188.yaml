body:
  text: 得四千九百三十步折半得二千四百六十五步以畒法除之合問今有抹角田西南闊二十五步東北長三十二步問為田幾何答曰四畒三十九步半法曰置東北長自乘為實減西南闊餘十步自乘折半減餘以畒法之合問今有眉田上周四十九步下周四十五步中徑一十四步問為田幾何答曰一畒八十九步法曰併二周上四十九步下四十五步得九十四步折半得四十七步為實以中徑一十四步折半得七步為法乘之得三百二十九步以畒法除之合問
