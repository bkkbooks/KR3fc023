body:
  text: 七十自乗得九千九百四十万九百於上别以分母一百四十一减分子一百餘四十一以乗分子一百得四千一百併入数共得九千九百四十万五千爲實以分母一百四十一自乗得一万九千八百八十一爲法除之得五千半人得積二千五百以開平方法除之合問今有方田斜七步問方一面幾何答曰四步十八分步之十七法曰置斜七步自乗得四十九百半之得一十四岁半爲實以開平方法除之得四步餘實半步半爲分子倍本方四步得八部加子一得九爲分母皆倍之合問今有梯田一十四畒一分比闊五十步正長九十四步問
