body:
  text: 法曰以粟五十乘糳米三斗以分母三分通得九十加分子一共九十一得四千五百五十為實以糳米二十四以原通分母三通得二十二為法除之合問問御米一十四斗為粟答曰三十三斗三升三分升之一法曰以粟乘御米一十四斗為實以御米二十一為法除之問稻穀十二斗六升十五分升之十四為粟幾何答曰十斗五升九分升之七法曰以粟五十乘稻穀十二斗六升以分母十五通得一千八百九十加分子十四共一千九百四得九万五千二百為實以稻穀六十以分母十五通得九百為法除之問糲米一十九斗二升七分升之一為稗米幾何答曰一十二斗二升十四分升之三
