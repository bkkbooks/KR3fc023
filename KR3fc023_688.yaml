body:
  text: 六千二百五十丙得三十三万七千五石丁得二十八萬一千二百五十戊得一十九万三千七百五十以法六千二百五十除之得數合問今有錢九十五貫九百二十八文欲糴米麥豆三色須用一分米二分麥三分豆米每斗五十四文麥每斗三十六文豆每斗二十八文問三色各幾何答曰米四十五石六斗八升麥九十一石三斗六升豆一百三十七石四升法曰置錢九十五貫九百二十八文為實以分數併各價米一斗五十四文麥二斗七十二文豆三斗八十四文共得二百一十文為法除實得米四十五石六斗八升以二乘得麥九十一石三斗六升加五得豆一百三十七石四升合問
