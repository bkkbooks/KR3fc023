body:
  text: 答曰重一十二秤一斤十一兩六錢四分八厘法曰置周三尺六寸以三而一得徑一十二寸再自乘得一千七百十二八寸以九因十六而一得積九百七十二寸於上又置徑一十二寸以減各厚四分得八分餘徑一十一寸二分再自乘得一千四百四寸九分二厘八毫以九因十六而一得空積七百九十寸二分七厘二毫以減徑積餘得金積一百八千一寸七分二厘八毫以每寸該金一斤合問人間八十里圍城遍地鋪金二寸深一寸自方一斤重請問共該多少金答曰二千五百九十二億斤法曰置城方八十里以除之得二十里爲一面之數以二十里與里步三百六十乘之得七千二百步又以步寸法五十寸乘之得
