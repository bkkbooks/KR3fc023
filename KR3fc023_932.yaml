body:
  text: 八文法曰各列置衰鵝五百兔七百二十鷄八百九十六副併得一千一百一十六爲法以所賣麥五石二斗九升乗未併者鵝得二千六百四十五石兔得三千八百八石八斗鷄得四千七百二十九石八斗四升各自爲列實以法二千一百一十六各除之鵝一石二斗五升兔得一石八斗鷄得二石二斗四升以各率除之得各價又以錢十二女乗之合問四十四秤三斤銀四箇啇人依率分原銀逓該四六出休將六折熟瞞人答曰甲一十八秤五斤六兩四錢乙一十二秤三斤九兩六錢丙八秤二斤六兩
