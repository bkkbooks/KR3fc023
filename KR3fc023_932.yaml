body:
  text: 八文法曰各列置衰鵝五百兔七百二十雞八百九十六副併得一千一百一十六為法以所賣麥五石二斗九升乘未併者鵝得二千六百四十五石兔得三千八百八石八斗雞得四千七百二十九石八斗四升各自為列實以法二千一百一十六各除之鵝一石二斗五升兔得一石八斗雞得二石二斗四升以各率除之得各價又以錢十二女乘之合問四十四稱三斤銀四箇啇人依率分原銀遞該四六出休將六折熟瞞人答曰甲一十八稱五斤六兩四錢乙一十二稱三斤九兩六錢丙八稱二斤六兩
