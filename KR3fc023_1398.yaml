body:
  text: 法曰置原用絲七斤一兩以銖法通之加零三銖共得三千四百八十三銖通今織八十四疋加零一丈四尺共得二千七百二尺乗之得九百四十一萬一千六十六爲實以原織心疋通之加零八尺二寸共得二百三十二尺二寸爲法除之得四萬五三十銖以斤兩銖法約之合問今有造水葉一十一萬六千九百七十二斤每一百片用鐵一秤六斤八兩問該鐵幾何答曰一千六百七十六秤八斤十五兩六錢八分法曰叫問乃乗除互換置水葉以用鐵通作二十一斤半乗之得二百五十一万四千八百九十八斤爲實以每百斤爲法除之得二萬三千一百四十八斤除實九十八定身减五得一千六百七十六抨八斤餘實九十八以
  hash: sha256:c22a70b693467fb68c43b2a98381698ae9dd8bc20e9c4f81a19aaf4981e3ca03
