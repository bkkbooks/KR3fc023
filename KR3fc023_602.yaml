body:
  text: 家有百文買百雞五文椎價步差池草雞每箇三文足小者一文三箇知玄妙法實幽微乘除加减任公為要知三色該多少特問明公甚法推右鷓鴣天答曰雄雞一十二箇該錢六十文草雞四箇該十二文小雞八十四箇該錢二十八文法曰置錢一百以三因得三百內减共數一百餘二百為實以三因雄雞五文得十五內减一餘十四為法除之得雄雞十二餘實三十二却三因草雞三文得九文內减一餘八除餘實草雞四以减總數一百餘得小雞八十四各價乘除合問三斗三升買箇鍋九千九百事如何乘除方法從公算不
