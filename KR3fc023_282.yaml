body:
  text: 三畝問截闊幾何答曰闊一十五步法曰置截田三畝以畝法乘之得七百二十步為實以原長四十八步為法除之合問今有直田長四十八步開四十步計八畝今依原闊截賣二畝問截長幾何答曰一十八步法曰通截田三百得七十步為實以原闊四十步為法除之得一十八步合問詞詩三十六問今有圭田一段昔年頗記魯量一百八十正中長五十四步闊享從尖截賣九畝得要納秋糧截該長闊數明彰
