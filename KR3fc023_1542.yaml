body:
  text: 三兩爲賤實以貴賤率玉重七兩石重六兩以少减多餘一兩爲法除之得石一十三寸减共積二十七寸餘得玉一十四寸以七兩乗得九十八兩石一十三寸以六兩乗得七十八兩合問醇酒一斗直五十行酒一斗直十文以錢三十買醇行酒二斗問各幾何答曰醇酒二升半行酒一斗七升半法曰此問亦前法置醇行酒二斗乗貴價五十得一百减部錢三十餘七十爲實以貴價五十减賤價一十餘四十爲法除實先得行酒一斗七升五合减共酒二斗餘得醇酒二升五合合問善田一畝直三百惡田七畝直五百今置一百畝共價十各幾何答曰善田一十二畝半惡田八千七
