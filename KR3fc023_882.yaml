body:
  text: 十九日與三十日相乘得八百七十折半得四百三十五却以添九丈乘得八十二丈六尺五寸加前六十丈共一百四十二丈六尺五寸匹法除之合問節遇元宵十五明燈百盞堪游兩稱五斤十兩油三夜神前如書三盞添油五兩九兩四甌無留要知多少盞和甌算得須當敬酒右西江月答曰盞六十箇一夜油六斤四兩三夜共油一稱三斤二兩甌四十箇一夜油五斤十兩三夜共油一稱一斤十四兩法曰列置三盞四一百八五九兩一百九十先以上中互乘三盞乘九兩得二十七兩的諫乘五兩得二十四以少减多餘七兩為法再以中下
