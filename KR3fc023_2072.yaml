  text: 乹六尔五六加三十將乹六改作离九中五兩五五加二十五將中五改作艮八却將次位离九改作異四合作四貫震三十五三加一十五將震三改作中五却將次位艮八改作震三巽四百五四加二十將異四改作乹六今有鈔六千五百三十四貫毎鈔一十五貫銀一兩問該銀幾何荅曰四百三十五兩六錢法曰置鈔六千五百三十四貫爲實以兩價鈔一十五貫爲法從實前起定身減之得四百三十五兩六尔合問巽四貫五六減三十將离九改作乹六合依定位得六尔震三十五五減二十五將艮八改作中五却將次位異四改作离九
