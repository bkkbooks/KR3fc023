body:
  text: 今有小麥八斗六升磨麪六千四斤八兩共有小麥三十五石四斗八升問該麪幾何答曰二千六百六十一斤法曰以共有小麥三十五石四斗八升乗磨麪六十四斤半得二千二百八十八石四斗六升爲實以原小麥八斗六升爲法除之合問今有麪二千六百六十一斤用小麥三十五石四斗八升今有麪六十四斤八兩問該用小麥幾何答曰八斗六升法曰以只有麪六十四斤八兩小麥三十五石四斗八升得二千二百八十八石四斗六升爲實以原有麪二千六百六十一斤爲法除之合問
