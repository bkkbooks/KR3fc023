body:
  text: 今有小麥八斗六升磨麵六千四斤八兩共有小麥三十五石四斗八升問該麵幾何答曰二千六百六十一斤法曰以共有小麥三十五石四斗八升乘磨麵六十四斤半得二千二百八十八石四斗六升為實以原小麥八斗六升為法除之合問今有麵二千六百六十一斤用小麥三十五石四斗八升今有麵六十四斤八兩問該用小麥幾何答曰八斗六升法曰以只有麵六十四斤八兩小麥三十五石四斗八升得二千二百八十八石四斗六升為實以原有麵二千六百六十一斤為法除之合問
  hash: sha256:a54cf4541b76c60c231f5f8a2ab79f49fe319a283cee01590cc38a4ae027ba5b
