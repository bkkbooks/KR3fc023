body:
  text: 幾何答曰一十六石九斗法曰置下周九尺七寸五分自乘得九十五尺六分二厘五毫又以高四尺乘之得三百八十尺二寸五分却倚角率九除之得四十二尺二寸五分爲實以斛法二尺五寸爲法除之得一十六石九斗合問今有倚壁內角堆米一六石九斗下周九尺七寸五分問高幾何答曰四尺法曰置米一十六石九斗以斛法二尺五寸乘之四又以倚壁內角率九因之得三百八十尺二寸五分爲實以下周九尺七寸五分自乘得九十五尺分二厘五爲法除之得高壁合問角堆米一十六石九斗高四尺問下周義
