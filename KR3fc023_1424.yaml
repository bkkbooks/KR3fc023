body:
  text: 一百八十五人煎四十五日問得塩幾何答曰四千七十四引法曰置灶丁九人加今增一百八十五人共一百九十四人以今煎日四十八乗又以原煎塩二十七引五分六厘二毫五絲乗之得二十五万六千六百六十二爲實以原灶丁九人乗原日七得六十三爲法除之合問今有九人九日淘金一十八銖今三十人今淘金一斤問合用幾日答曰五十七日五分日之三法曰置今淘金一斤通作三百八十四銖以九人乗之得三千四百五十六銖又以九日乗之得三万一千一百四銖爲實以原淘金一十八銖乗今人三十得五百四十爲法除之得五十七日餘實二百一十四銖法實
  hash: sha256:20f40462a033af7d195a79f627d014c9709a46db342d737d374fda6282ecf8ba
