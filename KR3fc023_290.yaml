body:
  text: 答曰截長四十步截闊三十八步法曰通截田五畝六分以畝步通之加零華十六步共一千二四六十步倍之得二千七百一十步乘梯田一百步得二十七万二千步却以大平五十步減小平二十步餘差一十步除之得一万三千六百步為實倍小平三十步得六十步以乘梯長一百步得六千步却以餘差二十步除之得三百步為從方以開平方法除之得截長四十步求截開以餘差二十步乘截長四千倍得八百步為實却以梯長一百步除之得八步加小平三十步共得三十八步為截闊合問今有梯田一假正長三十無餘南廣十八比十二計積四共五十今自北頭截起一半賣興相知問該多少是田積
