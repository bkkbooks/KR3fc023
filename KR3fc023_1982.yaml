body:
  text: 法曰置積爲實別置一筭名曰下法自末位常超五位約實得万億啇置第一位得二百下法亦置上啇爲二万億四遍二乗得三十二万億爲隅法與上啇二除實六十四万億餘實一百四十一万八千九百一十一億三千二百九万四千六百四十九尺乃六乗隅法得一百九十万億爲方法下法副置上啇二百爲二万億列爲四位第一位三遍二乗得一十六万億又以十五乗之得二百四十万億爲上廉第二位二遍二乗得八万億又以二十乗之得一百六十万億爲二廉第三位以二乗得四万億又以十五乗之得六十万億爲三廉第四位以六乗得一十二万億爲下廉乃方法一退得一十九万二千億上廉再退得二万四千億二廉三退得一千六百億三
  hash: sha256:ec6278d721fe1c05c3f8d370b765c7e908185fa06df841939741b3fe824b72a3
