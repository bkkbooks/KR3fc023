body:
  text: 百尺又以髙五十尺乗之得三十万五千尺如三而一合問圓亭䑓上周二丈下周三丈髙一丈問爲積幾何答曰五百二十七尺九分尺之七法曰上周小下周大有髙爲䑓形如造餅炉若何之如圓窖也置上周自乗得四百尺下周自乗得九百尺上下周二十三十相乗得六百尺併之得一千九百尺以髙一十尺乗之得一万九千尺如三十六而一合問方錐下方二丈七尺髙二丈九尺問爲積幾何答曰七千四十七尺法曰如斛四垛置下方自乗得七百二十九尺以髙二十九尺乗得二万一千一百四十一尺如三而一合問
