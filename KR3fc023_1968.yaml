body:
  text: 上廉再退得若干中廉三退得若干下廉四退得若干下法五退得若干再啇置第三位以方廉四法共若干啇餘實得若干下法亦置上啇若干三遍自乗得若干爲隅法又以上啇若干一遍乗上廉得若干二遍乗中廉得若干三遍乗下廉得若干以方廉隅五法共若干皆與上啇若干除實盡得若干合問今有四乗方積一十九萬七千一百六十二億四千五百三十二萬三千七百七十六尺問一方面幾何荅曰四百五十六尺法曰置積為實別置一筭名曰下法自末位常超四位
