body:
  text: 頭上廣二丈下廣二丈又髙二丈二尺正長一百二十五丈問積幾何答曰四萬二千一百五十丈法曰倍東高九尺得一丈八尺併入西髙二丈二尺共得四丈以東上廣一丈併下廣一丈六尺共二丈六尺折半得一丈三尺乗之得五百二十尺又置西髙二丈二尺倍之得四丈四尺併入東髙九尺得五丈三尺以西上廣二丈併下廣二丈四尺共四丈四尺折半得二丈二尺乗之得一千一百六十六尺併二数得一千六百八十六尺以正長一千二百五十尺乗之得二百一十万七十五百尺以五除之得四万二千一百五十尺合問今有築篭尾堤其堤從頭髙上闊以次斬狹至尾只云末廣少堤頭廣六尺又少髙一丈二尺又少袤四丈八尺甲
