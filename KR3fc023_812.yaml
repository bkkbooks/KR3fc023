body:
  text: 得逐等每戶之米求各等共數以各戶米數乘各等戶合問遞多金五兩差分今有金六十兩令甲乙丙三人依等次差五兩均分問各幾何答曰甲二十五兩乙二十兩丙一十五兩法曰置金六十兩內減差甲多丙一十兩乙多丙五兩共一十五兩餘四十五兩為實以人三為法除之得丙金一十五兩各加差五兩合問遞多七多五差分今有官配米二百七十八石五斗令三等人戶出之上等二十戶每戶多中等七斗中等五十戶每戶多下等五斗
