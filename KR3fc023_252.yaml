body:
  text: 十四為法除之得一匹餘實二十一法實皆三約之合問今有錢四貫八百七十二問七分文之四於內減去一貫六百二十四問六分文之一問尚餘幾何答曰三貫一百四十八文四十二分文之十七法曰置減去錢一千六百二十四文以分母六通之加分子一共得千七百四十五又以原錢分母七通之得六萬八千二百一十五列座又置石錢四千八百七十二文以分母七通之加分子四共得七万四千一百八以減去錢分母六通之得二十万四千六百四十八於內減去位六万七千二百一十五餘錢一十三万六千四百三十三為實以二分母六分七分相乘得四十二為法除之得三貫二百四十八文餘實
