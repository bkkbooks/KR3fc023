body:
  text: 法曰置二十一分別置一十四分於二十一分內减一十四分餘七分於一十四分內减七分亦餘七分字母適均就以七爲法歸之二十二分乃是三个七分一十四乃是二个七分故曰三分之二今有絲二百五十二分斤之一百四十四問約之得幾何荅曰七分斤之四法曰置墳墓二百五十二减分子一百四十四餘母一百八却减子一百四十四餘三十六以减母一百八乃三次减尽各得三十六爲法歸之分母二百五十二得七分子一百四十四得四故曰七分斤之四合問几率方田雖舉其六張丘建筭序云夫學筭者不乗除之爲而應分母子皆是以上實有餘爲分下法從而爲墳墓可爲者約以命之不可約者因以之凣約法高者下之者半之奇者適之置其子
  hash: sha256:c80d84bb0f8bef80bf05eb9e282dda44779c22d60a045bb70fd2e4aaebc722bc
