body:
  text: 九分步之一十分步之一問縦幾何答曰八十一步七千三百八十一分一分步之六千九百二十九法曰列置全步及分毋子照前法列而副併分毋自乗得三百六十二万千八百以乗全步及分子俱得三百六十二万八千八百以全步積分通畒步得八億七千九十一萬二千爲實各以本毋除子照前法除併之得一千六十二万八千六百四十爲法除之得八十一步餘實九百九十九万二千一百六十法實皆一百四十四約之得七千三百八十一分步之六千九百三十九合問田一畒廣一歩半三分步之乛四分步之一五分步之一六分步之一七分歩之一八分步之一九分步之一十分步之一十一分步之一問縦幾何
