body:
  text: 公原本要先知答曰五十斤法曰通絲五得七十五斤為實以月十二為法除之得六十二斤半以息二兩作一二五除之得原本五十斤合問十萬三十短竹做成好筆堪言管三冐五有則不知多少圑圎答曰筆一十九萬三千一百二十五管管用竹六萬四千三百七十五竿冐用竹三萬八千六百二十五竿法曰置竹一十万三千為實併管三冐五共得八為法除之得一万二千八百七十土為一停率以三乗之得冐用竹三万八千六百二十五竿以五乗以管三乗之得
  hash: sha256:68acc1bcc8695e1945754c4db71618f6f4a277f6a5076dd0bc465bb5c83b467f
