body:
  text: 法曰此問亦法列置善惡畝價乗善一畝價三百惡七畝價五百共一百畝價一千貫維乗善田一畝乗價五百得賤價五百惡田七畝價三百得貴價二貫一百又以惡田七畝乗十貫得部價七十貫以貴價二貫一百乗共畝一百得二百一十貫减都價七十貫餘一百四十貫爲賤實以貴價二貫一百减賤價百餘一貫六百爲法除之先得惡田八十七畝半以减共田一百畝得善田一十二畝半合問金九銀十一共重適等交易其一則金輕十三兩問各重幾何答曰金重二斤三兩十八銖銀重一斤十三兩六銖法曰此問亦同前法求金銀差数不知金銀之重則互易一金一銀爲二除
