body:
  text: 法曰假令原酒一斗六升不足五升一斗七升盈二升以盈不足互乗原酒不足五升乗一斗七升得八斗五升盈三升乗一斗六升得四斗八升併之得一石三斗三升爲實併盈三升不足五升共八升爲法除之合問栖樹一群鴉鴉樹不知数三箇坐一枝五箇沒去處五箇坐一枝閑了一枝樹請問能筭士要見鴉樹数荅曰鴉二十箇樹五枚法曰置列三个盈五个五个少五个互乗盈得二十五个不足得十五个併之得四十个以三个五个以少减多餘二个爲法除之得鴉二十个各加除合問衆戶分銀各要貪戶名銀数不能參三人五兩不足五五
