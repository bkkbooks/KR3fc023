body:
  text: 價三貫甲行下負十以三乗得三十貫加入正一十八貫共得四十八貫以上正六除得硃價八貫合問今有賣紗七疋買紵絲五疋欠鈔一百一十貫又賣紗五疋買紵絲七疋欠鈔二百五十貫問二價每疋幾何荅曰紵絲五十貫紗二十貫法曰此問買爲正賣爲負列所問數以甲行上正五爲法遍乗乙行得數上正五爲法下負七正一百一十貫上正七得正三十五下負五得負二十五正二百五十得正一千二百五十却以乙行上正七爲法復遍乗甲行上正五得正一十五与乙行上正三十五同異對減尽下負七得負四十九同減乙行下負二十五餘得下負二十四
  hash: sha256:0d58b89ea80fafcd44824108b352514daa4571ea9071966782d6dd9bf514f803
