body:
  text: 八寸問巳築髙得幾何答曰四尺八寸法曰以上廣减下廣餘一尺爲法置已築上廣二尺八寸减原下廣餘一尺二寸乗原髙得九尺六寸爲實以法除之合問今有築墻上廣一丈八尺下廣四丈八尺髙三丈六尺長一千六百三十二丈每人一日自穿運築折計㓛程常積二十四尺每髙一尺用搏子木二條每條長一丈二尺大頭徑六寸半小頭徑三寸半每條用橛葽三道每四十五道用草一束四靣去城五丈開濠取土起築先定濠上廣一十四丈下廣八丈限三箇月城濠俱畢問合用人夫及所用榑子木橛葽草并濠深各幾何
