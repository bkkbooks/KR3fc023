body:
  text: 法曰置各率二米得粟三米三分斗之豆該粟三斗七升五合粟為實以分毋乘之米三斗得就都加分子一共一万三斗七升五合得一石一斗二升五合粟四斗得一石二斗併之得三石三斗二升五合為法以分毋三乘總粟一百三十三石得三百九十九石為實以法除之得一十二石為一停率二因為米三以為豆四因為粟合問聞説東鄰織女三從四德溫柔初朝二丈織絲紬次日功添尺九今色織紬一月未知幾匹根由匹法四丈步難求算得無差好手右西江月答曰三十五匹一丈六尺五寸法曰置織紬二丈以三十日乘之得六十丈再置三十日以減一日餘二
