body:
  text: 答曰六十八斤六兩法曰以共有鈔五百二十五貫一百二十文乘原買絲三十八斤其十四兩求斤得八七五共乘得二百四万一千四百四爲實以原鈔二百九十八貫五百六十文為法除之合問貴賤率今有錢二十四貫五百八十文買物五百四十斤不欲畸零問得幾何答曰二百六十斤每斤四十五文二百八十斤每斤四十六文法曰此問糸欲盡兩物不欲零名曰貴賤率者是也置錢二十四貫五百八十文為實以買物五百四十斤為法除之每斤得四十五文餘實二百八十不欲
  hash: sha256:154389cc9baa35003bb1c5307910fa54d06c28609ece0806223c281c23f085bf
