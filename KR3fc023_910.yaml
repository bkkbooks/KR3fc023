body:
  text: 色官民便三色俱停用意詳右鷓鴣天答曰三色各八斗法曰置粟三石八斗二升為實併各率米七斗除粟一斗三升三合得一斗九升芝麻八升除粟一斗五升得一斗八升七合五勺本色一斗共四斗七升七合五勺為法除合問二十八箇馬和牛小童牧放在田疇芝麻踐了該三畒陪還六斤八兩油申里長莫干休牛陪二兩是根由馬陪五兩從公論幾箇耕犍幾駿騮右鷓鴣天答曰馬一十六匹該油五斤牛一十二頭該油一斤八兩法曰置總數二十八個以馬陪五兩乘之得一百四十以減陪油一百四兩餘三十六兩為實以馬陪五兩減牛陪二兩餘三兩為法除之
