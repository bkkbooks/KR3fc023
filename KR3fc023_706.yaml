body:
  text: 貫三百文除之得陳皮厚朴各三百二十七斤各以斤價乗之今有鈔三百七十八貫九百文糴四色粮斛數皆均平粟每斗價鈔三百四十文豆每斗價鈔二百五十文黃米每斗價鈔四百八十文白米每斗價鈔五百三十文問四色並價鈔各該幾何答曰各該二十三石六斗八升一合二勺五抄白米該鈔一百二十五貫五百一十文六分二厘五毫黃米該鈔一百一十三貫六百七十文豆該鈔五十九貫二百三十文一分二厘五毫
