body:
  text: 步闊八步四面存留各三步半法曰通田二百四十步爲實以差一步爲從方開平方除之得闊一十五步以除緫田得長一十六歩又通賣三分得七十二步爲實以差一步爲從方開平方法除之得闊八步以除七十二步得長九步以減原長闊各餘七步折半得四面各存合問今有方圓田地九畒四分五厘方面圓徑適等如何得見端的荅曰方面圓徑各三十六步法曰通田九畒四分五厘得二千二百六十八步於上以方四圓三併之得七除之得三百二十四爲一停率以四乘之得一千二百九十六爲實以開平方法除之合問
  hash: sha256:1a3c70dfdee5d5508570195ff20c35a31c4590a1f386fb861e6be1f7e7b8ed8c
