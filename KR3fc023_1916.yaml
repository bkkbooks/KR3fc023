body:
  text: 荅曰方面六十步地一十五畝法曰置立竿二百尺加垂地餘五十尺共二百五十尺自乘得六万二千五百尺减杆二百尺自乘得四百万尺餘得勾二万二千五百爲實以開平方法除之得勾一百五十尺三十步倍得方面六十步自乘得三千六百步以畝法而一得地一十五畝合問圓池八分下釣鉤魚吞水底是根由鈎繩五十岸齊頭使盡機関無法䆒橫深與誠源流水深幾尺宗難求荅曰水深三十尺法曰畝步通之得一百九十一步以四因三而一得二百五十六步以開平方法除之得池徑十六步折半得一
  hash: sha256:63b036ef01d9150f044ba85a63e795427431dd57d442736c802906982126f2f6
