body:
  text: 法曰置州裏二千七百里爲實以人十八爲法除之得每人一五十裏以馬七匹乗之得騎馬一千五十裏以減州裏餘得人行一千六百五十裏合問今有某州二千八十四人騎九匹馬每人十裏輪轉騎幾里騎行幾步要答曰人行一千里騎馬一千八百里法曰與前法同大車一輪十八輻小車一輪十六輻數了五十一條軸幹六九十條輻答曰大車一十六輛小車三十五輛法曰置總數五十一條爲實以大車十八二回得三十六乗之得一千八百三十六以減一千六百九十六餘一百四十以大車十八小車十六以少
