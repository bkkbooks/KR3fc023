body:
  text: 得千貫已上得万貫辰上得十万卯上得百万寅上得千万合問小乗大今有人二十五萬名毎名出銀五毫三絲問該銀幾何荅曰一百三十二兩五錢法曰置人二十五万名爲實以毎名出銀五毫三絲爲法乗之得数不動却從掌中寅位上定實順数實人十万卯上得万人辰上得千人已上得百人午上得十人未上得一人乃申上得法首毫復逆数回未上得厘午上得分已上得尔辰上得兩卯上得十兩寅上得百兩共得一百三十二兩五尔合問大乗小今有金七厘五毫毎兩價錢四千五百萬文問該錢幾何荅曰三十三萬七千五百文
