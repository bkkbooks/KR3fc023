body:
  text: 究而融會之耶若夫我聖儒堯夫邵先生默觀乎梧桐之樹片葉初飄而即知夫一歲豐歉之徵賞玩乎牡丹之本衆萼方揚而遽見夫諸賢用舍之兆是又真悟其像外之玄機環中之妙造矣然究其所以為妙造者又豈出于天一地二以至于天九地十六數之元會也耶
