body:
  text: 千爲實以原負塩二石以分毋三乘之得六百與原行里一百相乘得六万與法除得二十七乑餘實四万四千法實皆四千約之得十五分乑之十一合問負籠重一石一十七斤即一百三十七斤行七十六步一日五十返即三千八百步今負籠重一石即一百二十斤行一百步問日幾返曰五十七返二千六百三分返之一千六百二十九法曰置今負籠一百二十斤乘今行步一百得一万二千與原行返五十相乘得六十万爲實以原負籠一百三十七斤乘原行步七十六得一万四百一十二爲法除之得五十七返餘實六千五百一十六法實皆四約數合問
