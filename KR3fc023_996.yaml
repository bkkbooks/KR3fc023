body:
  text: 法啇置第一位得三千下法亦置三千進三位為三百万為方法與上啇三除寶九百万餘寶三万六千三十六乃二乘方法得六百万為廉法三退得六千下法六退得一續啇置第四位以廉法六千啇寶得六下法亦置六為隅法以廉隅二法共六千六皆與上啇六除寶盡得三千六以分毋四為法除之得七百五十一步半合問積三十九億七千二百一十五萬六百二十五步問平方一面幾何答曰六萬三千二十五步法曰置積為寶照前法啇置第一位得六万下法亦置上啇六万進四位為六億為方法與上啇六除寶三十六億餘寶
