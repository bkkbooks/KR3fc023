body:
  text: 法曰置原行道一千今與鈔六千七百六十八文得六百七十六万八千以乗原載重一千二百得八十一億二千一百六十万爲實以仐重共一千七百九十二乗原與鈔七千五百得一千二百六十九万爲法除之合問今有顧車一輛行道一千里載重一千二百斤與鈔七貫五百文今與鈔七貫六百五十文行道一千七百里問合載重幾何答曰七百二十斤法曰置原載重一千二百乗原行道一千得一百二十万以乗今與鈔七千六百五十得九十一億八千万爲實以今行道一千七百乗原與鈔七千五百得一十二百七十五万爲法除之何問今有顧車一輛行道一千里載重一千二百斤與鈔七貫
