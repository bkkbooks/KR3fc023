body:
  text: 皆一百四十四約之合問日一畒廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一六分步問縱幾何答曰八十四步七千一百二十九分步之五千九百六十四法曰列置分毋子及全步照前法列而副併分毋自乘得三十六万二千八百八十以乘全步及分子俱得三十分二千八百八十全步積分以通畒步得八千七百九万一千二百為實各以本毋除子照前法除併之得一百二萬六千五百七十六為法除之得八十四步餘實八十五萬八千八百一十六法實皆一百四十四約之合問田一畒廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一
