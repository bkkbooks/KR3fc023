body:
  text: 以法一百三十七除之不滿法者以法命之合問粟三乙持糲米三升丙持糲飰三升欲令合而分之問各得幾何答曰甲二升十分升之七乙四升十分升之五丙一升十分升之八法曰此問以粟糲飰衰為分母所持為分子各列置衰列相與率也四粟得五十分之三乙糲米得三十分之三丙糲飰得七十五分之三分母互乘子之三乘七十五又乘二分中得六百七十五之三乘五十又乘七十五乙得一千一百二十五之三乘五十又乘三分丙得四百五十副併得二千二百五十為法以所分米九升乘未併者甲得六千七十五乙得一万一百二十五丙得四千五十各自為列實以法
