body:
  text: 八百九十以少减多餘一百八十爲法又以七家九家相乘爲六十三家又爲法出一貫七百一十六十三家三百三十出一貫八百九十六十三家盈三十盈不足令維乘所出率併之爲實盈三十互乘一貫十百一十得五十一貫三百不足三百三十互乘一貫八百九十得六百十三貫七百併之得六百七十五文爲實併盈不足乘戶亦爲實盈三十不足三百三十三百六十乘六十三家得二萬二千六百八十家俱以法一百八十除之得数合問共買金人出四百盈三貫四百文人出三百盈一百文問人数金價各幾何荅曰三十三人金價九貫八百法曰此問兩盈置所出率人数兩盈各令維乘所出率出四百一人盈三貫四百出三百一人盈一百文以少减多餘爲法實
