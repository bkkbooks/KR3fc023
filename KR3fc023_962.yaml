body:
  text: 古問二十四問田一畒廣一步步問幾何答曰一百六十步法曰置田一畒以畒法通之得二百四十步為實以廣一步半為法除之得一百六十步合問田一畒廣一步半全步乃一分之一半二分步之一三分步之一問縱幾何答曰一百三十步一十一分步之一十法曰田六畒為主以廣求業但其中加分毋分子位以多用合分互乘之法豈不到古人棄洽分之以毋乘為全步之積及分子毋各除其子併之注以全步積分乘步為實如法而二其後各則是一畒以廣問同列置全步全步即一分之
