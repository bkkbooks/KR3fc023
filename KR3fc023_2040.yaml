body:
  text: 今有芝麻二十三石四斗五升每石價鈔二貫八百文問該鈔幾何荅曰六十五貫六百六十文法曰置所有麻二十三石四十五升倍之得四十六石九斗爲實以毎石價鈔二貫八百文折半得一貫四百文爲法加之合問今有絲三百七十一兩毎兩價鈔四百八十文問該鈔幾何荅曰一百七十八貫八十文法曰置所有絲三百七十一兩重倍得一千四百八十四兩爲實以所求價鈔四百八十文兩折半得一百二十文爲法加之合問今有絹一十二疋二丈八尺疋法四丈毎尺價鈔五百二十文問該鈔幾何荅曰二百六十四貫一百六十文
