body:
  text: 法曰置凈絲一千二百四十八斤其零四兩入糸以兩求斤法得三爲實以凈絲九糸爲法除之合問今有凈絲一千二百四十斤四兩八錢毎凈絲一兩練熟絲七錢五分問該練熟絲幾何答曰九百三十六斤三兩六錢法曰置凈絲一千二百四十八斤以斤法十六兩通之加零四兩八糸共得万九千九百七十二两八糸爲實練熟絲七糸五分爲法乗之得一万四千九百七十九两六糸以两求斤法除之合問今有練熟絲九百三十六斤三兩六錢毎七錢五分原用凈絲一兩問該凈絲幾何
