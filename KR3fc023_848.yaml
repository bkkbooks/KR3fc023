body:
  text: 法曰置淨絲一千二百四十八斤其零四兩入糸以兩求斤法得三為實以淨絲九糸為法除之合問今有淨絲一千二百四十斤四兩八錢每淨絲一兩練熟絲七錢五分問該練熟絲幾何答曰九百三十六斤三兩六錢法曰置淨絲一千二百四十八斤以斤法十六兩通之加零四兩八糸共得万九千九百七十二兩八糸為實練熟絲七糸五分為法乘之得一万四千九百七十九兩六糸以兩求斤法除之合問今有練熟絲九百三十六斤三兩六錢每七錢五分原用淨絲一兩問該淨絲幾何
