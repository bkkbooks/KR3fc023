body:
  text: 城垣堤溝塹渠未稽法同併上下廣半之以髙或深乗之即梯田之法也又袤乗之城側有上下廣及髙正面有長故袤乗之方堢壔周自乗形如方田又髙乗之形如方柱用髙乗也圓堢壔周自乗下有十二而一卽用圓田法也又髙乗之形如圓柱上下一等故用高乗之如十二而一見上文方亭䑓上方自乗下方自乗上下方相乗併之以髙乗之如三而一二方自乗上一下方相乗併之如三而一其亭也形高又用髙乗之圓亭䑓上周自乗下周自乗上下周相乗併之以髙乗之如三十六而一圓亭䑓之法如方亭䑓之法一同有方圓之異方錐下方自乗形以髙乗之如三而一以高乗多二
