body:
  text: 錢唐南湖後學吳敬信民編集盈不足計六十四問法曰置出率盈與不足各居其下出率盈率出率不足以盈不足令維乘維乘即互乘出率各人出数併以爲實併已聚出率併盈不足爲法實如法而一出率爲實盈爲法有分者通之有分者通無分不用盈不足相與同其物者盈不足爲物率同列其位也置位出率人数盈率出率人数不足所出率以少减多副相减餘以約法預爲約法求源物價爲實人数爲法其一法曰併盈不足爲實以所出率以少减多餘数爲
