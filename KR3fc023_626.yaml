body:
  text: 油一百斤用布一十二匹法曰列置四匹三匹一百匹五十二十五一千二百先以上中互乘四匹乘二十五得一百三匹乘五十斤得一百五十以少减多餘五十為法又以中下互乘三匹乘一千二百得二千六百二十五斤乘一百得二千五百以少减多餘一千一百邞以鹽四匹乘之得四千四百為實以法五十除得鹽布八十八匹該鹽一千一百斤以减總布百匹餘得油布一十二匹該油一百斤合問足色黃金整一斤煆匠誤侵四兩銀斤兩雖然不曾耗借問却該幾色金答曰八成色
