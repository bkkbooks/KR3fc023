body:
  text: 又正面斜長二十自乘得五百七十六以四而一合問今有錠腰田半邊正面長二十四步正中一十二步兩旁曲各周一十八步問為田幾何答曰七十二步法曰置正面長二十四步自乘得五百七十六以八而一合問又法正中闊一十二步自乘得一百四十四步折半合問又法兩旁曲周一十八步自乘得三百二十四倍九而一今有錠腰田半曲周一十八步兩旁半周各九步問為四幾何答曰七十二步法曰置曲周一十八步自乘得三百十四倍之九而一合問又法併兩旁半周得一十十八步自乘倍之九而一
