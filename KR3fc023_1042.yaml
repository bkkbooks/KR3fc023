body:
  text: 法曰通田三頃七十五畒得九万步爲實以開平方法除之得三百步爲一方面以里布而一合問今有直田積一千二百九十六步問一方面幾何答曰三十六步法曰置田積一千二百九十六步爲實以開平方法除之合問今有直田積一千三百步問一方面幾何答曰三十六步七十三万步之四法曰置田積一千三百步爲實以開平方法除之得三十六步餘實四分子倍方法三十六子一共七十三分爲分母合問今有直田面互十步問斜幾何
