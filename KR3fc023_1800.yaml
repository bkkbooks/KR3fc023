body:
  text: 木長二丈圖之三尺爲其下經木七周上與木齊問萬長幾何答曰二丈九尺法曰此問乘圖如股木長如勾問萬如弦勾七周乘三圖得二十一尺自乘得四百四十一尺股木長二十尺自乘得四百尺併得八百四十一尺爲實以開平方法除之合問弦十七步勾八步問爲股幾何答曰十五步法曰弦自乘內有一勾一股積减去餘勾餘股弦積弦十七自乘得二百八十九减勾八自乘得六十四餘得二百二十五爲實以開平方法除之合問圓材經二尺五寸爲板欲厚七村問開幾何答曰二尺四寸
