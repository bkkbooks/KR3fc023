body:
  text: 右六犬爲法空一兎二十中四犬得二十四二豬得一十二空二十得一万二千左空一豬八兎二十却以中行犬四爲法復遍乗右行犬六得二十四与右行犬二十四對減尽豬空中行豬只得豬正十二兎一得四中行左空无減只得兎正四二千得八千減中行一万二千餘正四千再相乗以中行豬正十二爲法遍乗左行豬正一得正十二兎正八得正九十六正二千得正一万四千却以左行豬正一爲法復遍乗中行豬正十二得正十二与左行豬正十二同名對減尽兎負一得兎負四異加左行兎正九十六得一百爲法五四千得正四千同減左行正二万四千餘得正二万爲實以法除得兎價
