body:
  text: 答曰九尺七寸五分法曰置米照前以斛法乘之又以倚壁內角率九因之得三百八十尺二寸五分爲實以高四尺爲法除之得九十五尺六分二厘五毫以開平方法除之得下周九尺七寸五分合問今有長棧酒廣一十八瓶長八十六瓶高九瓶問該幾何答曰一萬三千九百三十二瓶法曰置廣一十八瓶以高九乘之一百六十二瓶以長乘之合問今有方棧酒四靣各一十六瓶高一十五瓶問該幾何答曰三千八百十瓶法曰置方一十六瓶自乘二百五六瓶以高一十五瓶乘之合問
