body:
  text: 如縱二十八步問為田幾何答曰八畒法曰置斜去六十八步自乘得四千六百二十四步廣少如縱二十八步自乘得七百八十四步以少減多餘三千八百四十步折半得一千九百二十步為實以畒法除之合問今有直田縱六十步併廣斜得一百步問為田幾何答曰八畒法曰置併廣斜一百步自乘得一万步縱六十步自乘得三十六百步以少減多餘六千四百步折半得三千二百步為實以併廣斜一百步除之得田廣三十二步以縱六十步乘之得一千九百二十步以畒法除之合問
