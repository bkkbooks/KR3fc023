body:
  text: 如縦二十八步問爲田幾何荅曰八畒法曰置斜去六十八步自乗得四千六百二十四步廣少如縦二十八步自乗得七百八十四步以少減多餘三千八百四十步折半得一千九百二十步爲實以畒法除之合問今有直田縦六十步併廣斜得一百步問爲田幾何荅曰八畒法曰置併廣斜一百步自乗得一万步縦六十步自乗得三十六百步以少減多餘六千四百步折半得三千二百步爲實以併廣斜一百步除之得田廣三十二步以縦六十步乗之得一千九百二十步以畒法除之合問
