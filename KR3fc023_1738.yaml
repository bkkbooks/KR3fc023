body:
  text: 爲法正一百一十得正七百七十同減乙行正一千二百五十餘得負四百八十爲實以法除得二十貫爲紗一疋之價甲行下負七以二十貫乗得一百四十貫加入正一百一十貫共得二百五十貫以上正五除之得五十貫爲紵絲價合問今有羊三箇豕二箇價鈔一百五十五貫又有羊四箇豕五箇價鈔二百六十五貫問羊豕每箇價鈔各幾何荅曰羊三十五貫豕二十五貫法曰列各項問數陽三个豕二个價一百五十五羊四个豕五个價二百六十五先以甲行羊三爲法遍乗乙行羊四得一十二豕五得一十五價二百六十五得七百九十五却以乙行羊四爲法復遍
