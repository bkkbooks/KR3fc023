body:
  text: 加二盈行三個共五十八個折半得瓜二十九個以人人四人相得人一十二合問持客携壺沽酒不知熒內盒波逢人添倍又相和共飲斗半方可添飲還經五處壺中酒盡無多要知原酒勿差訛甚麼法曰便可答曰一斗四升五合三勺一抄二撮五圭法曰假令一斗四升五合倍得二斗九升一飲一斗五千餘一斗四升倍得二斗八升一一七升倍得一斗四升不足一升假令一斗四升六合倍得二斗九升二合一飲一斗五升餘一斗四升二合倍得二斗八升四合一飲一斗五升餘一斗三升四合倍得二斗六升八臺一飲一斗五升餘二斗一升八合倍得二斗三升六合一飲一斗五升餘八升六合倍得一斗七升二合一飲一斗五升忽二升二合置盈不足原酒一斗四升六合盈二升二令一斗四升五合不足一升互乘盈得三千一升九合不足得一斗四升六合併之得四斗六升五合爲實併盈二升二合不足一升共得三升二合爲法除之合問茺地欲行開墾村人戶通知七家八頃恰耕犁五頃有餘在記又欲五家七頃少四頃難及有人達得妙玄機芳名説你右西江月答曰人戶三十五家茺地四十五頃法曰置盈不足互乘七家乘七頃得四十九頃五家乘八頃得四十頃以少減多餘餘爲法又以人戶五家七家相乘得三十五家以乘盈五頃
