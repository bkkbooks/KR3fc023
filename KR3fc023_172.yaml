body:
  text: 今有三不等田東長三十六步西長三十步北闊二十五步問為田幾何答曰三畒一百五步法曰併東長三十六步西長三十步共六十六步折半得三十三步為實以北闊二十五步為法乘之得八百二十五步以畝法除之合問今有四不等田東闊四十二步四闊五十六步南長六十四步北長五十八步問為田幾何答曰一十二畝一百九步法曰併兩長南六十四步北五十八得一百二十二步折半得六十步為實併兩闊東四十二步西五十六步共得九十八步折得四
