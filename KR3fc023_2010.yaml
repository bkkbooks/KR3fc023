body:
  text: 法得四百併入從方共得七百九十俱爲方法一退得七十九下法再退得一續啇置第二位以方法七十九啇餘實得六步下法亦置上啇六爲隅法以方隅二法共八十五皆與上啇六除餘實盡得北闊二十六步各加不及合問今有畹田積一百二十步只云徑不及下周一十四步問下周并徑各幾何荅曰下周三十步徑一十六步法曰四因積步得四百八十步爲實以不及一十二步爲徔方開平方法除之於實数之下啇置第一位將徔方一進得一百四十下法二進得百以啇實得一十下法亦置上啇得一百爲方法與徔方共二百四十皆與上啇一除實二百四十餘實
