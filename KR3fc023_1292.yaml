body:
  text: 今有鉛面闊四寸長一尺九寸底闊三寸長一尺八寸厚三寸別置鉛方寸重九兩五錢問重幾何答曰一百一十五斤七兩七錢五分法曰倍面長得三尺八寸加底長共得五尺六寸以面闊四寸乘之得二百二十四寸又倍底長得三尺六寸加面長共得五尺五寸以底闊三寸乘之得一百六寸五寸併二位共得三百八十九寸以厚三寸乘之得一千一百七十七寸如六而一得一百九十四寸半却以鉛寸重九兩五乘之得一千八百四十七厘七五分爲實以斤法十六除之合問今有椒面方三尺二寸底方二尺八寸厚二尺一寸別置石方寸重三兩問重幾何
  hash: sha256:232d35f91d20d700d9351da57990c63ba6493b7fad839bb9c0e82942df3c5199
