body:
  text: 戶共給五石盈三十九石問原米及人戶各幾何答曰原米三百五十四石人戶二百五十二戶法曰置列六戶八石盈十八石四戶五石盈十九以六戶乘丑石得三十又以四戶乘八石得三十二兩數相減餘二爲法又以盈十八乘三十得五百四十盈三十九乘三十二得一千二百四十八兩數相減餘七百八以法除得米三百萬十四石又以六戶四戶相乘得二十四戶以兩盈相減餘二十一乘得五百四以法除之得人戶二百五十二戶合問兩不足今有芝麻录豆不知其價只云录豆八石價買芝麻六石四貫八百文又录豆六石買芝麻四石不足鈔
  hash: sha256:0ff9fc46e90d9add0b24118c1316904925945451ab505411e5e2385fb6b5bdd1
