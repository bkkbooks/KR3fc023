body:
  text: 答曰截長六十步截闊三十八步法曰通截田一十一畝得一十六百四十步倍之得五千二百八十步以二平相減五十步減三十步餘差二十步乘之得一十万五千六百步却以梯長一百步除之得一千五十六步於上置大平五十步自乘得二千五百步內減長除一千五十六步餘一千四百四十四步為實以開平方法除之得截闊三十八步以併太平五十步共八十八步折半得四十四步除截積二千六百四十步得截長六十步合問甲有梯田一假直長百步休疑大平五十小三十乙向小頭買置五畝六分餘數一十六步相隨有人算得不差池敢向人前稱會右西江月
  hash: sha256:a9792ea7b4443443872d3409a8bfa30b1d15ffa44cf16f620c700087eff9d2fd
