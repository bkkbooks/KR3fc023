body:
  text: 荅曰截長六十步截闊三十八步法曰通截田一十一畝得一十六百四十步倍之得五千二百八十步以二平相減五十步減三十步餘差二十步乗之得一十万五千六百步却以梯長一百步除之得一千五十六步於上置大平五十步自乗得二千五百步內減長除一千五十六步餘一千四百四十四步爲實以開平方法除之得截闊三十八步以併太平五十步共八十八步折半得四十四步除截積二千六百四十步得截長六十步合問甲有梯田一叚直長百步休疑大平五十小三十乙向小頭買置五畝六分餘數一十六步相随有人筭得不差池敢向人前称會右西江月
