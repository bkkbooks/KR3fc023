body:
  text: 答曰七百一十一百一十七分文二百九十三法曰置鈔一十八貫五百四十文以分毋八通之加分子七得一百四十八貫三百九十文又以香分毋十六通之得二千三百七十四貫二百四十為實以香二十六斤以分毋十六通之加分子一共得四百一十七又以鈔分毋八乘之得三千二百三十六為法除之得斤價七百一十一文餘實二千三百四十四法實皆八十約之得四百一十七分文文二百九十三合問今有絹匹價五十四貫布匹價三十二貫欲將布易絹問幾何可以價停答曰絹三十二匹易布五十四匹法曰置絹布匹價相乘各該價一千七百二十八貫為實以絹定
