body:
  text: 錢唐南湖後學吳敬信民編集開三乗方法法曰置積若干爲實別置一筭名曰下法常超三位一乗超一位二乗超二位三乗超三位万下定十億下定百約實下法定億啇置第一位得若干下法亦置上啇爲若干再自乗得若干爲隅法與上啇若干除實若干餘實若干乃四乗隅法得若干爲方法下法再置上啇爲若干副置二位第一位自乗得若干又以六乗得若干爲上廉第二位以四乗得若干爲下廉乃方法一退得若干上廉再退得若干下廉三退下法四退得若干
