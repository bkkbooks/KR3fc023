body:
  text: 得外周一百四十步合問長十六周闊十五不多不少恰一畝內有八箇白埋墓更有一條十字路每個墓周六步十字路闊一步每畝價銀二兩五除了墓除了路問公該剩多少數右雙搗練答曰占地二分二釐五毫剩地七分七釐五毫該銀一兩九錢三分七釐五毫法曰通地一畝為二百四十步於上置墓堆八音每堆周六步依圓法周自乘得二十六步以十二而一得三步共積二十四步又十字路闊一畝長十六步闊十五步共三十一步除路中心一步實三十步通共占地
