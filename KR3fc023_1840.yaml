body:
  text: 餘勾人立木東三里通之得四千五百尺爲法除之得餘股一千五百五十四尺三分尺之二加木高九十五尺爲山高合問比類二十九問今有直田勾弦和取二分之一股弦和取九分之二共得五十四步又勾弦和取六分之一减股弦和三分之二餘有四十二步問勾股弦各幾何荅曰勾二十七步股三十六步弦四十五步法曰列分毋二分九分相乘得一十八以乘共五十四步得百七十二步是九千勾弦和四千股弦和又列後分母三分六分相乘得一十八分以乘餘四十二步得七百五十六步乃是三千勾弦和减十二千股弦如方程
  hash: sha256:db59a4ba36d3b021100d01fcfc97818be4621fe9135f82a26bb520ccfad2f214
