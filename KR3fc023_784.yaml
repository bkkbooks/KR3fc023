body:
  text: 六百文又互和倂戊鈔三貫八九共七十八貫四百文折半得丁鈔三十九貫二百文又互和倂甲丙鈔折半得乙鈔五十六貫合問四六差分法曰各以四爲首加五二位者首位四就身加五作六倂得一十三位者首位四加五得六又加五得九倂得一十五四位者首位四十加五得六十又加五得九十又加五得一百三十五倂得三百二十五五位者首位四百加五得六百又加五得九百又加五得一千三百五十又加五得二千二十五倂得五千二百七十五各爲法除實得一分之数今有官輸絹一百五十疋令五等人戶從上逓以四六出之第一等二十四戶第二等三十二戶第三等四十六戶
