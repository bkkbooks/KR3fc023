body:
  text: 六百文又互和並戊鈔三貫八九共七十八貫四百文折半得丁鈔三十九貫二百文又互和並甲丙鈔折半得乙鈔五十六貫合問四六差分法曰各以四為首加五二位者首位四就身加五作六並得一十三位者首位四加五得六又加五得九並得一十五四位者首位四十加五得六十又加五得九十又加五得一百三十五並得三百二十五五位者首位四百加五得六百又加五得九百又加五得一千三百五十又加五得二千二十五並得五千二百七十五各為法除實得一分之數今有官輸絹一百五十匹令五等人戶從上遞以四六出之第一等二十四戶第二等三十二戶第三等四十六戶
