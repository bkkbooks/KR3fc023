body:
  text: 法曰置陪米六石九斗寫實置馬作九羊作五九併之得二十三爲法除之得三十爲一停率以乘谷率放債主人身姓叚每貫月息三錢半分厘毫忽不肯饒只説他家能會筭一客還錢整半年本利共該十四貫叚家筭定不相依平貼還八十半右王楼春答曰原本一十一貫五百文法曰置本利一十四貫以减貼還八十五文餘一十三貫九百一十五文爲賓以六因月利三乑半得二十一加每貫共一貫二百一十爲法除之合問家貧揭鈔起初言每兩年終息五錢休言定日月咱還時筭又不曾約幾壬到如今八箇月煎本利鈔都還不欠
  hash: sha256:63580ee4d631b29560da0c9f9cf6e9c60434d943c07c0145b68f1500168790af
