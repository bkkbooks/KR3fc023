body:
  text: 法曰置陪米六石九斗寫實置馬作九羊作五九併之得二十三為法除之得三十為一停率以乘谷率放債主人身姓假每貫月息三錢半分釐毫忽不肯饒只説他家能會算一客還錢整半年本利共該十四貫假家算定不相依平貼還八十半右王樓春答曰原本一十一貫五百文法曰置本利一十四貫以減貼還八十五文餘一十三貫九百一十五文為賓以六因月利三乑半得二十一加每貫共一貫二百一十為法除之合問家貧揭鈔起初言每兩年終息五錢休言定日月咱還時算又不曾約幾壬到如今八箇月煎本利鈔都還不欠
  hash: sha256:af3f160b2f58b75ab3909bd88d9d6997e6b01b4344ee14d522ff489bcc97532f
