body:
  text: 左行鷄二千一百五十六餘得七百七十六爲實不滿法皆以約法八約之得一百二十分鷄之九十爲從所食之数中行內鷄九十二以分母一百二十二通之得一万一千二百二十四從九十五以分子九十七通之得九千二百一十五以减分母餘二千九以吏四十九除之得吏食一百二十二分鷄之四千一右行內鷄十以分母一百二十二通之得一千二百二十减從十分得得九百七十吏五分子得二百五餘得四十五爲令一所食一百二十二分鷄之四十五合問二羊三犬五鷄一兔直八百六十一三羊一犬七鷄五兔直九百五十八四羊二犬六鷄三兔直一千一百七十五五羊四犬三鷄二兔直一千四百九十六問羊犬鷄兔各
