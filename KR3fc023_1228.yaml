body:
  text: 法曰置方一十二尺自乗得一百四十四尺以髙九尺乗之得一千二百九十六尺爲實以斛法二尺五寸除之合問今有米五百一十八石四斗欲造方倉盛貯只云方一丈二尺問髙幾何答曰九尺法曰置米五百一十八石四斗以斛法二尺五寸乗之得一千二百九十六尺爲實以方一丈二尺自乗得一十四丈四尺爲法除之合問今有米五百一十八石四斗欲造方倉盛貯只云髙九尺問方幾何答曰一丈二尺法曰置米照刖以斛法乗之得一千二百九十六尺爲實以髙九尺爲法除之得一百四十四尺又以開平方法除之合問
