body:
  text: 十九又以一兩六除中絲八十一半下線六十六併三位得二百四十七半為法以除錢鈔千一百八八百文得線兩價四貫四百八十文卻以一兩六除得絲兩介以二兩除得綿兩價今有鈔七萬五千八百四十貫買綾羅絹三色其綾匹價一百四十三貫羅匹價一百三十二貫絹匹價七十五貫卻要一停綾二停羅三停絹問各幾何答曰綾一百二十匹羅二百四十匹絹三百六十匹法曰以二乘羅價得二百六十四貫三乘絹價得二百二十五貫併入綾價共得六百三十二貫為法置總紗副置三位上一乘得七万五
