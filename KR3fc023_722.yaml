body:
  text: 今有官輸粮二千八十九石四斗六升二合五勺只云糯米八升折粮一斗芝麻五升一合二勺折粮一斗菜豆六升四合折粮一斗本色止納一斗今要四色谷停問各納幾何答曰各納三百六十二石四斗法曰置粮二千八十九石四六升二合五勺以芝麻五升一合二勺乗之得一千六十九石八斗四合八勺爲實併四色率糯米八升芝麻五升一合二勺菜豆六升四合本粮一斗共斗九升五合二勺爲法除之合問今有甲納米五十六石乙納米四十石丙納米三十二石共該一百二十八石到倉納折七石五斗閤各倍幾何答曰甲三石二斗八升一合二勺五抄
