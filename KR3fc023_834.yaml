body:
  text: 今有絲五斤八兩一十二銖五分銖之四賣鈔一貫三百二十八文問一斤該鈔幾何答曰二百四十文法曰以所賣鈔一貫三百二十八文乘所求絲一斤通為三百八十四銖以分貫五乘得一千九百二十以鈔乘得二百五十四万九千七百六十為實以所有絲五斤八兩以銖法通之小零一十二銖共得二千一百二十四銖以分毋五乘得一万六百二十加分子四共得一万六百二十四為法除之得斤價二百四十文合問今有錢一百六十一文三十二分糸之二十三買絲七兩一十二銖問一斤該鈔幾何答曰三百四十五文法曰以有錢一百六十一文以分毋三十二通之四分子二十三共得五千一百七十五乘所求絲一斤通為十六兩得八万二千八百為實以買絲七兩共一十二銖為五糸
  hash: sha256:0d1e87f22d70b8d026b8c4fda00083467dfc28002d1fb5c3888e19861b513d76
