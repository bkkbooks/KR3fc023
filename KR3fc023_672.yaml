body:
  text: 法曰以所有耗絲兩乘今有絲二十三斤五兩通為三百七十三兩得二千六百一十一兩為實以所有絲一斤通為十六兩為法除之合問生絲三十斥乾之耗三斤十二兩今有乾絲一十二斤問得生絲幾何答曰一十三斤十一兩十銖七分銖之一法曰此問生絲三十斤乾之耗三斤十二兩斤得乾絲十四兩置乾絲十一斤以銖通之得四千六百八銖以生絲十六兩乘之得七万三千之百二十八為實以乾絲十四兩為法除之得五千二百六十六銖以銖法除之得一十三斤十一兩一十銖餘實四法實皆折半得七分銖之二合問田一畒粟六升太半升今有田一頃二十六畒一百五十九步問牧粟幾何答曰八石四斗四升十二分升之五
  hash: sha256:997d603f7f58b8c698a3bd7d7893815bd061ec02b88e4f36a1d32dee00a920e2
