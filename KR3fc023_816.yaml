body:
  text: 等戶出之数各以逐等戶数乗之得各該米数合問帶分毋子差分今有官輸米一百二十石令三等人戶出之上等三十八戶中等六十三戶下等九十二戶須令上等多中等三分之二中等多下等四分之三問逐等及毎戶各出幾何答曰上等六十八石四斗毎戶一石八斗中等三十七石八斗毎戶六斗下等一十三石八斗毎戶一斗五升法曰置各等户数以各分乗之爲衰上等以十二乗之得四百五十六中等以四分乗得二百五十二下等以一分乗得九十二各列置衰上等四百五十六中等二
