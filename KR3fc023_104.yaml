body:
  text: 答曰十五分之十一法曰列置分母子三分五分于右之一之二于左母互乘子三分乘之二得五分乘之一得五併之得十一為實母相乘三分乘五分得十五為法實不滿法以法命之合問周三分之二七分之四九分之五合之得幾何答曰得一餘六十三分之五十法曰置分母子三分七分九分于右之二之四之五于左子互乘母之二乘七分九分得一百二十六之四乘三分九分得一百八之五乘三分七分得一百五餘之得三百十九為實母相乘三分七分九分相乘得一百八十九為法實如法而一得一餘一百五十與法皆三餘之得六十三分之五十合問
