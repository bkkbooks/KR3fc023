body:
  text: 十七兩五錢爲實以所絲一斤通得一十六兩爲法除之得一百六十一錢餘實一十一兩五錢法實皆五約之得三十二分錢之二十三合問縑一文價一百二十八今有縑一疋九尺五寸問直錢幾何答曰六百三十三錢五分錢之三法曰以所有錢一百二十八乘今問縑通一疋為四丈共四丈九尺五寸得六千三百三十六爲實以所有縑一丈爲法除之餘實折半合問布一疋價一百二十五今二丈七尺問直錢幾何答曰八十四錢八分錢之二法曰以所有錢一百二十五乘今問布二丈七尺得三千二百七十五爲實以所有布一疋通爲四丈爲法除之餘實皆五丈約之合問
