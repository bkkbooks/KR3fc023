body:
  text: 十七兩五錢為實以所絲一斤通得一十六兩為法除之得一百六十一錢餘實一十一兩五錢法實皆五約之得三十二分錢之二十三合問縑一文價一百二十八今有縑一匹九尺五寸問直錢幾何答曰六百三十三錢五分錢之三法曰以所有錢一百二十八乘今問縑通一匹為四丈共四丈九尺五寸得六千三百三十六為實以所有縑一丈為法除之餘實折半合問布一匹價一百二十五今二丈七尺問直錢幾何答曰八十四錢八分錢之二法曰以所有錢一百二十五乘今問布二丈七尺得三千二百七十五為實以所有布一匹通為四丈為法除之餘實皆五丈約之合問
