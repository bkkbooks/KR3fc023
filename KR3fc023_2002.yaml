body:
  text: 一百二十步三分步之二問周徑各幾何荅曰周一百八十一步徑六十步三分步之一法曰通田一十一畝加零九十步共得二千七百三十步以二分母十二分三分相乗得三十六乗之加二分子二共得九万八千二百八十三爲實以不及一百二十步以分毋三通之加分子二共得三百六十二爲從方開平方法除之於實数之下啇置第一位將徔方二進得三万六千二百下法四進得万以啇實得一百下法亦置上啇得一万爲方法與徔方共四万六千二百皆與上啇一除實四万六千二百餘實五万二千八十三乃二乗方法得二万併入徔方共得五万六千二百俱爲方法一退得五千六百二十下法再退得一百
  hash: sha256:e4ee9261eb0f972e175f0ff9da7e4414c8e88d2440717429bf651237b47dfc9f
