body:
  text: 答曰一十八貫法曰以所求率四十八尺乘鈔數四百三十六貫五百文得二万九百五十二為實以所買紵絲二十四匹以四十八尺通之加零一十二尺共一千一百六十四尺為法除之合問今有鈔四百三十六貫五百文買紵絲每匹價鈔一十八貫匹法四十八尺問該買幾何答曰二十四匹一丈二尺法曰以所求率四十八尺乘鈔數四百三十六貫五百文得二万九百五十二為實以所價一十八貫以四十八尺通得八百六十四為法除之得二十四匹二分五坐其匹下分以四十尺乘之合問今有鈔一百九十五貫二百文買羅一十二匹三丈四尺
  hash: sha256:86ac840d83850815aecf8ecde1d846d2c5701cc17972f037c5ae93fcf7d10362
