body:
  text: 六正長四十一步中闊一十八步三分步之二問為田幾何答曰四畒二十四步一百六十八分步之四十一法曰置正長四十一步以南闊分毋通之南闊六得二百四十六北闊七得一千七百一十二中闊三得五千一百六十六次置南闊二十五步以分毋六通之加分子五共得一百五十五又互乘北闊分毋七得一千八十五中闊分毋三得三千二百五十五北闊三十二步以分毋七通之加分子六得二百三十又互乘南闊分毋六得一千三百八十中闊分毋三得四千一百十中闊一十八步以分毋加分子二得三十六又互乘南闊分毋六得三百三十主分毋七得二千二百五十二倍之得四千七百四併三闊得一万五千九十九正長
