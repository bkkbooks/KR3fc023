body:
  text: 得二十七文除餘錢多三文該折二錢三文當三錢六文合問又五答當五十四當三九折二一小錢一文當十六三三折二十五小錢一當十六五十七當三一折二五小錢二當五一十八當三一折二一小錢五鋪戶留銀魯倍告買客紅綾一疋商量了若要石三粳米道芝麻石八亦同調今已芝麻魯北小五斗四升量了原不少問貼升粳米好賢家不會休心惱右鳳棲梧荅曰貼粳米九斗一升法曰以原粳米一石三斗乗今量芝麻五斗四升得七爲實却以原芝麻一石八斗爲法除之得三斗九升以减原米一石三斗餘得貼米九斗二升合問
