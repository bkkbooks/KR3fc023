body:
  text: 三文問米麥并該鈔各幾何答曰米三十四石九斗五升一合該鈔八十五貫二百八十文四分四厘麥三十二石二斗九升二合該鈔七十八貫四百六十九文五分六厘法曰置米麥六十七石二斗四升三合以貴率米每斗二百四十四文乘得一百六十四貫七十二文九分二厘以減總鈔一百六十三貫七百五十文餘三百二十二文九分二厘為實以二價相減餘一文為法除之得麥三十二石二斗九升二合餘為米三十四石九斗五升一合各以斗價乘之合問今有羅綾一百二十八匹二丈五尺二寸共賣鈔一千五
