body:
  text: 甲乙隔溝牧放二人暗裏參詳田雲得乙九箇羊多倍之上乙説的甲九隻兩家之數相當二邊閑坐惱心腦畫地筭了一晌右西江月答曰甲六十三隻乙四十五隻法曰置甲七乙五以各得九隻乗之合問忽見兔兒方犬追來知先走步跡難推一千二百犬驅馳短少二十未及相隨犬急求之兔力微又追四百兔步行直趕過四十步無移兔子先行幾步何如右一剪梅答曰兔走二百步法曰置犬追一千二百步以倂趕過四十步未及二十步共六十步
