body:
  text: 乙分金一兩七錢半折足色一兩四錢法曰置甲金九成二兩折足一兩八錢乙金七成一兩折足一兩四絲併之得八成金四兩以八成除各色得足色甲二兩二絲半乙二兩七絲半合問今有銅錢一串不知大小分文當三折二不均勻當五小錢雜混只要百錢百字其中造化由人乘除折半减加因惱得賢家瘦損答曰小錢一文折二錢三文當三銨六文當五錢一十五文法曰置錢百文字百箇約之得當五錢錢一十五文小錢一文共錢七十六文字六十四箇餘錢二十四文字三十六箇該錢以當三錢乘之
