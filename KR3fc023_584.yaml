body:
  text: 乙分金一两七錢半折足色一两四钱法曰置甲金九成二两折足一两八錢乙金七成一两折足一两四絲併之得八成金四两以八成除各色得足色甲二两二絲半乙二两七絲半合問今有銅錢一串不知大小分文當三折二不均匀當五小錢雜混只要百錢百字其中造化由人乗除折半减加因惱得賢家瘦損荅曰小錢一文折二錢三文當三銨六文當五錢一十五文法曰置錢百文字百箇約之得當五錢錢一十五文小錢一文共錢七十六文字六十四箇餘錢二十四文字三十六箇該錢以當三錢乘之
