body:
  text: 乗得價負一千一百一十八以减價負二千三百二十二餘得價負一千一百四以鷄負四十二除得鷄價二十三第二行兔正七以價二十九乗得價正二百三異加價負六百六十七共得價負八百七十减負一價二十三餘得價負八百四十七以犬負七除得犬價一百二十一第一行價八百六十一內减兔一價二十九鷄五價一百一十五犬三價三百六十三餘得價三百五十四以羊二除得羊價一百七十七合問麻九斗麥七斗菽三斗荅二斗黍五斗直一百四十麻七斗麥六斗菽四斗荅五斗黍三斗直一百二十八麻三斗麥五斗菽七斗荅六斗黍四斗直一百一十六麻
