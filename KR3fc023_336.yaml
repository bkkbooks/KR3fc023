body:
  text: 今有梯田長一百小頭十五大廾七截賣一百九十二欲從一邊截去積答曰截長八十步闊四步八分法曰二因截田一百九十二步得三百八十四步以乘長一百步得三万八千四百步為實以大頭二十七步減小頭一十五步餘一十二步折半得六步為法除之得六千四百步以開平方法除之得截長八十步以乘折半六步得四百八十步却以原長一百步除之得截闊合問圓田計積一百八三十六周徑十二賣却外周六十步內周徑步實該幾答曰剩內周二十四步徑八步法曰置積一百八步減截積六十步餘四十八步倍之得九十六步却以徑一十二步折半得六步乘之得五百七十六步又以周三十六步除之
  hash: sha256:59fc5c3a17bcf440a2f4af2c1c00a1119426691176eccf9c803429ff3b189064
