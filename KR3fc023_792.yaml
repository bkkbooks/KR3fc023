body:
  text: 之問得幾何答曰甲七百二十石九斗乙四百八十石六斗丙三百二十石四斗丁二百一十石六斗戊一百四十二石四斗法曰置米一千百七十七石九斗為實以各戶從戊起遞以四六差乘之為衰戊得四百丁得六百丙得九百乙得一千三百五十甲得二千二十五並之得五千二百七十五為法除之得三斗五升六合為一分之數以乘各衰合問三七差分法曰以三為首就以三因之二位者三七並得
