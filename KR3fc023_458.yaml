body:
  text: 答曰六十八匹二丈九尺法曰以所求率四十八尺乘麻布與錢數們為實以麻布二匹先四十二尺通之和零三尺八十七尺卻以分十六乘得一千三百九十二為法除之得三千二百九十三尺以紬匹四十八尺除之合問今有絲五十九斤十一兩六織絹四十七匹四尺四寸匹法宮尺三十二尺問每匹該絲幾何答曰一斤四兩法曰以所求率三十二尺乘絲教五十九斤其十一兩六銖得二五分以求斤通得共五十九斤七分三毫一絲二忽五錢却以三十二尺乘得一千九百一十斤畢為實以織絹四十匹以三十二尺通之加零二十四尺四寸共一千五百二十八尺四寸為法除之合問
