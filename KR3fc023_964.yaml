body:
  text: 一即二分之一及分毋子以分毋一二三列右行分子之一一一列左行而副併分毋自乘下動正位別置分毋一乘二二乘三得六以六乘全步一分得六分子之一得六以全步積分六通畒步二百四十步得一千四百四十步為實各以本毋除子全步得六其二分之一得三其三分之一得二併之得一十一為法除實得一百三十步餘實一十以法命之合問田一畒廣一步半三分之一四分之一問幾何答曰一百一十五步五分步之一法曰列置全步及分毋子全步即一分之一半步即二分之一以分毋一二三四列右行分子之一一一一列左行而副併分毋自乘不最正位別置分毋一乘二得二二乘三得六四乘六得二十四以乘全步及分子全步一分得二十四分子之一得二
