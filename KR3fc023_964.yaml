body:
  text: 一即二分之一及分毋子以分毋一二三列右行分子之一一一列左行而副併分毋自乗下動正位別置分毋一乗二二乗三得六以六乗全歩一分得六分子之一得六以全歩積分六通畒歩二百四十步得一千四百四十歩爲實各以本毋除子全歩得六其二分之一得三其三分之一得二併之得一十一爲法除實得一百三十步餘實一十以法命之合問田一畒廣一步半三分之一四分之一問幾何答曰一百一十五歩五分步之一法曰列置全歩及分毋子全步即一分之一半歩即二分之一以分毋一二三四列右行分子之一一一一列左行而副併分毋自乗不最正位別置分毋一乗二得二二乗三得六四乗六得二十四以乗全歩及分子全步一分得二十四分子之一得二
