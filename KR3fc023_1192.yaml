body:
  text: 四因之磚厚二寸一分添貼水四分共得二寸五分每一尺用磚四磈得一百五十六塊以縱一十六尺乗之得二千四百九十六磈却以磚長一尺五寸八分添灰貼水二分共一尺六寸除之得一千五百六十磈倍之得三千一百二十磈爲馬靣兩邉縱共用磚数又置斜髙磚数一百五十六磈於上併上下廣半之得三十七尺以乗上数得五千七百七十二爲實以磚灰共長一尺六寸除之得三千六百七磈五分爲正面廣所用数併前合問求礦灰併三面磚数共六千七百二十七磈半爲實以磚一十六磈爲法除之得四百二十磈餘實七磈半以秤決一十五斤乗之得一百一十二分半却以磚一十六磈除之得七斤餘半分以法約之得数合問今有築圍城一座內周二十六里二百一十九步厚三步
