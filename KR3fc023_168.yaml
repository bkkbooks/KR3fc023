body:
  text: 除之得二千九百三十步餘實二分五厘以法三約之得十二分之一以畒法除之合問今有圓田徑八十步三分步之一問爲田幾何荅曰一十一畒九十步十二分步之一法曰置半徑三十步以分毋三通之加分子半共得九十步半自乗得八千一百九十步二分五厘以三乗得二万四千五百七十步七分五厘却以分毋三與乗法三乗之得九以除上數得二十七百三十步餘實分五厘以法九分約之得十二分之一以畒法除之合問今有環田半外周六十一步印周四十六步徑五步問爲田幾何荅曰一畆二十七步二分步之
