body:
  text: 千五百七十五分為法除實得三千為一分之數以乘每戶各分得每戶數却乘各等戶得共米數上上等每戶七十分得二十一石共一十五戶得三百一十五石上中等六十分得一十八石共四十二戶得七百五十六石上下等五十分得一十五石共五十四戶得八百一十石中上等三十五分得一十石五斗共六十七戶得七百三石五斗中中等二十五分的七石五斗共七十五戶得五百六十二石五斗中下等一十五分得四石五斗共八十戶得三百七十三石五斗下上等一十分得三石共九十六戶得二百八十八石下中等五分得一石五斗共一百一十二戶得一百六十八石下下等三分五厘得七斗五升共一百二十八戶得九十六石合問今有官泒木炭一萬六千八百二十稱九斤六兩令三等九甲人戶出之各戶額分不等驗數泒納問每戶各幾何
