body:
  text: 法曰圓三象天方四象地圓居方四分之三以積立銜求方助乘除之妙用考究源淵奠不由此叨淪之置積七万一千八百二十四步為寶別置一籌為下法原下之法從末位常超一位約寶百下㝎十万下㝎百於寶上商置第一位得二百下法之上亦置上啇二百進二位得二万名曰方法與上啇二除寶四万餘寶二万一千八百二十四乃二乘方法得四万為廉退得四千下法再退得百於上啇之次續啇第二位以廉法四千啇寶得六十下法之上亦置上啇六十進一位為六百為隅法以隅廉二法共四千六百皆與上啇六除寶二万七千六百餘寶四千二百二十四乃二乘隅法六百得一千二百併大廉法四千共五十二百一退得五百二十下法再退得一又於上市啇置第
  hash: sha256:7cd107ac1854da0981a7d14a8897d0e9f39e0961463ee31213cafb5f7570e822
