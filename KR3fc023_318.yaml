body:
  text: 田平五十二步法曰通田二十五畒三分五厘得六千八十四步爲實以長九平四相乘得三十六爲法除之得一百六十九步以開平方法除之得索長一十三步以長九乘之得一百一十七步平四乘之得五十一步合問昨日扜量田地得長步整三十廣斜相併五十步不知幾畒及分厘荅曰二畒法曰併廣斜五十步自乘得二千五百步內減長三十步自乘得九百步餘一千六百步折半得八百步爲實以廣斜五十爲法除之得闊一十六步以乘長步合問今有直田恰一畒中心種石一根添遙望四得十三步問
