body:
  text: 步以一面一十四步自乘得一百九十六步以減實五十六步餘九百六十步步為實以畒法除之得四畒合問今有幞頭田東長六十步南闊一十八步西長二十七步又南闊一十五步問為田幾何答曰六畒一分八厘七毫五絲法曰置東長六十步乘南闊一十八步得一千八十步又列西長二十七步乘又南闊一十五步得四百五步併之得一千四百八十五以畒法而合問今有磬田內曲一十四步外曲二十二步兩頭各闊四步問為田幾何答曰七十二步
