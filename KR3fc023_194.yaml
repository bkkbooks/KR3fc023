body:
  text: 歩以一面一十四歩自乗得一百九十六歩以減實五十六歩餘九百六十步步爲實以畒法除之得四畒合問今有幞頭田東長六十歩南闊一十八歩西長二十七歩又南闊一十五歩問爲田幾何荅曰六畒一分八厘七毫五絲法曰置東長六十歩乗南闊一十八歩得一千八十歩又列西長二十七歩乗又南闊一十五歩得四百五歩併之得一千四百八十五以畒法而合問今有磬田內曲一十四歩外曲二十二歩兩頭各闊四歩問爲田幾何荅曰七十二歩
