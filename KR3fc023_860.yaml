body:
  text: 九数剰三剰一該二百八十剰三下八百四十併之共二千一十滿数五百四則去之凢三次減去共一千五百一十二餘四百九十八合問今有物不知緫只云十一数剰三数十二剰二数十三剰一数問緫幾何答曰一十四法曰十一数剰三剰一該九百三十六剰三該二千八百八十二数剰二剰一該一千五百七十三剰二該三千一百四十六十三数剰一下九百二十四併之共六千八百七十八滿数一千七百一十六則去之凢四次減去共六千八百六十四餘一十四合問今有物不知緫只云三数剰一五数剰二七数剰三九数剰四問緫幾何答曰一百五十七
