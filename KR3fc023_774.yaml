body:
  text: 一百二十丙一万六千二百六十丁八千九百四十戊四千六百八十副並得一十一万三千八百為法以所輸綿五千斤乘未並者各自為實甲得二億七千四百万乙得一億四千五百六十万丙得八千一百三十万丁得四千四百七十万戊得二千三百四十万以法一十万三千八百除之餘實與法各二百約之合問今有銀三百七十兩欲令甲乙丙丁四人從上作折半分之問各人得幾何答曰甲一百九十七兩十五分兩之五乙九十八兩十五分兩之十丙四十九兩十五分兩之五丁二十四兩十五分兩之十法曰各列置衰甲六乙四丙二丁一副並十為法以所分二百七十
