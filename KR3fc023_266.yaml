body:
  text: 千九百八十七步二分却以直長一百二十步除之得四百六十六步五分六厘再以比闊三千六步自乘得一千二百九十六步以減長除餘八百二十九步四分四厘為實以開平方法除之得截闊二十八步八寸併比闊三十六步共得六十四步八分折半得三十一步四分為法除截田積得長二十四步合問今有圭田南比直長一百二十步比闊三十六步南尖今從南頭截賣三畒二分四厘問截長闊各幾何答曰截長七十二步闊二十一步三尺法曰通截賣田三畒二分四厘得七百七十七步六分以直長一百二十步乘之得九万五千二百一十二步半比闊一十八步除之得五
