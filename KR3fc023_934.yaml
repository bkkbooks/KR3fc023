body:
  text: 四錢丁五稱六斤九兩六錢法曰各列置衰丁四十丙六十乙九十甲一百三十五副併得三百二十五為法以所分銀以稱通斤共六百六十二斤以斤求兩得一万六百八兩乘禾併者甲得一百四十三万二千八十兩乙得九十五万四千七百二十丙得六十二万六千四百八十丁得四十二万四千二百二十各自為列實以法各除之得數定身減六為斤減五為稱合問七稱一十一斤銀四箇啇人照本分原銀遞以三七出休得七折熟瞞人答曰甲四稱八斤九兩六錢乙一稱一十四斤六兩四錢丙一十二斤九兩六錢
