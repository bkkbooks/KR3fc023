body:
  text: 得言乎九敞端的處步産訛休誇會算還嘍囉此般小數非雞事敢問賢家會得麼右鷓鴣天答曰以買鍋言得鍋三千以賣鍋言得米三千二百六十七石法曰置鍋九千九百米三斗三升各以四除之米得八升二合五勺鍋得二千四百七十五個以買鍋言二千四百七十五為實以米八升二合五勺為法除之得鍋三千以賣鍋言置二千四百七十五為實以四因米三斗三升得一石三斗二升為法乘之得米三千二百六十七石合問三兩絲錢價步偏其綿四兩减都金外餘剩下五分半十一兩綿以價言絲五兩减張綿一錢九五是餘錢若知二
