body:
  text: 四万八千二百四十為實以糲飰七十五以分母七通得五百二十五為法除之問菽一斗為熟菽幾何答曰二斗三升法曰以熟菽一百三半乘菽一斗為實以菽率四十五為法除之問菽二斗為豉幾何答曰二斗八升法曰以豉六十三乘菽二斗為實以菽率四十五為法除之問麥八斗六升七分升之三為小䵂幾何答曰二斗五升十四分升之十三法曰以小䵂十三半乘麥八斗六升以分母七通得六百二加分子三共六百五得八千一百六十七半為實以麥四十五以分母七通得三百一十五為法除之合問問麥一斗為大䵂幾何答曰一斗二升
