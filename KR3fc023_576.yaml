body:
  text: 絲三得八升七分升之四絮四得八升九分升之八共二斗二升分毋子依合分法得二升六十三分升之八共併得二斗四升六十三分升之八以分母六十三乗二斗四升加分子八共一十五石二斗爲法以分母六十三乗原米五石七斗得三百五十九石一升爲寶以法除之得一斤七兩五絲二分五厘爲一停率以各率乘合問今有木綿三馱三朝換物各殊四斤換得一石粟七斗牛零貼與次日五升換麥餘零二斗交足九斤換絲疋無餘此法如何辨取右西江月答曰每馱一百七十一斤絹一十九疋粟四十二石十斗半麥三十四石二斗法曰四數剩一下四十五題內剩二歲下一百二十五五數剩一下
