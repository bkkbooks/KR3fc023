body:
  text: 十步法曰置兵士二十二萬八千四百八十以每隊五十六名除之得四千八十隊爲實以每隊一方面一十二步自乘得一百四十四步爲法乘之得五十八萬七千五百二十步以開平方法除之得一方面七百六十六步一千五百三十三分步之七百六十四以每隊方面一十二步約之得外圍六十三隊再置四千十隊以四方除之得一方面一千二十隊倍之得二千十隊都以三十層約之得六十八隊以減外圍六十三隊得內圍五隊又置兵士總數以每大隊一萬一千二百名除之得二十隊四分每隊都指揮一計二十員每員一方八步計六十四步共積一千二百八十步指揮一十員計二百四員每員一方六步計三十六步共積七千三百
  hash: sha256:d3e733b441caee5daf9cb52c4f6fbf6781cd136c6bea0bb7a355a016db83b543
