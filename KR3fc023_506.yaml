body:
  text: 答曰米一十三石二斗豆二十三石芝麻一十八石九斗七升五合各該價七百五十九貫法曰置米麻二價相乗得二千三百貫得豆二十三石米豆二價相乗得一千八百九十七貫五百文得芝麻一十八石九都七十五合芝豆二價相乗得一千三百二十貫得米一十三石二斗各以石價乗之合問今有綾一百疋羅一百五十疋絹二百疋共賣鈔四萬五千七百五十貫只云綾疋價比羅疋價多二十五貫羅疋價比絹疋價多六十五貫問三色疋價各幾何答曰綾疋價一百五十貫絹疋價六十貫
  hash: sha256:da5db3aefbeeaea5109a9e1c7e9276cee26bba593eede83e45b0dadfd5ae18f4
