body:
  text: 一三五七九並之得二十五為實得首尾數以四除其多少之數遞相加之其後位數多者皆以空位取法因之則得首尾之共數亦同前例今有白米一百八十石令三人從上作互和減半分之只云甲多丙米三十六石問各人該米幾何答曰甲七十八石乙六十石丙四十二石法曰置米一百八十石為實以例用五斗五斗七斗並得一石五斗為法除之得一百二十石乃甲丙二人共數於內減甲多三十六石餘八十四石折半得丙米四十二石加多三十六石得米七十八石互和並丙米共得一百二十石折半得乙米六十石合問
  hash: sha256:dfd168cc04136710bfef3bbee430c8a91f61507d5b35332cf6383434657a60cb
