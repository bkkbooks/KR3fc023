body:
  text: 一三五七九倂之得二十五爲實得首尾数以四除其多少之数逓相加之其後位数多者皆以空位取法因之則得首尾之共数亦同前例今有白米一百八十石令三人從上作互和减半分之只云甲多丙米三十六石問各人該米幾何答曰甲七十八石乙六十石丙四十二石法曰置米一百八十石爲實以例用五斗五斗七斗倂得一石五斗爲法除之得一百二十石乃甲丙二人共数於內减甲多三十六石餘八十四石折半得丙米四十二石加多三十六石得米七十八石互和倂丙米共得一百二十石折半得乙米六十石合問
  hash: sha256:13310b1faf56516184bfc83358947a445232fc59537313e8cdda9614264ce7b0
