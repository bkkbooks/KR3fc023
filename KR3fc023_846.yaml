body:
  text: 幾何答曰一十九斤八兩法曰置濕麵二十六斤以乘乾麵三斤得七十八斤為實以濕麵四斤為法除之合問因乘歸除今有荒絲一千三百八十七斤每一兩得淨絲九錢問該淨絲幾何答曰一千二百四十八斤四兩八錢法曰置荒絲一千三百八十七斤以淨絲九因之得一千二百四十八斤三分後步成斤加六得四兩八糸合問今有淨絲一千二百四十八斤四兩八錢每淨絲九錢用荒絲一兩問該荒絲幾何答曰一千三百八十七斤
