body:
  text: 以長分毋三通之得一十五二數相乗得二百九十半之得一百九十五爲實以分毋三自乗得九爲法除之合問今有圭田闊一十七步二分步之一長二十八步分步三問爲田幾何荅曰一畒一十一步十六分步之九法曰置闊一十七步以分毋二通之加分子一共得三十五長二十八步以分毋四通之加分子三共得二百一十五相乗得四十二十五半之得二千一十二步半爲實以分毋二分四分相乗得八分爲法除之得二百五十一步餘實四步半爲分子法爲分毋毋子各倍之得十六分之九以畒法而一合問今有半圭田闊六步長二十一步問爲田幾何
