body:
  text: 之得五千五百五十七餘實一千二百七十五法實皆三約之合問今有方一塊高一尺二寸六十三分寸之五十廣縱各一尺二寸問重幾何答曰一千八萬四十四斤七分斤之四法曰置高一十二寸以分母六十三通之加子五十一共得八百七又置廣縱各一十二寸各以分母六十三通之各得七百五十六自乘得五十七万一千五百三十六又以高八百七乘之得四倚六千一百二十二万九千五百五十一爲實以分母六十三再自乘得二十五万四十七爲法除之得一千八百四十四斤餘實一十四万二十八百八千四法實皆三万五千七百二十一約之得七分斤之四合問今有金方六寸別置金方寸重一斤問重幾何
