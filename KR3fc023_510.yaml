body:
  text: 法曰置鈔四貫七百文於上併粟麥少數得七十五文以乗豆九斗得六百七十五文於次又置粟少麥五十文乘麥七斗得三百五十文二位相併得一貫二十五文以減上數四貫七百文餘三貫六百七十五文爲實併三色斗數得二石一斗爲法除之得粟斗價一百七十五文加五十文爲麥價又加二十五文爲豆價合問今有鈔一貫買酒一十斗只云煮酒每斗七百文清酒每斗三百文白酒每三斗直一百文問各該幾何荅曰煮酒六升價四百二十文清酒一斗價三百文白酒八斗四升價二百八十文法曰置列鈔一貫酒十斗於上先行清酒一斗價三百文減上數餘鈔
