body:
  text: 法曰置鈔四貫七百文於上併粟麥少數得七十五文以乘豆九斗得六百七十五文於次又置粟少麥五十文乘麥七斗得三百五十文二位相併得一貫二十五文以減上數四貫七百文餘三貫六百七十五文為實併三色斗數得二石一斗為法除之得粟斗價一百七十五文加五十文為麥價又加二十五文為豆價合問今有鈔一貫買酒一十斗只云煮酒每斗七百文清酒每斗三百文白酒每三斗直一百文問各該幾何答曰煮酒六升價四百二十文清酒一斗價三百文白酒八斗四升價二百八十文法曰置列鈔一貫酒十斗於上先行清酒一斗價三百文減上數餘鈔
  hash: sha256:a57a5437e7e9f61dcc6de14654a36721f0f44a03a524350749c152368bcbcb50
