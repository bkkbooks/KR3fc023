body:
  text: 法曰置長八十一步以分毋三通之加分子二共得二百四十五又置闊三十一步以長分毋三通之得九十三二數相乗半之得万千三百九十二步半爲實以分毋三自乗得九爲法除之得一千二百六十五步餘實七步半法實皆一步半除之及畝法而一合問今有半圭田闊八十一步七分步之五長一百三十九步十三分步之九問爲田幾何荅曰二十三畝一百八十七步七分之三法曰置闊八十一步以分毋七通之加分子五得五百七十二又置長一百三十九步以分毋十三通之加分子九共得一千八百一十六二數相乗半之得五十二万九千三百七十六爲實以二分毋十三分七分相乗得九十一爲法除之得五千七百七步餘實三十九步法實皆十三
  hash: sha256:496b288a6cf59d9e893dbbf39eae51a98d14b98811f14ea5baad04aea75fd7f7
