body:
  text: 三步以分母九通之加內七共得一百二十四相乘得一万九千四百六十八却以矢分母九自乘八一以乘上數自一百五十七万六千九百八為實又矢一百二十四自乘得一万五千三百七十六以分母弦二矢九相乘得一十八以乘上數得二十七万六千七百六十八併入前置共得一百八十五万三千六百七十六折半得九十二万六千八百二十六為實以弦矢分母十八矢分母八十一相乘得一千四百五十八為法除之百三十五步餘實一千八法實俱以十八約之得八十一分步之五十六如畝法而一合問環田中周九十二步外周一百二十二步徑五步為田幾答曰二畝五十五步
