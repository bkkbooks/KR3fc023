body:
  text: 爲寶開立方法除之照前法上啇置第一位得一万下法亦置上啇一万進八位爲一万億自乘亦得一万億爲隅法與上啇一除寶一万億餘寶一万九千二百四十二億七百万尺乃三乘隅法得一万億爲方法下法再置上啇一万進八位爲一万億以三乘之得三万億爲廉法方法一退得三千億廉法再退得三百億下法三退得一十億續啇置第二位以方廉二法共三千三百億啇寶得四千下法亦置上啇四千進六位得四十億又以四乘之得一百六十億爲隅法又以上啇四乘廉法得一千二百億以方廉隅三法共四十三百六十億皆与上啇四除寶一万七千四百四十億餘寶一千八百二億七百万乃二乘廉法得二十四万億三乘隅法得四
