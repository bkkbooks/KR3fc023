body:
  text: 得一千五百三十六加五銖共得一千五百四十一銖以分母三通得四千六百二十三加內子二共得四千六百二十五與管收併數互乘以支數分母三乘併數五十一万七千一百五十二得一百五十五万一千四百五十六原管分母十一乘新收分母七得七十七以乘支數四千六百二十五得三十五万六千一百二十五又以支數減併數以支三十五万六千一百二十五減併數一百五十五万一千四百五十六餘一百一十九万五千三百三十一爲實以三分母相乘管分母十一乘收分母七得七十七乘支分母三得二百三十一法除之得五千一百七十四銖餘實一百三十七以法命之得二百一十一分銖之一百三十七却以銖法歸斤兩五千一百七十四銖光以斤法三百八十四除得一十三斤餘一百八十二銖又以兩法二十四除得七兩餘一十四銖該得見在銀一十三斤七兩一十四銖二百一十一分銖之一百三十七合問
