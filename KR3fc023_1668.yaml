body:
  text: 百四十得四百二十减第二行價一千四十四餘得價正六百二十四再以第四行麻二爲法遍乗第一行麻九得一十八与第四行麻一十八對减尽麥七得一十四减第四行麥四十五餘得麥正三十一菽三得六减第四行菽二十七餘得菽正二十一荅二得四减第四行荅八十一餘得荅正七十七黍五得一十减第四行黍三十六餘得黍正二十六價一百四十得二百八十减第四行價一千八餘得價正十百二十八再以第五行麻一爲法遍乗第一行麻九得九与第五行麻九對减尽麥七得七减第五行麥二十七餘得麥正二十菽三得三减第五行菽一十八餘得菽正一十五荅二得二减第五行荅七十二餘得荅正七十黍五得五减第五行黍四十五餘得黍正四十價一百四十得一百四十减第五行價八百五十五餘得價正七百一十五再相乗以第二行麥正五爲法遍乗三四五行
