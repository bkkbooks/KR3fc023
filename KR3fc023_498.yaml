body:
  text: 得七斗共二石五斗以三因之得七石五斗爲法除之得麥十七石二斗四升九合四勺倍之得米三十四石四斗九升八合八勺合問今有粟一十九石六斗八合欲爲細糙二米毎粟一斗春細米五升一合二勺糙米八升須令糙米倍細米問各幾何答曰細米四石四斗三合二勺糙米四石四斗三合二勺法曰置粟一十九石六斗八合以細米率五升一合二勺乗之得一十石三斗九合一勺九抄六爲實倍細米以八升除加細米粟一斗共得二十二升八合爲法除得細米四石四斗三合二勺倍之得糙米合問今有金銀一百錠直鈔一千七百二貫七百五十文只云
