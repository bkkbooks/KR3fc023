body:
  text: 答曰六十三步法曰置廣六步以乘長二十一步得一百二十六步折半合問今有半圭田闊三十一步七分步之四長八十一步問為田幾何答曰五畒七十八步十四分步之法曰置闊三十一步以分毋七通之加分子四共得二百二十一又置長八十一步以闊分毋七通之得五百六十七二數相乘折半得六万二千六百五十三步半為實以分毋七自乘得十為法除之得一千二百七十八餘實三十一步半陪法實皆七為及畒法除今有半圭田闊三十一步長八十一步三步之問為田幾何答曰五畒六十五步六分步之五
  hash: sha256:26feb384be9c3fc582b87d967fecd1ec94b5958b4ff1625f7a28e7d57053f87d
