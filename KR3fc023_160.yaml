body:
  text: 荅曰六十三步法曰置廣六步以乗長二十一步得一百二十六步折半合問今有半圭田闊三十一步七分步之四長八十一步問爲田幾何荅曰五畒七十八步十四分步之法曰置闊三十一步以分毋七通之加分子四共得二百二十一又置長八十一步以闊分毋七通之得五百六十七二數相乗折半得六万二千六百五十三步半爲實以分毋七自乗得十爲法除之得一千二百七十八餘實三十一步半陪法實皆七爲及畒法除今有半圭田闊三十一步長八十一步三步之問爲田幾何荅曰五畒六十五步六分步之五
