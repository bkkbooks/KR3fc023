body:
  text: 今有絹四十六匹二丈八尺匹法四十二尺賣鈔一百九十四貫只有絹三十四匹一丈二尺問該賣鈔幾何答曰二百一十六貫法曰以只有絹三十四匹以每匹四十二尺通得一千四百二十八尺加零一十二尺共一千四百四十乘原賣鈔二百九十四貫得四万二千三百三十六實以原絹四十六匹以匹法四十二通得加零二丈八尺共一千九百六十尺為法除之合問今有鈔二百一十六貫買絹三十四匹一丈二尺共有鈔二百九十四貫問該買絹幾何答曰四十六匹二丈八尺法曰以共有鈔二百九十四貫乘原買絹三十四匹以匹法四十二尺通這加零
  hash: sha256:8a3db5ec07223f69b916d87e51d293289f4bc51e995ead1ce566e0ecd15172ba
