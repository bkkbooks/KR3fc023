body:
  text: 今有絹四十六疋二丈八尺疋法四十二尺賣鈔一百九十四貫只有絹三十四疋一丈二尺問該賣鈔幾何答曰二百一十六貫法曰以只有絹三十四疋以每疋四十二尺通得一千四百二十八尺加零一十二尺共一千四百四十乗原賣鈔二百九十四貫得四万二千三百三十六實以原絹四十六疋以疋法四十二通得加零二丈八尺共一千九百六十尺爲法除之合問今有鈔二百一十六貫買絹三十四疋一丈二尺共有鈔二百九十四貫問該買絹幾何答曰四十六疋二丈八尺法曰以共有鈔二百九十四貫乗原買絹三十四疋以疋法四十二尺通这加零
