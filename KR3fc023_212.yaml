body:
  text: 南闊分毋六得一千三百八十中闊分毋三得四千一百四十中闊八步以分毋三通之加分子二共得五十六又互乗南闊分毋六得三百三十六北闊分毋七得二千三百五十二倍之得四千七百四併三闊共得一万一千九十九又置正長四十一步以分毋四通之加分子三共得一百六十七以乗三闊數併得二百二万五百三十三再折半得五十万五千一百三十三步二分半爲實以四分毋互乗六分乗七分得四十一乗三分得一百二十六又乗四分共得五百四爲法除實得一十二步餘實一百二十五步二分步以毎步五尺乗之得六百二十六尺二寸半法五百四步亦以毎步五尺乗之得二千五百二十尺法實皆三百七十五約之又畒法而一合問
