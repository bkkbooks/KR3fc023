body:
  text: 乘之得二万七千三百六十以元徑八步除之得三千四百二十又置外周七十二步自乘得五千一百八十四步以少減多餘一千七百六十四步為實以開平方法除之得內周四十二步却減外周七十二步餘三十步以六除之得徑五步合問今有環田外周七十二步中周二十四步實徑八步欲從內周截曰一百九十五步問所減外周併實徑各幾何答曰徑五步外周五十四步法曰倍截積得三百九十步為實以二周相減餘差四十八步以徑八步除之得六步為正隅倍中周得四十八步為從方開平方法除之上啇五步之上亦五畝以乘得十
  hash: sha256:d344e39bed455bc46cb0a43c3f52d645e5cb86c87811e002aa4dc4c58968fceb
