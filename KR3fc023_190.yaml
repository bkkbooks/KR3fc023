body:
  text: 今有牛角田一畔長六十八步一畔長六十二步底闊二十六步問為田幾何答曰三畒一百二十五步法曰併二畔共一百三十步折半得六十五步為實半底闊得一十三步為法乘之得八百四十五步以畒法除之合問今有船田頭闊一十步中闊一十五步尾闊八步正長六十步問為田幾何答曰二畒一百八十步法曰置正長六十步為實併三闊頭一十步中一十五步尾八步共得三十三步從三而一得十一步乘之得六百六十步以畒法之合問今有三角田每面一十四步問為田幾何答曰八十四步
