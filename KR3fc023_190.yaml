body:
  text: 今有牛角田一畔長六十八歩一畔长六十二歩底闊二十六步問爲田幾何荅曰三畒一百二十五歩法曰併二畔共一百三十歩折半得六十五歩爲實半底闊得一十三歩爲法乗之得八百四十五歩以畒法除之合問今有船田頭闊一十歩中闊一十五歩尾闊八歩正長六十歩問爲田幾何荅曰二畒一百八十歩法曰置正長六十歩爲實併三闊頭一十歩中一十五歩尾八歩共得三十三歩从三而一得十一歩乗之得六百六十歩以畒法之合問今有三角田毎面一十四歩問爲田幾何荅曰八十四歩
