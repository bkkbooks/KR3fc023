body:
  text: 價各幾何荅曰一人犬價一百法曰問不足適以不足爲實所出五文五十以少减多餘四十五爲法除得二人以適足五十乘得物價一百合問共買豕人各聘百盈一百文各出九十文適足問人数豕價各幾何荅曰一十人豕價九百法曰問盈適足以盈一百爲實所出一百九十以少减多餘一十爲法除得一十人以適足九十乘得豕價九百文合問長馬初日行一百九十三里日增一十三里駑馬初日行九十七里日减半里良馬駑馬俱發長安去齊三千里良馬先至齊囬迎駑馬問幾何日相逢良駑馬各行幾里
