body:
  text: 法曰三數剩一下三百一十五五數剩二剩一該一百二十六剩二下二百五十二七數剩三剩一該五百四十剩二下一千六百二十九數剩四剩一該二百八十剩四下一千一百二十併之共三千三百零七滿數六百三十則去之凡五次減去共三千一百五十餘一百五十七合問借本還利今有人借鈔共還本利九百九十六貫六百五十六文只云每貫月利三十五文今九箇月十八日問原借鈔幾何答曰七百四十六貫法曰置共還鈔九百九十六貫六百五十六文為實列月剩九箇月六日以三十五文乘之加本鈔一貫共得一貫三百三十六文為法除之合
