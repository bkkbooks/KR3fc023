body:
  text: 素一匹一丈價錢六百二十五今有錢五百問的素幾何答曰一匹法曰以所有素一匹一丈通為五丈乘今有錢五百得二千五百為實以所有價六百二十五為法除之合問絲一十四斤約得縑一十斤今有絲四十五今八兩問為縑幾何答曰三十二斤八兩法曰以所有縑一十斤乘今有絲四十五斤八兩得四百五十五斤為實以所有絲一十四斤為法除之合問絲一斤耗七兩今有二十三斤五兩問耗幾何答曰一百六十三兩四銖半
