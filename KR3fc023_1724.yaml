body:
  text: 一百三十二斤得正一十六斤復以左行甲三爲法遍乗右行已正二得正六同減左行乙正一餘得正五丙負三得負九異加左行丙正四得丙負十三正一十六斤得正四十八斤同減左行一百三十二斤得負十四斤再相乗以右行乙正五爲法遍乗中行乙正十一對減尽丙正五得正二十五正二百五十二斤得正一千二百六十斤復以中行乙正十一爲法遍乗左行丙負十三得負一百四十三異加中行丙正二十五得正一百六十八爲法復八十四斤得負九百二十四斤異加中行正一千二百六十斤共得二千一百八十四斤爲負以法除得一十三斤乃一停竿以四乗得丙絲五十二斤又以十三斤乘中行丙五得六十五以減中行絲二百五十二斤餘一百八十七以乙十一除得一十七斤以
  hash: sha256:8791baedbd0b667f49bdc6aec25b6d0d8b2375f250af21d3dd789fbe1f347aee
