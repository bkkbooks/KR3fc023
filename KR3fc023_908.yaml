body:
  text: 生多少數請均布算莫躊踷右鷓鴣天答曰毛詩四十本春秋三十本周易二十四本學生三百六十名法曰各列置衰互乘五乘四得二十三乘四得一十二三乘五得一十五副併得四十七為法又互乘三乘四得十二以乘五得六十以乘總書九十四得五千六石四十為實以法除之得一百二十以三除得毛詩數四除得春秋數五除得周易數以各書數仍與三四五次第乘之得各生數合問三石八斗二升強常年稅粟數明彰一斗三升三合粟圻米七升作軍糧斗五粟芝麻量八升實數赴官倉粟依本
