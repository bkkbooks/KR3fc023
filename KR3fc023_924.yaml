body:
  text: 法曰各列置衰甲一千乙六百丙三百六十丁二百一十六副併得二共百七十為法以所賦絹五百四十四匹乘未併者里得五十四五千乙得三十六千四百丙得一十九万五千八百四十丁得一十一万七千五百四各自為列實法二千一百七十六各除之合問二十四稱九斤絲出錢四客要分之原本皆是八折教一客少些兒答曰甲八稱五斤乙六稱一十斤丙五稱五斤丁四稱四斤法曰各列置衰甲一千乙八百丙六百四十丁五百一十二副併得二千百五十為法以所分絲稱照斤共三百六十九斤乘未併者甲得二十万九千乙
