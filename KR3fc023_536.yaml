body:
  text: 一百九十九文二分一厘八毫七絲五忽布疋價七百四十文得一百三十四貫七百七十二文五分麻秤價八百四十文得二百四十四貫七百七十六文米斗價五百文得一百八十六貫八百七十八文一分二厘五毫併之得一十二貫一百八十八文三分四厘一毫七絲五忽以減原本錢三百六十四貫二百五十文餘得息錢六百三十七貫九百三十八文三分四厘三毫七絲五忽合問今有錢六百五十四貫二百二十五文欲買油鹽蜜絹布炭六色油斤價一百五十文鹽斤價一百八十文蜜斤價二百一十文絹疋價八百四十文布疋價七百五十文炭秤價四十二文欲要一分油二分鹽三分蜜四分布六分絹八分炭問各買并該錢幾何
