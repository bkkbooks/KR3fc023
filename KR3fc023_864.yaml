body:
  text: 問今有人借銀九十兩月利二兩今共還四千三百五十六兩經三箇十二日問本利幾何答曰本銀四千五十兩利銀三百六兩法曰置共還銀四千三百五十六兩以月利九十二乗得三十九万三千四十爲實利借月三个月四分二因加借九十兩共得九十六兩八尓爲法除之得本銀四千五十兩以減共還餘得利銀合問今有人上年三月十五日借鈔九十貫月利四分於今年二月十二日共還本利鈔一百一十五貫問凈欠鈔幾何答曰一十四貫二百四十文
