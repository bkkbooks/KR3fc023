body:
  text: 百八十以三羽乘得一千一百四十叉三羽得一水合問比類計一百三問乘法今有金五十四兩七錢五分每兩價鈔二十四貫問該鈔幾何答曰一千三百一十四貫法曰置金五十四兩七糸五分為實以每兩二十四貫為法乘之合問今有金五百三十八兩每兩家鈔六十四貫七百五十文問該金幾何答曰三萬四千八百三十五貫五百文置金為實兩價六十四貫七百五十文乘之合問
