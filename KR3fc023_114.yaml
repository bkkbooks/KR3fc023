body:
  text: 錢三分銖之二減三分之二求之者一母互乘子求得二十四減一即一十銖三分銖之二益二分之一求之者五毋互乘子求得十八益五即五十三銖三分銖之一各平於三十六分之二十三三十六分全斤三百八十四銖內一分即十銖三分銖之二分子二十三即二百四十五銖三分銖之一法曰列置分毋子二分三分四分于右之一之二之三于左毋互乘子之一乘三分四分得十二之二乘二分四分得十六之三乘二分三分得十八副併十二十六十八得四十六為平實毋相乘二分三分四分相乘得二十四分為法以列數乘朱併分子列數三以乘十二得三十六乘十六得四十八乘十八得五十四亦以列數三乘法二十四得七十二數繁合用約分折半法得三十六實得二十三其之一得二得二十四之三得二十七以平實二十三減列實之二
