body:
  text: 三億七千二百一十五万六百二十五步乃二乘方法得一十二億為廉法一退得一億二千万下法再退得百万續啇置第二位以廉法一億二千万啇寶得三千下法亦置上啇三千進三位為三百万為隅法以廉隅二法共一億二千三百万皆與上啇三除寶三億六千九百万餘寶三百一十五万六百二十五步乃二乘隅法得六百万併入廉法得一億二千六百万二退得一百二十六万下法四退得百續啇置第四位以廉法一百二十六万啇寶得二十下法亦置上啇二十進一位為二百為隅法以廉隅二法共一百二十六方二千皆與上啇二十除寶二百五十二万四百餘寶六十三万二百二十五步乃二乘隅法得四百併入廉法共得一百二十六万四百一退得一十二万六千下法再
