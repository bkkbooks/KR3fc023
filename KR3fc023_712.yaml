body:
  text: 三十六爲法除實得四千八十八列左右二位左以五分因之得甌二万四四十隻以一甌油數一十八乗之得五十七万二千二百二十銖以釣銖法一万一千五百二十除之得四十九釣餘七千八百四十又除一得五千七百六十餘二千八十又以銖法三百八十四除之得五斤餘一百六十以兩銖法二十除之得六兩餘一十六銖乃是甌之油四十九釣一五斤六兩一十六銖右以三分因之得盞一万二千二百六十四隻以一盞油數三十二乗之三十九万二十四百四十八銖以釣銖法一万一千五百二十除之得三十四釣餘七百六十八以斤誅法三百八十四除之得二斤乃是盞之油三十四釣二斤併入甌油共得原総油八十三釣一秤七斤六兩一十六併甌盞共得一万二千七百四隻爲實併一
