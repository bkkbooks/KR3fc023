body:
  text: 十五減之餘一百二十五步却以平五除之得平二十五步又置減餘一百二十五步以減長較和餘三十得長較和九十五步加平二十五步共一百二十步折半得長六十步以減長較九十五步餘得較三十五步併長平得和八十五步合問七百五十勾股積長較相乗二千一不知和較與長平四事如何得備識荅曰長六十步平二十五步和八十五步較三十五步法曰置勾股積七百五十步以長較相乗二千一百步約之得股長六十步勾一十二步半倍之得平二十五步減長六十步餘得較
