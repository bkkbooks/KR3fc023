body:
  text: 何答曰一十八步法曰置正面長一十二步自乘得一百四十四步八而一合問又法半周九步自乘得八十一倍之得一百六十二九而一又法半周九步自乘長一十二步得一百八步六而一合問今有欖核田正中長二十四步兩旁各周二十六步問為田幾何答曰一百四十四步法曰正中長二十四步自乘得五百七十六步為實以四而一得一百四十四步合問今有欖核田半邊正面長一十六步三十三分步之三十二周一十八步問為田幾何答曰三十六步
