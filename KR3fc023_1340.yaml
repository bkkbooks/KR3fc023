body:
  text: 池積水通五渠開甲渠少半日而滿若開乙渠則一日而滿開丙渠二日半而滿開丁渠三日而滿開戊渠五曰而滿問五渠齊開幾日可滿答曰七十四分日之一十五法曰少半口一滿少半日乃三分日之一其一日得三滿置日爲分毋池滿爲分子一日一日二日半三日五日於右三滿一一滿一滿一滿於左以毋互乘子三滿乘一日得三以乘二日半得七日半又乘二日得十二日半又乘五日得一百一十二日半一満乘一日得一又乘二日半得二日半又乘三日得七日半又乘五日得三十七日半一滿乘一曰得一又乘一日亦得一又乘三日得三又乘五日得一一滿乘一日得一又乘一亦得一又乘二日半二日半又乘日得一十二日半滿乘一日一又乘一日得一又乘二日半又乘三日併之得一爲浃以分毋相乘一日乘一日二
