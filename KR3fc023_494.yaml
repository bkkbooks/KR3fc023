body:
  text: 分毋十三分乘三分共三十九乘之得四十万七千一百九十九以減除計積餘五万五千八百九再以分毋三分二十八分相乘得八十四乘之得四而六十八七千九百五十六為實仍以減餘六百一十三再以各分毋絹布共十三分乘價三分又乘布二分相乘得一百十七乘之得七万一千七百二十一為法除之得絹六十五匹餘實二万六千九十一法實皆一百一十七約之得六百一十三分匹之二百二十三合問今有西瓜每箇三文梨子每十箇五文桃子每十箇二文今瓜各食別客桃子二百五十五箇梨子二百二十六箇將瓜准還問各價瓜幾何答曰合價梨瓜二十一箇
