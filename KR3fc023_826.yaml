body:
  text: 今有杉木六根共賣鈔九十二貫甲四人買小根乙三人買中二根丙二人買一大根問各該價幾何答曰甲三十六貫乙三十二貫丙二十四貫法曰各列置衰列相與率也人為分毋木為分子甲四分之三乙三分之二兩二分之一以毋互乘子甲得十八乙得十六兩得十二重則可約各半之甲得九乙得八兩得六副併得二十三為法以賣鈔九十二貫乘未併者甲得八百二十八乙得七百三十六兩得五百五十二各自為列實以法二十三各除之合問今有鈔一百貫令三人分之只云甲多乙五貫丙得鈔如
  hash: sha256:3845d4c1c24428c30e7cd8ca2300b7ce24ef8f078b9368969f22e553b5900a2e
