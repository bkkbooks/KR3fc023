body:
  text: 並從方四十八步皆與上啇五步除實盡得徑五步以六乘得三十步併中周二十四步得截外周合問今有梯田長一百步南闊三十步北闊五十步今欲截南頭賣九畝問截長闊各幾何答曰截長六十步截闊處四十二步法曰通截田九畝得二千一百六十步倍之得四千三百二十步乘原長一百步得四十三万二千以闊差二十步除之得二万一千六百為實倍小頭闊二十步得六十步以原長一百步乘之得六千步却以闊差二十步除之得三百步為從方開平方法除之得截長六十步求廣以闊差二十步乘截長六十步得
  hash: sha256:a8e9404a106739fde56fdcc8267a5de8e83bfa11e2c4bfb59cc78e638f56f919
