body:
  text: 中田八畒該絲八錢八分下田四畒該絲三錢四分法曰排列問數以右行上田絲爲法遍乗左行得數右一錢二分五厘爲法一錢一分八分五厘一兩五乑三分二厘五毫左上一畒得一乑二分五厘下一畒得一乑二分五厘一十四畒五分得一兩八乑一分二厘五毫却以左行上田對減盡中田餘絲一分五厘下田餘絲四分緫餘絲二乑八分爲實以中下田餘絲得五分五厘爲法除實得田中下各五畒以餘絲乗之中田絲七分五厘下田絲二乑飲欠絲五厘約啇將下田減一畒餘得四畒該餘絲一乑六分減絲四分加餘欠絲五厘共四分五厘却增入中田絲七分五厘共一
