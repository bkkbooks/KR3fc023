body:
  text: 千四文錢梨棗数要全毎頃市上問聲宣我將一棗歸家去教公一任筭三年右鷓鴣天答曰梨六百五十七箇該錢八百三文棗三百四十三箇該錢一百九十六文法曰置列九箇七箇一千箇十一文四文九百九十九先以上中互乗九箇乗四文得三十六七箇乗十一文得七十七以少減多餘四十一爲法又以中下互乗七个乗九百九十九文得六千九百九十三文四文乗一千个得四千以少减多餘二千九百九十三却以梨九个乗之得二万六千九百三十六爲實以法四十一除之得梨六百五十七个以減緫数一千餘得棗三百四十三个以各價乗除合問
