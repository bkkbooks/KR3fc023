body:
  text: 千四文錢梨棗數要全每頃市上問聲宣我將一棗歸家去教公一任算三年右鷓鴣天答曰梨六百五十七箇該錢八百三文棗三百四十三箇該錢一百九十六文法曰置列九箇七箇一千箇十一文四文九百九十九先以上中互乘九箇乘四文得三十六七箇乘十一文得七十七以少減多餘四十一為法又以中下互乘七個乘九百九十九文得六千九百九十三文四文乘一千個得四千以少减多餘二千九百九十三却以梨九個乘之得二万六千九百三十六為實以法四十一除之得梨六百五十七個以減總數一千餘得棗三百四十三個以各價乘除合問
