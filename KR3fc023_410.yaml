body:
  text: 之合問今有鈔一千三百一十四貫買金五十四兩一十八銖問每兩價鈔幾何答曰二十四貫法曰置鈔一千三石一十四貫為實以買金五十四兩其一十八銖即其糸五分為法除之合問今有鈔一千三百一十四貫買金每兩家鈔二十四貫問該金幾何答曰五十四兩七千五分歸一八銖法曰置鈔一千三百一十四貫為實以每兩二十四貫為法除之合問今有銀九千九百六十銖計二十五斤十五兩問每斤該銖幾何答曰三百八十四銖
