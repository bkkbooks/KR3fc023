body:
  text: 法曰此問互換之法以漆三斗乗出漆率三得九易油四得十二和漆率五得十五各自爲實併漆率爲法出漆率三和漆率五併之得八以法除各實出漆得一斗一升餘二易油的得一斗五升和漆得一斗八升餘六不尽之数以法約之合問大器五小器一容三石大器一小器五容二石問大小器各容幾何答曰大器容二十四分石之十三小器容二十四分石之七法曰此問乃方程之法假令大器一容五斗小器五各容五斗多一石令之大器一容五斗五升小器五各容二斗分升不足二斗草曰副置大小器米盈不足
