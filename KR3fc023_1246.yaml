body:
  text: 法曰置下周一十九尺五寸自乗得二百八十尺二寸五分以髙四尺乗之得一千五百二十尺却以倚壁率十八除之得八十四尺五分爲實以斛法二尺五寸爲法除之得三十三石八斗合問今有倚壁尖堆米三十三石八斗下周一丈九尺五寸問髙幾何答曰四尺法曰置米三十三石八斗以斛法二尺五寸乗之得八十四尺五分又倚壁率十八乗之得一千五百二十一尺爲實以下周一十九尺五寸自乗得三百八十尺二寸五分爲法除之得髙四尺合問今有倚壁尖堆米三十三石八斗高四尺問下周幾何答曰一丈九尺五寸
