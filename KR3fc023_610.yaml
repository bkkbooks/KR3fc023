body:
  text: 答曰絹尺價一錢七分靛斤價二錢五分法曰置絹二十五尺以共四尓二分乘之得一百五為實併二價絹二十五靛一十七共四十二為法除之得靛斤價二尓五分以減共價餘得絹尺價一尓七分合問斗米粟斗半米一陳狂風起相和做以處分又分不得因此上做箇江見水右江兒水答曰米主該分一斗八升七合五勺粟主該分一斗一升二合五勺法曰置米粟共三十為實以米率六粟率十共十六為法除之得米一斗八升其分五勺以減數餘得粟一斗一升二合五勺合問
