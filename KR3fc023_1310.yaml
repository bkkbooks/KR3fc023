body:
  text: 錢唐南湖後學吳敬信民編集均輸計一百一十九問法曰以所輸粟價等物貴賤高下地里遠近人戶多寡均而爲衰如衰分法求之古問二十八問今有五縣賦粟一萬石每車載二十五石行道一里出顧錢一文各縣到輸所遠近不等粟價高下欲令各縣勞費相登內甲縣二萬五百二十戶粟一石價錢二十自輸其縣乙縣一萬二千三百一十二戶粟一石價錢一十遠
