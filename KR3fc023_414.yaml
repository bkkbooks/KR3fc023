body:
  text: 法曰置鈔一千七百八十五貫五百文爲實以置盐二百八十五引其一百二十六斤以二一得六分八厘爲法除之合問今有鈔三百四十五貫六百文買羅三十六疋每尺價鈔二百四十文問每疋長幾何答曰四十尺法曰置鈔三百四十五貫六百文爲實以尺價二百四十爲法除之得一千四百四十尺又以羅三十六疋除之合問今有鈔四十七貫八百八十文買胡椒每斤價鈔四貫六百八文問該買幾何答曰一十斤六兩六銖法曰此問本事歸除秪緑求斤之外餘不及者不以斤價求兩而以兩以銖之数來餘鈔求之可謂巧矣置鈔四十七貫八百八十爲實以椒價四貫六百八文爲法除之得一十斤
  hash: sha256:4725d1893d649ed8ecf73b475a5cf92c1037e895d875822da1db080ed901b690
