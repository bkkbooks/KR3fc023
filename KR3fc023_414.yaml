body:
  text: 法曰置鈔一千七百八十五貫五百文為實以置鹽二百八十五引其一百二十六斤以二一得六分八釐為法除之合問今有鈔三百四十五貫六百文買羅三十六匹每尺價鈔二百四十文問每匹長幾何答曰四十尺法曰置鈔三百四十五貫六百文為實以尺價二百四十為法除之得一千四百四十尺又以羅三十六匹除之合問今有鈔四十七貫八百八十文買胡椒每斤價鈔四貫六百八文問該買幾何答曰一十斤六兩六銖法曰此問本事歸除秪緑求斤之外餘不及者不以斤價求兩而以兩以銖之數來餘鈔求之可謂巧矣置鈔四十七貫八百八十為實以椒價四貫六百八文為法除之得一十斤
  hash: sha256:80bf324f502942491f033c77d50b93bf2bdff3dddc44458af532fb81debbda7f
