body:
  text: 一万五千四百八十四銖乃圴不盞之數以銖法而一得一爲一十斤無兩四銖一文得每兩價五錢以實一一十斤五兩四銖減法一石二二十八斤三兩五笄餘一石一釣一十七斤十四兩一銖為賤率一兩價得四錢合問貴賤實少法多其率法曰以所有物數為實所有錢為法實如法而一即歸除意實不滿法者以實為賤率分不書物數加上巳得貸數即物賤也以實減法為貴率以實減法即以賤減都數求買各乘得數求之得數乃求出物數也賤為法即貴賤物之都數也實為貴價減都數即價也以求出貴賤錢數以乘其物而求貴賤之數分矣問出錢九百八十買矢簳五千八百二十枚欲貴賤率之答曰三百枚五枚二錢五千五百二十枚六一
