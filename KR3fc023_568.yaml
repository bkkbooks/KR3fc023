body:
  text: 答曰大豕二兩六錢五分小豕一兩法曰置豕一十二以減相乗得一百三十二折半得六十六以轉添一絲半加之得九兩九分以減総銀二十一兩九錢餘一十二兩爲實以豕十二爲法除之得小豕價一兩各價轉添一絲半合問二絲九十三兩七錢五分餘飩麓絲一兩與英好價直二錢不少時價細絲一兩三錢足數明慓若知三事最爲高暗想其中蘊奧答曰錢二百二十五文細絲二斤五兩五錢麓絲三斤八兩二錢五分法曰置絲九十三兩七絲五分以併二價二銖五絲共五銖除之得一十八兩七
