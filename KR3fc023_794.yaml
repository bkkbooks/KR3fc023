body:
  text: 一十三位者九二十四十九並得七十九四位者二十七六十三一百四十七三百四十三並得五百八十五位者八十一一百八十九四百四十一一千二十九二千四百一並得四千一百四十一各為法除實如有位數多者皆以三因首數次第取之三歸七因以升其位並以為法除實得一分之數今有鈔二千五百二十六貫令甲二人乙五人丙七人丁九人欲遞以三七分之問各人得幾何答曰甲各得四百一十一貫六百文乙各得一百七十六貫四百文丙各得七十五貫六百文
