body:
  text: 啇除不若歸除餘得然開方用之数中有術號啇除啇總分排兩位居唯有開方湏用此續啇不盡命其餘今有鈔八十貫七百一十二文買物二百三十六斤問一斤價幾何荅曰三百四十二文法曰置所有錢八十貫七百一十二文爲實以所買物二百三十六斤爲法啇除之定位之法與歸除同二文二二六除一十二除存一十更除次检二文尽一十二三除如六扵第三位作七十內除六十餘存一十七百二二除如四除存四百餘扵前位下二文
