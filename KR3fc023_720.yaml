body:
  text: 乘未併者姑九得九十五四分十得七十四畝二妹六得六十三畝六分各自為列實以法二十二除之姑得四畝三分三釐六毫姊得三畝三分七釐毫餘一十六妹得二畝八分九釐餘二十不滿法者以法命之合問今有鰥寡孤獨四人支米二十四石內鰥者例給四分寡者例給五分孤者例給七分獨者例給九分問各得幾何答曰鰥三石八斗四升寡四石八斗孤六石七斗二升獨八石六斗四升法曰各列置衰四五七九副併得二十五為法以所支米二十四石乘未併者鰥四得九十六石寡五得一百二十石孤七一百六十八石九得二百一十六石各自為列實以法二十五除之合問
