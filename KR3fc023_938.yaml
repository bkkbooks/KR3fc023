body:
  text: 将八折易瞞人答曰甲五秤八金三兩二錢乙一秤五斤十二兩八錢丙五斤三兩二錢丁一斤四兩八錢法曰各列置衰丁二丙八乙三十二甲一百二十八副併得一百七十爲法以所分銀七秤五斤八兩以秤斤求兩得一千七百六十八兩乗未併者甲得二十二万六千三百四乙得五万六千五百七十六丙得一万四千一百四十四丁得三千五百三十六各自爲列實以法一百七十各除之得数定身减六爲斤又减五爲秤合問半兩黄金分不定丙丁戌與甲乙等五人所得要詳明此
