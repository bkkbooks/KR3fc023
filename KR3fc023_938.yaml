body:
  text: 將八折易瞞人答曰甲五稱八金三兩二錢乙一稱五斤十二兩八錢丙五斤三兩二錢丁一斤四兩八錢法曰各列置衰丁二丙八乙三十二甲一百二十八副併得一百七十為法以所分銀七稱五斤八兩以稱斤求兩得一千七百六十八兩乘未併者甲得二十二万六千三百四乙得五万六千五百七十六丙得一万四千一百四十四丁得三千五百三十六各自為列實以法一百七十各除之得數定身减六為斤又减五為稱合問半兩黃金分不定丙丁戌與甲乙等五人所得要詳明此
  hash: sha256:78a55a8b5a876d3f7137c77becb284d4068335be583610fe7f7d87fffccaba27
