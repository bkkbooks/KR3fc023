body:
  text: 答曰七十九步八萬三千七百十一分步之三萬九千六百十一法曰列置全步及分毋子照前法列而副併分毋自乘得三千九百九十一萬六千八百以乘全步及分子俱得二千九百九十一萬六千八百以全步積分通畒步得九十五億八千三萬二千為實各以本毋除子照前法除併之得一億二千五十四萬三千八百四十為法除之得七十九步餘實五千七百六萬八千六百四十法實皆一百四十四約之合問田一畒廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一九分步之一十分步之一十一分步之一一十二分步之一問縱幾何答曰七十七步八萬六千二十一分步之二萬九千一百八十三法曰列置全步及分毋子照前法列而副併分毋自乘得債七
  hash: sha256:ac10edef9dd0c518030bdc9119f0dd42afe589793e2c707a33e40372e1617704
