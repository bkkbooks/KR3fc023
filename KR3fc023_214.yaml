body:
  text: 今有錠田正中長三十六步兩頭各周二十七步兩二十七步四面兩角相空徑二十四步問為田幾何答曰二畒七分法曰置正中長三十六步自乘得一千二百九十六步折半得六百四十八步以畒法而一合問今有錠田半邊正面長二十四步兩頭周各九步腰周一十八步兩角相云空徑一十六步三十三分之三十二問為田幾何答曰一百四十四步法曰置正長二十四步自乘得五百七十六步以四而一合問又法兩頭周九步自乘得八十一又以十六乘之得一千二
