body:
  text: 今有錠田正中長三十六步兩頭各周二十七步兩二十七步四面兩角相空徑二十四步問爲田幾何荅曰二畒七分法曰置正中長三十六步自乗得一千二百九十六步折半得六百四十八步以畒法而一合問今有錠田半邊正面長二十四步兩頭周各九步腰周一十八步兩角相云空徑一十六步三十三分之三十二問爲田幾何荅曰一百四十四步法曰置正長二十四步自乗得五百七十六步以四而一合問又法兩頭周九步自乗得八十一又以十六乗之得一千二
