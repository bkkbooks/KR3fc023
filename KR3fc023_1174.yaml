  text: 一十二尺减下周三十六尺餘二十四尺爲法除之得接髙八尺合問今有方䑓一所上方九丈六尺下方一十二丈髙五丈四尺欲築作上方八丈問接髙幾何荅曰三丈六尺法曰置髙五丈四尺以上方九丈六尺减下方一十二丈餘二丈四尺除之得二丈二尺五寸爲實以欲築上方八丈减原上方九丈六尺餘一丈六尺爲法乗之得接髙三丈六尺合問今有圓䑓一所上周一十三丈五尺下周一十八丈高六丈欲築作上周一十二丈問接髙幾何荅曰二丈法曰置上周一十三丈五尺减欲築上周一十二丈餘一丈五尺又置上周一十三丈五尺减下周一十八丈餘四丈五尺以除髙六丈得一丈三尺餘
