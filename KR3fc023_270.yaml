body:
  text: 差二十步除之得三百步為從方開平方法除之得截長六十步求闊以廣差二十步乘今截長六十步得一千二百步為實却以原縱一百步為法除之得一十二步加南廣三十步共四十二步為截闊合問今有斜田南廣二十步北廣三十八步縱九十步今自北頭截田一千七百八十七步半問截廣縱各幾何答曰截廣二十七步縱五十五步法曰倍截田得三千五百七十五步以二廣相減除羌一十八步乘之得六万四千三百五十步却以原縱九十步除之得七百一十五步再以北廣三十八步自乘得一千四百四十四步內減縱
