body:
  text: 差二十步除之得三百步爲從方開平方法除之得截長六十步求闊以廣差二十步乗今截長六十步得一千二百步爲實却以原縱一百步爲法除之得一十二步加南廣三十步共四十二步爲截闊合問今有斜田南廣二十步北廣三十八步縱九十步今自北頭截田一千七百八十七步半問截廣縱各幾何荅曰截廣二十七步縱五十五步法曰倍截田得三千五百七十五步以二廣相減除羌一十八步乗之得六万四千三百五十步却以原縱九十步除之得七百一十五步再以北廣三十八步自乗得一千四百四十四步內減縱
