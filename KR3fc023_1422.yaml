body:
  text: 法曰置匠六千二人以乗三百六十百得二万二千三百二十以織五百七十九日乗之得一千二百八十五万六千三百二十爲實以原織二十四人乗原織日一百九十二得四千六百八爲法除之合問今有織匠一十二人九十六日織羅二百八十八疋今一百八十日織二千七百九十疋問該匠幾何答曰六十二人法曰置織羅二千七百九十疋以原織日九十六乗之又以一十二人乗得三百二十一万四千八十爲實以原織羅二百八十八疋乗今織日一百八十得五万一千八百四十爲法除之合問今有灶丁九人七日煎塩二十七引二百二十五斤今增
  hash: sha256:641429ea49b34d6db5b3a426e2dbed4ad19f9efe35146d04aba3ee1c4228faf4
