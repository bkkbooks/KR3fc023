body:
  text: 率餘實七千八百九十七銖乃均不盡之數以法而一得二十斤九兩以銖增一文得斤價六十八文以實二十斤九兩一銖減法一石二鈞二十八斤三兩五銖餘一石二鈞七斤十兩四銖爲賤率一斤貫得六十七文合問問出錢一十三貫九百七十文買絲一石二鈞二十八斤三兩五銖欲貴賤兩率之荅曰一石一鈞一十七斤十四兩一銖兩價四錢一鈞一十斤五兩四銖兩價五錢法曰以所求絲一兩得二十四銖乘錢數一十三貫九百七十得三十三万五千二百八十爲實以所買絲一石二鈞二十八斤三兩以法通之加零五銖共得七万九千九百四十九銖爲法除之一兩得四錢實不滿法者爲貴率餘
  hash: sha256:606937e0fa23604f98ce3e839fba97f277c3dc40d39be74d6578457632282fcb
