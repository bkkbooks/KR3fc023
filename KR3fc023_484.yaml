body:
  text: 升二合八抄爲實却以各米互白米四升二乗數四升八合得一斗一合六勺糙米四升八合乗糯米六升得二十八升八合糯米六升麥白米升二合得二斗五升二合併得七斗四升一合六勺爲法除之得六斗三升乃三米等數以各率除之得粟合問買物二色今有羅絹二十三疋半疋法四文共賣鈔一百八十六貫只云羅四尺與絹九尺共價適等又云絹尺價比羅尺價少一百五十文問羅絹并尺價各該幾何答曰羅一十二疋八尺毎尺價二百七十文絹一十一疋一丈二尺毎尺價一百二十文
