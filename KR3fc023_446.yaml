body:
  text: 今有綾六匹半絹九匹半其價適等只云絹少綾匹價二貫四百文問各價該幾何答曰綾七貫六百文絹五貫二百文法曰置貴率綾六匹半以差價二貫四百文乘之得一十五貫六百文賤率絹九匹半以差價二貫四百文乘之得二十二八百文各為列實以綾絹匹數相減餘三為差除貴率為絹價五貫二百文賤率為綾價七貫六百文合問就物抽分今有絹一丈二尺買蘇木二斤染絹三丈八尺共有絹六十三匹二丈四尺今欲減絹買蘇木還自染餘絹問染得
