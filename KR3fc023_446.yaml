body:
  text: 今有綾六疋半絹九疋半其價適等只云絹少綾疋價二貫四百文問各價該幾何答曰綾七貫六百文絹五貫二百文法曰置貴率綾六疋半以差價二貫四百文乗之得一十五貫六百文賤率絹九疋半以差價二貫四百文乗之得二十二八百文各爲列實以綾絹疋數相減餘三爲差除貴率爲絹價五貫二百文賤率爲綾價七貫六百文合問就物抽分今有絹一丈二尺買蘇木二斤染絹三丈八尺共有絹六十三疋二丈四尺今欲減絹買蘇木還自染餘絹問染得
