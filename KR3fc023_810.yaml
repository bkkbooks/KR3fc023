  text: 辛每戶七石三斗三升二合五勺九百二十戶共六千七百四十五石九斗壬每戶五石七斗三升二合五勺一千六百八戶共九千二百一十七石八斗六升法曰置各等戶以各分乘之為衰甲戶八之得二千九百一十二乙戶七之得二千七百七十二丙戶六之得二千五百九十二丁戶五之得二千八百五十戊戶四之得二千三百三十六已戶三之得二千二十八庚戶倍之得一千七百辛戶一因得九百二十副並得一万八千一百一十乙差一石六斗乘之得二万八千九百七十六石以减科米六万五千六百六十四石餘三万六千六百八十八石為實以並各等戶得六千四百為法除之得壬等每戶該米五石七斗三升二合五勺各加差一
