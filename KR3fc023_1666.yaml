body:
  text: 四二得一十八五得四十五三得二十七九得八十一四得三十六一百一十二得一千八五一得九三得二十七二得一十八八得七十二五得四十五九十五得八百五十五復以第二行麻七爲法遍乗第一行麻九得六十三与第二行麻六十三對减尽麥七得四十九减第二行麥五十四餘得麥正五菽三得二十一减第二行菽三十六餘得菽正一十五荅二得一十四减第二行荅四十五餘得荅正三十一黍五得三十五减第二行黍二十七餘得黍負八價一百四十得九百八十减第二行價一千一百五十二餘得價正一百七十一又以第三行麻三爲法遍乗第一行麻九得二十七与第三行麻二十七對减尽麥七得二十一减第三行麥四十五餘得麥正二十四菽三得九减第三行菽六十三餘得菽正五十四荅二得六减第三行荅五十四餘得荅正四十八黍五得一十五减第三行黍三十六餘得黍正二十一價一
