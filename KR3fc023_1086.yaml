body:
  text: 餘二百一十六半之得一百八以南闊分母六除之合問今有杖鼓田四畒一步一十四分步之十九南闊二十五步六分步之五中闊一十八步正長四十一步問北闊幾何答曰三十二步法曰俱照前法通田加分子爲實以正長除得五百六十三乃三闊之和别置南闊二十五步以分母六通之加分子五共得一百五十五中闊一十八步以南闊分母六通之得一百八步以二闊减和步五百六十三餘一百九十二以南闊分母六除之得北闊三十二步合問今有杖鼓田四畒一十步一百六十八分步之九十九南闊二十五步
