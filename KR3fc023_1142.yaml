body:
  text: 得三万七千五百尺以三而一万二千百尺合問城下廣四丈上廣二丈髙五丈一百二十六丈五尺問爲積幾何答曰一百八十九萬七千五百尺法曰以高袤關狹爲問求積者是逼其折变諸問相參併上下廣半之得三十尺以髙五十尺乗之得一千五百尺又以袤一千二百六十五尺乗之合問垣下廣三尺上廣二尺髙一丈二尺袤二十二丈五尺八寸問爲積幾何答曰六千七百七十四尺法曰併上下廣半之得二尺五寸以髙一十二尺乗之得三十尺又以袤二百二十五尺八寸乗之合問堤下廣二丈上廣八尺髙四尺袤一十二丈七尺問爲積
