body:
  text: 答曰各七百四十九石八斗一升六合法曰置鈔爲實併三色石價得五十七貫五百文爲法除之合問今有鈔一百二十五貫買紗羅只云羅毎尺一百三十文紗毎尺一百二十文問相停各該幾何答曰各一十二疋半法曰置鈔一百二十五貫爲實併二價得二百五十文爲法除之得五百尺以疋法四十尺約得一十二疋半合問今有鈔一十貫買羅絹只云羅三尺直二百文絹七尺直一百文欲買二色各停問該幾何答曰各二疋二五口羅價七貫絹價三貫
