body:
  text: 問九分之八比七分之六孰多幾何答曰九分之八多六十三分之二法曰列置分毋子九分七分於右之八之六于左毋互乘子九分乘之六得五十四七分乘之八得五十六以少五十四減多五十六餘二為實毋相乘九分乘十分得六十三分為法實不滿法即多六十三分之二合問問二十一分之八比五十分之十七孰多幾何答曰二十一分之八多一千五十分之四十三法曰列置分毋子二十一分五十分于右之八之一十七于左毋互乘子二十一分乘之十七得三百五十七五十分乘之八得四百以少三百五十七減多四百餘四十三為實毋相乘二十一分乘五十分得一千五十分為法實不滿法
