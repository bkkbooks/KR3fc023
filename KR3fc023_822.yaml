body:
  text: 二十二匹以匹法三十八尺乘之加零四尺共得二十五万一千六百四十尺却以分毋六人七人相乘得四十二乘之得一千五十六万八千八百八十為實以法一千八百六十四除之合問今有糧一萬三千四百七十七石一斗三分斗之一欲給軍食用只云馬軍六人給糧五十三斗水軍七人給糧五十四斗步軍九人給糧五十五斗其馬軍如水軍中半步軍多如馬軍太半問三色軍并各給糧幾何答曰馬軍三千一百六十四人糧二千七百九十四石八斗三分斗之二水軍六千三百二十八人糧四千八百八十一石六斗
