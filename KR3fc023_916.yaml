body:
  text: 之嫂自言快續麻李宅張家顧了他李家六斤十二兩二斤四兩是張家共織七十二尺布二人分布鬧喧譁借問鄉中能算士如何分得的無差答曰李宅一匹一丈四尺張宅一丈八尺法曰置共織布七十二尺為實併二麻張六斤十二兩李二斤四兩共得九斤為法除之每斤得八尺以乘各出麻合問三百八十一里關初行健步不為難次日腳疼俱减半七朝絻得到其間要見每朝行幾里請公仔細算相還答曰初日一百九十二里次日九十六里三日四十八里四日二十四里五日
