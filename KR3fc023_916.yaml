body:
  text: 之嫂自言快續麻李宅張家顧了他李家六斤十二兩二斤四兩是張家共織七十二尺布二人分布鬧喧嘩借問鄉中能筭士如何分得的無差答曰李宅一疋一丈四尺張宅一丈八尺法曰置共織布七十二尺爲實併二麻張六斤十二兩李二斤四兩共得九斤爲法除之每斤得八尺以乗各出麻合問三百八十一里関初行健步不爲難次日脚疼俱减半七朝絻得到其間要見每朝行幾里請公仔細筭相還答曰初日一百九十二里次日九十六里三日四十八里四日二十四里五日
