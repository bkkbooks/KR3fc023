body:
  text: 金積五十五寸分子二得銀積一十寸又併鉛銅分母十六分子九共二十五除積六十寸得二寸四分以乘分母十六得鉛積三十八寸四分分子九得銅積二十一寸六分各以寸兩变斤乘之合問今有金銀鉛銅四色長闊相等被火镕作一塊重九十一斤十二兩七錢五分問各方幾何答曰方五寸每色方三寸三千七百分寸之四百二十五法曰置重九十一斤以斤法十六通之得一千四百五十六兩加零十二兩七錢五分共得一千四百六十八兩七五分爲實以併四色方寸重兩共四十七兩爲法除之得各色積三十一寸二分五厘以四因之積一百二十五寸以開立方法除之得靣方五寸再置一
