body:
  text: 法曰置園圎四寸五分自乘得二十寸二分五厘以厚二寸乘之得四十寸五分以圎法十二除之得三寸三分七厘五毫以寸重十二兩乘之得四十五以斤法十六而一合問今有銅方一尺五寸別置銅方寸重七兩五錢問重幾何答曰一千五百八十二斤五錢法曰置銅方一十五寸再自乘得三千三百七十五寸以寸重七兩五乘之得二万五千三百一十二五爲實以斤法十六除之合問今有銅塔珠一箇實徑一尺周三尺問重幾何答曰二百六十三斤十兩七錢五分法曰置徑十寸再自乘得一千寸以九因得九千寸又以十六而一得五
