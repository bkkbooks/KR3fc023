body:
  text: 得牛一十二頭以减總數得馬一十六匹以各陪油乘之合問三將屯軍五萬名賞金千兩要均平甲多乙數三千旅乙比丙多一半兵今問欲知人數目各該金數要分明雖然不是玄微數會者須還一藝精答曰甲二万一千八百名金四百三十六兩乙一萬八千八百名金三百七十六兩丙九千四百名金一百八十八兩法曰置總軍五万名內减甲多三十餘四万七千名為實以三分為率內减丙半分餘二分半為法除之得乙軍數加三千得甲軍數將乙軍折半得丙軍數每軍該金二分乘之得數合問
