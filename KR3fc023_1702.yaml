body:
  text: 却以乙行上負五爲法復遍乗甲行上正六得正三十与左行上負三十異名對減尽下負十得正五十異減右行下正九十餘得然四十爲法正一斗八升得正八斗同加左行三斗得正一十二斗爲實一法除得五禾一秉得三升甲行下負十以三升乗得三斗加入正一斗八升共得四斗八升以上正六除得上禾一秉得八升合問上禾五秉損一斗一時爲下禾七秉上禾七秉損二斗五升爲下禾五秉問上下禾母秉各幾何荅曰上禾一秉五升下禾一秉二升法曰此問与前法同列所問數以甲行上正五爲法遍乗乙行得數上正五爲法下負七正一斗一升
