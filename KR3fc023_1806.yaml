body:
  text: 法曰去問如勾門廣如弦不合之半如股弦較勾去閫十寸自乘得一百寸股弦較不合二寸半之得一寸自乘得一寸併得一百一寸爲實倍較一寸得二寸爲法除之得弦門廣五十寸五分合問立木垂索委地二尺引索斜之柱地去木八尺問索長幾何答曰十七尺法曰木長如股弦索斜之如弦去木如弦索如股弦較勾去木八尺自乘得六十四尺
