body:
  text: 中聽得語吟分言當二瓶妳灌一升醉三灌三升醉一人共通飲了一斗九三十三客醉醺醺欲問高明䏻筭士幾向醨酒幾多醇答曰好酒一斗薄酒九升法曰置好酒一升互乗一人得一升爲醨酒薄酒三升互乗三人得九升爲醇酒又以薄酒三升互乗三十三人得九十九人爲総人又以醇酒九升乗共飲酒一斗九升得一酒七十一人內减九十九人餘七十二人爲實却以醇酒九升减醨酒一升餘八升爲法除之得薄酒九升以减共飲一斗九升餘得好酒一斗合問今有四石五斗黍碾束未精逢細雨裝到家中簸去糠三
