body:
  text: 中聽得語吟分言當二瓶妳灌一升醉三灌三升醉一人共通飲了一斗九三十三客醉醺醺欲問高明能算士幾向醨酒幾多醇答曰好酒一斗薄酒九升法曰置好酒一升互乘一人得一升為醨酒薄酒三升互乘三人得九升為醇酒又以薄酒三升互乘三十三人得九十九人為總人又以醇酒九升乘共飲酒一斗九升得一酒七十一人內減九十九人餘七十二人為實却以醇酒九升減醨酒一升餘八升為法除之得薄酒九升以減共飲一斗九升餘得好酒一斗合問今有四石五斗黍碾束未精逢細雨裝到家中簸去粳三
