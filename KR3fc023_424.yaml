body:
  text: 今有白米三百七十八石八斗四升該舂糙米七十六石共用白米三百七十八石問該用糙米幾何答曰四百五十石法曰以共用米三百七十八石乘糙米七十六石得兩千八百七十二石八斗為實以原白米六十三石八斗四升為法除之合問今有糙米四百五十石舂的白米三百七十八石只有糙米七十六石問該舂白米幾何答曰六十三石八斗四升法曰以只有糙米七十六石乘白米三百七十八石得二千八百七十二石八斗實以原糙米四百五十石為法除之合問
