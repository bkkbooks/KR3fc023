body:
  text: 賣爲正數買爲負數以右行牛正二爲法遍乗中左二行得數牛羊豕價右正二爲法正五負十三正一貫中正一得正二負三得負六正一得正二空左負五得負十正六得正十二正八得正十六負六百得負一貫二百却以中行牛正一爲法復遍乗右行牛正二得二百中行牛正二對減尽羊正五得正五異加中行羊負六得羊負十一豕負十三得負十三異加中行豕正二得豕正十五正一貫得正一貫中行價空无減得正一貫再以左行牛負五爲法復遍乗右行牛正二得正是與左行牛負十異名對減尽羊正五得羊正二十五同加左行羊正十三得羊正三十七豕負十三得豕負六
  hash: sha256:ab0f8d1974ef346926d8e6c435ae7e7c2e5fb6675d9f2cdd54980262ea38d637
