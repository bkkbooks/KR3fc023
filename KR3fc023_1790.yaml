body:
  text: 今有布絹三十疋共賣價鈔五百七十四疋絹值九十貫三疋步價該五十欲問絹布各幾何價鈔共該分端的若人筭得無差訛堪把芳名題郡邑答曰絹一十二疋該鈔二百七十貫布一十八疋該鈔三百貫法曰排列問数先一左行價九十貫爲法遍乘右行得数右絹四疋得三百六十布三疋得一百七十共三十疋得二千七百左價九十貫爲法五十貫五百七十貫却以右行絹四疋爲法復遍乘左行價九十得三百六十与左行三百六十對减尽價五十得二百减左行二百七十餘七十爲法價五百七
  hash: sha256:95811824ac049bbf30421dafb835f7d29e0437f0328ec314c6209202376954db
