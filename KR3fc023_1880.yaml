body:
  text: 一里一百二十步合問求廣法以入橫勾五十寸乗矩間相去四百寸得二万寸爲實以法一寸除之亦得二万寸又以里法一万八千寸除之得一里餘實二千寸以步法五十寸除之得四十步乃得廣一里四十步合問今有海島髙不知幾何置立二表於地各髙三丈前後各參直相去千步從前退行一百二十三步人目着地望島峯與前表末齊平復從後表退行一百二十七步人目着地望島峯亦與後表末齊平問島髙及去前表各幾何答曰島髙四里五十五步前表至島一百二里一百五十步
