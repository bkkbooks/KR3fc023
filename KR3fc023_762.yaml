body:
  text: 五十兩下下等每戶七分五厘得三千三百七十五兩共一百二十戶得四十万五千四各以二百四十兩除之爲秤十六兩除之爲斤合問今有軍夫二萬五千二百人共支米麥豆三色每四人支米三石七人支豆八石九人支麥五石問該幾何答曰米一萬八千九百石豆二萬八千八百石法曰置軍夫二万五千二百人列甲乙丙三位以三因甲得七万五千六百以四除得米一万八千六百石以五因乙得一万六以九除得麥一万四千石以八因丙得二十万一千六百以七除得豆二万八千八百石合問
