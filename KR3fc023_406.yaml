body:
  text: 該米幾何答曰一百一石五丰法曰置今有鈔四百一十一貫六百文為實以每石二貫四百文為法除之合問今有鈔六十六貫二百文糧芝麻二十六石四斗八升問每五斗價幾何答曰一貫二百五十文法曰以所求率五斗乘鈔六十六貫二百文貫三百三十一貫為實以所戀芝麻二十六石四斗八升為法除之合問今有鈔六十六貫二百文糴芝麻每石價二貫五百文問該糴芝麻幾何答曰二十六石四斗八升法曰置今有鈔六十六貫二百文為實以每石二貫五百文為法除
