body:
  text: 五仍將七千八百寄左又以一百一十九乗中行錢三百億三万五千七百加寄左七千八百共得四万三千五百以青錦五尺除得八千七百却以一百一十九除得青錦尺價七十三文一百一十九分文之一十三仍將八千七百寄左又以一百一十九乗右行錢三百得三万五千七百加寄左八千七百共四万四千四百以紅錦四尺除之得一万一千一百却以一百十九除得九十三文一百一十九分文之三十三爲紅錦尺價合問今有甲乙丙持緑不知其數甲云得乙絲強半丙絲弱半滿一百四十八斤乙元得甲絲弱半丙絲強半滿一百二十八斤丙云得甲絲強半乙絲弱半得一百三十二斤問甲乙丙各絲幾何
