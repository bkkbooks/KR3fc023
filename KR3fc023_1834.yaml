body:
  text: 法曰勾中容直即餘勾求餘股以容積井徑五尺人目入徑四寸餘開四十大寸以木高五十寸乘得二千三百寸爲實以餘勾入徑四寸爲法除之得長五丈七尺五寸即是徑深合問邑東西七里南北九里各中開門東門外十五里見木問出南門外幾何見木荅曰三百一十五步法曰求容積東西七里三通之得二千一百步南北九里三通之得二千七百步各半之相乘得
