body:
  text: 法曰置米五百七十五石以分毋三乘之得一千七百二十五穀三百一十五石以分子二乘之得六百五十併之得二千三百七十五為法置共鈔四万九千八百七十五貫副置二位上以三乘之得一十四万九千六百二十五下以二乘之得九万九千七百五十各以法除之合問今有鈔一千二百貫買綾每匹七貫二百文絹每匹四貫八百文欲買一停絹二停綾問各得幾何答曰綾一百二十五匹絹六十二匹半法曰置鈔一千二百貫為實併絹一匹價綾二匹價共一十九貫二百文為法除之得絹六十二匹半倍之得綾數合問今有絹布共一百三十八匹十三分匹之八共該價鈔三千四百
