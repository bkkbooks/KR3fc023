body:
  text: 之合問今有白米二百九十石七斗四升共舂糙米三百四十八石五斗問每糙米一石得白米幾何答曰八斗四升法曰置白米二百九十二石七斗四升為實以糙米三百四十八石五斗為法除之合問今有白米二百九十二石七斗四升每糙米一石舂白米八斗四升問共該糙米幾何答曰三百四十八石五斗法曰置白米二百九十二兩斗四升為實以舂白米八斗四升為法除
