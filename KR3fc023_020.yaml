body:
  text: 天之高也星辰之遠也苟求其故則千歲之日可坐而致也蓋天地之中有理斯有像也有像斯有數也有數斯有據也是以千歲之日至固廖邈而難知也聖賢傳侶丹衷登朗據其數而推致之亦有可知之道焉孟于之言豈欺我哉杭郡仁和之邑有良士吳氏主一翁
