body:
  text: 爲從方以開平方法除之得闊一十六步二步分得長一十九步一分各以一步六分除之得牆合問山一叚稍然平請得山人踏驗瑩用地一調三分半未知四面怎生均答曰方面一十八步法曰置地一亩三分五厘以畝步通之得三百二十四步爲實以開平方法除之合問假有平方面五步一十一分步之一試問英賢能筭士要見共該多少答曰二十六步法曰置方五步以分母十一乘之得五十五加分子一共得五十六自乘得三千一百三十六再以分母十一減分子一得一十卻以分子一乘
