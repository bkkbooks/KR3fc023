body:
  text: 答曰羅三十二疋三丈七尺八寸毎疋一十三貫綾九十五疋二丈九尺四寸毎疋一十二貫法曰以所求疋四十二疋乗鈔一千五百七十六貫一百文六万六千一百九十六貫二百文爲實以所買物一百二十八疋以四十二尺通加零二丈五尺二寸共五千四百一尺二寸爲法除之一疋得十二貫實不滿法者爲貴率除一千三百八十一尺八寸乃均不盡以四十二而一得三十二疋三丈七尺八寸增一貫毎疋得羅價一十三貫以實三十二疋三丈七尺八寸減法一百二十八匹二丈五尺二寸餘得九十五疋二丈九尺四寸爲賤率一疋價得一十二貫合問今有米麥共六十七石二斗四升三合共耀鈔一百六十三貫七百五十文米毎斗二百四十四文麥毎斗二百四
