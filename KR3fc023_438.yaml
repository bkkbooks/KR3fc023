body:
  text: 答曰羅三十二匹三丈七尺八寸每匹一十三貫綾九十五匹二丈九尺四寸每匹一十二貫法曰以所求匹四十二匹乘鈔一千五百七十六貫一百文六万六千一百九十六貫二百文為實以所買物一百二十八匹以四十二尺通加零二丈五尺二寸共五千四百一尺二寸為法除之一匹得十二貫實不滿法者為貴率除一千三百八十一尺八寸乃均不盡以四十二而一得三十二匹三丈七尺八寸增一貫每匹得羅價一十三貫以實三十二匹三丈七尺八寸減法一百二十八匹二丈五尺二寸餘得九十五匹二丈九尺四寸為賤率一匹價得一十二貫合問今有米麥共六十七石二斗四升三合共耀鈔一百六十三貫七百五十文米每斗二百四十四文麥每斗二百四
