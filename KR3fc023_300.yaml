body:
  text: 零在記方至池邊有數每邊十步無疑外方池徑果能到處芳名説你右西江月答曰方面六十步池徑四十步法曰通田一十畝得二千四百步以每邊一十步約之得方面六十步自乘得三千六百步內減田積二千四百步餘得圓池積一千二百步以四因三而一得一千六百步以開平方法除之得徑合問今有圓田一假中間有箇方池打量田畝可耕犁恰好三分在記池面至周有數每邊三步無疑內方圓徑若能知堪作算中第一右西江月答曰圓徑一十二步池方六步
