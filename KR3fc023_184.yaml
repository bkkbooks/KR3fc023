body:
  text: 三歩徑三歩問爲田幾何荅曰五十四歩法曰置外周二十七歩以四乗三而一得三十六歩自乗得一千二百九十六歩以三乗四而一得九百七十二歩以圓法十二除之得八十一歩於上併內方長六歩闊三歩共九歩以徑三歩乗之得二十七歩以減上數餘五十四歩合問今有錢田一角外周九歩內方三歩問爲田幾何荅曰一十八歩法曰四乗外周九歩得三十六歩自乗得一千二百九十六歩以四而一得三百二十四歩以圓法十二除之得二十七歩以減內方三歩自乗得九歩餘得一十八歩合問
