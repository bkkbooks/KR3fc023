body:
  text: 實併二價石價一百七十文共得三百三十文餘一貫六百文為法除之得客米六十六石六百七升五合以減總米八十四石餘為腳米合問白麵稱來九兩使油七兩相和今來有麵一斤多六兩五錢共數已用清油合和一斤五兩無訛再添多少麵米和不會應須問我右西江月答曰四兩五錢法曰置今用油二十一兩乘原麵九兩得一百八十九兩為實以原用油七兩為法除之得二十七兩以減今有麵餘為增麵合問四十三石一斗八升一合為餘更加一勺米無處買得淨椒有數稱斤兩皆十四又零三錢三銖不知各價是何如
  hash: sha256:e622838d44c3063de4384618d207b5a47c428dcd9ab8588b7cd6d059294e6227
