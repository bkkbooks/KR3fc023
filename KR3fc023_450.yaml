body:
  text: 腳該三十匹一丈五尺七寸九分六釐八毫七絲五忽法曰置布一千九百六十二匹三尺以匹法通三尺為一分二釐五毫以腳錢六十二文五分乘之得一百二十二貫六百三十文八分一釐二毫五系為實併匹價三貫九百三十七文五分腳錢六十二文五分共得四貫為法之得腳錢該布三十尺六分五釐八毫二絲三忽一鹿二渺五其匹下分數以法二丈四尺乘之以減共布餘得主留之數合問互換乘除今有鈔四百三十六貫五百文買紵絲二十四匹一丈二尺匹法四十八尺問每匹價鈔幾何
