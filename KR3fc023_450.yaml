body:
  text: 脚該三十疋一丈五尺七寸九分六厘八毫七絲五忽法曰置布一千九百六十二疋三尺以疋法通三尺爲一分二厘五毫以腳錢六十二文五分乗之得一百二十二貫六百三十文八分一厘二毫五系爲實併疋價三貫九百三十七文五分腳錢六十二文五分共得四貫爲法之得腳錢該布三十尺六分五厘八毫二絲三忽一鹿二渺五其疋下分數以法二丈四尺乗之以減共布餘得主留之數合問互換乗除今有鈔四百三十六貫五百文買紵絲二十四疋一丈二尺疋法四十八尺問毎疋價鈔幾何
