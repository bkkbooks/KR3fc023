body:
  text: 幾何荅曰二錢法曰置絹六疋以分母三通之得一十八加分子一共得一十九爲法以易銀一兩二錢以分母三通之得三十六加分子二共得三十八爲實以法除之合問今有鈔一十八貫五百四十八文四分文之三賈到胡椒二十六斤十六分斤之二問每斤價鈔幾何荅曰七百一十文法曰置鈔一十八貫五百四十八文以分母四通之加分子得七万四千一百九十五又以椒分母十六通之得一十一万八千七百一十二爲實又置胡椒二十六斤以分母十六通之加分子二共得四百一十八又以價分母四通之得一千六百七十二爲法除之合問
