body:
  text: 法曰置積若干爲實別置一筭名曰下法自末位常超五位約實得若干啇置第一位得若干下法亦置上啇爲若干四遍若干乗得若干爲隅法與上啇若干除實若干餘實若干乃六乗隅法得若干為方法下法再置上啇為若干列爲四位第一位三遍上啇若干乗得若干又以十五乗之得若干爲上廉第二位二遍上啇若干乗得若干又以二十乗之得若干爲二廉第三位以上啇若干乗得若干又以十五乗之得若干爲三廉第四位以六乗得若干爲下廉乃方法一退得若干上廉再退得若干二廉三退得若干三廉四退得若干下廉五退得若干下法六退得若干續啇置第二
