body:
  text: 共七兩五糸以原分毋三十二乘之得二百四十為法除之得三百四十五文合問今有布一匹價鈔一百二十五文只有鈔八十四文八分文之三問該買布幾何答曰二丈七尺法曰以只有鈔八十四文以分毋八遂之加分子三共得六百七十五乘所有布一匹通為四十尺得二万七千文為賣以所有價絲一百二十五文以原分毋八通之得一千為法除之得二丈七尺合問今有素一匹價鈔五百文有鈔六百二十五文該買素幾何答曰一匹一丈法曰以所有鈔六百二十五文乘所有素一匹通為四十尺得二万五千為實以價鈔五百文為法除之得五十尺合問
