body:
  text: 自乗得四百尺爲隅法與上啇二十尺除實盡合問積一百三十三萬六千三百三十六問爲三乗方面幾何答曰三十四尺法曰三相來其壯匾直置積爲實别置一筭名曰下法自末位常超三位一乗超一位二乗超二位三乗超三位万下十約實啇置第一位得三十下法亦置上啇三十進三位爲三万以三再自來得二十七万爲隅法與上啇三除實八十一万餘實五十二万六干三百三十三尺乃四乗隅法得一百八万爲方法下法再置上啇三十進三位爲三万置二位以三乗一位得九万又六乗得五十万爲上廉又一位三万以四乗得一十二万爲下廉方法一
