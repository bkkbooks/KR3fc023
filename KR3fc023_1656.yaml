body:
  text: 鷄負一兔一得三减第二行兔一十餘得兔正七價八百六十一得二千五百八十三减第二行價一千九百十六餘得價負六百六十七又以第三行羊四爲法遍乗第一行羊二得八与第三行羊八對减尽犬三得一十二减第三行犬四餘得犬負八鷄五得二十减第三行雞一十二餘得雞負八兔一得四减第三行兔六餘得兔正二價八百六十一得一千四百四十四减第三行價二千三百五十餘得價負一千九十四再以第四行羊五爲法遍乗第一行羊二得一十与第四行羊一十對减尽犬三得一十五减第四行犬八餘得犬負七鷄五得二十五减第四行雞六餘得雞負一千九兔一得五减第四行兔四餘得兔負一價八百六十一得四千三百五减第四行價二千九百九十二餘得價兔一千三百一十三再相乗以第二行犬負七爲法遍乗第三四行
