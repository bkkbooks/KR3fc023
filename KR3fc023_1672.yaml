body:
  text: 二百四十餘得荅負五百四黍負八得負一百九十二異加第三行黍正一百五得黍正二百九十七價正一百七十二得正四千一百二十八同減第三行價正三千一百二十減得價負一千八又以第四行麥正三十一爲法遍乗第二行麥正五得正一百五十五与第四行麥正一百五十五對減尽菽正一十五得正四百六十五同減第四行菽正一百五得菽負三百六十荅正三十一得正九百六十一同減第四行荅正三百八十五得荅負五百七十六黍負八得負二百四十八異加第四行黍正一百三十得黍正三百七十八價正一百七十二得正五千三百三十二同減第四行價正三千六百四十餘得價負一千六百九十二再以第五行麥正二十爲法遍乗第二行麥正五得正一百与第五行麥正一百同減尽菽正一十五得正三百同減第五行菽七十九得菽負二百二十五荅正三十
