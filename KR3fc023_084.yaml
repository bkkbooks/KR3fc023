body:
  text: 田幾何答曰二十三畒七十步法曰併兩畔縱共一百七十二步乘正廣六十五步得一万一千一百八十步折半得五千五百九十步為實以畝法除之合問箕田廣二十步廣五步正縱三十步為田幾何答曰二畝一百三十五步法曰併兩廣舌二十步踵五步與二十五步以乘正縱三十步得七百半折半得三百七十五步為實以畝法除之合問箕田一十七步踵廣五十步正縱一百三十五步為田幾何答曰四十六畝二百三十二步半法曰併兩廣舌一百一十七步踵五十步共得一百六十七步以乘正縱一百三十
