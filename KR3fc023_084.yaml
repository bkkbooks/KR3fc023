body:
  text: 田幾何荅曰二十三畒七十步法曰併兩畔縱共一百七十二步乗正廣六十五步得一万一千一百八十步折半得五千五百九十步爲實以畆法除之合問箕田廣二十步廣五步正縱三十步爲田幾何荅曰二畆一百三十五步法曰併兩廣舌二十步踵五步與二十五步以乗正縱三十步得七百半折半得三百七十五步爲實以畆法除之合問箕田一十七步踵廣五十步正縱一百三十五步爲田幾何荅曰四十六畆二百三十二步半法曰併兩廣舌一百一十七步踵五十步共得一百六十七步以乗正縱一百三十
