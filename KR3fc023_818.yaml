body:
  text: 百五十二下等九十二副併得八百為法以兩輸米一百二十石乘未併者各自為實上等得五万四千七百二十中等得三万二百四十下等得一万一千四十以法八百除之得逐等數又以各户除之得數合問今有七人差等均鈔甲乙均七十七貫戊己庚均七十五貫問丙丁合得幾何答曰甲四十貫乙三十七貫丙三十四貫丁三十一貫戊二十八貫己二十五貫庚二十二貫法曰置列二人二人為分毋七十七貫七十五貫為分毋令毋互乘子二人得一百五十三人得二百三十一以少一百五十減多二百三十一餘八十一為一差之
  hash: sha256:d1de4cab6c468731a9ff23880856dfbc15941e999513061b9baee353ffac20db
