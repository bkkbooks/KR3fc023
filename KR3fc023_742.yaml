body:
  text: 今有官輸䋹絲三百斤以糧多寡出之甲區秋糧米二千五百六十石每石三分乙區秋糧米二千一百三十石每石二分丙區秋糧米一千八百四十石每石石一分丁區秋糧米一千六百八十石每石半分問各區該絲幾何答曰甲區一百五十七斤七百三十一分斤之四百三十三乙區八十七斤七百三十一斤之三百三丙區三十七斤七百三十一分斤之五百五十三丁區一十七斤七百三十一分斤之一百七十三法曰置各區糧數以各分乘之為衰甲米以三分乘得七千六百八十乙米以二分乘得四千二百六十丙米以一分乘得一千八百四十丁米以半分乘得八百四十各列
