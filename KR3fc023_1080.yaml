body:
  text: 今有杖鼓田四畒一百六十五步南北各闊二十五步中闊二十步問正長幾何答曰五十步法曰通田四畒加零一百六十五步共得一千一百二十五步以四乗之得四十五百步爲實倍中闊二十步得四十步併南北各闊二十五步九十步爲法除之合問今有杖鼓田四畒一百六十五步南闊二十五步中闊二十步正長五十步問北闊幾何答曰二十五步法曰照前法通田以四乗之得四千五百步爲實以正長五十步爲法除之得三闊之和九十步以倍减中闊得四十步南闊二十五步餘得北闊二十五步合問
  hash: sha256:904ef42e1dd4994b4ab890588c3ac4ea3d2a59cf8b90bcdd420ef681c14cdfa6
