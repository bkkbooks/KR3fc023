body:
  text: 今有麻布一百四十二疋四尺十六分尺之力疋法四十二尺易紬六十八疋二丈九尺疋法四十八尺問毎紬一疋易布幾何答曰二疋三尺法曰以所求率四十八尺乗麻布一百四十二疋先以疋法四十二尺乗之加零四尺共五千九百六十八尺又以分毋十六通得九万五千四百八十八加分子九共九万五千四百九十七都以由疋法四十八尺乗得四百五十八万三千八百五十六爲實以易紬六十八疋先以疋法四十八尺通之加零二十九尺共二千二百九十三尺都以分毋十六乗得五萬二千六百八十八爲法除之得八十七尺以麻布四十二尺除之合問今有麻布一百四十二疋四尺十六分尺之九疋法四十二尺毎二疋三尺疋法四丈八尺易紬一疋問該紬幾何
