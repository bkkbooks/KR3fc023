body:
  text: 今有麻布一百四十二匹四尺十六分尺之力匹法四十二尺易紬六十八匹二丈九尺匹法四十八尺問每紬一匹易布幾何答曰二匹三尺法曰以所求率四十八尺乘麻布一百四十二匹先以匹法四十二尺乘之加零四尺共五千九百六十八尺又以分毋十六通得九万五千四百八十八加分子九共九万五千四百九十七都以由匹法四十八尺乘得四百五十八万三千八百五十六為實以易紬六十八匹先以匹法四十八尺通之加零二十九尺共二千二百九十三尺都以分毋十六乘得五萬二千六百八十八為法除之得八十七尺以麻布四十二尺除之合問今有麻布一百四十二匹四尺十六分尺之九匹法四十二尺每二匹三尺匹法四丈八尺易紬一匹問該紬幾何
