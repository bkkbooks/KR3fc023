body:
  text: 法曰置占地一二毫以尺畝通之付七十二尺以闊一尺五寸除之得四十八倍得內外周九十六尺六乗闊一尺五寸得九尺减餘得八十七尺折半得內周四十三尺半加九尺得外周五十二寸半合問遷塚種一楼一畝斯属頭楼闊二尺五不知內外周答曰內周四百七十八步半外周四百八十一步半法曰通畝得二百四十步以楼闊二尺五該半步除之得四百八十步倍得九百六十步以六因闊半步得三步减之餘九百五十七步折半得内周四百七十八步半加因闊三步得外周合問假有立積三十一步試問方面多少步数
  hash: sha256:3cbbd2f80936642f9ecb26029f1060515337beea9e698843e0bd6f7564cb739f
