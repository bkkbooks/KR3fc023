body:
  text: 二斗麥五斗菽三斗荅九斗黍四斗直一百一十二麻一斗麥三斗菽二斗荅八斗黍五斗直九十五問麻麥菽荅黍各斗直錢幾何荅曰麻七錢麥四錢菽三錢荅五錢黍六錢法曰此問与第一問相同相增二位次第求之排列問数以第一麻九爲法遍乗二三四五行麻麥菽荅黍價一九爲法七三二五一百四十得一千一百五十二二七得六十三六得五十四四得三十六五得四十五三得二十七一百二十八得一千四十四三三得二十七五得四十五七得六十三六得五十四四得三十六一百一十六
