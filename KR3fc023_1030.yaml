body:
  text: 退得一十万八干上廉再退得五千四百下廉三退得一百二十下法四退得一續啇置第二位以方廉三法共一十一万二千五百二十啇實得四下法亦置上啇四再乗得六十四爲隅法又以上啇四一遍乗上廉得二万一千六百二遍乗下廉得一千九百二十以方隅廉四法共一十三万一千五百八十四皆與上啇四除實盡得三十四尺合問比類六十六問今有宜田八畒廣三十二步問縦幾何答曰六十步法曰通田八畒得一千九百二十步爲實以廣三十二步爲法除之合問
