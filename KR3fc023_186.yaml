body:
  text: 今有火塘田外方一十二步內圓徑六步問為田幾何答曰一百一十七步法曰置外方一十一步自乘得一百四十四步減內圓徑六步自乘得三十六步以三乘得一百八步四除得二十七步餘一百一十步合問今有三廣田南闊二十六步北闊五十四步中闊一十八步正長八十五步問為田幾何答曰一十畒六十五步法曰併兩闊南二十六步北五十四步共八十步折半得四十步加中闊十八步共五十八步為實以正長八十五步為法乘之
