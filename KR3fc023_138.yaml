body:
  text: 今有直田廣三十二步縱六十步問為田幾何答曰八畒法曰置廣三十二步乘縱六十步得一千九百二十步以畒法而一合問今有直田廣三十二步二尺縱六十步三尺問為田幾何答曰八畒一分八釐一毫法曰置廣二十二步以每步五尺乘之加乘二尺共得一百六十二尺縱六十步每步五尺之加零三尺其三百三尺相乘得四万九千八十六尺以畝法六千尺除之合問今有直田廣三十二步三尺四寸問為田幾何答曰八畒二分四釐五毫四絲四忽法曰置廣三十二步通三尺六寸為七分二釐縱六十步通二尺四寸為四分八釐相乘
