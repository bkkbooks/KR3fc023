body:
  text: 乗之得七萬二千步爲實以又追四百步爲法除之得一百八十步加未及二十步共二百步合問歎豪家子弟心閑樂逍遙好養鵓鴿只記得五箇白兒九箇麻褐四日食三升九合更有此鳳頭毛腳錦皆相和二十八箇計數若多饒你筭字僂儸問一年糧數目如何答曰七石二升法曰置白兒五個麻褐九個共一十四個該四日食三升九合每日食九合七勺五抄相和二十八個每日食二升九合五勺以三百六十日乗之合問昨日街頭幹事閑來稅局門前立客持三百疋長司每疋必須稅二尺收布一十五疋半中貼回錢六百不知
