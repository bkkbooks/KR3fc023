body:
  text: 六豆價二貫乘米八斗得一千六以乘米七斗得一石一十二解得三百八十二為法除之得六石三斗乃米麥豆等數倍之七除得米價八除得麥價九除得豆價合問今有粟三石八斗六升二合五勺只云白米四升二合用粟一斗糙米四升八合用粟一斗糯米六升用粟一斗欲三色米各停問該幾何答曰各六斗三升白米該粟一石五斗糙米該粟一石三斗一升二石五勺糯米該粟一十五升法曰置粟三石八斗六升二合五勺於上以三米率數相乘四升二合乘四升八合得二斗六合六勺又以六升乘之得一石又十九合六勺以乘率數得四石六斗七
