body:
  text: 分子令毋互乘子糲米六百四十八粺米得七百十得八百一十副併得二千一百七十八爲法以有乘未併者各自爲實米糲得四千五百三十六粺得五千四十糳米得五千六百七十實如法而一糲米二併餘實一石八十粺米二斗餘六百八十四糳米二斗糳實一千三百一十四餘實與法皆一十八約之得數求米等者米取糳二斗以分毋一百二十一通之加分子一十共得二百五十二又以糲三十乘之得七千五百六十爲實以粟五十乘分毋一百二十一得六千五十爲法餘之得米一斗餘實一千五百一十法實皆一十約之得數六百五分斗之一百五十一粺糳米照法末之合問五人均錢五文合甲乙所得與丙丁戊相等問各幾何曰甲一錢六分乑之二乙一錢六分乑之一丙一錢
  hash: sha256:a1066b55a6165212b537e305343520ca11f5e6802e4b089201da53fd10f20ab2
