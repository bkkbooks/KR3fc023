body:
  text: 法除積得人夫八千九百七十六人合問求榑子木并橛葽草以城上廣一丈八尺减下廣四丈八尺餘三丈半之得一十五尺自乗得二百三十五尺加入髙羃一千二百九十六尺夫得一千五百二十一尺爲實以開平方法除之得三十九尺爲城斜髙以二因之即是一尺合用榑子木二條得七十八於上下置長一万六千三百二十尺以每條一十二尺約之得一千三百六十條却以上数七十八乗之得一十万六千八十兩靣合用倍之得二十一万二千一百六十條爲榑子木緫数其木止是謄倒使用爲要橛葽草数木故取其数以三之得六十三万六千四百八千爲橛葽各数又以四十五道除之得草数合問求濠深置城積一千九百三十八万八千一百六十尺以四因三除得二
