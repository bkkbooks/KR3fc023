body:
  text: 今有直田用較除一百二十步無餘長闊相和該一百問公三事幾何如答曰長六十步闊四十步較二十步法曰置較除一百二十減長闊相和一百餘二十為較以減相和一百餘八十折半得四十步為闊加較二十得長六十步合問圓田內著一方池七分二十步耕犁欲求在內方池面除演天源如積堆答曰圓徑二十八步池面二十步法曰通田七分加零二十步共一百八十九步以約減方池得圓徑二十八步自乘得七百八十四步三因四而一得五百八十八步以減總田一百八十八步餘四百步以開平方法除之得池方面二十步合問
  hash: sha256:d451686632c330dbf3833e5d1ff94133ff097b1539bc60d56c42fd415a38153a
