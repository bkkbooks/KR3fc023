body:
  text: 併之得五十六兩八分爲實以七十一兩爲法除之合問今有銅一經入爐每十斤得八斤今三經入爐得熟銅二百二十四斤十五兩八錢七分二厘問原本生銅幾何答曰四百十九斤七兩法曰置銅二百二十四斤以斤法十六通之加零十五兩八錢七分二厘共得三千五百九十九兩八錢七分二厘爲實以煉熟八斤再自乘得五百一十二斤爲法除之得七千十一兩以斤法除之合問今有鐵一經入爐每十斤得七斤今三經入爐得熟鐵一百一十四斤十五兩六錢四分六厘二毫問原本生鐵幾何答曰三百三十五斤三兩四錢
