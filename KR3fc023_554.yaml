body:
  text: 併之得五十六兩八分為實以七十一兩為法除之合問今有銅一經入爐每十斤得八斤今三經入爐得熟銅二百二十四斤十五兩八錢七分二釐問原本生銅幾何答曰四百十九斤七兩法曰置銅二百二十四斤以斤法十六通之加零十五兩八錢七分二釐共得三千五百九十九兩八錢七分二釐為實以煉熟八斤再自乘得五百一十二斤為法除之得七千十一兩以斤法除之合問今有鐵一經入爐每十斤得七斤今三經入爐得熟鐵一百一十四斤十五兩六錢四分六釐二毫問原本生鐵幾何答曰三百三十五斤三兩四錢
  hash: sha256:73cec612fc866aff65305f90d0e974ee05943297324516e26fd0dfaa423df08c
