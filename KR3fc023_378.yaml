body:
  text: 問出錢一百六十買鈱尾一十八枚間一枚價幾何答曰八文九分錢之八法曰以出錢一百六十為實以買鈱尾八十為法除之得八文餘實十六法實俱折半得九分錢之八合問問出錢一十三貫五百買竹二千三百五十箇每箇價幾何答曰五文四十七分錢之三十五法曰以除錢一十三貫五百為實以買竹二千三百五十為法除之得五文餘實一千一百五十法實俱五十約之得四十七分錢之三十五合問貴賤率除法曰以出錢數為實以所買物數為法實如法而一通歸除法實不滿法者以數為貴率即是分不盡錢數乃在物上以
  hash: sha256:e5cd2317af9d7f976b5b9e1ae67bcea03ac0b26366093a5e37a971b7d8d55cdb
