body:
  text: 問出錢一百六十買鈱尾一十八枚間一枚價幾何荅曰八文九分錢之八法曰以出錢一百六十爲實以買鈱尾八十爲法除之得八文餘實十六法實俱折半得九分錢之八合問問出錢一十三貫五百買竹二千三百五十箇每箇價幾何荅曰五文四十七分錢之三十五法曰以除錢一十三貫五百爲實以買竹二千三百五十爲法除之得五文餘實一千一百五十法實俱五十約之得四十七分錢之三十五合問貴賤率除法曰以出錢數爲實以所買物數爲法實如法而一通歸除法實不滿法者以數爲貴率即是分不盡錢數乃在物上以
  hash: sha256:d27657dcfb572d47c783764a6bd8b8d203e0c2ea22d5599350e79e6f7122b188
