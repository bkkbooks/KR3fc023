body:
  text: 勾弦和三爲法股弦和十二得一百八七百五十六得六千八百四勾弦和九爲法股弦和四得一十二九百七十二得一千九百一十六乃併勾股弦和得一百二十以三除得四十爲法併乘共步得九千七百二十以三除科二千二百四十爲實以法除得股弦和八十一步就以十二乘得九百七十二以减右下七百五十六餘二百一十六以三除得勾弦和七十二步却以股弦和八十一步乘得五千八百三十二倍得一万一十六百六十四爲實以開平方法除得一百八步即勾股弦和副置上位以减股弦和八十一步即勾二十七步又下位一百八步减勾弦和七十二步餘即股三十六步又勾弦和七十二步减勾二十七步即弦四十五步合問
  hash: sha256:ffeb428b54ccb6dc2e476b5d8f3e91838e9ea3b0b08d0e898062995633fc60b4
