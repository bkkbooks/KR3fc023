body:
  text: 為貴率以實減法為賤率法即貴賤都數實減法即之以貴率減都數餘皆賤率也問出錢一貫一百二十買絲一百九十八斤欲貴賤率之答曰六十八斤一斤五文一百三十斤一斤六文法曰以出錢一貫一百二十為實以所買絲一百九十八斤為法除之一斤得五文實不滿法者為貴率一百三十文乃均不盡之數指為一百三十斤每斤增一文通是六文一斤以實一百三十斤減去一百九十八斤餘賤率六十八斤各得五文合問問出錢五百七十六文買竹七十八箇欲其大小率之答曰四十八箇每箇七文三十箇每箇八文法曰以出錢五百七十六文為實以所買竹七十八箇為法除之一箇
