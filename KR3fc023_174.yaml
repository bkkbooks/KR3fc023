body:
  text: 十九步為法乘之得一千九百八十五步以畒法除之合問今有八不等田正北六步正南一十九步正東一十二步正西一十八步東北二十五步西北一十五步西南一十步東南五步問為田幾何答曰三畒五分二釐五毫法曰以繩量之正中長得三十六步闊得三十步相乘得直田積一千八十步于上次量東北角勾一十五步股二十步相乘得三百西北角勾九步股一十二步相乘得一得八步西南角勾六步股八步相乘得四十八步東南角勾步股四步相乘得一十二步併四數折半得二百三十步
