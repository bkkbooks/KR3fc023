body:
  text: 法曰置米二百七十石以斛法二尺五寸乗之得九百二十五尺又以圓法三十尺乗之得三万三千三百尺爲實以上周自乗得一千六百尺爲周自乗得九百尺上下周相乗得一千百尺併三数得三千七百尺爲法除之得深九尺合問今有圓窖積米三百七十石只云上周四丈深九尺問下周幾何答曰三丈法曰置米照前以斛法乗之又以圓法乗之得三万三千三百尺以深九尺除之得三千七百尺內减上周四丈自乗得一千六百尺餘一千一百尺爲實以上周四十尺從方開平方法除之合問今有圓窖積米三百七十石只云下周三丈深九尺問上
  hash: sha256:84b236b8b87e326c2e5e026c453c87894664258d52e80b15bce6d410ce7d9591
