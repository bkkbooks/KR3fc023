body:
  text: 加正一貫得一十六貫以絹二疋徐得絹價八貫合問今有銀硃六兩價質漆一十兩多鈔一十八貫又銀硃五兩價買漆一十五兩欠鈔五貫問硃漆每兩價幾何荅曰銀硃八貫漆三貫法曰此問賣欠爲正買爲負列所問效以甲行行正六爲法遍乗乙行得數上正六爲法下負十正一十八貫上負五得負三十下負十五得正九十正五貫得正三十却以乙行上負五爲法復遍乗甲行上正六得正三十異名与乙行負十對減尽下負甲行負五十異減乙行上正九十餘得正四十爲法正一十八貫得正九十貫同加乙行正三十貫得正一百二十貫爲實以法除得漆
