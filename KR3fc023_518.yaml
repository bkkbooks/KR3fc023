body:
  text: 貫四百文絲三分得五貫二百五十文粉七分得四貫四百八十文麵六分得五百八十八文併之得一十三貫七百一十八文為法除實得綾一分該二十七匹三分就綾數三因得絲八十一斤九分七因得粉一百九十一褁一分六因得麵一百六十三斤八分各為列實以各價為法乘之綾匹價三貫四百文得九十二貫八百二十文絲斤價一貫七百五十文得一百四十三貫三百二十五文粉褁價六百四十文得一百二十二貫三百四文麵斤價九十八文得一十六貫五十二文四分匹有三分以匹法二丈八尺素得八尺四寸褁下有分以三十二乘之為兩斤下有分加六為兩合問置物五色米七石四斗五合四勺四抄換油蜜茶鹽麵五色每
