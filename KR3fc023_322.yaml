body:
  text: 斜八十九步法曰併二減剩共五十九約之加三十得斜八十九步自乘得七千九百二十一於上畒斜內減九步得長八十步自乘得六千四百步又斜內減五十得闊三十九步自乘得一千五百二十一併得斜自乘同合問五畒六分勾股田不知勾股不知弦記得三事魯相併二百二十四步全答曰勾二十八步股九十六步弦一百步法曰通田五畒六分得一千三百四十四步以勾股約之得勾二十八步自乘得七百八十四步以半勾一四步除總步得股九十六步自乘得九千二百一十六步併得一万步以開平方除之得弦一百步合問
