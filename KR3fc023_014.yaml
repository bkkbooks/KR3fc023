body:
  text: 程勾股题向深隱法歸難曉古註混淆庖筭能畧初與宻所发臨由是通至術者鮮矣輒不自撰採輯舊問至章詳註繼至遺闊蒦其终繆粲然昨白如楷諸掌前增乗除開方起例至法中添詳註此類歌詩之術後繼續積演啟還源之方增千二百題通古舊題總學四百餘向數十萬言勞爲十卷題曰此章筭法此類大全積功十年馋克脫寡而年老目
