body:
  text: 程勾股題向深隱法歸難曉古注混淆庖算能略初與密所发臨由是通至術者鮮矣輒不自撰採輯舊問至章詳注繼至遺闊蒦其終繆粲然昨白如楷諸掌前增乘除開方起例至法中添詳注此類歌詩之術後繼續積演啓還源之方增千二百題通古舊題總學四百餘向數十萬言勞為十卷題曰此章算法此類大全積功十年饞克脫寡而年老目
