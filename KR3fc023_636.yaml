body:
  text: 麥二價如何取答曰黍五石四斗斗價一貫二百五十文麥三石斗價二貫二百五十文法曰四因各價六十七貫半得二百七十以麥黍八石四斗乘相併斗價三貫五百文共得二百九十四以減二百七十餘二十四乃賤價每斗一貫該黍二石四斗以減總數八石四斗餘六石折半得麥黍各三石黍加二石四斗共得五石四斗以除各價六十七貫半得黍價一貫二百五十加一貫得麥斗價二貫二百五十合問今有粟麥各一斗共錢三百二十文却有粟麥共一石各價六百若為論
  hash: sha256:0a7e578448f539f9b7dfaf1820695eee6ff6ac560bb2774804364681008cc895
