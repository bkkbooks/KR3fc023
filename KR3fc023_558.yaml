  text: 每兩藥直錢數四十一買良薑五十二文買檳榔八十丁香一兩客錢七貫五百三般分數商量檳三薑四二丁香多少要知各項右西江月答曰丁香一斤十五兩二錢五分檳榔二斤十四兩八錢七分五釐良薑三斤十四兩五錢法曰置鈔七貫五百文為寶併各價二丁香一百六十文三檳榔一百五十六文四良薑一百六十四文共四百八十文為法除之得一停率一十五兩六錢二分五釐以各物率乘之合問丁零羅七尺換訖五兩紅花染成裙假色偏佳六幅量
