body:
  text: 自乘得九百步以畝法除之得芝麻田三畝七分五厘以減總田十畝餘得黍田六畝二分五厘合問一假環田余久慮衆說分明亦有誰人悟忘了二周并徑步人道內周不及為零處七十有餘單二步三事通知答曰分明住五畝二分無餘數玄機與妙堪思慕六鳳樓梧答曰徑一十二步內周六十八步外周一百四十步法曰通田五畝二分得一千二百四十八步倍之得二千四百九十六步為實以不及七十二步以六餘除得徑一十二步為法除之得二百八步以減不及七十二步餘一百三十六步折半得內周六十八步加不及七十二步
  hash: sha256:764dda93073761c6b3e4a87f3b37c6de3113b4258cb24f95410e723396bea3a1
