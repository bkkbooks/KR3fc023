body:
  text: 自乗得九百步以畝法除之得芝麻田三畝七分五厘以減總田十畝餘得黍田六畝二分五厘合問一叚環田余乆慮衆説分明亦有誰人悟忘了二周并徑步人道內周不及爲零䖏七十有餘單二步三事通知荅曰分明住五畝二分無餘數玄機與妙堪思慕六鳳樓梧荅曰徑一十二步内周六十八步外周一百四十歩法曰通田五畝二分得一千二百四十八步倍之得二千四百九十六步爲實以不及七十二步以六餘除得徑一十二步爲法除之得二百八步以減不及七十二步餘一百三十六步折半得內周六十八步加不及七十二步
