body:
  text: 令之十六日多一百四十里良馬初日行一百九十三里第十六日行三百八十八里併之以十六日折半得四千六百四十八里駑馬初日行九十七里第十六日行八十九里半併之以十六日相乗折半得一千四百九十二里兩馬共行六千一百四十里課於六千里多一百十里草曰置盈不足日分里数十五日少三百三十七里半十六日多一百四十里維乗十五日乗多得二千一百日十六日乗少得五千四百日併得七千五百日爲實併盈一百四十不足三百三十七里半共四百七十七里半爲法除之得十五日餘實三千三百七十五法實皆以二十五約之得一百九十一分日之一百三十五合問良馬行初日併第十五日行共五百六十八里以十五日
