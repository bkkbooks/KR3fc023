body:
  text: 今有鈔一千一百八貫八百文買到線絲綿共二十四斤十二兩只云其線一兩價多絲價一貫六百文綿價二貫欲買一停線二停絲三停綿問三色各幾何答曰線六十六兩每兩四貫四百八十文絲一百三十二兩每兩二貫八百文綿一百九十八兩每兩二貫二百四十文法曰先置線絲綿共數以斤通兩得三百九十兩爲三位上以三乗得一千一百八十八兩中以二乗得七百九十二兩理得三百九十六兩各自爲實併停率一二三得六爲法各除上得綿九十八兩中得絲一百三十一兩理得線六十六兩卻以二兩除上綿
