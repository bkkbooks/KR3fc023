body:
  text: 去四丈更從立勾端望東南隅入上股一丈七尺五寸問邑廣縱各幾何答曰東西廣一里四十步南北縱一里一百二十步法曰求縱以勾髙三十五寸乗東南隅入下股一百八十寸得六千三百寸却以入上股一百七十五寸除之得三十六寸內减勾髙三十五寸餘一寸爲法置東南隅入下股一百八十寸內减東北隅入下股一百二十寸餘六十寸以乗矩間相去四百寸得二万四千寸爲實以法一寸除之亦得二万四千寸又以里法一万八千寸除之得一里餘實六千寸又以步法五十寸除之得一百二十步乃得縱
