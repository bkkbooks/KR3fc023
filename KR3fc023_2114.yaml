body:
  text: 勾股測望論唐荆川勾股之法橫為勾縱為股斜為弦勾股求弦勾股自乗相併為實平方開之得弦勾弦求股勾弦自乗相减為實平方開之得股股弦求勾同法蓋一弦實蔵一勾一股之實一勾一股之實併得一弦實也數非両不行因勾股而得弦因股弦而得勾因勾弦而得股三者之中其両者顯而可知其一者藏而不可知因兩以得三此勾股法之可通者也至如遠近可知而高下不可知如卑則塔影高則日
