body:
  text: 答曰大羊一百二十隻小羊二十隻法曰置羊一百四十以大羊剪毛十八兩一乘之得二千五百二十兩以減剪毛一千四百兩餘一百二十兩為實以大羊毛一十八兩減小羊毛一十二兩餘六兩為法除之得小羊二十以減總羊一百四十餘大羊一百一十合閣甲劉九成二兩叉七色相同李銀鋪內偶相逢各欲改成器用其子末所以懼埒一處銷鎔不惟悶惱李三翁又把算師擾動右西江月答曰共鎔成八色金四兩甲分金二兩二錢半折色一兩八錢
