body:
  text: 得四第四位得三下一位第二復以隅算如前升增逅低一位求之求第二位六舊報五加十而止四加六為十三加三為六二加一為三求第三位六十五並舊嚴十加十而止六加四為十三加一為四求第四位六十五二十並舊嚴十加五而止四加一為五求第五位六十五二十十五並舊嚴五加一為六廉上廉二廉三廉四廉下開平方法曰置積為實別置一算名曰下法原下之法於實數之下自末位常超一位初乘時過一位今超一位約實至首位盡而上一下㝎一百下㝎十萬下㝎百百萬下㝎千於實上啇第一位得數以方法一一二二三三四四五五六六七七八八九九之嚴為啇啇本體實數下法之上亦置上
