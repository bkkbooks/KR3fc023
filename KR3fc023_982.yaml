body:
  text: 得四第四位得三下一位第二復以隅筭如前陞増逅低一位求之求第二位六舊報五加十而止四加六爲十三加三爲六二加一爲三求第三位六十五並舊嚴十加十而止六加四爲十三加一爲四求第四位六十五二十並舊嚴十加五而止四加一爲五求第五位六十五二十十五並舊嚴五加一爲六廉上廉二廉三廉四廉下開平方法曰置積爲實別置一筭名曰下法原下之法於實數之下自末位常超一位初乗時過一位今超一位約實至首位盡而上一下㝎一百下㝎十萬下㝎百百萬下㝎千於實上啇第一位得數以方法一一二二三三四四五五六六七七八八九九之嚴爲啇啇本體實數下法之上亦置上
