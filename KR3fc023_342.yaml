body:
  text: 見闊長多少數荅曰闊三十六步長六十八步法曰二乘田積一千二百二十四步得二千四百四十八步爲實以不及三十二步爲從方照前開平方法除之得中闊三十六步加不及二十二步得長六十八步合問今有覆月田一叚共積二百一十六徑不及弦闊十二問該弦徑各數目荅曰弦闊二十四步徑一十二步法曰四乘田積得八百六十四步以三除得二百八十八步爲實以不及一十二步爲從方照前開平方法除之得徑一十二步加不及一十二步得弦闊二十四步合問箭筈田截一叚各長十九東西北闊一百八十中闊十步
