body:
  text: 法曰以熟菽一百二半乘粟四斗為實以粟率五十為法除之問粟二斗為糳幾何答曰七斗法曰以糳一百七十五乘粟二斗為實以粟率五十為法除之問糲一十五斗五升五分升之二為粟幾何答曰二十五斗九升法曰以粟五十乘糲一十五斗五升以分母五分通得七百七十五加分子二共七百七十七得三万八千八百五十以糲三十以原通分母五通得一百五十為法除之合問問稗米二斗為粟幾何答曰三斗七升二十七分升之一法曰以粟五十乘稗米二斗為實以稗米二十七為法除之問糳米三斗三分升之一為粟答曰六斗三升三十六分升之七
