body:
  text: 慢使臣日行里數合問今有快行者日行九十八里慢行者日行六十六里今慢行者先發八日問快行者趕至幾日及之答曰十六日二分日之一及半日法曰置慢行者日行六十六里以先發八日乗之得五百二十八里爲實以快慢行里相減餘三十二里爲法除之合問互換用工今有織匠二十四人一百九十二日織紵絲五百七十六疋欲令六十二人織三百六十日問蔎織幾何答曰二千七百九十疋
