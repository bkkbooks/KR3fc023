body:
  text: 答曰積三百五十尺菽一百四十四斛二百四十三分之八法曰置下周自乗得九百尺以髙七尺乗之得六千三百尺如一十八而一得積二百五十尺以斛法二尺四寸三分除之得菽合問委米倚垣內角下周八尺髙五尺問積尺及爲米各幾何答曰積三十五尺九分尺之五爲米二十一斛七百二十九分斛之六百九十一法曰置下周自乗六十四尺以髙五尺乗之得三百二十尺如九而一得積三十五尺九分尺之五以分母九乗三十五尺得三百一十五加分子五得三百二十爲實以斛法一尺六寸二分以分母九乗之得一千四百五十八爲法除之得二十一斛餘實一千三百八十一法實皆折半
