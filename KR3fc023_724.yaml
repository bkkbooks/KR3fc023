body:
  text: 乙二石三斗四升三合七勺五抄丙一石八斗七升五合法曰置納折米七石五斗爲實以共該米一百二十八石爲法除之得五升八合五勺抄三七五粟米得各該倍米合閤今有甲出絲一十八斤十二兩乙出絲一十五斤九兩丙出絲二十二斤十一兩丁出絲二十四斤十五兩戊出絲一十一斤十三兩共絲九十三斤十二兩共織絹九十一疋五尺二寸五分三六尺驗出絲以分之問各得幾何答曰甲一十八疋八尺二寸五分
