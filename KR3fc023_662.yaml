body:
  text: 答曰大夫八錢一百三十七分錢之一百四不更十錢一百三十七分錢之一百三十簮裊以一十四錢一百三十七分錢之八十二上造二十一錢一百三十七分錢之一百二十一公士四十三錢一百三十七分錢之一百九法曰此問衰分加分母子各列置衰列相與率也大夫五分之一不更四分之一簮裊三分之一上造二分之一公士一分之一分母互乘二分乘三分又乘四分大夫得二十四二分乘四分又乘五分不更得三十二分乘四分又乘五分簮裊得四十三分乘四分又乘五分上造得六十倍之公士得一百二十重則可約各半之大夫十不更十五簮裊二十上造三十公士六十副併得一百三十七為法以所均一百乘未解大夫得一千二百不更得一千五百簮裊得一千上造得三千公士得六千各自
