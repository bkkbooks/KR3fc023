body:
  text: 長九十四步法曰通田一十四一分得三千三百八十四步為實半南比北闊得一十四步為從方以多南闊七十二步為減積以開平方法除之得南闊二十二步列二位一位加差爭十步得北闊五十步一位加多南闊七十二步得長九十四步合問今有圓田一所不知頃畝的端直一道正中穿狐矢分為兩假通徑七十四步二十四步頁除河見在幾多田水占如何得見右西江月答曰見在田九畝八分九一步二水占田七畝二分四步
