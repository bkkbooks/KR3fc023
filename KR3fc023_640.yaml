body:
  text: 七兩四分銀錠糴得米麥同盛九石四斗三升二價髙例各另米價九分一斗麥價七分無剰請問米麥分明精術果然通聖答曰米二石一斗九升五合麥七石二斗三升五合法曰置米麥九石四斗三升爲實以米斗價九分因之得八兩四十八分七厘以減原銀七兩四分餘剰銀一兩四尔四分七厘爲實以米價九分減麥價七分餘價二分爲法除之得麥七石二斗三升五合以減總数餘得米二石一斗九升五合合問今有一田好粟七石六斗五升鄉例自来六米如何展得
