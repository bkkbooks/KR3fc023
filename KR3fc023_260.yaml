body:
  text: 八千五百六十一文以分母九通之加分子七共得七万七千五十六以乘前數得一百九十二万六千四百為實以二分母七分九分相乘得六十三為法除之得三十貫五百七十七文餘實四十九法實皆七紬之合問今有一百九十人每人支鈔一貫十九分貫之一問該鈔幾何答曰二百貫法曰置人支鈔一貫以分母十九通之加分子一得二千又以人一百九十乘之得三千八百為實却以支鈔一貫以分母十九通之得十九貫為法除之合問除分今有絹六匹三分匹之以易銀一兩二錢二分錢之一問一匹易銀
