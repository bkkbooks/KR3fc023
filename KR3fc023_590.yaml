body:
  text: 答曰茶重一斤一兩六錢四分法曰置又有江茶八寸四分二寸一分相乘得一尺七寸六分四重又以厚九分乘之得一十五尺八寸七分六重為實以原江茶長闊二寸八寸相乘得一尺六寸又以厚九分乘之得一十四尺四寸為法除之合問斤二兩買油聲噴斤四兩買鹽聽言今有銀二兩七錢三分六厘交足無僞要停買如何計算兩般見稱得都全欲問英貿莫得所感為何得保差到處名傳右折桂令答曰各一斤九兩九錢二分法曰置銀二兩七爾三分六厘以二價油一十八兩鹽二十兩相乘得三兩六十爾乘之得六十兩兩二為實併二價為法除之合問
  hash: sha256:a455c4c613725b4b292aa046936eb82051820ee09b44662d6059a9ab7d6fc915
