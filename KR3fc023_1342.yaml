body:
  text: 半又乘三日得七日又乘五日得三十七日半爲寶寶不滿法以法約之發長安五日至齊乙發齊七日至長安至長安今巳先發二日幾日相逢答曰二日分日之一乙之禾也法曰併甲五日乙七日共得一十二日爲法以乙先發二日減乙元程七日餘五日以乘甲程五日十五日爲寶以法除之合問粟七斗爲糲粺糳米欲令相問粟爲米谷幾何曰各米一斗六百分半一百十一糲米取粟二斗一百二十一分十之一十粺米取粟二斗一百一十一分斗之三十八糳米取米二斗一百二十一分斗之七十三法曰置糲米三十粺米二十糳米二十四爲分毋皆以一爲
