body:
  text: 法曰以銀九千九百六十銖為實以計二十五斤其一五兩兩求斤即九三七五為法除之合問今有鈔七十四貫三百五十文買乳香三十八斤十一兩十四銖問每銖價鈔幾何答曰五文法曰置鈔七十四貫三百五十文為實以所買乳香三十八斤其十一兩以兩求斤即六八七五以每斤三百八十四銖通得一万四十八百五十六銖加零十四銖共一万四千八百七十銖為法除之合問今有鈔一千七百八十五貫五百文買鹽二百八十五引一百三十六斤每引二百斤問每引該鈔幾何答曰六貫二百五十文
  hash: sha256:fd8da22fdf992661826286817574667cdd9e651c8646e879df2d6cdd274fd6b8
