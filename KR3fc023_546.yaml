body:
  text: 法曰置原借布長五百二十寸問二十一寸相乘得一萬九百二十寸為實以常行布闊一十六寸為法除之合問今有鈔五百二十五貫五百文共買木綿布七十五匹各闊二尺一寸今原布無止有闊一尺六寸布主扣箅原價貼還問該幾何答曰一百二十七貫五百文法曰置鈔五百三十四貫五百文為實以布七十五匹以四貫通得三百文以闊二尺一寸乘之得六千三百尺為法除之得尺價八分五厘別以闊二尺一寸減一尺六寸餘五寸以乘三百丈得一千五百尺為不及數卻以尺價八分五厘乘之得貼還鈔合問今有原布長二百四十八尺闊二尺二寸今無原布歸還
  hash: sha256:75d4e7e4a13ef929f84ddb67936052a93d97307f66be8645929b79596bc01aec
