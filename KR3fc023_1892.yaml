body:
  text: 堪可應他筭舉右西江月答曰索長四丈六尺二寸五分杆長四丈三尺七寸五分法曰勾去杆一十五尺自乗得二百二十五尺爲實以股弦較索乗委地二尺五寸爲法除之得九十尺加較二尺五寸共九十二尺五寸折半得索長四丈六尺二寸五分减較二尺五寸餘得杆長合問今有竹髙一丈園中出衆高強只因有病被虫傷節相連不長風折枯梢在地離根三尺曾量枯梢折竹数明張激惱先生一晌答曰未折髙四尺五寸半
