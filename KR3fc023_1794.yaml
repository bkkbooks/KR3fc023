body:
  text: 錢唐南湖后學吳敞信民編集勾股計一百一問求弦法曰勾取各自乘併二開方除之一勾一股幕典弦積相等故併而開方求弦回数弦求股法曰勾自乘以减弦自乘餘開方除之弦自乘內有一勾積一股積余法减去餘是積開方知得数股弦求勾法曰股自乘以减弦自乘餘開方除之弦自乘中有一勾積一股積以股减弦餘即勾實故開平方法求之勾股弦圖
