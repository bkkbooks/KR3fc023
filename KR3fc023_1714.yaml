body:
  text: 行羅二十四對減尽綾五得三十減左行數十六餘得綾十四絹六得三十六減左行絹二十餘得絹一十六鈔一貫二百一十九文得其負三百一十四文減左行鈔五貫五十二文餘得鈔二貫二百六十二文再以中行綾一爲法遍乗左行綾十四得十四絹十六得十六鈔二貫二百六十二文得二貫二百六十二文復以左行綾十四爲法遍乗中行綾一得十四与左行綾十四對減尽絹十四得一百九十六見三行絹十六餘得絹一百八十爲法錢一貫二十三文得一十四貫三百二十二文減左行鈔二貫二百六十二文餘导鈔一十二貫六十文爲實以法除得絹尺價六十七文中行以絹尺價六十七文乗中行絹一十四尺得九百三十八文以減中行錢一貫二十三文餘得綾尺價八十五文就乗右行綾五尺得四百二十五文絹
