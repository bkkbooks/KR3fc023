body:
  text: 法曰各列七層衰數一二四八十六三十二六十四副併得一百為置共燈三百八十一為實以法除之合問饒均善有縱橫藝七月還錢七貫二每月利錢四十文多少本錢多少利答曰原本五貫六百二十五文利錢一貫五百七十五文法曰置鈔七貫二百文為實以利錢四十文因七月得二百八十文加一貫共得一貫二百八十文為法除之得原本五貫六百二十五文以减鈔餘得利錢合問今有書生至精細每日熟寫九十字師傅逐日加添二問
