body:
  text: 答曰初日八十五字次日一百七十字第三日三百四十字第四日六百八十字第五日一千三百六十字第六日二千七百二十字法曰置絰五千三百五十五字為實以一二四八十六三十二為衰併之得六十四為法除之得八十五字乃初曰書數加一倍得各日數合閣各分差分法曰置各等戶以各分乘之為衰副併為法以所分乘未併者各自為列實以法除之今有孫粟六萬八百七十石八升於上中下三
