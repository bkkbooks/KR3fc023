body:
  text: 得七十三家又爲法再別置十八十兩士十二家兩上千二家十二兩二十八兩互乘所出率併之爲實二十八兩乘四十八兩得一千三百四十四兩不足六十二乘六十三兩得二千九百兩併之得五千二百五十兩爲實併盈不足乘戶率亦爲實盈二十八兩不足十二兩得九十兩以乘七十二家得六千四百八十家爲實俱以約法一十五兩除之得各數全問今有米麥九十九石直鈔九百三貫只云米九石直鈔一百二十三貫麥六石直鈔四十六貫問來麥及各價幾何答曰米二十四石該鈔三百二十八貫麥七十五石該鈔五百二十五貫法曰假令來二六七麥七十二石有餘一十貫米麥七十不
