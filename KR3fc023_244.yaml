body:
  text: 為法除之得一四餘實五以法命之合問今有米價二貫三百五十六問七分又之四麥價一貫九百四十八文九分文之四問合之得幾何答曰四貫三百五文六十三分之八法曰置米價二千三百五十六文以分毋七通之加分子四共得一万六千四百九十六又以麥分母九通之得一十四万八千四百六十四又置麥價一千九百四十八文以分母九通之加分子五共得一万七千五百三十七又以米分母七通之得一十二万二千七百五十九併二位共得二十七万一千二百二十三為實以二分母七分九分相乘得六十三為法除之得四貫三百五文餘實八以法命之合問
