body:
  text: 法曰置積八百四十六步以乗闊分母五十二得四万四千八百三十八步倍之得八万九千六百七十六步爲實以闊三十一步以分母五十三通之加分子四十九共得一千六百九十二爲法除之合問今有圭田積一百九十步四十八分步之四十三大頭闊一十四步八分步之七問正中長幾何答曰二十五步三分步之二法曰置積一百九十步以分母四十八分通之加分子四十三共得九千一百六十三又以闊分母八因之倍得一十四万六千六百八爲實以闊一十四步以分母八通之加分子七共得一百一十九又以積分母四十八乗之得五十七百一十二爲法除之合問今有圭田積二百五十一步正中長二十七步九分步之八
