body:
  text: 法曰置地一畝以畝法通之得二百四十步爲實以八較三平四和約之得較八步爲徔方開平方法除之得平一十二步以除總步得長二十步併長平得和五十二步合問閑將直積立方開得数如平更莫猜七股八勾較筭問和得幾勿徘徊荅曰平四步長一十六步和二十步較一十二步法曰以七長八平約之直積立方開如平得四步再自乗得六十四以平四步除之得長一十六步以七長乗得一百一十二以八勾乗平四得三十二併之得一百四十四開平方法除之得較一十
