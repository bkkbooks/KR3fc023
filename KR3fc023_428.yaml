body:
  text: 十二尺共一千四百四十尺得四万二千三百三十六爲實以原鈔二百一十六貫爲法除之得一千九六十尺以疋法四十二尺除之合問今有絲六十八斤六兩賣鈔五百二十五貫一百二十文只有絲三十八斤十四兩問該鈔幾何答曰二百九十八貫五百六十文法曰以只有絲三十八斤其以兩求斤得八七五乗賣鈔五百二十五貫一百二十文得二百四万一千四百四文爲實以原絲六十八斤其六兩以兩求斤得三七五爲法除之合問今有鈔二百九十八貫五百六十文買絲三十八斤十四共有鈔五百二十五貫一百二十文問該買絲幾何
