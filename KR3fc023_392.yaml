body:
  text: 法曰以所買簳五千八百一十為實以所錢九百八十為法除之一文得五枚實不滿法九百二十為賤率以實九百二十減法九百八十餘六十為貴率各乘得數求之賤率九百二十乘六枚得五千五百二十即六枚文以貴率六十乘五枚得三百即五枚一針合問問出錢一十三貫九百七十文買絲一石二鈞二十八斤三兩五銖欲其貴賤銖率之答曰一鈞二十斤陸兩十一銖每五錢得一文一石一鈞七斤十二兩是把銖每六銖得一文法曰以所買絲一石二鈞二十八斤三兩以銖法適之加寒五銖七万九千九百四十九銖為實以所錢一十三貫一百七十為法除之一文得五銖實不滿
  hash: sha256:5d9a0f59208297551c2064e5c6900338ba11ae5a5f14e2f66f601e67b617fc1a
