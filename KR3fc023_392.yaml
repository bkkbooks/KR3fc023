body:
  text: 法曰以所買簳五千八百一十爲實以所錢九百八十爲法除之一文得五枚實不滿法九百二十爲賤率以實九百二十減法九百八十餘六十爲貴率各乗得數求之賤率九百二十乗六枚得五千五百二十即六枚文以貴率六十乗五枚得三百即五枚一箴合問問出錢一十三貫九百七十文買絲一石二鈞二十八斤三兩五銖欲其貴賤銖率之荅曰一鈞二十斤陸兩十一銖每五錢得一文一石一鈞七斤十二兩是把銖每六銖得一文法曰以所買絲一石二鈞二十八斤三兩以銖法適之加寒五銖七万九千九百四十九銖爲實以所錢一十三貫一百七十爲法除之一文得五銖實不滿
