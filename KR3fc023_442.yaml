  text: 百七十三貫八百八十七文羅匹價三百一十文綾匹價二百八十五文問羅綾并鈔各該幾何答曰羅三十二匹三丈七尺八寸該鈔四百二十八貫三百五十八文綾九十五匹二丈九尺四寸該鈔一千一百四十五貫五百二十九文法曰置羅綾一百二十八匹以匹法四十二尺通之加零二丈五尺二寸共得五千四百一尺二寸以綾尺價二百八十五文乘之得一千五百三十九貫三百四十二文以減共鈔一千五百七十三貫八百八十七文餘三十四貫五百四十五文為實以二價相減餘二十五丈為法除之得羅一千三百八十一尺八寸以匹法除得三十二
