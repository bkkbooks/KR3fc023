body:
  text: 得二工一十二文實不滿者為貴率餘實七万七千一十二銖乃均不盡之數以銖法除得一石二鈞二十斤八兩二十銖皆一文得鈞價二千一十四文以實一石一鈞二斤八兩二十銖減法一石二鈞二十八斤三兩五銖餘二斤十兩九銖為賤率合問問出錢一十三貫九百七十文買絲有一石二鈞二十八斤三兩五銖欲貴賤斤率之答曰一石二鈞七斤十兩四銖斤價六十七文二十斤九兩一銖斤價六十八文法曰以所求絲一斤得三百八十四銖乘錢數一十三貫九百五十得五百三十六万四千四百八十為實以所買絲一百二鈞二十八斤三兩以鈞法通之加零五銖二万九千九百四十九銖為法除之一斤得六十七文實不滿法者為貴
  hash: sha256:577e0401948b4be51e57ff50af997f18f92fdd7023de91716a8753a6fa27af48
