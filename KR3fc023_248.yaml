body:
  text: 荅曰一貫九十四文十分文之九法曰置錢五贯四百五十八文以分母九分通之加分子二共得二十七貫二百九十二文又以減去分母二文通之得五十四貫五百八十四文別置減去錢四貫三百六十三文以分母二通之加分子一共得八貫七百二十七文又以錢分母五分通之得四十三貫一百三十五文以減前數餘十貫九百四十七文以二分母五分乗二分得一十分除之合問今有布二十一分疋之一十二疋法四十二疋得一十四尺比五十分疋之二十三得一十九尺三十二分問孰多幾何荅曰二十一分疋之一十二多一千五十分之一百一十七
