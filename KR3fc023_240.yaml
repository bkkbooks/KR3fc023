body:
  text: 十一貫二百五十一文又以三分乘之得三百六十三貫七百五十三文再置鈔二十四貫九百六十二分以分母三通之加內子二共得七十四貫八百八十八文又以分母七分乘之得五百二十四貫二百一十六文併前共得八百八十七貫九百六十九文爲實以分母七分三分相乘得二十一分爲法除之合問今有細三分疋之一疋法四十二尺得一十四尺五分疋之二得一丈六尺八寸七分疋之三得一十八尺問合之得幾何荅曰得一疋四十二尺一百五分之十七得六尺八寸法曰列置分母子三分五分七分於右之一之二之三於左子互乘毋之一乘五分七分得三十五之二乘三分七分得四十二之三乘三分五分得四十五併得一百二十二爲實毋相乘三分乘五分得一十五乘七分得一百五爲法實如法而
  hash: sha256:9989f7af3fb11073ab98ab107725631ba98bb4676cf18df0e39c0c86d2c76615
