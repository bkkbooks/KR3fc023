body:
  text: 步每步五尺乘之得四十尺自乘得一千六百尺弦鈎繩五十尺自乘得二千五百尺以减一千六百尺餘九百尺爲實開平方法除之得勾水深三十尺合問家有粉墙一丈六墙頭斜倚一杆木將木離墙八尺地木倒墙根恰齊足不知杆子幾多長得分明免勞碌荅曰杆長二丈法曰置墙高一丈六尺自乘得二十五丈六尺爲實以勾弦較木離墙八尺爲法除得三丈二尺加勾弦較八尺共得折半得杆長二尺合問借木棖短不記得止將草繩去量木繩比其木長八尺以
