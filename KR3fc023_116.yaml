body:
  text: 求出二十四餘一之三求出二十七四以列實之一求出者十八減平實二十三少併所減之二餘一之三餘四共五以益少益二分之各其平也各平於三十六分之二十三合問問三分之一三分之二四分之三減多益少幾何而平三分之一即一百二十八餘三分之二比二百五十六銖四分之三比二百八十八銖答曰減四分之三求之者二毋互乘子求得九減二即六十四銖減三分之二求之者一毋互乘子求得八減一即三十二銖益三分之一求之者三毋互乘子求得四益三十六銖各平于十二分之七十二分比金氏三百千四銖內一分即三十二銖分子七即二二十四銖法曰列置分毋子三分二分四分于右之一之二之三于左毋互乘子之一乘三
