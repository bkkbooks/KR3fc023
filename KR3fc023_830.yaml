body:
  text: 今有無人均銀四十兩內甲得一石兩四錢戊得五兩六錢問乙丙丁次第均各得幾何答曰乙九兩二錢丙八兩丁六兩八錢法曰併甲一十兩四夭戊五兩六夭共十六兩半之得丙八兩又併甲一十兩四尓丙八兩共得一十八兩四尓半之得乙九兩二尓又併丙八兩戊五兩六夭共得一十三兩六尓半之得丁六兩八尓合問貴賤差分今有民田三頃一十五畒共夏稅絲三十七兩四錢三分五釐五毫只云每畒科絲上田一錢二分五釐中田一錢一分問上中田并科絲各幾何
