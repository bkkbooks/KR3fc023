body:
  text: 原管共該銀八斤一十一分斤之五巳後新收得九斤又零七分兩之四却行支過四斤零五銖三分銖之二不知餘剩見在銀要見實該多少是答曰一十三斤七兩一十四銖二百三十一分銖之一百三十七法曰分母乘其全分子之實原管銀八斤以分每十一通之得八十八加內子五共得九十二却以銖法三百八十四乘之得三万五千七百一十二置新收銀九斤以十六兩通得一百四十四又以分母七通得一千八加內子四共得一千一十二却以二十四銖乘得二万四千二百八十八管收分母互乘併之原管分母十一乘新收二万四千二百八十八得二十六万七千一百六十八新收分母七乘原管三万五千七百一十二得二十四万九千九百八十四併得五十一万七千一百五十二以支數亦通分巳支銀四斤以銖法三百八十四通
  hash: sha256:cd7a0ffce26a761a83e50c961a4fa4cee87cd63f46eecbc21573550886c9adf4
