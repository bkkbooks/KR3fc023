body:
  text: 五尺乗之合問倉廣三丈四丈五尺容粟一萬石問髙幾何答曰二丈法曰置粟一万石以斛法二尺七寸乗之得二万七千尺爲實以廣三十尺乗袤四十五尺得一千三百五十尺爲法除之合問圓堢壔周四丈八尺髙一丈一尺問爲積幾何答曰二千一百一十二尺法曰上下問相等形如圓柱周自乗十二而一即屬田之意此問以高乗之題類圓垛也置周四十八尺自乗得二千三百尺以髙一十一尺乗之得二万五千三百四十四尺如十二而一合問
