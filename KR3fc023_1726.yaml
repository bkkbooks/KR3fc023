body:
  text: 四乗得乙絲六十八斤又以十三斤乗左行丙四四于以減左行絲一百三十二斤餘八十斤又減乙一十七斤餘六十三斤以三約之得二十一斤却以四乗得甲絲八十四斤合問今有官輸米每七十五石着上戶三戶中戶四戶下戶五戶共人戶一十二戶辦納只云上戶二戶中戶一戶納二十五石中戶三戶下戶一戶納二十五石下戶四戶上戶一戶納二十五石問上中下戶各幾何荅曰上戶九石中戶七石下戶四石法曰排列問數上二中一空二十五石
