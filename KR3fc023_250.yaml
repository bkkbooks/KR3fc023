body:
  text: 法曰列置分母子二十一分五十分於右之十二之一十三於左母互乘子二十一分乘之二十三得四百八十三五十分乘之十二得六百以少減多六百減四百八十三餘一百一十七為實母互乘五十分乘二十一得一千五十分為法實不滿法以法命之即多一千五十分之一百一十七合問今有布二匹九分匹之五今用過一匹六分匹之一問尚餘幾何答曰一匹十八分匹之七法曰置用過布一匹以分母六通之加分子一共餘七又以原布分母通之得六十三列左又置原布二匹以分母九通之加分子五共得十三又以用過布分母六通之得一百三十八內減去左位六十三餘得七十五為實以二分母九分六分相乘得五
