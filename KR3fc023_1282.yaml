body:
  text: 以乘高一千八百一十二九十二億六千六百九十四万六告千以銀寸重十四兩加之得一百二十九億七千三百七十二万四千四百减六見斤得八十一億八百五十七万七十七百五十爲實以分母六十五再自乘得一十七万四千六百二十五爲法除之合問今有銀方七寸別置銀方寸重十四兩問重幾何答曰三百斤二兩法曰置銀方七寸再自乘得三百四十三寸以寸重十四兩乘之得四千八百二兩爲實以斤法十六除之合問今有銀塔珠一箇空徑三尺九寸六分外周一丈二尺厚二分問銀重幾何答曰九百三十五斤九兩三錢四厘
