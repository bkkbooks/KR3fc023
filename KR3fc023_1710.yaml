body:
  text: 五得正五万四千七十五以戊行丁負一乗丁行士百二十一加入積片得五万四千七百九十六爲實以法除得戊綆七尺六寸丁行七百一十一以減戊綆七尺六寸餘得六百四十五以丁五除得丁綆一丈而尺九寸丙行七百二十一以減丁綆一丈二尺九寸餘五百九十二寸以丙四除得丙綆一丈四尺八寸乙行七百二十以減丙綆一丈四尺八寸餘得五百以乙三除得乙綆一丈九尺一寸甲行七百二十一以減乙綆一丈九尺一寸餘得五百三十以甲二除得甲綆二丈六尺五寸合問一十六問有羅四尺綾五尺絹六尺直錢一貫二百一十九文羅五尺綾六尺絹四尺直錢一貫二百六十八文羅六尺綾
