body:
  text: 法約之得買錫八斤四兩以價乗之得五十二貫八百文以减原鈔餘得手工鈔一十七貫六百文合問合稅物價今有客持絲四百八十斤每斤價鈔八貫一百三十文赴務投稅三十分而稅一問該稅鈔幾何答曰一百三十貫八十文法曰置絲四百八十斤以每斤價鈔八貫一百三十文乗之得三千九百二貫四百文爲實以稅法三十除之合問今有客持絲二十四百疋疋法四十二尺出關稅之每一十疋合稅一尺共稅絹八疋貼得鈔一貫八百文問每疋價鈔
