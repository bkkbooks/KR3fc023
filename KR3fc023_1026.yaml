body:
  text: 百八十億皆併入方法共五千八百八十億下法再置上啇一万四千進六位馬一百四十億以三乘之得四百二十億爲廉法方法一退得五百八十八億廉法再退得四億二千万下法三退得一百万續啇置第三位以方廉二法共五百九十二億二千万啇寶得三百下法亦置上啇三百進四位馬三百万以三乘得九百万爲隅法又以上啇三乘廉法得一十二億六千万以方廉隅三法六百億六千九百万皆與上啇三除寶盡得一万四千三百尺合問積四千五百尺問爲立圓徑幾何答曰二十尺法曰置積以方法十六乘之得七万二千尺圓法九而一得八千尺爲寶開立方除之上啇二十下法之上亦置上啇二十
