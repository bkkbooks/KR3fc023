body:
  text: 二文五分米斗價二百五文得七十四貫六百七十一文二分五釐各就原本錢為實以各物買價為法除之得各買到物數油斤價六十文得七百二十八斤八兩鹽斤價七十文得七百二十八斤八兩粉褁價八十文得五百六十九褁四兩五布匹價三百二十文得一百八十二匹三尺麻稱價三百一十二文五分得二百九十一稱六斤米斗價二百文得三十七石三斗三升五合六勺二抄五棍粉褁下有分數三十二乘之為兩布匹下有分數二十四乘之為尺麻稱下有分數加五為斤卻將各物粉褁下兩布匹下尺麻稱下斤價作分數為實以市中貨賣價為法乘之油斤價一百五十文得一百九貫二百六十五文鹽斤價一百七十五文得一百二十七貫四百八十七文五分粉褁價三百五十文得一百九十九貫
  hash: sha256:53c6c886b996bc1a93950ff588428aa0a30f1fa80eaadfd0f62914643edf7a07
