body:
  text: 二十八餘得六十六以白禾二除之每步得一百一十一分斗之三十三合問今吏五從十食鷄十令十吏一從五食鷄八令五吏十從一食鷄六問令吏從各食鷄幾何荅曰令一百二十二分鷄之四十五吏一百二十二分鷄之四十一從一百二十二分鷄之九十七法曰此問与前題法相同排列問数以右行令一爲法遍乗中第二行爲右令一爲法吏五從十鷄十中令十得十吏一得一從五得五鷄八得八
