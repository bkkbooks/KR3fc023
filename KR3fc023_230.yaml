body:
  text: 之得二百八十八以三乗得八百六十四以一十六除之合問今有欖核田一角正面長八步十七分步之十六半角周九步問爲田幾何荅曰一十八步法曰置正面長八步以分毋十七通之加分子十共得一百五十二自乗得二万三千一百四又以分毋十七減分子十六餘一以乗分子亦得十六併二數共得二万三千一百二十爲實以分毋十七自乗得二百八十九爲法除之得八十以九乗之得七百二十以四十而一合問今有碗田下周二百一十六步徑九十三步問爲田幾何荅曰二十畒九分二厘五毫
