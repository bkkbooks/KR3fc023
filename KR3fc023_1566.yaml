body:
  text: 得三十八石斗併得六十四石爲實併盈不足得二十兩石六斗除之合問兩盈今有人分鈔不知其數只云三人分士貫剰一貫四人分九貫剰二貫問人鈔各幾何答曰一十二人鈔二十九貫法曰以三人乘九貫得二十七貫以四人乘七貫得二十八貫併得王十五貫加盈一貫二貫得五十八貫折半得二十九貫以三人乘四人得一十二人合問今有大紅青絨紵絲不知共價只云大紅九兩價買青一十五兩盈鈔一貫五百文大紅一十八兩價買青二十七
