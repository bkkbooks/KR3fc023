body:
  text: 如倒合石也冥谷形如正面石穿地之況也曲池盤池並如蒭童法其曲池者併上中外周半之爲上乗又併下中外周半之爲下乗依蒭童法羨除併三廣以深乗之又長乗之如六而一其狀上平下斜以兩鼈臑一堵是第地古問二十八問地積一萬尺問爲堅壤幾何答曰爲堅七千五百尺爲壤一萬二千五百尺法曰空者實固之土者靈柔活築壘故以同之以地積一万尺求堅三之得三万尺四而一得七千五百尺以堅七千五百求壤五之
  hash: sha256:0c63fbffc8b22e8005eb407eb8afb0b11da8c2a005928ee27f5aa6f1d9e8ef99
