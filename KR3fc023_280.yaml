body:
  text: 一千二百却以原長一百步除之得一十二步加小頭三十步共得四十二步為截長闊合問今有梯田長一百二十步北闊一十二步南闊一十八步計積一千八百步今自北頭截田一半問截闊及田積各幾何答曰田積八百一十步截闊處一十五步法曰置二闊以少減多餘六步以原長一百一十步除之得步却以半長六十步乘之得三步併北闊一十一步共一十五步為截闊併二闊得二十七步折半得一十三步半以乘半長六十步得田積得八百一十步合問今有直田長四十八步闊四十步計八畝今依原長截賣
  hash: sha256:9bd179e057fce125be34b4bf9cf83ff9984a93a6438bb5ce043791546b4aade9
