body:
  text: 二千二百五十除之不滿法者以法約之合問絲一斤直二百四十今有有錢一千三百二十八文問買絲幾何答曰五斤八兩十二銖五分銖之四法曰以所有絲一斤以銖法通之得三百八十四銖乘今有錢一千三百二十八文得五十万九千九百五十二為實以所直錢二百四十為法除之得二千一百二十四銖以銖約之得五斤八兩一十一銖餘實一百九十二法實皆四十八約之得五分銖之四合問絲一斤直三百四十五今有絲七兩一十二銖問直錢幾何答曰一百六十一錢三十二分錢之二十三法曰以所有錢二百四十五乘今有絲七兩通一十二銖為五錢得二十五百
