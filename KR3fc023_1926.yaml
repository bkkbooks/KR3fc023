body:
  text: 問斗面君知否荅曰古率斗面一尺一寸六分六厘三分厘之二法曰置五尺以七尺乘得三尺五寸如三而一得古率斗面一尺一寸六分六厘三分厘之二合問圓木二尺五寸徑欲厚七寸爲方未知桁廣有幾何如人田徑運動民堪敬荅曰桁廣二尺四寸法曰置弦徑二尺五寸以减厚七寸餘一尺八寸舉之得弦較九寸以减弦徑二尺五寸餘一尺六寸以弦較九寸乘得一百四十四寸爲實以開平方法除之得一十二寸倍得桁廣二尺四寸合問又二爲勾丈六內容直不知数有人得的無差長
