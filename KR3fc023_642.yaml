body:
  text: 中停答曰各二石八斗六升八合七勺五抄法曰置粟七石六斗五升以米率六乗之得四十五石九斗爲貫併米六升粟一斗共得一斗六升爲法除之合問秤斤兩皆十四更有三錢三銖斤價斗九二合净椒賣米何如答曰四十三石一斗八升一合一勺法曰置通秤十四得二百一十斤加一十四斤共二百二十四斤併兩十四兩三尔加三銖得一尔二分五厘共十四兩四尔二分五厘以兩求斤法得九分一毫五絲六忽二微五塵通併共得二百二十四斤九分一毫五絲六忽二微五塵爲實以斤價一斗九升二合爲法乗之合問秤斤兩皆十四更有三錢三銖兩價一升二合净椒賣米
