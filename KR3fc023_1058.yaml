body:
  text: 通之加分子一共得七十四又以南北相和分母七通之得五百一十八以减前数餘七百六十爲實以南闊分母二乗南北闊相和分母七得二十一爲法除之得北闊合問今有圭田積二十三步六分步之五廣五步二分步之一問幾何答曰八步三分步之二法曰置積二十三步以分母六通之加分子五共得一百四十三倍之得二百八十六又以廣分母二通之得五百七十二爲實以廣五步以分母二通之加分子一共得一十一又以積分母六通之得六十六爲法除之得八步餘實四十四法實皆二十二約之合問今有圭田積一百二十六步廣一十二步問幾何
