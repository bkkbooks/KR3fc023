body:
  text: 二尺限一日役畢問用人夫磚灰各幾何答曰人夫二百九十六人磚六千七百二十七磈半礦灰四百二十秤七斤五錢法曰求人夫併上下廣半之得三十七尺以乗髙三十六尺得一千三百三十二尺又乗縱一十六尺得二万一千三百一十二尺以日作七十二尺除之得人夫合問求磚以上廣减下廣餘三十尺半之得一十五尺自乗得二百二十五尺於上置髙三十六尺自乗得一千二百九十六尺加入上数得一千五百二十一尺爲實以開平方法除之得三十九尺爲斜髙以
  hash: sha256:d38239a1c107fc537330c472a727a68d077eb521414bcd8569d5ee474e041c94
