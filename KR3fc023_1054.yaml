body:
  text: 今有梯田積一千二百一十七步七方步之一南闊二十四步七分步之六北闊三十六步問正長幾何答曰四十步法曰置積一千二百一十七步以分母七通之加分子一共得八干五百二十倍之得一万七千四十爲實再置南闊三十六步以分母七通之加分子六共得一五十二例又置北闊三十六步以南闊分母七通之得二百五十二併二闊数得四百二十六爲法除之合問今有梯田積一千二百一十七步七分步之一北闊三十六步正長四十步問南闊幾何答曰二十四步七分步之六法曰置積前法倍之得一万七千四十爲實以正長四千步除之得四百二十六又置北闊三十六出以積分七通
