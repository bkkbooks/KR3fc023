body:
  text: 一得一匹餘一十七合問今有甲米五分石之三乙米七分石之四問合之得幾何答曰一石三十五分石之六法曰列置分母子五分七分為左之三之四為右毋互乘子五分乘之四得二十七分乘之三得二十一併之得四十一為實以二分母五分七分相乘得三十五分為法除之得一餘實法實命之合問今有甲金三分兩之二乙金四分兩之三問合之得幾何答曰一兩十二分兩之五法曰列置分母子三分四分為左之二之三為右毋互乘子三分乘之三得九四分乘之二得八併之得十七為實以二分母三分四分相乘得一十二
