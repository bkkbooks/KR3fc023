body:
  text: 四分得十二之乘三分四分得二十四分之三乘三分三分得二十七副併十四二十七其六十三為平實毋三分三分四分相乘得三十六分為法以列數三乘未併分子十二得三十六二十四得七十二十七得八十一亦以列數三乘法三十六得二百八合用約分以九約之法得十二平實得七之一四之二得八之以平實七減列實之二求出八減七餘一之三求火九減七餘二以列實求四減平實七少三併所減之二餘一之三餘二併得三以益少各其平也各平於十二分之七合問乘分法曰分毋各具全分乘內子分子從之分毋乘全分子併為一虔相乘為實即曰用分毋相乘為法元用分毋通全步相乘為實分乘除之實如法而以法除也
