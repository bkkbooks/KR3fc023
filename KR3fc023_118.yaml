body:
  text: 四分得十二之乗三分四分得二十四分之三乗三分三分得二十七副併十四二十七其六十三爲平實毋三分三分四分相乗得三十六分爲法以列數三乗未併分子十二得三十六二十四得七十二十七得八十一亦以列數三乗法三十六得二百八合用約分以九約之法得十二平實得七之一四之二得八之以平實七減列實之二求出八減七餘一之三求火九減七餘二以列實求四減平實七少三併所減之二餘一之三餘二併得三以益少各其平也各平於十二分之七合問乗分法曰分毋各具全分乗內子分子從之分毋乗全分子併爲一虔相乗爲實即曰用分毋相乗爲法元用分毋通全步相乗爲實分乗除之實如法而以法除也
