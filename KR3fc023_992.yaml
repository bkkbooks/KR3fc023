body:
  text: 隅二法共二千五百皆與上啇六除寶一万二千五百餘寶二千七百八十一乃二乘二隅法五百得一千併入廉法二千共一千一退百下法再退得一又於上啇置第三位以廉法三百啇寶得九下法之上亦置九為隅法以廉隅二法共三百九皆與上啇九除寶盡合問積五萬五千二百二十五步問平方一面幾何答曰二百三十五步法曰置積五万五千二百二十五步為寶照前法啇置第一位得二百下法亦置二百進二位為二万名曰方法與上啇除寶四万餘寶一万五千二百二十五乃三乘方法得四万為廉法一退退四千
