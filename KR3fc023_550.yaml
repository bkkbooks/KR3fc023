body:
  text: 二丈五尺六寸共得八百七十六丈一尺六寸以減上數九百一十四丈四尺餘三十八丈二尺四寸以乘原鈔七千二百五十八貫五十文得二十七万五千五百四十七貫八百三十二文為實以原絹九百一十四丈四尺為法除之合問金銅鐵錫煉鎔今有錫金同煉鎔一塊自方一尺稱重六百一十七斤八兩只云金方一寸重一斤錫方一寸重七兩問錫金幾何答曰錫方六百八十寸重二百九十七斤八兩金方三百二十寸重三百二十斤法曰置自方一尺進作十寸為自乘得一千寸以金一寸升一斤進作十六斤乘之得一萬六千寸於上下置六百一十七斤半以十六兩進得九千八百八十兩以減上
  hash: sha256:eeb3fe057350051c04624d8f4d4edc4fae98e367bedea6e6a6e16416f30d146a
