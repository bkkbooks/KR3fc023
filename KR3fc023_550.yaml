body:
  text: 二丈五尺六寸共得八百七十六丈一尺六寸以減上數九百一十四丈四尺餘三十八丈二尺四寸以乗原鈔七千二百五十八貫五十文得二十七万五千五百四十七貫八百三十二文爲實以原絹九百一十四丈四尺爲法除之合問金銅鐵錫煉镕今有錫金同煉镕一塊自方一尺秤重六百一十七斤八兩只云金方一寸重一斤錫方一寸重七兩問錫金幾何荅曰錫方六百八十寸重二百九十七斤八兩金方三百二十寸重三百二十斤法曰置自方一尺進作十寸爲自乗得一千寸以金一寸升一斤進作十六斤乘之得一萬六千寸於上下置六百一十七斤半以十六兩進得九千八百八十兩以減上
  hash: sha256:ec41bc1bd28cceeb20ecda62503ab91844ca883c2442f2e2ff3338c286546517
