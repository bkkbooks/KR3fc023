body:
  text: 一十二里六日六里七日三里法曰各列置衰一二四八十一三十二六十四副併得一百二十七為法置二百八十一里為實以法除之得三里為第七日數每日加倍得各日之數合問大翁種麥在莊西四驢三馬五羊食羊食驢半驢馬半共要陪還麥四石驢羊馬主三家論每人合用幾何陪答曰羊五該八斗驢四該一石二斗八升馬三該一石九斗二升法曰置羊五止作五戶四分馬倍羊得八分馬三倍驢得一十二分併之得二十五分為法置共陪麥四石為實以法除之得羊
