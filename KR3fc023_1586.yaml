body:
  text: 不足四頃併共九頃得三百一十五家以前法九頃除之得人戶三十五家又盈不足互乘盈五頃乘四十九頃符二百四十五頃不足四頃乘四十頃得一百六十頃併之得四百五頃爲實以法九頃除之得茺地合問甲米不知其數置扵石七瓮盛乙持凈粟然傾滿瓮平方定春米一石三斗甲來忿恕難分粟率六米不難明怎免這場爭競右西江月答曰甲米七斗乙粟一石該米六斗法曰假令原米六斗不足四升原米六斗減瓮一石七斗餘一石一斗以米率六十乘之以粟率一百除之得六斗六升增令六斗共一石二斗六升比今米一石三斗乃少四升故曰不足假令原米八斗盈四升京米八斗減瓮一石七斗九斗以米六十
  hash: sha256:afb6b862a42c49692769d2ba2d2d70a66d140ff01f36c9e593ef5d412b47d834
