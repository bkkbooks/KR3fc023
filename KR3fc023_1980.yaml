body:
  text: 干爲三廉第四位以六乗得若干爲下廉乃方法一退得若干上廉再退得若干二廉三退得若干三廉四退得若干下廉五退得若干下廉六退得若干再啇置第三位以方廉五法共若干啇餘實得若干下法亦置上啇若干四遍自乗得若干爲隅法又以上啇若干一遍乗上廉得若干二遍乗二廉得若干三遍乗三廉得若干四遍乗下廉得若干以方廉隅六法共若干皆與上啇若干除實盡得若干合問今有五乗方積二百五萬八千九百一十一億三千二百九萬四千六百四十九尺問一方面幾何荅曰二百四十三尺
