body:
  text: 石三斗五升五雖然六米與粟同米黍不知各幾許答曰米變黍一石六斗三升七合五勺米一石七斗一升七合五勺法曰置黍四石五斗以米率六乘之得二石六斗以减簸去糠三石三斗五升五合餘六斗五升五合為實以米率六减黍一斗餘四升為法除之得未變黍一石六斗三升七合五勺以减簸去糠三石三斗五升五合餘得米一石七斗一升七合五勺合問錢千三三十二欲白米來向市每斗牙錢該二文於該果五升米就算貼面一文錢米價不知多少是答曰米一百八斗斗價七十四文
