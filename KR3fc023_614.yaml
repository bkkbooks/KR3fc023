body:
  text: 石三斗五升五雖然六米與粟同米黍不知各幾許答曰米变黍一石六斗三升七合五勺米一石七斗一升七合五勺法曰置黍四石五斗以米率六乗之得二石六斗以减簸去糠三石三斗五升五合餘六斗五升五合爲實以米率六减黍一斗餘四升爲法除之得未变黍一石六斗三升七合五勺以减簸去糠三石三斗五升五合餘得米一石七斗一升七合五勺合問錢千三三十二欲白米來向市毎斗牙錢該二文於該果五升米就筭貼面一文錢米價不知多少是答曰米一百八斗斗價七十四文
