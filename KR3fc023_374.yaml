body:
  text: 法曰以大䵂五十四乘麥一斗爲實以麥四十五爲法除之歸除法曰以所求率或疋或后或干斤乘錢數如無所求又以錢數爲實以所求數爲法即所買之物實如法而一以法除之是也問出錢二千三百七十買布九疋二丈七尺問疋價幾何荅曰二百四十四文一百二十九分錢之一百二十四法曰以所求率疋四十尺乘錢數二千三百七十得九万四千八百爲實以所求數九疋以四十通得三百六十加二十七尺共三百八十七爲法除之合問問出錢五貫七百八十五文買漆一百六十斤三分斤之二每十斤價幾何荅曰三百四十五文五百三分錢之十五法曰以所求率十斤乘錢數正貫七百八十五文得五十七貫八百五十文以原分母
  hash: sha256:47d21f5042b28ab7e59d703339b389928bd4a694bbfe009561a5e1467f6248c0
