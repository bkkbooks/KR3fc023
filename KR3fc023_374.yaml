body:
  text: 法曰以大䵂五十四乘麥一斗為實以麥四十五為法除之歸除法曰以所求率或匹或后或干斤乘錢數如無所求又以錢數為實以所求數為法即所買之物實如法而一以法除之是也問出錢二千三百七十買布九匹二丈七尺問匹價幾何答曰二百四十四文一百二十九分錢之一百二十四法曰以所求率匹四十尺乘錢數二千三百七十得九万四千八百為實以所求數九匹以四十通得三百六十加二十七尺共三百八十七為法除之合問問出錢五貫七百八十五文買漆一百六十斤三分斤之二每十斤價幾何答曰三百四十五文五百三分錢之十五法曰以所求率十斤乘錢數正貫七百八十五文得五十七貫八百五十文以原分母
  hash: sha256:91d4145e5f5d10de0c300960d47985cbb9029b9ca5236106a853b850d4bb6339
