body:
  text: 不見軒轅竹右西江月答曰各一石八斗粟九斗滿九升小斗一石黍一石二斗六升滿九升小半一石四斗法曰置績量二石四斗以小斗九升乘之得二石一斗六升以七升斗見量黍一石八斗折得一石六斗該九升斗除得一石四斗五升龕子般栗一石八斗折得九斗該率得一石較之合問花銀六十四錠將來欲辣椒每斤牙稅問根笛止納一分不少椒折三斤二兩為無銀子難饒共椒斤價要明摽請問各該多少右西江月答曰椒一千斤斤價三兩二錢
