body:
  text: 一綆一丈九尺一寸丙綆一丈四尺八寸丁綆一丈而尺九寸戊綆七尺六寸法曰此問戶綆數爲分母相頭其分也借綆數爲分子倂之內其子也如友方程正負入之得井深綆數五綆數爲分母相乗二三得六內四四六得二十四丁五因二十四得一百二十戊六因一百二十得七百二十再借綆數一爲分子倂之得七百二十一爲深積列各戶本綆所借及深積只戊行可取諸綆甲乙丙丁戊深積二一七百二十一三一七百二十一四一七百二十一
