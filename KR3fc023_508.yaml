body:
  text: 羅疋價一百二十五貫法曰置羅一百五十疋以較多六十五貫乗之得九千七百五十貫又綾一百疋以二項較多乗之傍九千貫併二位共得一萬八千七百五十貫以減共鈔餘二萬七千貫爲實併綾羅絹共四百五十疋爲法除之得絹疋價六千貫各加多數合問今有鈔四貫共七百文共耀到粟五斗麥七斗豆九斗只云粟每斗價少如麥每斗五十文麥每斗價少如豆每斗價二十五文問粟麥豆每斗價鈔各該幾何荅曰豆二百五十文麥二百二十五文粟一百七十五文
