body:
  text: 一万三千除一万九千五百加利十三得二万五千三百五十除第三返歸一万二千餘一万三千三百五十加利十三得一万千三百五十五除第四返歸一万一千餘六千三百五十五加利十三得八千二百六十一五分除五返歸一万故曰不足一千七百三十八五分令之四萬多三萬五千三百九十錢八分本四万併利得五万二千除初返歸一万四千餘三万八千加利十三得四万九千四百除第二返歸一万三千餘三万六千四百加利十三得四万七千三百二十除第三返歸一万二千餘三万五千三百二十加利十三得四万五千九百一十六除第四返歸一万一千餘三万四千九百一十六加利十三得四万五千三百九十八分除第五返歸一万餘三万五千三百九十八分故曰多也草曰列所率盈不足三万四万不足一千七百三十八子五分万五千三百九十禾八分
