body:
  text: 十斤半爲法除之合問今去買松好米量來七石全集米將都買就牙言毎對七勺話在前買訖少牙錢准討松更不偏其朱知多少数賢家能筭教公問一年右南鄉子答曰一百對每對價米七升法曰置米七石以牙錢七勺除之得一万勺爲實以開平方法除之得一百以除米七石得每對該米七升合問爲商出外作經營將帶花銀去販參爲當初不記原銀錠只記得七錢七買六斤脚錢更使用三分緫計用牙錢該四錠是六分中取二分問先生販買数分明右水仙子
