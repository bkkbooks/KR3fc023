body:
  text: 十斤半為法除之合問今去買松好米量來七石全集米將都買就牙言每對七勺話在前買訖少牙錢準討松更不偏其朱知多少數賢家能算教公問一年右南鄉子答曰一百對每對價米七升法曰置米七石以牙錢七勺除之得一万勺為實以開平方法除之得一百以除米七石得每對該米七升合問為商出外作經營將帶花銀去販參為當初不記原銀錠只記得七錢七買六斤腳錢更使用三分總計用牙錢該四錠是六分中取二分問先生販買數分明右水仙子
