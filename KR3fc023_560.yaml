body:
  text: 該丈八有羅七十三丈也依前列無差出羅折興染坊家該染幾何可能右西江月答曰染羅一十三匹五尺六寸出羅五匹四尺四寸法曰置有羅七十三丈乘染羅一丈八尺得一百三十一丈四尺為寶併零羅十尺染羅一丈八尺共二丈五尺為法除之得染羅五十二丈五尺六寸以減有羅餘得出羅合問白米三石五斗芝麻換得三石芝麻五斗五升知八斗小麥換已劫有小麥換米九石六斗無移知公能算問端的不會傍人笑你右西江月
