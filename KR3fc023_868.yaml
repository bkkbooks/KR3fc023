body:
  text: 利鈔合問今有人午年六月十五日借鈔一百六十貫月息三分今已還利鈔七十三貫四百四十文問該展至何年月日答曰入利十五箇零九日至未年九月二十四日法曰置借鈔以月利三分乗之得四貫八百文爲法已還利鈔七十三貫四百四十文爲實以法除之得十五个月零三分以三乘之得九日加原典月日合問詞詩五十九問三客攅銀買賣甲銀十兩三錢乙銀九兩七錢言丙獨出銀斤半換得新絲九秤五斤四兩都全有能分豁步教揙
