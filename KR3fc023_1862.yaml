body:
  text: 六步問勾股弦各幾何答曰勾四十二步股一百四十四步弦一百五十步法曰置相乗六千四十八步爲實以相和一百八十六步爲從方以减從平方法除之得勾闊四十二步以减和步餘得股長一百四千四步以勾股各自乗併之得二万二千五百步爲實以開平方法除之得弦長一百五十步合問有勾弦相乗得四千三百七十五步只云勾弦相和一六十步問勾股弦各幾何答曰勾三十五步股一百二十步
