body:
  text: 足四十五眼三十以減總數餘四十八足七十二眼該龜一十二個合問八臂一頭號夜叉三頭六臂是那吒兩處爭強來閗勝二相勝負正交加三十六頭齊廝種一百八手亂相柧傍邊爲者態動問幾筒那吒幾夜叉答曰那吒一箇夜叉六箇法曰置列一頭三頭三十六頭八臂六臂一百八手互乗一頭乗六臂得六臂三頭乗八臂得二十四臂又以那吒三頭乗一百八手得三百一十四手又以六臂乗三十六頭得二百一十六頭以減三百二十四手餘一百八手爲實以六臂減二十四臂餘一十八臂爲法除之得夜叉六個頭六個臂四十八以減三十六頭一百八手餘三十頭六臂得那吒合問
