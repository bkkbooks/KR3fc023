body:
  text: 匹法四十八尺每二十尺問價鈔幾何答曰六貫四百文法曰以所求率二十尺乘鈔一百九十五貫二百文得三千九百四貫為實以所買羅一十二匹以匹法四十八尺通之加零三十四尺共得六百一十尺為法除之合問今有鈔一百九十五貫二百文買羅每二十尺價鈔六貫四百文匹法四十八尺問該買羅幾何答曰一十二匹三丈四尺法曰以所求率二十尺乘鈔數一百九十五貫二百文得三千九百四貫為實以所買羅價六貫四百文為法除之得六百一十尺以匹法四十八尺除之合問
