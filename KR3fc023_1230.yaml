body:
  text: 今有圓倉周二丈六尺髙九尺問容米幾何答曰二百二石八斗法曰置周二十六尺自乗得六百七十六尺以髙九尺乗之得六千八十四尺如十二而一得五百七尺爲實以斛法二尺五寸除之合問今有米二百二石八斗欲造圓倉盛貯只云周二丈六尺問髙幾何答曰九尺法曰置米二百二石八斗以斛法二尺五寸乗之得五百七尺爲實以周二丈六尺自乗得六百七十六尺以圓法十二除之得五十六尺餘實四以法約之得二分之一以分母三通五十六尺得一百六十八加分子一得一百六十九爲法以分母三通實五百七尺得一千五百二十一爲實
