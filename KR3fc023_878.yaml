body:
  text: 答曰甲一秤二斤八兩乙一十斤八兩丙七斤八兩法曰置乾茗通之得三十五斤半爲實以各行互乗甲三日乗乙五日得一十五爲丙率又甲三日乗西七日得二十一爲乙率又乙五日乗丙七日得三十五爲甲率併之得七十一爲法除之得半斤以乗各率合問一百三十三石常年額粟爲期今年折納擬分催三豆田粟二米大豆八升折粟六升折米無虧粟依本色有倚倍問三色各幾右西江月答曰米二十四石折粟四十石粟四十八豆三十六石折粟四十五石
