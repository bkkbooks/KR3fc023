body:
  text: 以法除之得髙九尺合問今有米二百二石八斗欲造圓倉盛貯只云髙九尺問周幾何答曰二丈六尺法曰置米照前以斛法乗之得五百七尺又以圓法十二乗之得六千八十四尺爲實以髙九尺爲法除之得六百七十六尺以開五方法除之得周二丈六尺合問今有方窖一口上方八尺下方一丈二尺深一丈二尺六寸問積米幾何答曰五百一十石七斗二升法曰置上方八尺自乗得六十四尺下方一十二尺自乗得一百四十四尺又上方八尺乗下方一十二尺得九十六尺併三数得三百四尺
