body:
  text: 答曰甲雞一兩一錢一分二釐五毫癸雞八錢八分七釐五毫法曰置雞十箇張二位一位減一得九箇相乘得九十折半得四十五却以轉差二分半乘之得一兩一尓二分五釐以減總賣十兩餘八兩八尓七分五釐為實以雞十為法除之得癸雞價八尓八分七釐五毫各加轉差二分半得數合問二丈四長尺八闊四兩半銀休打脫二丈六長尺六闊該銀多少要交割答曰六兩法曰置今長三丈六尺闊一尺六寸相乘得五丈七尺六寸以乘原銀四兩
