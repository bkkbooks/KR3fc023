body:
  text: 今有鈔二百三十八貫令五等人從上作互和减半分之只云戊不及甲三十三貫四百文問各該鈔幾何答曰甲六十四貫四百文乙五十六貫丙四十七貫六百文丁三十九貫二百文戊三十貫八百文法曰置鈔二百三十八貫爲實以例用鈔一百三百五百七百九百倂得二貫五百文爲法除之得九十五貫二百文乃首尾二人之数於內减戊不及甲鈔三十三貫六百文餘六十一貫六百文折半得戊鈔三十貫八百文仍加戊不及甲鈔三十三貫四百文得甲鈔六十四貫四百文互和倂戊鈔三十貫八百文共得九十五貫二百文折半得丙鈔四十七貫
