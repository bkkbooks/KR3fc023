body:
  text: 錢唐南湖後學吳敬信民編集衰分計一百六十七問法曰各列置衰各自排列所求等次多寡之位列相與率也有分者率無分者非重則可約数重疊者以約分法約之位簡而易求分不重者勿用副併爲法併列衰之数以所分乗未併者各自爲列實以法除之不滿法者以法命之以法命實數可約者約之古人謂衰等位繁故立此法分也古問二十問六夫不更簮褭上造公士天公侯伯子男凡五人以爵次高下均五鹿問各得幾何
