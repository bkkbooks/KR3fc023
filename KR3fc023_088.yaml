body:
  text: 以分母三除得一千七百三十步十二分步之一以畝法而一合問圓田周三十步徑一十步為田幾何答曰七十五步法曰半周一十五步半徑五步相乘得七十五步合問晥田下周九十九步徑五十一步為田幾何答曰五畝六十二步四分步之一法曰置周九十九步徑五十一步相乘得五千四十九步以四而一得一千二百六十二步四分步之一為實以畝法除之合問晥田下周三十步徑一十六步為田幾何答曰一百二十步法曰置周三十步徑一十六步相乘得四百八十步以四而一合問
