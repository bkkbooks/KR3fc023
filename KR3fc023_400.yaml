body:
  text: 法曰置鐵三万六千二百錢爲實以每十錠價五貫四百文爲法乗之合問今有錫一石三鈞一秤五斤八兩每斤價鈔一貫六百文問該鈔幾何答曰三百六十八貫八百文法曰置錫一石通之爲一百二十斤三鈞爲就十斤一秤爲十五斤加其八兩作五共得二百三十斤半爲實以斤價一貫大每文爲法乗之合問今有絲一千九百五十三斤二兩每斤直銀一兩一十一銖紫四黍問該銀幾何答曰七萬銖法曰置絲一三斤二兩作一二五九百五十三斤一二五爲
