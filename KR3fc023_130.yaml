body:
  text: 比類一百一十五問今有直田廣一步半三分步之一四分步之一五步之一縱一百五步一百三十七分步之一十五問為田幾何答曰一畝法曰置廣一步得一分之一半步得二分之一而烈置分毋子以子互乘毋一分二分三分四分五分于右之一之一之一之一之一于左而乘之一乘二分三分四分五分得一百二十之一分三分四分五分得六十之一乘一分二分分十之一乘一分二分三分五分得三十之一一分二分三分四分得併之得二百七十四為實毋相乘一分二分四分分自相乘一為法除之得廣二步餘實三十四去實皆折半得六十分之十以分毋六十乘廣二加分子一十七共得一百三十七為廣法置縱一百五步以分毋一百三十七乘
