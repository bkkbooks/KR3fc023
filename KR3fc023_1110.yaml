body:
  text: 雲准糯米就要做酒每石要工食鈔三貫爲無鈔還亦將糯米准還只記得准到工食鈔折糯米一斗二升五合四勺二抄四撮要問糯米總數及價鈔並船腳工食鈔並各准糯米數共幾何答曰糯米四千三百五十五石每石價鈔五十貫船鈔一千三百六貫五百文該准糯米二十六石一斗三升挑腳鈔一百四貫五百一十文該准糯米二石九升四勺做酒工食鈔六貫二百七十一文二分該
