body:
  text: 者天資頴遠而博通乎算數凡吾浙藩田疇之饒衍糧稅之滋多與夫戶口之浩繁載諸版籍之間者皆于翁乎是資則旡遺而旡爽焉一時藩臬重臣皆禮遇而信託之者有由然矣翁嘗編藄其九章算法比類大全通九卷以刻于桙以開導其後進之士何其厚也永幾板
