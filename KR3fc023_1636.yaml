body:
  text: 能上武馬借中馬一匹中馬借下馬一匹下馬借武馬一匹方過其坂問各馬一匹力引幾何荅曰武馬力二十二石七分石之大中馬力一十七石七分石之一下馬力五石七分石之五法曰此問馬亦同前借禾之意也列所問数以右行武一爲法遍乗左行得蒙右武一爲法中一空四十石中空中二下一四十石左武一得一空下三得三四十石得四十石復以左行武一爲法遍乗右行武一得一与左行武一對减尽中
