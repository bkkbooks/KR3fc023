body:
  text: 得三升三勺五抄六撮水七升六合八勺得六合一勺四抄四撮餘存酒水合問一箇公公不記持主杖在門前一兩八銖泥彈子每嵗窓錢放一丸嵗深經雨濕總然化作一泥團都秤來八斤半借公公活幾年答曰一二歲法曰置総數以每斤銖法三百八十四銖乘之得三千二百六十四銖爲實以兩作一十四銖加八共三十二銖爲法除之合問今到某州二千十八人騎馬七匹言定十裏輪轉騎各人騎行怎知得答曰六百五十裏騎馬一
