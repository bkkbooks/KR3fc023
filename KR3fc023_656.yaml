body:
  text: 織乘禾併者十六得八十八得四十四得二十二得十一得五日為列實以法三十一除之不滿法者以法命之合問廩五石欲令三人得三二人得二問各得幾何答曰三人各得一石一斗五升十三分升之五二人各得七斗六升十三分升之十二法曰此問均廩當以三三三二二為衰各列置衰副併得十三為法以所均廩五石乘未併者三人三各得十五二人二各得十各自為列實以法十三除之不滿法者以法命之合問甲持錢五百六十乙持錢三百五十丙持錢一百八十出門共稅百錢以持錢多寡衰之
