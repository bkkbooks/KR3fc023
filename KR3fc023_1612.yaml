body:
  text: 二个七人共九个相乗得三百一十五却以前法九果除之得人户三十五名又盈不足互乗盈二个乗四十九得九十八果不足七果乗四十得二百八十併之得三百七十八果爲實以前法九果除之得果四十二合問十一石與八玉等交換一枚玉便輕記得差輊十二兩重輕玉石要分明荅曰玉一枚重一斤六兩石一枚重一斤法曰此問乃貴錢分率之法不知玉石之重則互易一玉一石得二以除輕十二兩得差六兩以乗玉八得四十八爲實却以石十一减玉八餘三爲法除之得石重十六兩以乗石十一得一百七十六兩又以玉八除之得玉重二十二兩合問
  hash: sha256:b24d49575ee24099836ac41deb7244fd4029d0b3808f1e7a0c2f42d98b2d0a07
