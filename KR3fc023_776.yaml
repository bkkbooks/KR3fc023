  text: 兩乗未倂者甲得二千九百六十乙得一千四百八十丙得七百四十丁得三百七十各自爲列實以法除之不滿法者以法命之合問互和減半分法以一三五七九爲圍法除陽位之数以二四六八十爲圍法除哙位之数照位併而爲法除實取其首尾之共数然後看題中之甲有餘丁不足之数如三等以二除之四等以三除之多少之数於尾位次第加之得各人之数也二位者不立法三位者以三五七倂之得一十五爲法除實得首尾数以二除其多少之数逓相加之四位者以二四六八倂之得二十爲法除實得其首尾数以三除其多少之数逓相加之五位者以
