  text: 兩乘未並者甲得二千九百六十乙得一千四百八十丙得七百四十丁得三百七十各自為列實以法除之不滿法者以法命之合問互和減半分法以一三五七九為圍法除陽位之數以二四六八十為圍法除噲位之數照位併而為法除實取其首尾之共數然後看題中之甲有餘丁不足之數如三等以二除之四等以三除之多少之數於尾位次第加之得各人之數也二位者不立法三位者以三五七並之得一十五為法除實得首尾數以二除其多少之數遞相加之四位者以二四六八並之得二十為法除實得其首尾數以三除其多少之數遞相加之五位者以
