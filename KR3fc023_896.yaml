body:
  text: 答曰張大嫂一斗一升二合五勺牛婆一斗王婆八升七合五勺法曰各列置衰張九分牛八分王七分副併得二十四為法以共米三斗乘未併者張得二斗升牛得二斗四升王得二斗一升各自為列實以法二十四各除之合問六十七新增盧著七十二兩錢上戶三家七貫判中戶九家十二貫下戶七家二貫無差別亂緞橫不醒慢推窮問賢家此法如何籌右寄生草答曰上戶一十二家錢二十八實中戶二十七家錢三十六實下戶二十八家錢八十
