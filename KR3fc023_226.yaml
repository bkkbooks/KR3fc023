body:
  text: 法曰置正面長一十六步以分毋三十通之加分子三十二共得三百六十自乘得三千万三千百又以分毋三十三減分子三十二餘一以乘分子亦得三十二併二數共三十一万三千六百三十二為實以分毋三十三自乘符一千八十九為法除之得二百八十八以八而一合問今有欖核田半段中長八步三十四分步二十六兩邊半周各九步問為田幾何答曰三十六步法曰置中長八步以分毋三十四通之加分子一十六共得二百八十八自乘得八万二千九百四十四又以分毋三十四減分子十六餘一十八以乘分子得二百八十八併二數共得八万三千二百三十
