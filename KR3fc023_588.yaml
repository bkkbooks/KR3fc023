body:
  text: 今有鋪戶留鈔貫買客羅一疋言之賤若要五斤紅花换六斤四两黃蠟滿令巳有之見該了二斤半蠟無差舛問貼紅花多少筭玄挠妙法真羨右鳳樓梧答曰貼紅花三斤法曰以原花桓乗今秤黃蠟二斤得一十二斤半爲實却以原黃蠟六斤四兩爲法除之得已收作紅花二斤以減原紅花五斤餘得貼紅花三斤合問一袋江茶買將去八寸爲長二寸闊之度其厚九分無差悞秤來恰好一斤数又有江茶分明許八寸四分量了爲長處二寸一份知闊数九分爲厚無零黍右鳳樓梧
