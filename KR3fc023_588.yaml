body:
  text: 今有鋪戶留鈔貫買客羅一匹言之賤若要五斤紅花换六斤四兩黃蠟滿令巳有之見該了二斤半蠟無差舛問貼紅花多少算玄撓妙法真羡右鳳樓梧答曰貼紅花三斤法曰以原花桓乘今稱黃蠟二斤得一十二斤半為實却以原黃蠟六斤四兩為法除之得已收作紅花二斤以減原紅花五斤餘得貼紅花三斤合問一袋江茶買將去八寸為長二寸闊之度其厚九分無差誤稱來恰好一斤數又有江茶分明許八寸四分量了為長處二寸一份知闊數九分為厚無零黍右鳳樓梧
