body:
  text: 闊一十五步共六十步以四而一得一十五步以乘底長八步共得七百二十步為實以畒法而一三全問今有苽田周四十八步徑一十六步問為田幾何答曰一百九十二步法曰置周四十八步以乘徑一十六步共得七百六十八步為實以四而一合問今有田長八十步一頭廣二十步一頭闊三十步問為田幾何答曰八畒八十步法曰併二闊得五十步以乘長八十步得四千步折半得二千步以畒法除之得八畒八十步合問
