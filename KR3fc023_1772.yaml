body:
  text: 法曰列所問數甲二分之一乑二百乙三分之一乑二百互乗二分得四百三分得六百以少減多餘二百爲實以甲二分乙三分相倂得五分爲法除之得四十以乙二分乗之得一百二十爲乙錢以減原錢二餘錢八十以甲二分乗之得甲錢一百六十文合問賣却四雞三兎訴三兎價中趕却雙雞去雞尤減之絲一兎雞錢兎價無差䖏各一千文適足數二價分明亦有誰人惧加減乘除循軓度賢家不會空思慕右鳳棲梧荅曰雞價四百文兎價六百文法曰列所問數價正四兎正價正二千負二兎正價正二千先以甲行雞正四爲法遍乗負二將負兎正
  hash: sha256:540e07914e7eaa373e87d14688b7508134018776ef06c95891c9e4a062fc8d4a
