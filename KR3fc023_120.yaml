body:
  text: 問田廣七步步縦十五步五爲田幾何荅曰百二十步九步法曰分毋乗其全分子之置七步以四分三共得三十一十五步九分加分子五一百十相乗百四十乗三十一得四千三百四十爲實分毋相乗四分九分得二十分爲法實如法而一得一百一十步餘三十六分之二十俱之得九分之五合問問田廣三步二分步之一縦五步五步之爲田幾何荅曰一十八步法曰分毋各乗其全分子從置三步以三分乗分子一共得一十五步以五分乗加分子二共得二十七相乗一乗二十七此得百七十爲實以分毋
