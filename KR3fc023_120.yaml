body:
  text: 問田廣七步步縱十五步五為田幾何答曰百二十步九步法曰分毋乘其全分子之置七步以四分三共得三十一十五步九分加分子五一百十相乘百四十乘三十一得四千三百四十為實分毋相乘四分九分得二十分為法實如法而一得一百一十步餘三十六分之二十俱之得九分之五合問問田廣三步二分步之一縱五步五步之為田幾何答曰一十八步法曰分毋各乘其全分子從置三步以三分乘分子一共得一十五步以五分乘加分子二共得二十七相乘一乘二十七此得百七十為實以分毋
