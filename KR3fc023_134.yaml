body:
  text: 法曰置併縱斜一百二十八步自乘得一万六千三百八十四步廣三十一步自乘得一千二十四步以少減多餘一万五千三百六十步折半得七千六百八十步為實以併縱斜一百二十八步為法除之得田縱六十步以乘廣三十二步得一千九百二十步以畒法除之合問今有直田廣縱相和得九十二步兩隅斜相去六十八步問為田幾何答曰八畒法曰置斜去六十八步自乘得四千六百二十四步相和九十二步自乘得八千四百六十四步以少減多餘二千八百四十步折半得一千九百二十步為實以畒法除之合問今有直田不知廣縱只記得兩隅斜相去六十八步廣少
