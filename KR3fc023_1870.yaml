body:
  text: 表竿子池角以立池左視之前後二角與木適對以立池右視之則去池右後角三尺與右前角相對問木遠幾何答曰木遠四百八十丈爲連池方共四百九十二丈法曰置池方一十二丈自乗得一万四千四百尺容積爲實以去池三尺爲餘勾爲法除之得木遠四百八十丈加池方一十二丈得共遠四百九十一丈合問今有寶塔一座不知髙幾何從塔底中心量至影末其影長三丈一尺二寸五分別置長一丈量影長二尺五寸問塔髙幾何答曰一十二丈五尺法曰置塔影三百一十二寸五分爲實以表影二十五寸爲法除合問
  hash: sha256:bc0c5b7e5c4610f9db97343c45ce7dd44381442c02fe6b478a6695b478f51837
