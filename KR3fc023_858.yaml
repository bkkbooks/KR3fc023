body:
  text: 得乙金一百五兩併入前三十五兩共一百一十兩倍之得甲金二兩八十兩併入前一百四十兩得原金四百二十兩合問今有物不知總數只云三數剩二五數剩三七數剩二問總幾何答曰二十三法曰三數剩二總一該七十剩二該一百四十五數剩三剩以該二十一剩三該六十三七數剩二剩一該一十五剩二該三十併之共二百三十三滿數一百五則去之凡兩次共去二百一十餘二十三合問今有錢不知總只云七數剩一八數剩二九數剩三問總幾何答曰四百九十八法曰七數剩下二百八十八數剩二剩一該四百四十一剩二下八百八十二
