body:
  text: 今有鈔二百四十貫令四人從上作互和减半分之只云甲多丁鈔一十八貫問各該鈔幾何答曰甲六十九貫乙六十三貫丙五十七貫丁五十一貫法曰置鈔二百四十貫為實以例用鈔二百四百六百八百並得一貫為法除之得一百二十貫乃甲丁二人共數於內减甲多一十八貫餘一百二貫折半得丁鈔五十一貫加多一十八貫得甲鈔六十九貫惟乙丙之數不可並折得之却以題內甲多一十八貫以三除得六貫加入丁鈔五十一貫得丙鈔五十七貫又加六貫得乙鈔六十三貫合問
  hash: sha256:2e847b9e621d185c9bc23ce32b27315f34f5e1d63d3fcaa490e74e9897e28576
