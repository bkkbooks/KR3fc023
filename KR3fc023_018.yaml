body:
  text: 九章算法比類大全序天一地二天三地四天五地六天七地八天九地十此天地生成萬類大數之元會也爰侯伏羲氏之王天下也神會豫上下神祈肇彂其閥而傳歷乎百千萬世以可于旡紀極而咸有賴焉神聖之王開物成務之功大矣哉衁軻氏曰
