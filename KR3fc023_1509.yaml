body:
  text: 法寶如法而一得人数位無互乘以術求人数以所出率乘之乘人数减盈增不足即物價也觲以盈乘出率爲是餘盈馬毋出率爲子互乘齊其数也或向列出率而有孫湘今不以出率乘盈而以盈乘出率者何議曰上下相乘其理剩一欲存盈併爲人数故以盈而乘出率此之謂也又同併盈爲人数者何議曰盈数爲毋已乘出率数爲母亦乘出率二子併而盈此二者亦有之爲人此作注之意乎古問二十問共實物人出八文盈三文人出七文不足四文問人数物價各幾何荅曰七人物價五十三注曰以盈不足盈三十不足令筆乘出率盈三乘出七得二十一不足四
