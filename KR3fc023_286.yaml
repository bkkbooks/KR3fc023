body:
  text: 答曰截長六十步截闊三十六步法曰置截田一十一畝二分半以畝法通之得二千七百步以二乘得五千四百步又以南廣五十四步乘之得二十九万一千六百步却以正長一百八十步除之得一千六百二十步於上再置南廣五十四步自乘得二千九百一十六步內減長除一千六百二十步餘一千二百九十六步為實以開平方法除之得截闊三十六步併南廣五十四步共九十步折半得四步十五步以除截積二千七百步得截長六十步合問今有梯田一段梯長百步無疑大平五十小三十共該四千步積今向大頭截賣一十一畝從實有人算得見端的到處芳名說你右西江月
