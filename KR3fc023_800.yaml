body:
  text: 二八差分法曰以二為首次第四因為作法之始二位者以四因二得八並得一十三位者二八三十二並得四十二四位者二八三十二一百二十八並得一百七十五位者二吧三十二一百二十八五百一十二並得六百八十二各為法除實得一分之數後位數多者不出於四因以生下位之數今有官配米二百二十五石三斗六升令五等人戶從上遞作二八出之第一等四戶第二等八戶第三等一十五戶第四等四十一戶第五等一百二十戶問遂等戶各幾何答曰第一等每戶二石五斗共一十石第二等每戶二石共一十六石第三等每戶一石
