body:
  text: 圓囤髙一丈三尺三寸三分寸之一容米二千石問周幾何答曰五丈四尺法曰置米二千石以斛法一尺六寸二分乗之得三千二百四十尺又以周法十二乗之得三万八千八百八十却以分母三通之得一十一万六千六百四十於上以髙一丈三尺三寸以分母三通之加分自一共得四十尺爲法除之得二千九百一十六尺爲寶以開平方除之合問方亭䑓上方四丈下方五丈髙五丈問爲積幾何答曰一十萬一千六百六十六尺三分尺之二法曰上方小下方大有高爲䑓如方斛無尖面頂平類無袤之城也上方自乗得一千六百尺下方自乗得二千五百尺上下方四十五十相乗得二千尺併之得六千一
