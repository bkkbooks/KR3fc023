body:
  text: 之得一百一十七錢一分二因得油二百二十七四錢四分三因得蜜百三十五貫一文六分四因得鹽四石四十六兩六十八文五因得茶五百五十八兩六文六因得麵六百七十兩三文二分各以斤法十六約之合問買物六色今有客持錢三百六十四貫二百五十文每一貫內一百二十文買油一百四十文買鹽一百二十五文買粉一百六十文買布二百五十文買麻二百五文買米油斤價六十文鹽斤價七十文粉褁價八十文布匹價三百二十文匹法二丈四尺麻稱價三百一十二文五分米斗價二百文買
