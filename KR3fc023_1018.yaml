body:
  text: 九自乘得八十一爲隅法又以上啇九乘廉法得八千三百七十以方廉隅三法共二十九万六千七百五十一皆與上啇九除寶盡得三百一十九別置分毋五百一十二如開立方而一得八爲法除積三百一十九得立方三十九尺餘積七以法命之合問積一百九十三萬七千五百四十一尺二十七分尺之十七問爲立方幾何答曰一百二十四尺三分尺之二法曰置積以分毋二十七通之加內子一十七共得五千二百三十一万三千六百二十四爲寶照前法啇置第一位得三百下法亦置上啇三百進四位爲三百万以三乘得九百万爲隅法與上啇三除寶二千七百万餘寶二千五百三十一万三千六百二十四乃三乘隅法得二
