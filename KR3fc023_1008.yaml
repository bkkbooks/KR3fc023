body:
  text: 啇置第一位得一百下法之上亦置上啇一百進四位爲一万自乘亦得一百万爲隅法與上啇除寶一百万餘寶八十六万八百六十七尺乃三乘隅法三百万爲方法再置上啇一百進四位爲一百万以三乘之得三百万爲廉法方法一退得三十万廉法再退得三万下法三退得千續啇置第二位以方廉二法共三十三万啇寶得二十下法亦置上啇二十進二位爲二千以二乘得四千爲隅法又以上啇二乘廉法得六万以方廉隅三法共三十六万四千皆與上啇二除寶七十二万八千餘寶一十三万二千八百八十七尺乃二乘廉法得一十二万三乘隅法得一万二千皆併入方法共四十三万二千再置上啇一百二十進二位
