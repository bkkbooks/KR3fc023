body:
  text: 法曰併上中下所出錢七貫十二貫二貫共得二十一貫以各得四因得八十四以減總錢二十二餘一十二乃中戶除一止得三上下皆四上戶三家得一十二戶並二十八貫中戶九家得二十七戶該三十六貫下戶七家得二十八戶該八貫合問王留伴哥沙三相呼在山中放畜在池塘共六馬九驢十五箇綿羊共食踐田禾一方要賠償六石九斗精糧共議啇量若要停當驢抵三羊兩箇馬抵三箇驢強問先生大小賠償右折桂令答曰驢九頤二石七斗馬六匹二石七斗羊一十五隻一石五斗
