body:
  text: 田幾何答曰五十一步四分步之三法曰置外周二十七步自乘得七百二十九步以圓法十二除之得六十步四分步之三以減內方周十二步自乘得一百四十四步以方法十六除之得九步餘得五十一步四分步之三合問今有錢田半邊外周一十八步通長一十二步內方長六步闊三步徑三步問為田幾何答曰三十六步法曰倍外周得三十六步自乘得一千二百九十六步折半得六百四十八步以圓法十二除之得五十四步於上以內方長六步乘闊三步得一十八步以減上數餘得三十六步合問今有錢田三角外周二十七步內方東南長六步西北長
