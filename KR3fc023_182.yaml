body:
  text: 田幾何荅曰五十一步四分歩之三法曰置外周二十七歩自乗得七百二十九歩以圓法十二除之得六十歩四分歩之三以減內方周十二歩自乗得一百四十四歩以方法十六除之得九歩餘得五十一歩四分歩之三合問今有錢田半邊外周一十八歩通長一十二歩內方長六歩闊三歩徑三歩問爲田幾何荅曰三十六歩法曰倍外周得三十六歩自乗得一千二百九十六歩折半得六百四十八歩以圓法十二除之得五十四歩於上以內方長六歩乗闊三歩得一十八歩以減上數餘得三十六歩合問今有錢田三角外周二十七歩內方東南長六歩西北長
