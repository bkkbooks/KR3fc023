body:
  text: 足一十八貫置米二十七石乘不足一十八得四百八十六以米二十石乘盈一十八得三百七十八併得八百六十四爲米實又以麥七十二石乘不足一十八得一千二百九十六又麥七十八石乘盈一十八石得一千四百四石併得二千七百石爲麥實併盈千八不足十八得三十大爲法除各實得來麥數乘各該鈔合問今有人借來每年息來六分初歲先還一十五石次年又還三千石尚欠米一十石問原借米幾何答曰二十五石法曰假令原米二十石不足一十二石八斗原米三十盈一十二石八斗維乘原米二千石乘一十二石八斗得二十五石六斗米二十石乘不足一十二石八斗
  hash: sha256:d3b46f9f2eea6073193f5496bbeec87d28733735ec22cc6e1edd43390b88800e
