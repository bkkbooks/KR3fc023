body:
  text: 除水門四座門四步旱門四座各闊二步四尺只云城外邉每二步二尺處乳頭三牧間共乳頭幾何答曰一萬三百二牧七分牧之六法曰置內周二十六里以里步三百步通之加零二百一十九步共八千一十九步扵上信厚三步半得七步以三因得二十一步加入上数共八千四十步以每步六尺乗之得四万八千二百四十尺乃城外圍之数以水門四步以步法六尺乗之得二十四尺又以四座乗之得九十六尺又旱門二步以步法六尺乗之加零四尺共一十六尺以四座乗之得六十四尺併之得一百六十尺以减外圍四万八千二百四十尺餘四万八千八十尺以三乗之得一十千二百爲實以每二步通
