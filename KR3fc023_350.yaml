body:
  text: 環田一畒無零忘了圓徑根因記得打量時語中心池占八分答曰圓池徑一十六步內周四十八步外周七十二步環徑四步法曰通池占八分得一百九十二步以四因三而一得二百五十六步為實以開平方法除之得圓徑一十六步以三因得內周四十八步倍之得八十六步以三因四而一得外周七十二步併內外周共得一百二十步折半得六十步以除環田一畒得環徑四步合問直田七畒半忘了長和記得立契時長闊爭一半今問俊明公此法如何答曰長六十步濶三十步
