body:
  text: 弧田弦三十步矢十五步爲田幾何荅曰一畆九十七步半併弦矢折半以矢乗之弦矢折半爲長矢爲闊乃長闊相乗弦矢相乗又矢自乗併之折半弦比長矢比闊相乗得一積三分積之一矢自乗得三分積之二併之得二積乃折半爲一積也法曰併弦三十步矢時十五四十積折半得二十二步半以矢十五步乗之得三百三十七步半如畆法而一合問弧田弦七十八步二分步之一矢一十三步九分步之七爲田幾何荅曰二畆一百五十五步八十一分步五十六法曰置弦七十八步以分母二步通之加內子一共得一百五十七矢一十
