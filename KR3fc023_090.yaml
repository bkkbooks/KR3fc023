body:
  text: 弧田弦三十步矢十五步為田幾何答曰一畝九十七步半併弦矢折半以矢乘之弦矢折半為長矢為闊乃長闊相乘弦矢相乘又矢自乘併之折半弦比長矢比闊相乘得一積三分積之一矢自乘得三分積之二併之得二積乃折半為一積也法曰併弦三十步矢時十五四十積折半得二十二步半以矢十五步乘之得三百三十七步半如畝法而一合問弧田弦七十八步二分步之一矢一十三步九分步之七為田幾何答曰二畝一百五十五步八十一分步五十六法曰置弦七十八步以分母二步通之加內子一共得一百五十七矢一十
  hash: sha256:3ece663e2dc19b1ac1dace212f93f6ca57b9f782b0959088dbcebf9e05f73fbd
