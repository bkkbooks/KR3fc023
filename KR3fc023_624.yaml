body:
  text: 五尓得二百五十九兩二尓為實以原長二丈四尺闊一尺八寸相乘得四丈三尺二十為法除之合問白麵一貫斤十二下麵一貫二斤四賫鈔三貫買兩停問公谷該多少是答曰各得二斤十五兩二錢五分法曰置鈔三貫以二價二十八兩三十六兩相乘得一千八乘之得三千二十四為實併二價二十八兩三十六兩共得六十四兩為法除之合問日該共用百匹布買得油鹽千二數四匹買鹽五十斤三匹買油二十五答曰鹽一千一百斤用布八十八匹
