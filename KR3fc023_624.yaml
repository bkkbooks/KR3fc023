body:
  text: 五尓得二百五十九兩二尓爲實以原長二丈四尺闊一尺八寸相乗得四丈三尺二十爲法除之合問白麫一貫斤十二下麫一貫二斤四賫鈔三貫買兩停問公谷該多少是答曰各得二斤十五兩二錢五分法曰置鈔三貫以二價二十八兩三十六兩相乗得一千八乗之得三千二十四爲實併二價二十八兩三十六兩共得六十四兩爲法除之合問日該共用百疋布買得油塩千二數四疋買塩五十斤三疋買油二十五答曰塩一千一百斤用布八十八疋
