body:
  text: 公車轉幾何遭荅曰二十八萬遭法曰通行該七百里得二十五万二千步以每步五尺因之得一百二十六万尺爲實以車高一尺五寸三因得四尺五寸爲法除之合問鷂子曰飛八百鴈飛六百無疑鴈先飛去半月鷂子幾日趕齊荅曰四十五日法曰置鴈飛六百以先飛十五日乘之得九千爲實以鷂飛八百减鴈飛六百餘二百爲法除之合問
