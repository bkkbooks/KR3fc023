body:
  text: 兩問該人幾何答曰三十六人法曰置淘金照前法垂得一万六千二百爲實以原淘金十五兩乗今三十日得四百五十爲法除之合問今有四匠八日食米九斗今四十二匠十六日問食米幾何答曰一十八石九斗法曰置匠四十二以十六日乘得六百七十二又以食米九斗因之得六千四十八爲實以四匠因八日得三十二爲法除之合問今有三口三日食米八升今有米三十石令三十口食之問幾何日食畢答曰三箇月零二十二日半法曰置今米三千升以三口因之得九千升又以三日因之得二万七千
