body:
  text: 法曰置表髙三丈以步法六尺除之得五步以乗表間相去千步得五千步爲實以前表退行一百二十三步减後表退行一百二十七步餘四步爲法除之得一千二百五十步加表髙五步共得一千二百五十五步以里法三百步除之得島髙四里五十五步合問求島遠置千前表退行一百二十三步乗間相去一千步得一十二万三千步爲實以前後退行步数相减餘四步爲法除之得三万七百五十步以里步除得前表去島遠一百二里一百五十步合問今有隔水有竿不知其髙求二表各髙六尺前後相去一十五尺從前表退行五尺人目着地望竿與前表末齊平又從後表退行八尺人目着地望後表與竿末相平問竿
