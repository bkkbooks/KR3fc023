body:
  text: 下等一百一十戶問逐等毎戶各幾何答曰上等毎戶二石四斗七升五合共四十九石五斗中等毎戶一石七斗七升五合共八十八石七斗五升下等毎戶一石二斗七升五合共一百四十石二斗五升法曰置中等五十户以多五斗因之得二十五石又置上等二十户以多五斗七斗共一石二斗乗之得二十四石併二数共得四十九石以減総米餘二百二十九石五斗爲實以併三等户数共一百六十户爲法除之得一石二斗七升五合乃下等一户所出之数加一石二斗得二石四斗七升五合乃上等户出之数減七斗得一石七斗七升五合乃中
