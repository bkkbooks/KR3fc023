body:
  text: 四百二十六得一十一万九千二百八十折半五万九千六百两十爲實以分毋自乗得四九爲法除之得一千二百一十五步以畒法除之不盡之數約之合問今有梯田南閣二十一步七分步之六北闊二十八步長三十六步十九分步之十七問爲田幾何荅曰二畒一百九十九步二百六十六分步之一百九十五法曰置南闊二十一步以分毋七通之加分子六共得一百五十三又置南闊十步以南闊分毋七通之得一百九十六併二闊共三百四十九於上又置長三十六步以分毋十九通之加分子十士共得七百一以乗上數得二十四万四千六百四十九半之清一十二万三百二
