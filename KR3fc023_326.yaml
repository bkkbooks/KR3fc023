body:
  text: 直田一十二畒半中有圓池侵兩半三平多下五步先要見長怎生算答曰長一百五步平四十步圓池徑四十步法曰通田一十二畒半得三千步以中有圓池侵兩半約之得闊四十步以三因得一百二十步減多長一十五步餘得長一百五步以闊四十步乘之得四千二百步以減田積三千步餘一千二百步以四因三而一得一千六百步以開平方法除之得圓徑四十步合問直田一畒無零欲要賣與他人四鄰不肯畫字中間剜賣三分長闊各差一步四面存要均勻答曰原長一十六步闊一十五步今賣長九
