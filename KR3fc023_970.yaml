body:
  text: 十以乘全步及分子俱得五千四十以全步積分通畒步得一百二十萬九千六百為實各以本毋除子照前法除併之得一万三千六十八為法除實得九十二步餘實七千三百四十四法實皆一百八約之合問田一畒廣一步半三分步之一四分步之一五分步之一六分步之一八分步之一問縱幾何答曰八十八步七百六十一分步之二百三十二法曰列置全步及分毋子照前列實而副併分毋自乘得四万三百二十以乘全步及分子俱得四万三百二十以全步積分通畒步得九百六十七万六千八百為實各以本毋除子照前法除併之得一十万九千五百八十四為法除之得八十八步餘實三萬三千四百八法實
