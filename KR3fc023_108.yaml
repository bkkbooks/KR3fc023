body:
  text: 答曰十五分之三十一法曰列置分母子九分五分于右之八之一于左母互乘子九分乘之一得九五分八四十以少九減多四十餘三十一為實母相乘五分乘九分併以十五為法實不滿法以法命之得四十五分之三十一合問問八分之五比二十五分之十六孰多幾何答曰二十五分之十六多二百分之三法曰列置分母子八分二十五分于右之五之一十六于左母互乘子八分乘之十六得一百二十八二十五分乘之五得一百二十五以少一百二十五減多一百二十八餘三為實母相乘八分乘二十五分得二實不滿法即多二百分之二數也合問
