body:
  text: 今有寶塔一座不知髙幾何從塔底中心量至影末其影長四丈別置一表髙二尺五寸量影長八寸問塔髙幾何答曰一十二丈五尺法曰置表髙二十五寸乗塔影長四百寸得一万寸爲實以表影八寸爲法除之合問今有望深谷偃矩岸上令勾髙六尺從勾端望谷底入下股九尺一寸設重矩於上其矩間相去三丈更從勾端望谷底入上股八尺五寸問谷深幾何答曰四十一丈九尺法曰置矩間相去三百寸以乗入上股八十五寸得一万五千百寸爲
  hash: sha256:fdf564a3a86773b43b4193e22de8688254ebfed919381ebfea2718d0dc52a3d9
