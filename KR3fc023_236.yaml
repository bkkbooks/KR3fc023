body:
  text: 遍十四六史相減以六減九餘三以三減六餘三求其等也減換皆等爲三以等約之以三約分母二十四得入又以三約分母九得三即八分疋之三合問今有秋十五萬六千一百石今已徵一十一萬一千五百分中徵過幾分荅曰七分之五法曰米一十五万六千一百石爲分毋巳徵一十一万一千五百石爲分子以子減母餘四万四千六百以二次減分子餘二万二千二百以減各得二万二千三百求其等也以等約之合問今有夏稅絲六十四萬一千八百四十七兩六錢今巳徵妆四十五萬六千八百八十七兩七錢問幾分中徵過幾何荅曰五百二十四分巳徵三百七十三分
