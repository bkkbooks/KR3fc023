body:
  text: 物價得數第三行麥正二十四得正一百一十菽正五十四得正二一七十荅正四十八得二百四十黍正二十一得正一百五價正六百二十四得正三千一百二十第四行麥正三十一得正一百五十五菲正二十一得正一百五荅正七十七得正三百六十五黍正二十六得正一百三十價正七百二十八得正三千六百四十第五行麥正二十得正一百菲正一十五得正七十五荅正七十得正三百五十黍正四十得正一百價正七百一十五得正三千五百七十五復以第三行麥正二十四爲法遍乗第二行麥正五得正一百二十与第二行麥正一百一十對減尽菽正一十五得正三百六十同減第三得菽正二百七十餘得菽負九十荅正三十一得正七百四十四同減第二行荅正
