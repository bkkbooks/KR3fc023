body:
  text: 併中外周折半以乘徑外周自乘以中周自乘減之餘十二而一法曰併二周中九十二步外一百二十二步共二百一十四步折半得一百七步以乘徑五步得五百三十五步以畝法而一合問環田中周六十二步分步之三外周一百一十曰步二分徑一十二步三分步之二為田幾何答曰四畝一百五十六步四分步之一法曰併二周中六十二之外一百六十三步共一百七十五步中周之三乘外周二分得六外周之一乘中周四分得四併之得十卻以分母三分四分相乘得八為法除十得一步二分五釐併前共步得一百七十六步二分五釐折
  hash: sha256:05779f87f019a049b12d0f2010f4098e7584b409b4122afb588e2be7f30877c9
