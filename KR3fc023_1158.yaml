body:
  text: 約之合問壍堵下廣二丈一十八丈六又髙二丈五尺問積幾何答曰四萬六千五百尺法曰一立方斜西叚形如屋脊置下廣二十尺袤一百八十六尺相乗得三千七百二十尺以髙二十五尺委之得九万三千尺爲實如二而一合問陽馬廣五尺袤七尺髙八尺問積幾何答曰九十三尺三分尺之一法曰此方錐之積在一角髙廣長相等是也置廣五尺袤七尺相乗得三十五尺以髙八尺乗之得二百八十尺如三而一合問鼈臑下廣五尺無袤上四尺無廣髙七尺問積幾何
