body:
  text: 七分升之四先以七二十五升得五百二十五八分子四共得五百二十九却以稻率六十乘得三万一千二百四十以粟率為除之以原分毋七乘粟率五十得三百五十除實得九斗餘實二百四十以法命之得三十五分乘之二十四合問問粟一斗為糲米幾何答曰六升法曰置糲米三十乘粟一十為實以粟率五十為法除之合問問粟二斗一升為稗米答曰一斗一升五十分升之十七法曰置稗米二十七乘粟二斗一升為實以粟率五十為法除之問粟四斗五升為糳米答曰二斗一升五分升之三法曰置糳米二十四乘粟四斗五升為實以粟率五十為法除之問粟七斗九升為御米答曰三斗三升五十分升之九
