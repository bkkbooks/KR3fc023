body:
  text: 田怎筭長闊步差二十看來奧妙幽玄特將周徑訪英贤四事如何得見右西江月答曰長八十步平六十步周三百步圓徑一百步法曰置田二十調以畝法通之得四千八百步爲實以長闊差二十步爲從方開平方法除之得平六十步加差二十步得長八十步每步加圓二分五厘得圓徑一百步以三乘得周合問圭田一十四調一分零數休忘以長爲實啓平方得數且留上向闊中添二平方開後存啇將啇減上五猶強要知的當右西江月
