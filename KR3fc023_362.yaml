body:
  text: 法曰置糳飰四十八乘栗八斗六升為實以粟率五十為法除之問粟九斗八升為御飰答曰八斗二升二十五分升之八法曰置御飰四十二乘粟九斗八升為實以粟率五十為法除之問粟三斗三分升之一為菽答曰二斗七升一十分升之三法曰置菽四十五乘粟三斗以分毋三道之加于一共得九十一分菽率四十五乘之共得四千九十五為實以粟率五十以原母三通得一百五十為法除之合問問粟四斗一升三分升之二為答答曰三斗七升五合法曰以答四十五乘粟四斗一升以分母三分通得一百二十三加分子二共一百二十五得五千六百二十五為實以粟率五十以原通分母三通得一百五十為法除之問粟五斗三分升之二為麻答曰四斗五升五分升之三
