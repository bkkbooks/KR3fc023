body:
  text: 法曰置綾一十六尺以差十二乘之得一百九十二羅二十尺以差乘之得二百四十各自為列寶以羅二十減綾十六餘四尺為法各除之合問今有芝麻七斗七每升價錢七十七乘除加減隨公算用法之時休使七答曰五貫九百二十九文法曰倍寶七斗七升得一石玉斗四升折法七十七得三十八半乘之合問今有小麥五石五每斗價錢五十五因歸加減任公為不言五五二十五答曰三千二十五文
