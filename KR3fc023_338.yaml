body:
  text: 得一十六步為實以開平方法除之得內周半徑四步以乘外周二十六步得一百四十四步又以半徑六步除之得內周二十四步倍半徑四步得徑八步合問今有圭田一假積一百二十零六步闊不及長實該九借問長闊多少數答曰長二十一步闊一十二步法曰倍積一百二十六步得二百五十二步為實以不及九步為從方開平方法除之於實數之下將從方九步進一位為九十步以下法啇實得一十下法亦置上啇一十進一位為一百為隅法與從方共一百九十皆與上啇一除實一百九十餘實六十二乃二乘隅法一百得二百為廉法一退得二十從方亦一退
  hash: sha256:ef67e578afd914ba3535899994efb6222fe5af2b7adcb6ed500089d968739d4b
