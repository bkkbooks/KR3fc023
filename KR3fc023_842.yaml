body:
  text: 法曰以所收粟八石四升以分毋十二通之加分子五共得一万一百三十三乗所求田一畒得再二四十步得二百四十三万一千九百二十爲實以所有田一二十六畒以畒法通之加零一百五十九步共三万三百九十九步以菓分毋十二通之共得三十六万四千七百八十八爲法除之得六升餘實二十四万三千一百九十二以法约之得三分升之二合問今有取保一百六十九日二十五分日之二十三該鈔一貫二百文問一歲該鈔幾何答曰二貫五百文法曰以所求一歲當作三百五十四日乗所有鈔一貫二百文得四百二十四貫八百文以原分毋二十五通之得一万六百二十贯爲實以所取保一百六十九日以分毋二十五通之加分子二十三共得四千二百四十八爲法除之得二貫五百文合問
  hash: sha256:8d774de3bac9a142c416376570c59e4700a43e74a756b1d7463f29a97226a794
