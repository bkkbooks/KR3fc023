body:
  text: 數合問甲乙丙丁戊酒錢缺千五甲兄告乙弟四百我還與轉差天幾文各人出怎取答曰轉差五十文甲四百文乙三百五十文丙三百文丁二百五十文戊二百文法曰置酒錢一千五百以甲出四百約之得十五為衰甲四乙三六丙二丁二半戊一得轉差三十文合問甲乙丙丁戊酒錢缺千五戊弟告四兄一百五我與轉差吳幾文各人出怎取答曰轉差七十五文
