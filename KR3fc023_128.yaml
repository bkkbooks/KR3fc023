body:
  text: 答曰一錢二十一分錢之四法曰人數為法有分者通之置七人以三分乘得二十一錢數為實有分者通之置人錢以三分通之加分子一共二十五實如法而一合問問三人三分人之一均六錢三分錢之一四分錢之三各人得幾何答曰二錢八分錢之一法曰重有分者同而通之置三人以三分通之加內子一共得一十置六錢以三分通之加內子一共得一十九以重分毋乘之得七十六又以分毋三乘分子三得九加入前數共得八十五為實以法實分毋互乘法分毋三實分四乘得十二併分毋法分毋三實分毋三四共得十以乘十二共得一百二十為法又以分毋三乘前實八十五得二百五十五為實如法而一得二錢十五之得八分錢之一合問
