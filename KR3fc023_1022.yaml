body:
  text: 第三位以方廉二法共四十一万一千六百一十啇寶得四下法亦置上啇四自乘得一十六爲隅法又以上啇四乘廉法得四千四百四十以方廉隅三法四十一万五千一百五十六皆與上啇四除寶盡得三百七十四爲寶別置分毋二十七如開立方而一得三爲法除之立方一百二十四餘寶二以法命之合問開立圓法曰以方法十六乘積如泆九一開方法之積一萬六千四百四十八億六千八百四十三萬七千五百尺問爲立圓徑幾何答曰一萬四千三百人法曰立與七万十六置積以方法十六乘之得二十六万二千一百七十八六千三百以法而一得二万九千二百四十二億七百尺
