body:
  text: 三十一寸二分五厘以開立方法除之得面方三寸三千七百分寸之四百二十五合問今有方金一塊高一尺九寸八十四分寸之七十五廣一尺五寸三分寸之二縱一尺七寸六分寸之五問重幾何答曰五千五百五十七斤五百四分斤之四百二十五法曰置高一尺九寸以分母八十四通之加子七十五共得一十六百七十廣一尺五寸以分母三通之加子二共得四十七縱一尺七寸以分母六通之加分子五共得一百七以三数相乘高一子六百七十一乘廣四十二得七万八千五百三十七又以縱一百七乘之共得八百四十万三千四百五十九爲實以三母相乘八十四分乘三分得二百五十二尺以六分乘得一千五百一十二爲法除
