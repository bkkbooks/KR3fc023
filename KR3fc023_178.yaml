body:
  text: 答曰二頃五十三畒八十步法曰置周六百四十步徑三百八十步相乘得二十四万三千二百步為實以田為法除之得六万八百步以畒法除之合問今有盆田下周二十四步徑一十六步問為田幾何答曰九十六步法曰置周二十四步徑一十六步相乘得三百八十四步以四而一得九十六步全問今有覆月田弦闊二十四步徑一十二步問為田幾何答曰二百一十六步法曰併弦二十四步徑一十二步共得三十六步折半得一十八步為
