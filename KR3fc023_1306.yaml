body:
  text: 之加分子一共得一千六百爲實以柘縣城二十一里以分母三乘之加分子一共六十四爲法除之合問今有自方一塊蠟自方高厚一尺八一日對天燃一寸問燃幾年用何法答曰一十六年二箇月零十二日法曰置蠟自方一十八寸再自乘得五入百三十二寸爲實以年率三百六十四爲法除之得一十六年餘實七十二寸以三除得二箇月零十二合問圓窖見積粮儲二百二石八斗高不及周丈七請問高周多少答曰高九尺周二丈六尺法曰置積二百二石八斗以斛法二尺五寸乘之得五百七尺又以十二
