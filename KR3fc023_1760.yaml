body:
  text: 舊有田九畒二分五厘該米一石八斗五升法曰排列問數先以右行米二斗五升爲法遍乗左行得数右二斗五升二斗三升五合二斗六石三升五合左一畒得二斗五升一畒得二斗五升一畒得二十五升二十六畒五分却以左行站田米對減盡雲宗田餘米一升五合舊有田餘米五升緫餘米五斗九升爲實以雲宗舊有田共餘六升五合爲法除之得二色田各九畒餘米五合約啇得舊有田九畒二分五厘以餘米五升乗之得米四斗六升二合五勺以減緫餘米五斗九升餘米一斗二升七合五勺却以雲宗田餘米一升五合除之得田八畒五分以每畒科米二斗三升五合乗之得米一石九斗九對七合五勺舊
