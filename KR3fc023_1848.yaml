body:
  text: 法曰置股五十步自乘得一千二百九十六步弦四十五步自乘得二午二十五步以减股数餘七百二十九爲實以開平方法除之合問今有勾股田勾闊二十七步弦斜四十五步問股長幾何荅曰三十六步法曰置勾二十七步自乘得七百二十九步弦千步自乘得一千二十五步以减勾数餘一千二百九十六步爲實開平方法除之合問今有勾股田勾二十七步股長十六步問弦長幾何荅曰四十五步法曰置勾二十七步自乘得七百二十九步股十步自乘得一千二百九千六步併之得三千二十五步爲實以開平方法除之合問
