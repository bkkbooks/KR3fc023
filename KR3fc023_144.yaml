body:
  text: 答曰二畝六分法曰置勾闊二十六步股長四十八步相乘得一千二百四十八步折半得六百二十四步為實以畒法除之合問今有勾股田股長八步弦斜一十步問為田幾何答曰二十四步法曰置投長八步自乘得六十四步弦斜一十步自乘得一百步內減股餘三十六步為實以開平方法除之得勾闊六步以乘股長八步得四十八步折半合問今有勾股田勾闊六步弦斜一十步問為田幾何答曰二十四步
