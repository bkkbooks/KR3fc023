body:
  text: 闊分毋七通之得五千七百二十二別置南闊二十五步以分毋六通之加分子五共得一百五十五又以北闊分毋七通之得一千八十五北闊三十二步以分毋七通之加分子六共得二百三十又以南闊分毋六通之得一千三百八十再置中闊一十八步以南闊分毋六通之得一百八又以北闊分毋七通之得七百五十六倍之得一千五百一十二併三闊得三千九百七十七以乗正長一千七百二十二得六百八十四万八千三百九十四再折半得一百七十一万二千九十八步半爲實以二分毋六分七分相乗得四十二自乗得一千七百六十四爲法除之得九百七十步餘實皆一十半約之畒法而一合問今有杖鼓田南闊二十五步六分步之五北活三十二步七分步之
  hash: sha256:5693dd9923dd0e50883e1b51fa41d1a3b260158974d32b23b703f6448d01f577
