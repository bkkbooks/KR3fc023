body:
  text: 六百九十十八里分毋加分三共得三二分三十除之得一十四里加不及二十三里合問今有兎先走未知步數大追四百步未及一十步更追一百步却赶過五步問兎先走几何答曰七十步法曰併未及二十五步共一趕過十五步乘犬追四百步得六千步爲實以更追一百步爲法除之得六十步加未及一十步合問今有順天府至杭州府計四千二百七十五里站馬從順天府投南日行二百里站船從杭州府投北書夜行二百五十里問幾日相逢及船馬各行里幾何答曰相會九日二分日之一馬行一千九百里
  hash: sha256:1abc1e1dfaf2fe844c4bfcb10cc1191e174b4527a650c3ff9b2249cb2e94db83
