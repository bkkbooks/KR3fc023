body:
  text: 法曰通積二畒加零五十五步共得五百三十五步為實併二不及得二百四步折半得一百二步為從方照前開平方法除之得徑五步各加不及得中外周合問今有眉田積一畒八十九步又零多徑比二周皆不及上周三十五步過下周亦多三十一上下周徑各幾何答曰上周四十九步下周四十五步中徑一十四步法曰通積一畒加零八十九步共得三百二十九步倍之得六百五十八步為實半二不及得二十三步為從方照前開平方法除之得中徑一十四步各加不及得上下周合問
