body:
  text: 步軍九千四百九十二人糧五千八百石六斗三分之三法曰置人為分毋糧為分子互乘五十三斗乘七八得三百七十一万乘九人得三千三百三十九五十四斗乘九人得四百八十六又乘六人乘得二千九百一十六倍之得五千八百三十二五十五斗乘六人得三百二十又乘七人得二千三百一十以三囡得六千九百三十併之得一万六千一百一三因得四万八千三百三為法置糧一万三千四百七十七石一斗以分毋三通之加內子一得四十万四千三百一十四以分毋七人六人人相乘得三百七十八乘之得一億五千二百八十三万六百九十二為實以法除之得三千一百六十四人為馬軍數倍之水軍三之步軍也求各糧列三色軍數以本色給糧乘之為實以各軍率除之合問
  hash: sha256:4c41b488dac1768237edf8b9c6af0defa06bbb71ba5c29cabec2442ed8f3eae6
