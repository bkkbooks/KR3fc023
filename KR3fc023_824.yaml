body:
  text: 歩軍九千四百九十二人粮五千八百石六斗三分之三法曰置人爲分毋粮爲分子互乗五十三斗乗七八得三百七十一万乗九人得三千三百三十九五十四斗乗九人得四百八十六又乗六人乗得二千九百一十六倍之得五千八百三十二五十五斗乗六人得三百二十又乗七人得二千三百一十以三囡得六千九百三十併之得一万六千一百一三因得四万八千三百三爲法置粮一万三千四百七十七石一斗以分毋三通之加内子一得四十万四千三百一十四以分毋七人六人人相乗得三百七十八乗之得一億五千二百八十三万六百九十二爲實以法除之得三千一百六十四人爲馬軍数倍之水軍三之步軍也求各粮列三色軍数以本色给粮乗之爲實以各軍率除之合問
  hash: sha256:428054915940372ec3bdcfc2033c52590622b1d6884ba89cced46fa9c0a050b3
