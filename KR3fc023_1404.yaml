body:
  text: 幾何答曰六貫三百文法曰置絹每一十疋以疋法四十二尺乗之得四百二十尺又乗貼鈔一貫八百文得二百五十六貫爲實以共稅大疋乗共尺四百二十得二千五百一十疋减原持䋭二千四百疋餘一百二十疋爲法除之合問今有合稅物價一千一百三十七定四貫八百文依例三十分而取一問納稅鈔幾何答曰三十七定四貫六百六十文法曰置物價一千一百二十七定以定率五昇通之加零四貫八百文共得五千六百八十九貫八百文爲實以稅例三十爲法除之得一百八十九貫六百六十文再以定率五貫除之合問
  hash: sha256:8090eb44af033285c32a3c1e3fc83925234c43bcb915e8bcaf78deb537e58e38
