  text: 百二十傭一日顧一文目輸其縣乙縣三萬四千二百七十二筭粟一石直一千八傭一日顧十文遠七十里丙縣一萬九千三百二十八筭粟一石直一十六傭一日顧五文遠一百四十里丁縣一萬七千七百筭粟一石直一十四傭一日顧五文遠一百七千五里戊縣二萬三千四十筭粟一石直一十二傭一日顧五文遠二百一十里已縣一萬九千一百三十六筭粟一石直一十傭一日顧五文遠二百八十里問各縣該粟幾何荅曰甲縣一萬八千九百四十七石一百三十三分石之四十九
