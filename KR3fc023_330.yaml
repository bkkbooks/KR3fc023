body:
  text: 直田一假四不等東邊二十五步長西長三十二步南闊十七步明彰北闊止該有八步依圖改正不多量答曰一畒四分此圖考較立法當作勾股田二假直田一假算之皆得其當以見前圖截處之差使學者易曉此理也遇有歪斜之田倣此截作勾股田梯田直田算宜以此為法審其當截處而截之庶無誤矣法曰一舊圖併東西長共五十七步折半得二十八步半為實以併南北闊共二十五步折半得一十二步半為法乘之得三百五十六步二分五
  hash: sha256:a4aa8ffab7983f293d511346bc63d862a045d63e407d952848054e8329e92f72
