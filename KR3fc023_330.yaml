body:
  text: 直田一叚四不等東邊二十五步長西長三十二步南闊十七步明彰北闊止該有八步依圖改正不多量荅曰一畒四分此圖考較立法當作勾股田二叚直田一叚算之皆得其當以見前圖截䖏之差使學者易曉此理也遇有歪斜之田倣此截作勾股田梯田直田筭宜以此爲法審其當截䖏而截之庻無誤矣法曰一舊圖併東西長共五十七步折半得二十八步半爲實以併南北闊共二十五步折半得一十二步半爲法乘之得三百五十六步二分五
