body:
  text: 法曰置御米二十一乘粟七斗九升爲實以粟率五十爲法除之問粟一斗爲小䵂幾何答曰二升一十分升之七法曰置小䵂三半乘栗一十爲實以粟率五十爲法除之問粟九斗八升爲大䵂答曰一石五升二十五分升之二十一法曰置大䵂五十四乘九斗八升爲實以粟率五十爲法除之問粟二斗三升爲糲飰答曰三斗四升半法曰置糲飰七十五乘粟二斗三升爲實以粟率五十爲法除之問粟三斗六升爲粺飰答曰三斗八升二十五分升之二十二法曰置粺飰五十四乘栗三斗六升爲實以粟率五十爲法除之問粟八斗六升爲糳飰答曰八斗二升二十五分升之一十四
