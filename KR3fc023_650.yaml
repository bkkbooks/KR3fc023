body:
  text: 答曰大夫一鹿三分鹿之二不更一鹿三分鹿之一簮裊一鹿上造鹿三分之二公士鹿三分之一法曰五人以爵次均五鹿者大夫為五不更為四簮裊為二上造為二公士為一各列置衰排五四三二一副併一十五為法以所分五鹿乘未併者五得二十五四得二十三得十五二得十一得五各自為列實以法十五除之大夫得一鹿餘十不更得一鹿餘五簮裊得一鹿上造十公士五各不滿一鹿止可為分子法實俱五約之得數合問大夫不更簮裊上造公士五人依爵次支粟一十五斗後大夫亦支五斗倉無粟欲以六人依爵次均之答曰大夫二人各出一斗四分斗之一
