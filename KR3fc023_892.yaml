body:
  text: 分共一兩二乑八分為法除之得本銀以減總銀餘息銀合問甲借乙銀作本逐年倍息曾言啇經遠處整十年近日還家計算二百五十六兩連本和利都全不知原本問根源甚法求之可見答曰原本銀二錢五分法曰置銀二百五十六兩為實以三度八除得五乑折半合問丙借丁鈔不用保原本無稽考不知多少月利四分雖些小今經八月來取討還得利錢分明道四十四兩得了皆倍告請問當初實多少賢家算時休心惱右鳳棲梧答曰兩錠三十七兩半
