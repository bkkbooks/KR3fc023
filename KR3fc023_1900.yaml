body:
  text: 荅曰南行四里二百五十二步法曰置城每邊三每里三百六十步通之得一千八十步加餘東六百步西二百步得一千八百八十步半城步得五百四十步乘之得一百一五千二百步爲實却以餘東門松株六百步爲法除之得南行一千六百九十二步以里步三百六十除之得四里餘二百五十二步合問令有方城一座每邊三里無餘東門路畔有松株相去六幾步方能見樹右西江月荅曰出南門一里一百二十六步法曰半城方以里步通方自垂爲實以餘東門爲
  hash: sha256:2c66d89c7ab48b73570c16f28bf4035d6a1ba5450ea654245628b45967904bc5
