body:
  text: 空青正五緑負一錢正三百紅負一得負四空緑正六得正二十四錢正三百却以左行紅負一爲法復遍乗右行紅正四得正四与左行紅負四異名對減尽青負一得負一左行青空无減合加青負一緑空无減左行亦得羅正二十四正三百得正三百同加左行正一千二百得正一千五百再相乗以中行青正五爲法遍乗左行青負一得負五緑正二十四得正一百二十錢正一千五百得正七千五百却以左行青負一復遍乗中行青正五得正五与左行青負五異名對減尽緑負一得負一異減左行緑正一百二十餘得緑正一百一十九爲法正三百得正三百同加左行七千五百得正七千八百爲實以法除得緑錦尺價六十五文一百一十九分文之六十
