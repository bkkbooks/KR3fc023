body:
  text: 一斤爲練练一十二兩練练一斤爲练一斤一十一銖有青一斤問爲絡幾何曰一斤四兩一十六錢二十三分之十六法曰置今有青十六兩乘問練十六兩得一万五千六百又以絡十六兩乘之得四千九十六爲實以青一斤十二銖爲十六兩半乘練十二兩得一百九十八兩爲法除之得二十兩餘實一百三十六兩以銖法二十四乘之得三千二百六十四仍以法一百九十入除之得一十六銖尚餘九十六法實皆六約之得數合問惡粟二十斗春得糲米九斗今欲爲粺米十三斗問用惡粟幾何曰二十四斗六升八十一分升之十十四
