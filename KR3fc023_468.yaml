body:
  text: 價除之得絹數布匹價除之得布數合問今有絲六十二斤八兩換金一十兩內八分半五兩七分半五兩問二色金每兩該絲幾何答曰八分半該六斤十兩二錢五分七分半該五斤十三兩七錢五分法曰置絲六十二斤以十六兩通加零八兩共一千兩為實列五兩以八分半乘得四兩二禾半又列五兩以七分率乘得三兩七禾半併得八兩為法除之得一百二十五兩副置二位上以八分半乘之下以七分半乘之各以斤約之合問今有稻穀九十三石七斗五升每四斗出米一斗六升每
