body:
  text: 下等每戶三石一斗八升五合一百八十戶共五百七十三石三斗法曰置列三鄉戶數以各分乘之為衰上鄉上等五十六戶以一万乘得五十六万中等七十四戶以九千乘得六十六万六千下等九十八戶以八千一百乘得七十九万三千八百中鄉上等八十二戶以五千乘得四十一万中等一百二十戶以四千乘得四十八万下等一百六十戶以三千二百乘得五十一万二千下鄉上等九十五戶以二千五百乘得二十三万七千五百中等一百七十二戶以一千七百五十乘得三十万一千下等一百八十戶以一千二百二十五乘得二十万五百各列置衰上鄉上等五十六万中等六十六万六千下等七十九万八百中鄉上等六十一万中等四十八万下等十一万二千下鄉上等二十三万七千五百中等万一千下等二十一万三百副並百一十八万八為法置所輸粟
  hash: sha256:3800cc39b31fb7353bf7c6bdca00f74ae936eade4fed2854bb676b5b05849e52
