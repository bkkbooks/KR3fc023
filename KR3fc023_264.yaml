body:
  text: 今有鈔二百貫每人分一貫十九分貫之一問該人幾何答曰一百九十人法曰置鈔二百貫以分母十九通之得三千八百貫為實以人分一貫以分母十九通之加分子一共得二十為法除之合問截田一十二問今有圭田南比直長一百二十步比闊三十六步南尖今從比頭截賣三畒二分四厘問截長闊各幾何答曰長二十四步闊二十八步八分法曰通截賣田三畒二分四厘得七百七十七步六分以二因得一千五百五十五步二分為實以比闊三十六步為法乘之得五万五
  hash: sha256:11224f78989d64c8da768945389df78b9f8cd7552a7b248209fdf65fc274f47c
