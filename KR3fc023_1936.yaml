body:
  text: 斜倚墻齊放一木木去墻根六尺六今東立木放墻邊却比墻頭高尺五荅曰墻高一丈三尺七寸七分木長一丈五尺二寸七分法曰置木去墻六尺六寸如勾自乗得四百三十五尺六寸比墻高一尺五寸如股弦較爲法除之得二十九尺四分以減較一尺五寸餘得二十七尺五寸四分折半得墻高一丈三尺七寸七分加較一尺五寸得木長一丈五尺二寸七分合問直積內減平自乗八百七十五無零五較七平数適等不知和較與長平荅曰長六十步平二十五步
