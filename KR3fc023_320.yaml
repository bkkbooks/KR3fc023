body:
  text: 公長闊如何取答曰長二十四步平一十步法曰倍四隅二十六步餘得自乘得六百七十六步以長平自乘約之得長二十四步自乘得五百七十六步平一十步自乘得一百步併得六百七十六步今有直積用長乘一千八百步無零兩隅相去十七步闊長何以得分明答曰長一十五步闊八步法曰置兩隅一十六步自乘得二百五十六步為實以約長平得長一十五步自乘得二百二十五步闊八步自乘得六十四步併之得二百八十九步却以長十五闊八相乘得一百二十步以長十五乘之得一千八百步合問直田一假不知畒長闊不知幾步數以闊減斜剩五十斜內減長斜九步答曰長八十步闊三十九步
