body:
  text: 法曰置鈔一千貫爲實以羅三尺絹七尺相乗得二十一乗之得二百一十貫却以羅三尺直二百絹七尺直二百互乗併之得二貫爲法除之一百五尺乃羅絹等數各倍之以三除得羅價七除得絹價合問今有鈔四十七貫七百五十文耀米麥豆只云米七斗麥八斗豆九斗各直二貫欲三色各停問該幾何答曰各六石三斗米價一十八貫麥價一十五貫七百五十豆價一十四貫法曰置鈔四十七貫七百五十文於上以米麥豆數相乗七斗乗八斗得五十六又以九斗乗得五百四乗上數得二万四千六十六爲實卻以米價二貫乗麥八斗得一十六又乗豆九斗得一百四十四麥價二貫乗米七斗得一十四又乗豆九斗得一百二十
  hash: sha256:cff7dab82685bb3256d75c700eaa0eb618f069273f8323d8be71767398b2d4a8
