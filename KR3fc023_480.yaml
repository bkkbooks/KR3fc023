body:
  text: 法曰置鈔一千貫為實以羅三尺絹七尺相乘得二十一乘之得二百一十貫却以羅三尺直二百絹七尺直二百互乘併之得二貫為法除之一百五尺乃羅絹等數各倍之以三除得羅價七除得絹價合問今有鈔四十七貫七百五十文耀米麥豆只云米七斗麥八斗豆九斗各直二貫欲三色各停問該幾何答曰各六石三斗米價一十八貫麥價一十五貫七百五十豆價一十四貫法曰置鈔四十七貫七百五十文於上以米麥豆數相乘七斗乘八斗得五十六又以九斗乘得五百四乘上數得二万四千六十六為實卻以米價二貫乘麥八斗得一十六又乘豆九斗得一百四十四麥價二貫乘米七斗得一十四又乘豆九斗得一百二十
  hash: sha256:001be6324e0c46af7e85ac493df39b4dac5da1b517b88c64fb26b59bbfa572da
