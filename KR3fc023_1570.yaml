body:
  text: 中青十五兩除之得青價九貫五百文合問今有人分銀不知其數只云三人分五兩多一十兩四人分八兩多二兩問人銀各幾何答曰二十四人銀五十兩法曰以三人乘余兩得二十四兩以四人乘五兩得二十兩以少減多餘四兩爲約法又以三人乘四人得一十二人以盈十兩減盈二兩餘八兩乘得九十六兩爲人實又以盈十兩乘二十四兩得二百四十兩盈一兩乘二十兩得四十兩以少減多餘二百兩爲銀實俱以約法四兩除之合問今有官倉給米賬濟人戶每六戶共給八石盈十八石四
