body:
  text: 以每絹三尺一寸二分五釐除之得七千一百四十一兩三禾七分六釐為實以每絲一十二兩八禾為法除之得五百五十七匹九分二釐匹下九分二釐以匹法二丈八尺乘之得一丈五尺七寸六分合問今有芝麻六十二石一斗九升每二斗五升出油七斤每油八斤直鈔九百二十文問該鈔幾何答曰二百二貫四百二十八文四分五釐法曰置麻六十二石一斗九升乘出油七斤得四百三十五石二斗三升却以每麻二斗五升除之得油一千七百四十一斤三分二釐又以直鈔九百三十文乘之得一千六百一十九斤四分二釐七毫六絲為實以每油為法除之二百二貫四百二十八文四分五釐合問
