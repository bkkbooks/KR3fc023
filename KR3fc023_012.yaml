body:
  text: 博至理微妙殆非學意刨啓鍾儀坂算數之家心稱九章算法為宗世傳至書出于囷公然世既函件而無習而貫通者豫以草茅末學苗心算術蓋之者年密訪九章全書久未之見一旦幸謢寫本至目二百回又者六內方田粟米寡分不過乘除互換人皆易曉若少廣之截多益少開平方圓商功之侑築堆積均輸之遠迫勞歸學法頠難玉于盈朏方
