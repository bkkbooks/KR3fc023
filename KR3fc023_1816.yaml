body:
  text: 万寸勾弦較戶高多光六十八步折半得三十四寸自乘得一千一百五十六寸倍之得二千三百一十二寸以减積一万寸餘七千六百八十八寸折半得三千八百四十四寸開方除之得弦六十二寸以减半較三十四寸餘二十八寸爲勾即戶廣加較六十八寸其得九十六寸爲戶高合問邑方不云大小各中開門此門外二十步有木出南門十四步折而西行一千七百七十五步木紋邑方幾何
