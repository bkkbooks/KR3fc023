body:
  text: 庚府四萬一百十二石八斗一升二合勺五法曰置米石一以行道黑五因之得爲法甲府至輸所一千二百里以脚錢四十文因之得四十八貫以法五除之得六百文併入石價共得三十五貫除本府民一千九百二十五里得衰五十五乙府至輸所一千五百六十里以脚錢四十文因之得六十一貫四百文以法五除之得一十二貫四百八十文併入石價共得四十一貫除本府民一千七百六十三里得衰四十三丙府至輸所一千二百八十里以脚錢四十文因之得五十五貫二百文以法五除之得一十一貫四十文併入石價共得二十九貫除本府民一千五百九十九里得衰四十一丁府至輸所八百七十五里以脚錢四十
