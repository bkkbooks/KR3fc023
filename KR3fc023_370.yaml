body:
  text: 法曰以粺米二十七乘糲米一十九斗二升以分母七分通之得一千三百四十四加分子一共一千三百四十五得三万六千三百一十五爲實糲米率三十以原通分母七通得二百一十爲法除之合問問糲米六斗四升五分升之三爲糲飰幾何荅曰一石六斗一升五合法曰以糲飰七十五乘糲米六斗四升以分母五通得三百二十加分子三共三百二十三得二万四千二百二十五爲實以糲米三十以分母五通得一百五十爲法除之問糲飰七斗六升七分升之四爲飱幾何荅曰九斗一升三十五分升之三十一法曰以飱九十乘糲飰七斗六升以分母七通得五百三十二加分子四共五百三十六得
