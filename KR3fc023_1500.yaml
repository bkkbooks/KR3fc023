  text: 公多少馬和驢荅曰馬一十四匹支七斗驢一十匹支二斗法曰置馬驢二十四匹每匹支二升共四十九升以减共支九斗餘剩四斗二升爲實以驢支二升减馬支五升餘三升爲法除之得馬一十四匹减総数餘得驢一十匹合問騾行七里馬行九先放騾行七里走次後馬走趕騾行幾里相隨一處有荅曰三士里半法曰置馬行九里以乘騾先行七里得六十三里爲實以騾行七里减马行九里餘二里为法除之合問一輛車兒尺五高推徃西京走一遭徃來行該七百里問
