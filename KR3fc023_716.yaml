body:
  text: 一万九百二十北棧二千七百六十五以二因得五千五百三十副併得三万一千六百五十為法以所分鈔三十七百九十八貫乘未併者東棧得五千七百七十二万千六百西棧得四千一百四十七万四千一百六十北棧得二千一百万二千九百四十各自為列實以法除之合問今有納夏稅絲三千六百二十八兩八錢每絲八兩準綿十兩絲一斤折小麥一石絲一斤四兩折絹一匹匹法二丈二尺今要一分絲二分綿三分小麥四分絹問各納幾何答曰絲二十三斤十兩綿四十七斤四兩小麥七十石八斗七升五合絹七十五匹一丈九尺二寸
