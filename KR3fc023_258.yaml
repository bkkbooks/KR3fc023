body:
  text: 十六各其平也各平於三百四十分之一百六十三合問乘分今有鉛七斤四分斤之三每一兩六錢換鐵一十五斤八分斤之五問圜鐵幾何答曰一百二十一斤三七二分斤之二法曰分母各乘其全分子從之置鉛七斤以四分乘得二十八加內子三共得三十一又一十五斤以八分乘得一百二十以分子五共得一百二十分相乘得三千八百七十五為實以分母四分八分相乘得二十二分為法除之合問今有紬三匹七分匹之四每匹價鈔八貫五百六十一文九分文之七問該鈔幾何答曰三十貫五百七十七文九分文之七法曰置紬三匹以分母七通之加分子四共得二十五又置匹價
  hash: sha256:e7220651efd04e4d5ef235cc2914c0418f48c3bd818f84d9f158264b2a3c247f
