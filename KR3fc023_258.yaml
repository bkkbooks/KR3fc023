body:
  text: 十六各其平也各平於三百四十分之一百六十三合問乗分今有鉛七斤四分斤之三每一兩六錢換鐵一十五斤八分斤之五問圜鐵幾何荅曰一百二十一斤三七二分斤之二法曰分母各乗其全分子從之置鉛七斤以四分乗得二十八加內子三共得三十一又一十五斤以八分乗得一百二十以分子五共得一百二十分相乗得三千八百七十五爲實以分母四分八分相乗得二十二分爲法除之合問今有紬三疋七分疋之四每疋價鈔八貫五百六十一文九分文之七問該鈔幾何荅曰三十貫五百七十七文九分文之七法曰置紬三疋以分母七通之加分子四共得二十五又置疋價
  hash: sha256:1b7bdae6dce0ad718fd421b0c4d03614054a7e53f1edadec4cae04f93939c2ff
