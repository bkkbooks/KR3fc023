body:
  text: 直田一畒無零字不知長闊如何是長中添二約之了恰當平步八分二答曰長三十步闊八步法曰通田一畒得二百四十步以長添二步得長八分闊二分約之得田長三十步添二步共三十二步以八約得四步乃二因得闊八步合問今有直田不知畒兩隅相去十三步長內減平餘有七問公此法如何取答曰該田二分五釐法曰置兩隅相去一十三步自乘得一百六十九步長減平餘七步自乘得四十九步以少減多餘一百二十步折半畒法而一合問今有直田不知畒長闊相和十七步平不及長草五尺請問田該多少數答曰該由二分五釐
  hash: sha256:ff64f331b31d03e82741ead326b4ae6973974e96ced86eeb5fc7ea8880848ac0
