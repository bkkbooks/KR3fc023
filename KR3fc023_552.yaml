body:
  text: 數一万六千兩餘六千一百二十兩為實以金重十六兩減錫重七兩餘九兩為法除之得六百八十寸為錫方以七兩乘之得二百九十七斤八兩為錫重又置一千寸減錫六百八十寸餘三百二十寸為金方再置六百一十七斤八兩減鐵重二百九十七斤八兩餘二百二十斤為金重合問今有金五塊共重七十一兩成色不等內九分五厘色者九兩九分色者一十四兩八分五厘色者五兩八分色者一十三兩七分色者三十兩欲同煉一處問得成色幾何答曰八分法曰置各率目乘九分五厘乘九兩得八兩五十五分九分進一十四兩得一十二兩六三八分五厘乘五兩得四兩二十五分乘一十三兩得一十四兩四分七厘乘三十兩得
