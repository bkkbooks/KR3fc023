body:
  text: 法曰與前法同倍寶合問如意立法六貫二百一十錢買却松不全每株牙錢三文足無錢就准一株答曰四十六株價一百三十五文法曰置錢六千二百一十以牙錢三文除之得二千七十為寶以開乎方法除之得四十五株餘寶四十五得一株十六株合問借了一斤三兩絮還他一十四兩綿二般價鈔曾相併百六十五文錢答曰綿兩價九五文絮兩價七十文法曰置絮一十九兩以相一百六十五文乘之三千一百三十五文為寶
