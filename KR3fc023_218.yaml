body:
  text: 又法腰九步自乗得八十一歩八乗九而一今有錠腰田正中兩角相去斜長二十四步四面曲各周一十八歩四面兩角相去空徑十六歩三十三分歩之二十二問爲田幾何荅曰一百四十四步法曰置一面兩角相去空徑一十六步以分毋三十三通之加分子三十二共得五百六十自乗得三十一万三千百又以分毋三十三減分子三子二一乗分子亦得三自乗得一千八十九爲法除之得二百八十八折半合問又法倍一面曲周得三十六自乗得一千二百九十六九而一
