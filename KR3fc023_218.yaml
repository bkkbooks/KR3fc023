body:
  text: 又法腰九步自乘得八十一步八乘九而一今有錠腰田正中兩角相去斜長二十四步四面曲各周一十八步四面兩角相去空徑十六步三十三分步之二十二問為田幾何答曰一百四十四步法曰置一面兩角相去空徑一十六步以分毋三十三通之加分子三十二共得五百六十自乘得三十一万三千百又以分毋三十三減分子三子二一乘分子亦得三自乘得一千八十九為法除之得二百八十八折半合問又法倍一面曲周得三十六自乘得一千二百九十六九而一
