body:
  text: 三分乗五分得一十五分爲法實如法而一得一十八步合問問田廣十八步七分步之五縦二十三步十一分步之六爲田幾何荅曰一畆二百步十一分步之七法曰分毋各乗其全分子從之置廣十八步以七分乗加分子五共得一百三十一桀二十三步以十一分乗加分子六共得二百五十九相乗一百三十一乗二百五十九共得三万三千九百二十九爲實以分毋十一分七分相乗得七十七爲法實如法而一得四百四十步餘四十九法實皆以七約之皆十一分之七如畆法而一合問問田廣七分步之四縦五分步之三爲田幾何荅曰三十五分步之十二
