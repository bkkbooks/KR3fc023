body:
  text: 啇數即原法數也名曰方法於本積內去其一方命上啇除實法實視呼以確積數乃二乘方法一退為廉一方帶兩盒以直其壯如廢故二乘退位下法再退下法即㝎之算再退垂㝎於上啇之次續啇第二位得數與上意同於廉法之次照上啇置隅一方帶二廉正一角角即名隅以隅廉二法亦原乘之法也皆命上啇除實二乘隅法併入廉法一退億隅入廉作一大方以求次位得數下法再退前意啇置第三位得數下法之上照上啇置隅以廉隅二法皆命上啇數除實第二位啇意同得平方一面之數更有不盡之數依第二位體面而倍入廉根而啇之積七萬一千八百二十四步問平方一面幾何答曰二百六十八步
