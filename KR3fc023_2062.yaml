body:
  text: 今有人支銀四錢五分又支三錢四分又支三兩五錢問共該幾何荅曰四兩二錢九分法曰置錢九圖用銅錢九箇若遇問分只動分圖上一箇錢至扵千萬皆然先下四尔將銅錢置錢圖異四上又將五分置分圖中五上再加二尔四分將錢圖異四改作兊七外有四分扵分圖內起中五改作離九再加三兩五尔置兩圖下異四却除錢圖內兊七改作坤二共得四兩二尔九分合問今有白米五百七十六石毎石價鈔三貫問該鈔幾何荅曰一千七百二十八貫
