body:
  text: 除七百一十五步餘七百二十九步為實以開平方法除之得截廣一十七步併北廣三十八步共得六十五步折半得三十二步半以除截田得長五十五步合問今有圓田直徑一十三步今從邊截積三十二步問所截弦矢各幾何答曰弦一十二步矢四步法曰倍截積得六十四步自乘得四千九十六步為實四因截積得一百二十八步為上廉四因直徑得五十二步為下廉以五為負隅開三乘方法除之上啇四步以負隅五得二十以餘下廉五十二餘三十二又以上啇步一遍乘上廉一百二十八得五百十二二遍乘下廉三十二得五百一十二得一千二十四與上啇四步實得矢四步
  hash: sha256:48de0b60df7fcad1078103446041bce6e15e3932648002451784fff0779a28d6
