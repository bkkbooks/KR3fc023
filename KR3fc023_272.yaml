body:
  text: 除七百一十五步餘七百二十九步爲實以開平方法除之得截廣一十七步併北廣三十八步共得六十五步折半得三十二步半以除截田得長五十五步合問今有圓田直徑一十三步今從邊截積三十二步問所截弦矢各幾何荅曰弦一十二步矢四步法曰倍截積得六十四步自乗得四千九十六步爲實四因截積得一百二十八步爲上廉四因直徑得五十二步爲下廉以五爲負隅開三乗方法除之上啇四步以負隅五得二十以餘下廉五十二餘三十二又以上啇步一遍乗上廉一百二十八得五百十二二遍乗下廉三十二得五百一十二得一千二十四與上啇四步實得矢四步
