body:
  text: 法曰置錢一千三百三十二文以米五升乘之得六十六石大斗以牙錢三文除之得三十三石三斗為實以開平方法除之得米一石八斗餘米九斗以該米一石八斗除之得回貼米五升乃一文數合問米麥相和九斗半麥到街頭賣一貫斗價相差十六文請問先生怎地算答曰米三斗一升二合五勺每斗價錢二百一十六文該三百六十二文半麥六斗三升七合五勺每斗價錢一百文該六百三十七文半法曰置錢以米麥九斗半除之得麥斗價一百文餘錢五十
