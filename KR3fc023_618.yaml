body:
  text: 文以差十六除得米三斗一升二合五勺以减相和餘得麥六斗三升七合五勺斗價一百加差十六得米斗價各乗合問綾絹共該三丈四筭定都銀五兩二其價差銀整八分不知二色多少是答曰絹三丈二尺七寸半尺價一錢五分綾一尺二寸五分尺價二錢三分法曰置銀五兩二尓以綾絹三十四尺除之得絹尺價一尓五分餘銀一尓以差除之得綾一尺二寸半尺價二尓三分减総数餘得絹三丈二尺七寸半合問兩十三石一斗米八升一合又一勺毎兩價直一升二欲
