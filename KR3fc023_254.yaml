body:
  text: 分子法四十二為分母合問今有綃二分匹之一匹法四十八尺得二十四尺三分匹之二三十二尺四分匹之三三十六尺五分匹之四三十八尺四寸減多益少幾何而平答曰減五分之四求之者二十九母互乘子求得一百九十二尚二十九每一得二寸即五尺八寸減四分之三求之者十七母互乘子求得一八十減十七即三尺八寸益二分之一求之者四十三母互乘子一二十益四十三即八匹六益三分之二求之者母互乘子一百六十益三六十得各平於二百四十分之一百六十三二百四十分比四十八尺每一分一寸分子一百六十三即三十二尺六寸
  hash: sha256:5324c35f0f5fdb6b9a6e4e94c053064c37f07feb9112cc625139ff8f0a8c94fa
