body:
  text: 分子法四十二爲分母合問今有綃二分疋之一疋法四十八尺得二十四尺三分疋之二三十二尺四分疋之三三十六尺五分疋之四三十八尺四寸減多益少幾何而平荅曰減五分之四求之者二十九母互乗子求得一百九十二尚二十九每一得二寸即五尺八寸減四分之三求之者十七母互乗子求得一八十減十七即三尺八寸益二分之一求之者四十三母互乗子一二十益四十三即八疋六益三分之二求之者母互乗子一百六十益三六十得各平於二百四十分之一百六十三二百四十分比四十八尺每一分一寸分子一百六十三即三十二尺六寸
  hash: sha256:6883dd0914b207bf85b47e65502092c64e75064f88c6e0abc52bd0437e1d1b5a
