body:
  text: 厘以畒法而一得一畒四分八厘四毫三絲七忽五微一今依圖截作三叚筭一叚直田長二十四步以闊八步乘之得一百九十二步一叚勾股田股長二十四步乘勾闊七步得一百六十八步折半得八十四步一叚勾股田股長一十五步乘勾闊八步得一百二十步折半得六十步併三位共得三百三十六步爲實以畒法而一得一畒四分合問今有環田積二畒五十五步是零多徑比二周皆不及中周八十七步過外周一百一十七中外周徑各幾何荅曰中周九十二步外周一百二十二步徑五步
