body:
  text: 得八一二五共四百十二斤八一二五得除之合問今有降香二百六十七斤毎三兩價鈔三貫五百文問該鈔幾何答曰四千九百九十四貫五百文法曰置香二百六十七斤以斤法十六通之加零九兩共得四千二百八十一兩爲實以毎三兩價三貫五百文爲法乗之得一万四千九百八十三貫五百文却以三兩爲法除之合問今有鈔一百四十貫七百五十文買物三十七秤八斤問一秤價鈔幾何答曰三貫七百五十文法曰此問即乗除不問斤價而問秤慣以秤率十五斤乗鈔一百四十貫七百五十文得二千一百一十一貫二百五十文爲實以物三十七斤通之加零八斤共得五百
