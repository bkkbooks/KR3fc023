body:
  text: 得八一二五共四百十二斤八一二五得除之合問今有降香二百六十七斤每三兩價鈔三貫五百文問該鈔幾何答曰四千九百九十四貫五百文法曰置香二百六十七斤以斤法十六通之加零九兩共得四千二百八十一兩為實以每三兩價三貫五百文為法乘之得一万四千九百八十三貫五百文却以三兩為法除之合問今有鈔一百四十貫七百五十文買物三十七稱八斤問一稱價鈔幾何答曰三貫七百五十文法曰此問即乘除不問斤價而問稱慣以稱率十五斤乘鈔一百四十貫七百五十文得二千一百一十一貫二百五十文為實以物三十七斤通之加零八斤共得五百
