body:
  text: 得二十三步四厘以開平方法除之得圓徑四步八分以五尺乘之得二十四尺折半得勾一十二尺自乘得一百四十四尺杆子一十六尺自乘得二百五十六尺併之得四百尺爲實以開平方法除之得索長二合問村南地面一株桑樹上搭索鎖腔羊踐了一畝八分地不知索有幾多長荅曰索長六十尺法曰通地一畝八分得四百三十一步以四因而一得五百七六步爲實以開平方法除之得徑二十四步以五尺乘之得一百二十尺折半得索長六十尺合問五尺瓦盆口口中恰着一方斗斗角四繋依盆借
