body:
  text: 法曰三數無零不下五數剩四下八十四七數剩六下九十共得一百七十四滿數一百五減之餘六十九合問八馬九牛十四羊趕在村南趂草場踐了王家一假榖議定陪他六石糧牛二隻比一羊四牛二馬可賠償若還算得無差錯姓字超群到處揚右鷓鴣天答曰馬三斗七升半共三石牛一斗八升七合半共一石六斗八升七合半羊九升三合七勺半共一石三斗一升二合五勺法曰置陪米六石為實併各率羊十四半十八馬三十二共六十四為法除之得九升三合七勺五升為一羊數以乘各率合問
