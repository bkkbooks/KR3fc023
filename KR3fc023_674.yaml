body:
  text: 法曰以所有粟六升太半升即三分升之二以分母三通之加分于二共得二十乘今有田一頃二十六畒以畒歩通之加零一百五十九歩共得三万三百九十九歩以乘二十得六十万七千九百八十爲實以所有田一畒通爲二百四十歩以原分母三乘得七百二十爲法除之得八百四十四升餘實三百法實皆六十約之合問保一歳價錢二貫五百文今先取一貫二百問當日幾何答曰一百六十九日二十五分日之二十三法曰以取保一歳作三百五十四日乘先取錢一千二百得四十二万四千八百爲實以原價錢二貫五百爲法除之一百六十九日餘實二千三百法實皆一百約之合問門貸錢一貫月息三十今貸百五十扵九日歸之求
