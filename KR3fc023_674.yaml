body:
  text: 法曰以所有粟六升太半升即三分升之二以分母三通之加分于二共得二十乘今有田一頃二十六畒以畒步通之加零一百五十九步共得三万三百九十九步以乘二十得六十万七千九百八十為實以所有田一畒通為二百四十步以原分母三乘得七百二十為法除之得八百四十四升餘實三百法實皆六十約之合問保一歲價錢二貫五百文今先取一貫二百問當日幾何答曰一百六十九日二十五分日之二十三法曰以取保一歲作三百五十四日乘先取錢一千二百得四十二万四千八百為實以原價錢二貫五百為法除之一百六十九日餘實二千三百法實皆一百約之合問門貸錢一貫月息三十今貸百五十于九日歸之求
