body:
  text: 毀于鄰烻而十存其六焉翁之長嗣怡庵庱士歎惜彌深輒命其季子名訥字仲敏而號循善者重加編較而印行之以上繼其父祖之素志又何其厚也然則披閲斯集而攻乎算藝者可不深念夫吳氏諸良更涉三世而其立心制衍一掃于忠厚有如是焉而必圖所以參
