body:
  text: 總旗每名三斗共六斗小旗每名二斗四升共二石四斗軍人每名二斗共二十石法曰置總米一百二十五石退除百戶鈔米三石餘米一百二十二万以八乘得米九十七石六斗二乘得麥二十四石四斗另置百戶鈔米三石以每石鈔五錠乘之得鈔一十五錠餘七石八乘得米五石六斗二乘得麥一石四斗以各率乘之合問今有鈔一百二十貫令五人分之只云甲乙人四六分之丙比乙少三貫併丙乙與丁同却不及戊九貫問五人各得幾何答曰甲二十四貫乙一十六貫丙一十
