body:
  text: 停無䛘大豆八升折粟六升折米尋常粟依本色莫悶殺庫司糧長右西江月答曰各一萬二千石米折粟二万石豆五千石本色粟一万二千法曰置粟四万七千石以三色率相乘豆八升粟米六升四斗八升以粟一乘得四石八斗以乘總粟得二十二万五千六百石為實却以粟一斗豆八升八斗豆八升粟米六升得四斗八升粟一斗乘米六升得六斗併得一石八斗八升為法除之得一万二千石乃三色等數以各率除之得粟合問三客入山採茗甲行三日一遭一行丙往隔雙朝效力步相倚靠乾茗共得兩稱五斤八兩無饒各行遞往論功勞請問各該多少右西江月
