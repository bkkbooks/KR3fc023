body:
  text: 和八十五步較三十五步法曰置較五平七相乗得三十五以較五乗之得一百七十五以平七除之得平二十五步自乗得六百二十五步加入直積八百七十五步共一千五百步爲實以平二十五步爲法除之得長六十步併長平得和八十五步長減平得較三十五步合問直積加長減平步一千五百三十五五平內減長較和餘有三十無差惧荅曰長六十步平二十五步和八十五步較三十五步法曰置較和三十步以平五乗之得一百五十以平五自乗得二
