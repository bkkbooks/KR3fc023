body:
  text: 中五百五三減一十五將中五改作震三却將次位震三改作艮八乹六千五四減二十將乹六減作異四寫筭先要書置烙將實数扵上橫寫法数扵右直寫法實拓乎填寫挌內得数從下小数起遇十進上合問寫筭先湏仔細看物錢多少在毫端就填圖內依書数加減乗除緫不難今有紵絲七百疋毎疋價鈔二百三十四貫五百六十七文八分九厘問該鈔幾何荅曰一十六萬四千一百九十七貫五百二十三文法曰置紵絲七百疋爲實以毎疋價鈔二百三十四貫五百六十七文八分九厘爲法因之得一十六万四千一百九十七貫五百二十三文合問
