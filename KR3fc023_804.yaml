body:
  text: 第四等戶出數就八因得一石二升四合乃第五等戶出數各以本等戶數得逐等米數合問今有銀七千三百八十七兩令五人從下作二八分之問各得幾何答曰甲一千七百九十二兩乙四百四十八兩丙一百一十二兩丁二十八兩戊七兩法曰置二千三百八十七兩為實以各戶從戊起遞以二八差乘之為衰戊得二丁得八丙得三十二乙得一百二十八甲得五百一十二並之得六百八十二為法除之得三兩五粟為一分之數以乘各衰合問
