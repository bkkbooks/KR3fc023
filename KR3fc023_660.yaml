body:
  text: 西鄉一百一十二人一万二千一百八十五分人之四千四南鄉一百二十九人一万二千一百七十五分之八千七百九法曰各列置衰北鄉八千七百五十八西鄉七千二百三十六南鄉八千三百五十六副併得二万四千三百五十為法以所分徭三百七十八乘未併者得三百三十一万五百二十四西鄉得二百七十三万五千二百八南鄉得三百一十五万八千五百六十八各自為列實以法二万四千三百五十除之不滿者法者法實皆折半合問大夫不雯簮裊上造公士五人均錢一百文欲令高爵出少以次漸多大夫出五分之一不更出四分之一簮裊出三分之一上造出二分之一公士一分之一問各出幾何
