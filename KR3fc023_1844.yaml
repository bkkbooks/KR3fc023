body:
  text: 今有直田勾弦和取七分之四股弦和取七分之六二数相减餘二十二步又股弦和取三分之一不及勾弦和八分五一十四步問勾股弦各幾何荅曰勾二十一步股二十八步弦三十五步法曰置前分毋七分七分相乘得四十九以乘除二十二步得千七十八步乃是四十二千股弦和內减二十八千勾弦和餘数又以後分毋三分八分相乘得二十四以乘不及一十四步得三百三十六乃是八千股弦和减一十五千勾弦和餘数也如方程正負入之勾弦和二十八爲法股弦和四十二得六百三十一千七十八勾弦和十五爲法股弦和八得一百二十四三百三十六
  hash: sha256:4428563b3c04ee05ddf91b1033d2839490eec10a6261761bd55a9185678f7fc2
