body:
  text: 之加分子一十五共一万四千四百以乘廣得一百九十七万二千八百為實以分毋相乘得八千二百一十為法除之得二百四十步一合問今有直田廣二步一十分步之九縱九十七步四十九分步之四十七問為田幾何答曰一畒法曰置廣步以分毋二十乘之加入分子九共得四十九縱九十七步以分毋四十九乘之加入分子四十七共得四十八百以乘廣得一十三万五千二百為實分毋相乘得九百八十為法除之得一百四十步為一畒合問今有直田廣三十二步併縱斜共一百三十八步問田幾何答曰八畒
