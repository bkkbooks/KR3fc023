body:
  text: 法曰置所有絹一十二疋以疋法四十尺通之加零二丈八尺共得五百八尺折半得二百五十四尺爲實以所求價五百二十文倍之得一貫四十文爲法加之合問求一除法求一者求分毋一数居首而爲法也盖定身除若法更位皆一不待也或二三四五六七八九者居首非一也乃法折或倍必求一数居首而以定身除筭之但毋法折倍則斯数亦湏折倍下筭重復不若㷌除捷徑不必李也所求一㷌能烝九㷌定身除歸除三法変者亦不可不知耳求一明教置兩停二三折半四因三五之以上二因見去一除零要定身今有米二十三石四斗五升七合四勺糶鈔三十八貫問毎貫該米機何荅曰六斗一升七合三勺
