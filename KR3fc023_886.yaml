body:
  text: 之恰盞欲問共該多少推窮妙法門庭知公能筭維橫此法不難易醒右西江月答曰一百五枚法曰以三枚與五枚相乗得一十五再以七箇乗之合問張宅三女孝順歸家頻望勤勞東村大女隔三朝五日西村女到小女南鄉路遠依然七日一遭何朝齊至飲香醪請問英賢回報右西江月答曰一百五日同會法曰與前法相同靜棟綿花婵經相合共顧王孀九斤十二是長昌李德五
