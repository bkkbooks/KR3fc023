body:
  text: 法曰置各等戶数以從上逓以四六差乗之爲衰第一等以百二半乗得四千八百六十第二等以一百三十五乗得四千二百二十第三等以九十乗得四千一百四十第四等以六十乗得三千六百第五等以四十乗得三千八十各列置衰第一等四千八百六十第二等四千二百一十第三等四千一百四十第四等三千六百第五等三千八十副倂得二万爲法以所輸絹一百五十疋乗未倂者各自爲實第一等得七十二万九千第二等得六十四万八千第三等得六十二万一千第四等得五十四万第五等得四十六万二千以法除之餘實與法約之合問今有鈔六百七十二貫六欲令甲九人乙七人丙五人丁四人逓以四分之各人得幾何答曰甲各得一十五貫二百文
  hash: sha256:be5090bb48d66e42051584fd5c6c4f56d98f554270f4b2aefc707bea31eb408c
