body:
  text: 法曰置各等戶數以從上遞以四六差乘之為衰第一等以百二半乘得四千八百六十第二等以一百三十五乘得四千二百二十第三等以九十乘得四千一百四十第四等以六十乘得三千六百第五等以四十乘得三千八十各列置衰第一等四千八百六十第二等四千二百一十第三等四千一百四十第四等三千六百第五等三千八十副並得二万為法以所輸絹一百五十匹乘未並者各自為實第一等得七十二万九千第二等得六十四万八千第三等得六十二万一千第四等得五十四万第五等得四十六万二千以法除之餘實與法約之合問今有鈔六百七十二貫六欲令甲九人乙七人丙五人丁四人遞以四分之各人得幾何答曰甲各得一十五貫二百文
  hash: sha256:7d7279245f2bc0ec606173d08be7eb6d47f0df88fa4fac346c7b3579338b59b6
