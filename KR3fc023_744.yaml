body:
  text: 置衰甲七千六百八十乙四千二百六十丙一千八百四十丁八百四十副並得一万四千六百二十為法以所輸絲三百乘未並者各自為實甲得二百三十万四千乙得一百二十七万八千丙得五十五万二千丁得二十五万二千以法一万四千六百二十除之餘實與法各二十約之合問今有鈔三百六十貫分給甲六人各支四分乙八人各支二分丙十人各支一分問各得幾何答曰甲各得二十八貫八百文乙各得一十四貫四百文丙各得七貫二百文法曰置各等戶以各分乘之為衰甲六人得二十四乙八人得一十六丙十
