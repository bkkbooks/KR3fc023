body:
  text: 實併分毋二人三人得五折半得二半以減總人七八餘得四人半却以分毋二人三人相乘得六乘之得二十七為一差之法實如法而一得三貫為一差之數置甲乙矷均七十七貫加一差三貫共八十貫折半得四十貫為甲所得之數遞減二貫得各數合問今有馬軍七人給腿裙給二匹二丈步軍六人給胖襖絹四匹三丈二尺匹法三十八尺今共有絹六千六百二十二匹四尺欲給馬步軍適等問各幾何答曰各五千六百七十人法曰置人為分毋絹為分子互乘七八乘一百八十四尺得一千二百八十八六人乘九十六尺得五百七十六併之得一千八百六十四為法置絹六千六百
