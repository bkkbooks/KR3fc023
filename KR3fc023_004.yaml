body:
  text: 微妙無窮不有精于是法者注書以為筌蹄則初學之士將何由而得其藴與哉算學自大撓以來古今凡六十六家而十書今巳無傳惟九章之法僅存而能通其說者亦鮮矣錢唐吳君信民精于算學者病算法無成書乃取九章十書與諸家之說今類注釋會穳成編而
