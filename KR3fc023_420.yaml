body:
  text: 今有菜子八斗四升壓油三十一斤八兩只有菜子四石三斗二升問該油幾何答曰一百六十二斤法曰以只有菜子四石三斗二升乘壓油三十一斤半得一百三十六斤零八該一兩二錢八分為實以原菜子八斗四升為法除之合問今有油一百六十二斤用菜子四石三斗二升只有油三十一斤八兩問該菜子幾何答曰八斗四升法曰以只有三十一斤八兩乘菜子四石三斗二升得一十三石六斗八合為實以原油一百六十二斤為法除之合問
