body:
  text: 今有菜子八斗四升壓油三十一斤八兩只有菜子四石三斗二升問該油幾何答曰一百六十二斤法曰以只有菜子四石三斗二升乗壓油三十一斤半得一百三十六斤零八該一兩二錢八分爲實以原菜子八斗四升爲法除之合問今有油一百六十二斤用菜子四石三斗二升只有油三十一斤八兩問該菜子幾何答曰八斗四升法曰以只有三十一斤八兩乗菜子四石三斗二升得一十三石六斗八合爲實以原油一百六十二斤爲法除之合問
