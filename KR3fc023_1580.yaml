body:
  text: 石共三十九石五斗利加四得五十五石三斗添次返還米一十八石七十三石三斗利加五得一百九石九斗五升添次返還米一十一石共一百二十石九斗五升利加六得一百九十二石五斗二升添次返還米一十四石餘米石五斗六升二百一十二石八升爲實次置初返米一石加二得一二斗加三得一石五斗六井加四得二石一斗八升四合加五得三石二斗七升六合加六得五石二斗四升一合六勺內減去初返米一石餘四石二斗四升一合六勺爲法除之合問詩詞二十幾問一客專行買賣持銀出外經營每年本利對相停一歲歸還五錠爲客到今七載本息俱盡無零聞公能妙縱橫莫得徉推不醒右西江月
