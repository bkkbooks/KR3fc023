body:
  text: 米三斗二升换鹽九斤問該鹽幾何答曰一千五十四斤十一兩法曰置稻穀九十三石七斗五升乘出米一斗六升得一百五十石却以每四斗除之得三十七石五斗又以換鹽九斤因之得三十三石七斗五升為實以每米二斗二升為法除之得一千五十四斤六分八釐七毫五絲斤下分數加六為兩合問今有絹六千九百七十四尺每三尺一寸二分五釐換絲三兩二錢每絲十二兩八錢換紗一匹長二丈八尺問該紗幾何答曰五百五十七匹二丈五尺七寸六分法曰置絹六千九百七十四尺乘換絲三兩二錢得二万二千三百一十六兩八禾卻
