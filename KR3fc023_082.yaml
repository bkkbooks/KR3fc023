body:
  text: 法曰置廣五步以分母二通之加分子一共十一又置縱八人步分母三通之加分子二共二十六與廣相乘得二百八十六折半得一百四十三為實以分母二分之分相乘得六為為法除之得二十三步餘實五以法命之得六分之五合問斜田南廣三十步比廣四十二步縱六十四步為田幾何答曰九畝一百四十四步併兩廣乘縱折半併兩廣乘半又折半乘正縱法曰併兩廣兩廣三十步北廣四十二步共七十二長以乘縱六十四步併四千六百八步折半得二千三西四步以畝法而一得九畝餘一百四十四步合門斜田正廣六十五步一畔縱七十二步一畔縱一百步為
