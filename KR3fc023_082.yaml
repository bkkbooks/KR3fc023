body:
  text: 法曰置廣五步以分母二通之加分子一共十一又置縱八人步分母三通之加分子二共二十六與廣相乗得二百八十六折半得一百四十三爲實以分母二分之分相乗得六爲爲法除之得二十三步餘實五以法命之得六分之五合問斜田南廣三十步比廣四十二步縱六十四步爲田幾何荅曰九畆一百四十四步併兩廣乗縱折半併兩廣乗半又折半乗正縱法曰併兩廣兩廣三十步北廣四十二步共七十二長以乗縱六十四步併四千六百八歩折半得二千三西四歩以畆法而一得九畆餘一百四十四歩合門斜田正廣六十五步一畔縱七十二步一畔縱一百步爲
