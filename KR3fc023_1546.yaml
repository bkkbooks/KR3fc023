body:
  text: 金輕十三兩將差六兩半以乗金九得五十八兩半爲實以銀十一减金九餘二爲法除得銀重二十九兩餘兩以兩銖通之得十二銖以二除得六銖加金輕十三兩二除得六兩半其半兩得十二銖共得金重二斤三兩十八銖合問十斗曰中故有糲米不云其数添粟蒲而春之共得米七斗問新故米各幾何答曰故米二斗五升新米四斗五升法曰此問乃互換之法以糲米三十减粟率五十餘爲糠率二十得粟七斗减曰積十斗餘爲糠實三斗乗所求糲率三十得九十爲實以所有糠率二十爲法除得新米四斗五升减其米
