body:
  text: 今有甲出絲五斤八兩乙出絲四斤三兩丙出絲三斤一兩丁出絲二斤十四兩共織得絹一十二疋二丈問各人得絹幾何答曰甲四疋一丈六尺乙三疋一丈四尺丙二疋一丈八尺丁二疋一丈二尺法曰各列置衰甲五斤八兩乙四斤三兩丙三斤一兩丁二斤十四兩各通爲兩副併得二百五十兩爲法以所分絹八十二疋以疋法通得四十八丈加第二丈共五十丈乘未併者各自爲列實甲得四千四百乙得三千三百五十丙得二千四百五十丁得二千三百兩以法除之合問今有甲乙丙丁四人共支塩甲四千三百六十引乙三千
