body:
  text: 爲實以股弦較矢闊一步除之如故加矢闊一得徑一十步以三因得周三十步如徑五十步矢闊一步該紡長一十四步半之得七步自乘得四十九步以闊一步除之如故加矢闊一步得徑五十步以三因得周一百五十步合問假有坡地一叚中間乙買安瑩總該一畝二分平更有八厘相應只要縱多兩堵每堵八尺無零築牆選日顧工興幾許封堆可定答曰東西一十二堵南北十堵長一十九步四尺闊一十六步法曰置田一畝二分八厘以畝步通之得三百七步二分爲實以縱多
  hash: sha256:52388e63c411bc4da2f6377aa291546ea5b9257b608f027f9546f2617e84c256
