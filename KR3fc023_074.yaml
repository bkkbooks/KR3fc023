body:
  text: 錢唐南湖後學警民編撰方田計二百一問田畒相乘為積方田方自乘直田廣從相乘圭田勾田梭田半梭田廣從相乘折半斜田箕田梯田箭答田箭翎田併兩廣兩從折半畹田丘田盆田笟田碗田凹田凹問米四而一圓田一曰外問自來十二而一二曰問自染一之四而一三曰半問半徑零弧田覆用田問弦矢折半以乘矢環田併中外周折半乘問錢田自米二之內而一內自米火塘田湖方自乘內圓徑自乘三田四而一餘為積三廣田鼓田鼓田併折半加入中長以乘正長折半二不等田併二長折半乘下問四不等田併二廣併乘八不等田以正
