body:
  text: 餘實一貫八百文不滿一斤之數秪可求之為兩若以斤價紐兩價求之算不勝其繁也故用斤法十六兩乘餘實得二十八貫八百文仍以椒價四貫六百八文除之又得六兩尚餘一貫一百五十二文又不及兩價秪當求之為銖如何前以兩法二十四銖乘餘鈔得二十七貫六百四十八文仍以椒價四貫六百八文除之得六銖今有錢五貫六百四十文買梨一萬六千九百二十枚問每文得幾何答曰一錢買三枚法曰此問糸率為實物本位法今實不蒲法當以物為實糸為法示答初者知變通之道者也置梨一万六千九百二十六枚為實以錢五貫六百四十為法除之合問異乘同除
  hash: sha256:30c88f409b7ff436c78f4e1c7d082db95fe1b21f1ce908017548dd982a686785
