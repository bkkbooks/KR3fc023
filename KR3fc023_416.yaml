body:
  text: 餘實一貫八百文不滿一斤之数秪可求之爲兩若以斤價紐兩價求之筭不勝其繁也故用斤法十六兩乗餘實得二十八貫八百文仍以椒價四貫六百八文除之又得六兩尚餘一貫一百五十二文又不及兩價秪當求之爲銖如何前以兩法二十四銖乗餘鈔得二十七貫六百四十八文仍以椒價四貫六百八文除之得六銖今有錢五貫六百四十文買梨一萬六千九百二十枚問每文得幾何答曰一錢買三枚法曰此問糸率爲實物本位法今實不蒲法當以物爲實糸爲法示荅初者知变通之道者也置梨一万六千九百二十六枚爲實以錢五貫六百四十爲法除之合問異乗同除
  hash: sha256:79d48b741624696a31600cda6d07302a17f6da3db0a73c906551a0d2c428121d
