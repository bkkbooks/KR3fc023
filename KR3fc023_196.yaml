body:
  text: 法曰併內曲一十四步外曲二十二步共三十六步以頭廣乘之得一百四十四步折半得七十二步合問今有曲尺田東長五十步南闊六步北闊長四十步西闊八步問為田幾何答曰二畒五分零二十法曰置東長五十步乘南闊六步得三百又列北長四十步乘西闊八步得三百二十步併之得六百二十步為實以畒法而一得二畒份一十合問今有鞋底田頭闊一十七步腰闊一十四步尾闊一十五步底長四十八步問為田幾何答曰三畒法曰二乘腰闊一十四步得二十八步實頭闊一十七步尾
  hash: sha256:74a0a4a599a812700c50ec5cb6e995a2a602299e27c19e1aac45f8340b682f5c
