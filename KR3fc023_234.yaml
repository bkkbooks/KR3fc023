body:
  text: 為法乘之得一千五百七十五步以畒法除之合問今有車輞田外彎三百七十三步半內彎二百二十六步半闊九步問為田幾何答曰一十一畒六十步法曰置外彎三百七十二步半內彎二百二十六步半併之得六百步折半得三百步為實以闊九步為法乘之得二千七百步以畒法除之合問約分今有羅二十四分匹之九匹法四十八尺得一十八尺問約之得幾何答曰八分匹之三即一十八尺法曰列置分母二十四在上分子九在下數不可半也以少減多先以九
  hash: sha256:c06040ab4616c5ad4200d8ddb0dd06ce5ce682582d05c8cecaa280558b55ec44
