body:
  text: 大器五斗小器五斗一石五斗五升一斗五升少二斗維萊盆一石敢五斗五升得五十五不是二斗乘大器五斗得一十併得六十五爲實又以極一石乘六器二斗五升得二十五不是二斗乘小器五斗得一十併得三十五亦爲實併盈一石不足二斗得一百二十爲法除二實各不滿法皆五約之得數合問比類一十五問盈不足今有人分銀不知其數隻雲人分四兩剩一十二兩人分七兩少六十兩問銀及人各幾何答曰銀一百八兩人二十四法曰以盈十二乘人分七得八十四不足六十乘人分四得
  hash: sha256:6517273483c1f79655ed635fe1ab7493cbf54a1c6d7ace68cfc455442f852592
