body:
  text: 法曰各列置衰甲乙各七兩五副併得一十九爲法置錢一百减不五文餘九十五文爲實以法除之得五文爲錢率以乗各差三客共分百果其中分教兠荅甲雖多丙二十八乙数實難及甲當在三分之二煩公用意詳察果然筭得的無差問公湏用甚法右西江月答曰甲四十八枚乙三十二枚丙二十枚法曰各列置衰甲丙各三分乙二分副併得八分爲法置果一百加八共一百二十八爲實以法除之得一十六爲果率以乗各差疑三十二甲得四十八減二十八內的二十合問會約萬七千臨倉馬軍支料步支粮三分
  hash: sha256:347c87b06a49021a6a9b7606a2d91dd99711dbf45d69a737d5fb4a80d7d16df4
