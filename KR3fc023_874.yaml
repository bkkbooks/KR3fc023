body:
  text: 法曰各列置衰甲乙各七兩五副併得一十九為法置錢一百減不五文餘九十五文為實以法除之得五文為錢率以乘各差三客共分百果其中分教兜答甲雖多丙二十八乙數實難及甲當在三分之二煩公用意詳察果然算得的無差問公須用甚法右西江月答曰甲四十八枚乙三十二枚丙二十枚法曰各列置衰甲丙各三分乙二分副併得八分為法置果一百加八共一百二十八為實以法除之得一十六為果率以乘各差疑三十二甲得四十八減二十八內的二十合問會約萬七千臨倉馬軍支料步支糧三分
