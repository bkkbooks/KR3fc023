body:
  text: 第三等七十六戶每戶三分問各等銀幾何答曰第一等每戶一兩九錢八分共六十二兩七二分第二等每戶一兩四錢共六十一兩六第三等每戶八錢四分共六十三兩八四分法曰置各等戶數以各分乘之為衰第一等三十二戶以七分乘得二百二十四第二等四十四戶以五分乘得二百二十第三等七十六戶以三分乘得二百二十八各列置衰一等二百二十四二等二百二十三等二百二十八副並得六百七十二為法以所輸銀一百八十八兩一六分乘未並者各自為實一等得四万二千一百四十七兩八四分二等得四万一千三百九十五兩二三等得四万二千九百兩四八分以法六百七十二除之得各等共數却以各戶除之合問
