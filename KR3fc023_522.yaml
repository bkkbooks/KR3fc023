body:
  text: 四得一升三合六分合之二茶五得一升四合七分合之二麫六得一升三合九分合之三共併得六升五合餘分母子依合分法油三分之一鹽六分之二茶七分之二麫九分之三列置三分六分七分九分之一之二之二之三子互乗母先以之一乗六分七分九分得三百七十八之二乗三分七分九分得二百七十八之二乗三分六分九分得三百二十四之三乗三分六分七分得三百七十八又併之得一千四百五十八爲實以分母相乗三分乗六分得一十八又乗七分得一百二十六又乗九分得一千一百三十四爲法除之得一合併前共得六升六合餘實三百二十四法實皆約之得十四分之四以分母十四乗原米七石四斗五合四勺四抄得一百三石六斗七升六合一勺六抄爲實又以分母乗併米六升六合得九斗一升四合加分子四共得九斗二升八合爲法除
