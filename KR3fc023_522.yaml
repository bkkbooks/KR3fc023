body:
  text: 四得一升三合六分合之二茶五得一升四合七分合之二麵六得一升三合九分合之三共併得六升五合餘分母子依合分法油三分之一鹽六分之二茶七分之二麵九分之三列置三分六分七分九分之一之二之二之三子互乘母先以之一乘六分七分九分得三百七十八之二乘三分七分九分得二百七十八之二乘三分六分九分得三百二十四之三乘三分六分七分得三百七十八又併之得一千四百五十八為實以分母相乘三分乘六分得一十八又乘七分得一百二十六又乘九分得一千一百三十四為法除之得一合併前共得六升六合餘實三百二十四法實皆約之得十四分之四以分母十四乘原米七石四斗五合四勺四抄得一百三石六斗七升六合一勺六抄為實又以分母乘併米六升六合得九斗一升四合加分子四共得九斗二升八合為法除
