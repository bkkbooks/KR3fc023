body:
  text: 法曰置總絲六十四万一千八百四十七兩六錢內減巳徵四十五万六千八百八十七兩七錢餘一十八万四千九百五十九兩九錢以二次減巳徵餘八万六千九百六十七兩九錢復以二次減總絲餘得一万一千二十四兩一錢復以七次減巳徵餘得九千七百九十九兩二錢復減緫絲餘一千二百二十四兩九錢求其等也以等約之合問合力今有鈔一十七貫三百二十一文七分文之四又有鈔二十四貫九百六十二文三分文之一問併計幾何荅曰四十二貫二百八十四文二十一分文之五法曰置鈔一十七貫三百二十一文以分母七通之加內子四共得一百二
