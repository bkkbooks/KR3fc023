body:
  text: 今有杖鼔田四畝二十四步一百六十八分步之四十一南闊二七步六分步之五北閱三十二步七分步之六中闊一十八步三分步之二問正長几何答曰四十一步法曰通田四口畝方零二十四步得九百八十四步以分母一百六十八通加分子四十一共得一千六萬五千三百五十三以三乘之得四十九六千五爲實別置南闊二十五步以分母六通之加分子五一十五又互乘比闊分母七得一千八十五又乘中闊分母得千二百五十五比闊三十二步以分母七通之加分子六共二百十又互乘南闊分母六得一千二百八十又以中闊分母三之得四千一百四十中闊一十八步以分母三通之加分子
