body:
  text: 八十四厘乘之得二十一億二千四万二十五万一千一百三十六以圎法十二除之得一億七千七百二万九百二十八厘爲空積別置丙周三千三百五十三厘以圎法三除得七百八十四厘倍厚八厘得一十六厘併之共八百厘以三因得外周二千四百自乘得五百七十六万以高四百厘乘之得二十三億四百万以圎法十二除之得外周全積一億九千二百万以减空積餘得一千四百九十七万九千七十二厘以寸積一百万厘除之得一十四寸九分七厘九毫七忽二微又以銀寸重十四万乘之得二百万兩七七厘八忽减六見斤至斤上零爲兩合問今有玉園圎四寸五分厚二寸別置玉方寸重十二兩問重幾何答曰二斤八兩五錢
  hash: sha256:275b21ff52143ec83b1b6f249467cae07cf990c20fc9c4f6e51d02ded0d01be1
