body:
  text: 巳築髙八尺問上方幾何荅曰一十尺法曰置上方八尺减下方一十四尺餘六尺以髙一十二又除之得五寸爲法又置一十二尺减巳築髙八尺餘四尺爲實以法乗之得二尺加入上方八尺得一十尺合問今有築圓䑓一所上周一十二尺下周一十八尺髙八尺今巳築上周一十三尺五寸問該髙幾何荅曰六尺法曰置巳築上周一十二尺五寸减下周一十八尺餘四尺五寸以乗原髙八尺得三十六尺爲實以上周一十二尺减下周一十八尺餘六尺爲法除之得髙六尺合問今有圓錐下周三十六尺髙二十四尺欲截上周一十二
