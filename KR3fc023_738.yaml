body:
  text: 一万八百七十石一升以約率一万乘之得一億八百七十万八百為實以法除之二十七石乃上鄉上等每戶之數九因得二十三石四斗乃中戶之數又九因得二十一石六斗乃下戶之數又列上戶二十六石折半得一十三石乃中鄉上等每戶之數八因得一十石四斗乃中戶數又八因得八石二斗二升乃下戶數又列上戶一十三石折半得六石五斗乃下鄉上等每戶之數七因得四石五斗五升乃中戶數又七因得三石一十八升五合乃下戶數各以每戶之率各等戶得粟合問今有官輸銀一百八十八兩一錢六分令三等人戶出之第一等三十二戶每戶七分第二等四十四戶每戶五分
