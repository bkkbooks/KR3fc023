body:
  text: 五以乘上數得三千五百二十一万三千六百七十為實以三毋相乘六十三分乘九分得五百六十七又乘四分共得二千二百六十八為法除之得一万五千五百二十六步餘實七百二步法實五十四約之又以畒法除合問今有半梯田南闊一十一步北闊二十五步長四十七步問為田幾何答曰三畒一百二十六步法曰併南闊一十一步北闊二十五步共三十六步以乘長四十七步共得一千六百九十二步半之得八百四十六步為實以畒法除之得三畒一百二十六步合問今有二梯田西各長三十六步中闊一十二步南北各斜一十二步為田幾何答曰一畒一百九十二步
