body:
  text: 法曰置米照前以斛法乗之又以三因之得三千八百三十尺四寸以深一丈二尺六寸除之得百四內减上方八尺自乗得六十四尺餘二百四十尺爲實以上方八尺爲從方開平方法除合問今有方窖積米五百一十石七斗二升只云下方一丈二尺深一丈二尺六寸問上方幾何答曰八尺法曰置米照前以斛法乗之又以三因之却以深除之得三百四尺內减下方十一尺自乗得一百四十四尺餘一百六十尺爲實以下方一十二尺爲從方開平方法除之合問今有圓窖積米三百七十石只云上周四丈下周三丈問深幾何答曰九尺
  hash: sha256:4363e075fd7847e295f1e3d1459eec94050bcd73b6288f1f2e20f1b9cd3d8179
