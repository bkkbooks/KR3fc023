body:
  text: 何答曰米三十四石九斗五升一合每斗二百兩十四文麥三十二石二斗九升二合每斗二百兩十三文法曰置鈔一百六十三貫七百五十文為實以所耀米麥六十七石二斗四升三合為法除之每斗得賤價二百四十三文實不滿法為貴率餘買三百四十九文五分一釐乃均不盡之數為米三十四石九斗五升一合每斗增價一文得二百四十四文以實米三十四石九斗五升一合減法六十七石二斗四升三合餘為麥率三十二石二斗九升二合每斗二百四十三文合問今有鈔一千五百七十六貫一百文共買羅綾一百二十八匹二丈五尺二寸每匹四丈二尺只云羅比綾每匹多價一文問二價各幾何
