body:
  text: 何答曰米三十四石九斗五升一合毎斗二百兩十四文麥三十二石二斗九升二合毎斗二百兩十三文法曰置鈔一百六十三貫七百五十文爲實以所耀米麥六十七石二斗四升三合爲法除之毎斗得賤價二百四十三文實不滿法爲貴率餘買三百四十九文五分一厘乃均不盡之數爲米三十四石九斗五升一合毎斗增價一文得二百四十四文以實米三十四石九斗五升一合減法六十七石二斗四升三合餘爲麥率三十二石二斗九升二合毎斗二百四十三文合問今有鈔一千五百七十六貫一百文共買羅綾一百二十八疋二丈五尺二寸毎疋四丈二尺只云羅比綾毎疋多價一文問二價各幾何
  hash: sha256:6dd28caa3f5cb2ec497db7fe316999440aedd9f7c9ce0d28aec54c20778e164a
