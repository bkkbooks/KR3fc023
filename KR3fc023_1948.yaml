body:
  text: 和四十一步較九步法曰置併入原長四十五步約之得長二十五步平方面二十步自乗得四百步爲實以長二十五步爲法除之得平一十六步以長二十五步減平一十六餘得較九步併長平得和四十一步和問和步長平共積四步半数爲差會者便能囬荅筭中爲第一家荅曰長二十二步半平一十八步和四十步五分法曰置差四步半倍得九步以差四步半乗之得和四十步五分又四因四步半得平一十八步加差四步半得長二十二步半合問城門將次谷啓去閘方一尺不合恰二寸門廣如何識
