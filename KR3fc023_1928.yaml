body:
  text: 才可應筭中舉荅曰長七尺六寸八分五尺七寸六分法曰置勾十二尺十六尺相乘得一百九十二尺爲實以勾十二减十六餘四寸乘乃二五除得長七尺六寸八分又置勾二十自乘得一百四十四以二五除得闊五尺七寸六分合問一箇銀盆三尺周內容三雙水日毬有人下得穿心徑奪却筭中第一籌荅曰毬徑四寸六分五厘有奇法曰置周三尺得徑尺爲一尺乃三分之二爲勾得六寸六分六六毫七以乘一得六尺六寸六六厘七毫倍之得一十三尺三寸三分三厘回毫爲實以勾乘併得一百四十四寸以開平方法除
