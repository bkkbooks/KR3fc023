body:
  text: 十一文實不滿法者爲貴率餘實六方八千二百一銖乃均不盡之數以銖法除得一百一鈞二十七斤九兩十七銖增一文得石價八千五十二文以實一石一鈞二十七斤九兩十七銖減法一石二鈞二十八斤三兩五數餘一鈞九兩十二銖爲賤率合問問出錢一万三千九百七十文買絲一石二鈞二十八斤三兩五銖欲貴賤鈞率之荅曰七斤十兩九銖鈞價二千一十二文一石二鈞二十斤八兩二十銖鈞價二千一十三文法曰以所求絲一鈞即三十斤以銖斤一百八十四通之得一万一千五百二十銖乘錢數一万三千九百七十得一億六千九十三万四千四百銖爲實以所買絲一石二鈞一十八斤二兩以銖法通之加零五銖共得七万九千九百四十九銖爲法除之一乃
