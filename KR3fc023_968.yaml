body:
  text: 日一畒廣一步半三分步之一四分步之一五分步之一六分步之一問幾何答曰九十七步四十九分步之四十七法曰列置全步及分毋字照前法列而副併分毋自乗得七百二十以乗全步一分得七百二十分子之一得七百二十以全步積分七百二十通畒步得一十七萬二千八百爲實各以本毋除子照前法除併之得一千七百六十四爲法除之得九十七歩餘實一千六百力十二法實皆三十六約之合問田一畒廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一問幾何答曰九十二步一百二十一分歩之六十八法曰列置全步及分毋子照前法列而副併分毋自乗得五千四
