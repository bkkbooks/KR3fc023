body:
  text: 四畒得一十二併之共四十七爲以分相乘二畒乘四一十二又畒得六十又以收息一百乘之得六干爲寶以浃除之合問種耕凡一人日發七畒其一人日耕三畒其一人日耕五畒今令一人一日自發耕種問治田几何答曰一畒一百一十四步七十一分步之六十大法曰置畒爲分母人爲分子七畒三畒五畒於右一人一人一人於左以毋互乘子一人乘三畒又乘五畒得一十五一人乘七畒又乘五畒得三十五一人乘三畒得乘三畝得二十一併之共七十一爲法以分毋相乘七畒乘三畒得二十一又乘五畒得一百五又以畒法二百四十乘之得二万五千二百步爲寶以法七十一除之得數以畒法而一餘寶以法約之合問
