body:
  text: 九百一十二两四两乗麫塩薑得三万六千八百六十四两併之得一百六十九千五十六两爲法除之得一千三百四十四两以秤約之合問李貨郎城中去就貫鈔不用錢四斤油一斤蜜塩斤半一貫三斤皮見麫四般見中停買無差亂交足價直要分明問賢家此法如何算右寄生草答曰各得四斤法曰置鈔九買以各率相乗油四斤乗蜜一斤得四斤又塩半斤乗得六斤又麫三斤乗得一十八斤乗之得一百六十二爲實又各率相乗油四斤乗蜜一斤得四斤又塩斤半得六斤蜜一斤乗塩斤半得斤半又油三斤乗得四斤半塩斤半乗塩三斤得四斤半又油四斤乗得一十八斤麫三斤乗油四斤得一十二斤又一斤乗得一十二斤併之得四
  hash: sha256:ad2888381ff629b6c9d71834788616ed9735eadb9c770ccf1627e73cb58ef2d1
