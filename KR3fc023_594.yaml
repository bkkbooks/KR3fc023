body:
  text: 九百一十二兩四兩乘麵鹽薑得三万六千八百六十四兩併之得一百六十九千五十六兩為法除之得一千三百四十四兩以稱約之合問李貨郎城中去就貫鈔不用錢四斤油一斤蜜鹽斤半一貫三斤皮見麵四般見中停買無差亂交足價直要分明問賢家此法如何算右寄生草答曰各得四斤法曰置鈔九買以各率相乘油四斤乘蜜一斤得四斤又鹽半斤乘得六斤又麵三斤乘得一十八斤乘之得一百六十二為實又各率相乘油四斤乘蜜一斤得四斤又鹽斤半得六斤蜜一斤乘鹽斤半得斤半又油三斤乘得四斤半鹽斤半乘鹽三斤得四斤半又油四斤乘得一十八斤麵三斤乘油四斤得一十二斤又一斤乘得一十二斤併之得四
  hash: sha256:621c9b352b27ee1dd5ef5daeae5223a0681a718d55c919aff8d751b464f5b602
