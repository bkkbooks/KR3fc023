body:
  text: 乘出三十二併以爲實得五十三併盈三不足四得七爲法實如法而一寶五十二爲物價法七爲人数合問人買雞各出九文盈十一文各出六文不足十六文問人数雞價各幾何荅曰九人雞價七十法曰併盈十一不足十六得二十七爲實以所出多九少六以少减多餘三爲法除之得人数九以所出各九乘人九得八十一减盈十一餘七十即雞價合問共買璡各出二分之一盈四文各出三分之一不足三文問人價各幾何荅曰人四十二璡價十七法曰有分者通之出二分之一盈四通得八出三分之一少三通得九以盈不足
