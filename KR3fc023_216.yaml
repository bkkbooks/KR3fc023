body:
  text: 百九十六却以九而一合問今有錠田半段正中長一十二步頭周一十八步兩旁周各九步問為田幾何答曰一百四十四步法曰置正中長一十二步自乘得一百四十四步合問又法置頭周一十八步自乘得三百二十四步四乘九而一又法兩旁曲周九步自乘得八十一步十六乘九而一今有錠田一角正面長一十二步頭周九步腰周九步問為田幾何答曰七十二步法曰置正面長一十二步自乘得一百四折半合問又法頭周九步自乘得八十九而一
