body:
  text: 乙七分之五問得鈔各幾何答曰甲四十貫乙三十五貫丙二十五貫法曰以所有鈔一百貫減甲多乙王貫餘九十五貫為實併各差甲乙各七分丙五分共一十九分為法除之得王貫以各差乘之合問今有鈔一百貫令三人分之只云乙鈔如甲三分之二丙少如甲二十八貫問各得幾何答曰甲四十八貫乙三十二貫丙二十貫法曰以所有鈔一百貫加丙少如甲二十八貫共得一百二十八貫為實併各差甲兩各三分乙二分共八分為法除之得一十六貫為鈔率以乘各差合問
