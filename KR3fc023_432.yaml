body:
  text: 畸零以餘錢二百八十為斤每斤得四十六文以滅原買物五百四十斤餘二百六十斤每斤得四十五文合問今有錢二十四貫五百八十文買綾羅五百四十尺綾每尺四十五文羅每尺四十六文問綾羅各幾何答曰綾二百六十尺羅二百八十尺法曰反用前問二價相和俗曰貴賤分身以貴價四十六文乘總帛五百四十只得二十四貫八百四十文以原錢二十四貫五百八十文減之餘二百六十文為實以貴賤二價相減四十五文減四十六文餘以為法除實得二百六十尺即賤綾價以減都五百四十餘得貴羅價二百八十尺合問今有錢五百八十三貫九百五十六文耀到米麥一千二
