body:
  text: 位以方廉五法共若干啇餘實得若干下法亦置上啇若干四遍若干乗得若干爲隅法又以上啇若干一遍乗上廉得若干二遍乗二廉得若干三遍乗三廉得若干四遍乗下廉得若干以方廉隅六法共若干皆與上啇若干除餘實若干仍餘實若干乃二乗上廉得若干三乗二廉得若干四乗三廉得若干五乗下廉得若干六乗隅法得若干皆併入方法共若干又於下法副置上啇若干進五位爲若干列爲四位第一位三遍上啇若干乗得若干又以十五乗之得若干爲上廉第二位二遍上啇若干乗得若干又以二十乗之得若干爲二廉第三位以上啇若干乗得若干又以十五乗之得若
  hash: sha256:16d0d6e81f414424ae873a9565ea684670bfbd5ce3ae65067d4429bad7723699
