body:
  text: 今有直田一十九畝六分只云長取強半平取弱半和取小半較取大半爲共不及二長二步少半步問長平各幾何荅曰長八十四步平五十六步法曰置長四分之三平四分之二和二分之一較三分之二毋互乗子長之三乗四分得一十二又以二分乗得二十四又乗三分得七十二步平之一乗四分得四步二分乗得八又乗三分得二十四步和之一乗四分得四又以四分乗得一十六又乗三分得四十八步較之二乗二分得四又以四分乗得一十六又乗四分得六十四步分毋四分乗四分得一十六又乗二分得三十二又乗三分得九十六却以不及分毋三乗之得二百八十八又以不及二步三分步之一以分毋三乗二步得六加分子一得七乗之得二千一十六却以二遍三除得二百二十四得八長內減八半餘得八較今後八約之得二十八步
