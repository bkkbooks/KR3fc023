body:
  text: 定實逆数法百貫丑上得貫乃丑上得實首万仍復数回寅上得千共得一千三百五十六石三斗合問河圖書數自古傳之乃論先天推陰陽之数將經演十五之圇先運扵掌上熟記其数無差次書圖形布排運用乗除加減開方自毫厘至扵千万會零合踐不用灘釐至無差誤實爲炒用也坎一坤二震三異四中五乹六兊七艮八離九縱橫十五人能脫天下科差掌上觀萬中千坎百埽艮十震兩異錢離安分坤厘兊豪乹上河圖千古再重看免用筭錢余加減不爲難
