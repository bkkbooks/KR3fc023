  text: 錢唐南湖後學吳敬信民編集方程計四十三問方者謂数之形也程者量度之緫名亦權衡丈尺斛斗之平法也尤課分明多寡之義以諸物緫併爲問其法以减損求源爲主去一存一以考其數如甲乙行列諸物與價先以甲行首位遍乗其乙復以乙行首位遍乗其甲求其有等用少减多以簡其位是去其物减其錢價爲實物爲法一法一實得數並以啇除之行位繁者次第求之同减異加異减同加正無正入之負無負入
