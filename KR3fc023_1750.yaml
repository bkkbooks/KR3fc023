body:
  text: 得四十一十二石八斗得六十四石却以左行小四爲能簡遍乗中行小五得二十与左行小二十對減尽軍一得四減左行軍四十餘得軍三十六爲法七石得二十八石減左行六十四石得得三十六石爲實以法除得軍該一石中行七石減軍一得一十餘得六石以小五除得一石二斗爲小旗支數右行士石九斗減小二得二石四斗軍一得一石餘得四石五斗以緫三除得一石五斗爲緫旗支數合問今有壯軍一弱軍二老軍三俱駕船一隻載米八十石至灘皆不能遇背壯軍能弱家工弱軍借老軍一老軍借壯軍一俱過臍灘問各引力幾何荅曰壯軍一名力引四十五石七分石之五
