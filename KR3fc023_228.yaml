body:
  text: 二為實以分毋三十四自乘得一千一百五十六為法除之得七十二折半合問又法併兩旁半周自乘九而一合問今有欖核田三角正中長一十六步三十三分步之三十二右邊周一十八步左邊半周九步問為田幾何答曰五十四步法曰置正中長一十六步以分毋三十三通之加分子三十二共五百六十自乘得三十一万三千六百又以分毋三十三減分子三十二餘一以乘分子亦得三十二併二數共得三十一万三千六百二十二為實以分毋三十三自乘得一千八十九為法除
