body:
  text: 法曰半池水方如勾水深如股引幾平水如弦出水一尺如股弦較勾半池方五尺自乘得二十五以减股弦較出水一尺自乘得一尺餘得二十四爲實倍較出水一尺爲二尺爲法除之得股水深一丈二尺合問開門去閫一尺不合二寸問門廣幾何答曰一扇廣五十寸五分
