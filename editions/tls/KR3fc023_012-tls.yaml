body:
  text: 博至理微妙殆非學意刨啟锺儀坂筭數之家心称九章筭法爲宗世傳至書出扵囷公然世既函件而無習而貫通者予以草茅末學苗心筭術蓋之者年宻訪九章全書久未之見一旦幸謢寫本至目二百回又者六內方田粟米寡分不過乗除互換人皆易曉若少廣之截多益少開平方圓商功之侑築堆積均輸之遠迫勞歸學法頠難玉扵盈朏方
