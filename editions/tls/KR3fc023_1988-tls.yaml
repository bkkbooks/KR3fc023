body:
  text: 千八百一十四万五千四百四十啇餘實得三尺下法亦置上啇三四遍自乗得二百四十三尺爲隅法又以上啇三一遍乗上廉得一千四百九十二億九千九百二十万二遍乗二廉得二十四億八千八百三十二万三遍乗三廉得二千三百三十二万八千四遍乗下廉得一十一万六千六百四十以方廉隅六法共四万九千二百九十三億八千五百三十六万四千八百八十三尺皆與上啇三除實盡得二百四十三尺合問帶徔開平方法法曰置積若干爲實以不及若干爲徔方於實数之下將徔方啇一位就啇啇二位者一進以一得十啇三位者二進以一得百下法啇二位者二進得百啇三位者四進得万於實上啇置第一位得数若干下法亦置
  hash: sha256:277db9023a5cf5d00066ae57cd78fbd2429b8ee30517b123da175d22fe38702d
