body:
  text: 四尺絹五尺直錢一貫二百六十三文問各尺價幾何荅曰羅九十八文綾八十五文絹六十七文法曰此問与前法相同排列遂項問數以右行羅四尺爲法遍乗中左行數羅四爲法綾五絹六一貫二百一十九文羅五得二十綾六得三十四絹四得一十六一貫二百六十八文羅六得二十四綾四得一十六絹五得二十一貫二百六十三文却以中行羅五爲法復遍乗右行羅四得二十与中行羅二十對減綾五得二十五減中行綾二十四除得綾絹六得三十減中行絹十六餘得絹一十四錢一貫二百一十九文得六貫九十五文減中行五貫七十二丈餘得一貫二十三文又以左行羅以而法復遍乗右行羅四得二十四与左
