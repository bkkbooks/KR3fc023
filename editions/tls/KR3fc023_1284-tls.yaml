body:
  text: 法曰置空徑三十九寸六分再自乘得六万二千九十九寸一分三厘六毫以立圎法九乘得五十五万八千八百九十二寸二分一厘四毫以十六而一空得三万四千九百三十寸七分六厘四毫別置外周一百二十寸再自乘得一百七十二万八千寸以立圎周率四十八而一得金積三万六千寸內减空積三万四千九百三十寸七分六厘四毫餘得實積一千六十九寸二分三厘六毫以銀寸兩十四加之得一万四千九百六十九兩三錢四厘减六見斤合問今有銀平頂圎盒一箇高四寸厚八厘內空周二尺三寸五分二厘高三寸八分四厘問重幾何答曰一十三斤一兩七錢七厘八忽法曰置內周二千三百九十二自乘得五百五千二万一千九百四厘以高五百
