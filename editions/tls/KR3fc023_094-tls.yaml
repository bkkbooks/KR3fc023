body:
  text: 併中外周折半以乗徑外周自乗以中周自乗減之餘十二而一法曰併二周中九十二步外一百二十二步共二百一十四步折半得一百七步以乗徑五步得五百三十五步以畆法而一合問環田中周六十二步分步之三外周一百一十曰步二分徑一十二步三分步之二爲田幾何荅曰四畆一百五十六步四分步之一法曰併二周中六十二之外一百六十三步共一百七十五步中周之三乗外周二分得六外周之一乗中周四分得四併之得十卻以分母三分四分相乗得八爲法除十得一步二分五厘併前共步得一百七十六步二分五厘折
  hash: sha256:aa1fb611f7ae82a84e94c0e03eef27c5ef44a30cd90e45ecfb135b6cfbfd6ef3
