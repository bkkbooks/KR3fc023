body:
  text: 乗得若干爲隅法又以上啇若干一遍乗上廉得若干二遍乗下廉得若干以方廉隅四法共若干皆與上啇除實盡得若干合問今有三乗方積二千七十五億九千四百一十四萬六百二十五尺問一靣幾何荅曰六百七十五尺法曰置積爲實別置一筭名曰下法常超三位一乗超一位二乗超二位三乗超三位万下定十億下定百約實下法定億啇置第一位得六百下法亦置上啇爲六億再自乗得二百一十六億爲隅法與上啇六除實一千二百九十六億餘實七百七十九億九千四百一十四万六百二十
