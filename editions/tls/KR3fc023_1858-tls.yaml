body:
  text: 弦各幾何答曰勾七十步股二百四十步弦二百五十步法曰置相乗得六万步爲以相差一十步爲從方開平方法除之得股長二百四十步加差一十步得弦長二百五十步置股弦各乗相减餘四千九百步爲實以開平方法除之得勾闊七十步合問今有勾股田積三千九百七十六步只云勾不及股八十六步問勾股各幾何答曰勾闊五十六步股長一百四十二步法曰二乗田積得七千九百五十二步爲實以不及八十六步爲從方
