body:
  text: 以一百三十步又以分母十一乗之加分子一十共得一千四百四十爲法除之得一步餘實一千二百法實皆二百四十約之合問今有直田一畒九十七步四十九分步之四十七問廣幾何荅曰二步二十分步之九法曰通田一畒得二百四十步以分母四十九乗之得一万一千七百六十步爲實置九十七步以分母四十九乗之加分子四十七共四千八百爲法除之得二步餘實二千一百六十法實皆二百四十約之合問今有直田八畒六十步問廣幾何荅曰三十二步法曰通田八畒得一千九百二十步爲實以六十步爲法除之合問
