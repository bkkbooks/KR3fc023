body:
  text: 法曰方自乗爲積如畒法而一十目乗即是直田相乗也通方一里得一百步自乗得八万步以畒法而一合問圭田廣十二步縱二十一步爲田幾何荅曰一百二十六步圭田一頭尖一頭廣其行如圭其積之直田之半廣縱相乗折半正頃乗半廣減長丁角以餘補折作直田半正縱以乗廣截步一半爲畒分兩如直田百爲侑兩兩之爲法曰置廣十二步縱二升一步相乗得二百五十二步折半合問圭田廣五步分步之一縱八步三分步之二爲田幾何荅曰二十三步六分步之五
