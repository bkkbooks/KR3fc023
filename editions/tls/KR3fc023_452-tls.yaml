body:
  text: 答曰一十八貫法曰以所求率四十八尺乗鈔數四百三十六貫五百文得二万九百五十二爲實以所買紵絲二十四疋以四十八尺通之加零一十二尺共一千一百六十四尺爲法除之合問今有鈔四百三十六貫五百文買紵絲毎疋價鈔一十八貫疋法四十八尺問該買幾何答曰二十四疋一丈二尺法曰以所求率四十八尺乗鈔數四百三十六貫五百文得二万九百五十二爲實以所價一十八貫以四十八尺通得八百六十四爲法除之得二十四疋二分五坐其疋下分以四十尺乗之合問今有鈔一百九十五貫二百文買羅一十二疋三丈四尺
