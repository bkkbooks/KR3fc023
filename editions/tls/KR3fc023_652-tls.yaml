body:
  text: 不出一斗簮㵗出四分斗之三上造出四分之二公士出四分斗之一法曰六人以前爵次出粟五斗法前同止大大五數各列置衰将五五四三二一副併得二爲法以所出粟五斗乘未併者五各得二十五四得二十三得十五二得十一得五各自爲列實以法二十除之二大夫各一斗餘五不更一斗簮㵗十五上造十公士五各不滿一斗止可爲分子法實俱五約之得數合問牛馬羊食人苗主責之粟五斗羊食馬之半馬食牛之半欲衰償之荅曰牛二斗八升七分升之二馬一斗四升七分升之二羊七升七分升之一
