body:
  text: 竹高一丈折梢柱地去三尺問折零高幾何答曰四尺二十分尺之十一法曰去根如勾折零如股折梢如弦同長如股弦和勾去根三尺自乘得九尺以股弦和竹高一丈二一除得九寸以减股弦和竹高一丈餘得九尺一寸半之的四尺餘約得二十分尺之十一合問勾八步股十五步問勾中絨圓經幾何法曰圓經与弦和較等数即勾股求弦和較股十五步相乘得一百二十步倍
