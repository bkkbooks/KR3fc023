body:
  text: 荅曰甲縣二百二十九人乙縣二百八十六人丙縣二百二十八人丁縣一百七十一人戊縣二百八十六人法曰置縣卒各以行道日數而一爲衰甲縣一千三百人以一十日除得四爲衰乙縣一千五百五十人以三十一日除得五爲衰丙縣一千二百八十人以三十二日除得四爲衰丙縣一千二百八十人以三十二日除爲衰戊縣一千七百五十人以三十五日除得五爲衰各列置衰甲四乙五丙四丁三戊五副併五縣共衰二十一爲法以所均卒一千二百乘未併者各自爲實甲得四千八百乙六千丙四千八百丁二千六百戊六千以法二十一除之甲得二百二十八人餘實一十二乙得二百八十五人實二十五丙得二百二十八人餘實一十二丁得一百七十一人得實九戊得二百八十五人實十戶
  hash: sha256:633e76060f674330514bec0a38abaae80e9868c1095166b2f9af0c3254195551
