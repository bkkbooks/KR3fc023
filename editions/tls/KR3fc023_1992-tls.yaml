body:
  text: 法曰置田六頃九十六畝以畝步通之得一十六万七千四十步爲實以不及一百三十二步爲徔方開平方法除之於實数之下啇置第一位將徔方二進得一万三千二百步下法四進得万以啇實得三百下法亦置上啇得三万爲方法與徔方共得四万三千二百皆與上啇三除實一十二万九千六百餘實三万七千四百四十乃二乗方法得六万併入徔方共得七万三千二百俱爲方法一退得七千三百二十下法再退得百續啇置第二位以方法七千三百二十啇餘實得四十下法亦置上啇得四百爲隅法與方法共得七千七百二十皆與上啇四除餘實三万八百八十仍餘實六千五百六十乃二乗隅法得八百併入方法共得八千一百二十一退得八百一十二
  hash: sha256:101bdf89985d98604d34e80632c7648e02ed0fba201237e725955be92c3a1495
