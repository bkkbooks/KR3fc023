body:
  text: 法曰以各分數乗総錢一十貫各自爲實併各支分數共得六十五爲法除各實得數合問今有甲乙丙丁戊分米二百四十石只云甲乙二人與丙丁戊三人數等問各得幾何答曰甲六十四石乙五十六石丙四十八石丁四十石戊三十二石法曰各列置衰甲乙四丙三丁二戊一又併甲五乙四得九又併丙三丁二戊一得六以減九除三卻於前五等數各增三甲得八乙得七丙得六丁得五戊得四副併三十爲法以所分米二百四十石乗未併者甲得一千九百二十石乙得一千六百八十石丙得一千四百四十石丁得一千二百石戊得九百六十石
  hash: sha256:5326aaab9f569201743f5e6060de223127ead274354e5f88955c0d69e95a333c
