body:
  text: 荅曰甲八十四斤乙六十八斤丙五十二斤法曰此問正作四絲作三弱作二列所問數右甲四乙三丙一一百四十八中甲一乙四丙三一百二十八左甲三乙一丙四一百三十二先以左行甲三爲法遍乗中行甲對減一尺乙四得正十一減左行乙正一餘得乙正十一丙三得正九減左行丙正四餘得丙正五一百二十八斤得正三百八十四斤減左行正一百三十二斤餘得正二百五十二再以中行甲一爲法遍乗右行甲四對減尽乙三得正三減左行乙一餘等乙正二丙一得正一減左行丙正四餘病負二一百四十八斤得正一百四十入斤減左行三
