body:
  text: 答曰绢尺價一錢七分靛斤價二錢五分法曰置絹二十五尺以共四尓二分乗之得一百五爲實併二價絹二十五靛一十七共四十二爲法除之得靛斤價二尓五分以减共價餘得絹尺價一尓七分合問斗米粟斗半米一陣狂風起相和做以䖏分又分不得因此上做箇江見水右江兒水答曰米主該分一斗八升七合五勺粟主該分一斗一升二合五勺法曰置米粟共三十爲實以米率六粟率十共十六爲法除之得米一斗八升其分五勺以减数餘得粟一斗一升二合五勺合問
