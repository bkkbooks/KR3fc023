body:
  text: 百五十二以减上数餘一百七十四以積分母七除之合問今有梯田積一千二百一十七步七分步之一南闊二十四步三分步之二正長四步問北闊幾何答曰三十六步問北闊幾何法曰置積步一干二百一十七步以分母七通之加分子一共得八千五百二十又以南闊分母三通之得二万五千五百六十倍子得五万一千一百二十爲實以正長四十步乗南闊分母三得一百二十又乗積分母七得八百四十爲法除之得南北闊相和六十步七分步之六就置六十步以分母七通之加分子六共得四百二十六又以南闊分母三通之得一千二百七十八又置南闊二十四步以分母三
