body:
  text: 共七兩五糸以原分毋三十二乗之得二百四十爲法除之得三百四十五文合問今有布一疋價鈔一百二十五文只有鈔八十四文八分文之三問該買布幾何答曰二丈七尺法曰以只有鈔八十四文以分毋八遂之加分子三共得六百七十五乗所有布一疋通爲四十尺得二万七千文爲賣以所有價絲一百二十五文以原分毋八通之得一千爲法除之得二丈七尺合問今有素一疋價鈔五百文有鈔六百二十五文該買素幾何答曰一疋一丈法曰以所有鈔六百二十五文乗所有素一疋通爲四十尺得二万五千爲實以價鈔五百文爲法除之得五十尺合問
