body:
  text: 羃四千三百五十六乗之得一億二千三百五万九千七百八十七尺八寸四分置本髙三十尺以乗廣差六得一百八十爲法除之得六十八万三千六百六十五尺四寸八分八厘爲實以甲上廣二丈一尺併末廣一丈八尺共三十九尺三因得一百一十七以乗甲髙一十五尺得一千七百五十五又乗袤羃四千三百五十六得七百六十四万四千七百八十却以除法一百八十約之得四万二千四百七十一爲從方置甲上廣二丈一尺以三因得六十三尺又以甲袤三十三乗之得二千七十九於上以甲上廣二丈一尺減原廣二丈四尺餘三尺爲廣差以除前位得六百九十三爲從廉以一爲隅筭開立方法除之得一丈三尺二寸爲乙袤加甲袤二丈三尺共得四丈六尺二寸以原髙乗之得一千三百八十六尺却以原袤六十六尺
  hash: sha256:7480836eafac18aa3771f7c41b824ca9c49784a192f76de3dc16f27585ea0139
