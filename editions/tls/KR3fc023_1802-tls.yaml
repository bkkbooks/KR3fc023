body:
  text: 法曰圖經弦厚如勾求問如股弦二尺五寸自乘得六百二十五寸减勾七十自乘得四十九寸餘得五百七十六寸爲實以開平方法除之合問股十五尺弦十七尺問爲勾幾何答曰八尺法曰弦自乘中有一股一勾積以股减弦餘即勾实弦十七自乘得二百八十九减股十五自乘得二百二十五餘得六十四爲實以開平方法除之合問池方一丈正中有葭出水一尺引葭至岸與水適平問水深幾何答曰一丈二尺
