body:
  text: 法曰四乗田積七十二步得二百八十八步於上别置徑三步自乗得九步以圓法十二乗之得一百八步以减上数餘一百八十步爲實再以圓法十二乗面徑三步得三十六步爲從方一爲益隅併從方三十六加入餘積一百八十步共得二百一十六步爲實以帶從開平方法除之合問今有斜田九畒一百四十四步只記得南廣三十步北廣四十二步問幾何答曰六十四步法曰通積九畒加零一百四十四步共得二千三百四步爲實併二廣得七十二步折半得三十六步爲法除之得合問今有斜田九畒一百四十四步只記得南廣三十步六
  hash: sha256:3c0b7bc609c79aa64bf3c170dc03e062195969eef855438f62b0f49673d5e727
