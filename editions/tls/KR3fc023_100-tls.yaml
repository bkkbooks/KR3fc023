body:
  text: 法曰副置分母九十一在上分母入十在下數不可半也以少減多先餘四十九或九十一四十二更相减損以四十二或四十九七伤以七六次四十二即七等求其等也減積皆等餘七以等約之以七月九十一得十三四十九得其即十三分之七合問合分法曰商除不盡法爲分母實爲分子合欲以銘分母子和而爲一長合分之求之母互乗子法意欲以分子即而爲一令分母于皆不所以用母互乗諸于其數也併以爲實諸母即乗諸子齊其數爲合爲一故曰併以爲實母相乗爲法子即合而爲一母亦當合二爲一用母自田乗之數爲法實如法而一以法除實發即分實母分子不滿法者以法命之數少而法餘多積以法數之減用爲分其母同者真相從之分母或有同者母併入予以併入于可互故曰相從之
