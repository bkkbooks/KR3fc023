body:
  text: 之得二十億二千五百万爲中廉第三位以五乗之得二千二百五十万爲下廉乃方法一退得二千五十億三千一百二十五万上廉再退得九億一千一百二十五万中廉三退得二百二万五千下廉四退得二千二百五十下法五退得一再啇置第三位以方廉四法共二千五十九億四千四百五十二万七千二百五十尺啇餘實得六尺下法亦置上啇六三遍自乗得一千二百九十六尺爲隅法又以上啇六一遍乗上廉得五十四億六千七百五十万二遍乗中廉得七千二百九十万三遍乗下廉爲四十八万六千以方廉隅五法共二千一百五億七千二百一十三万七千二百九十六尺皆與上啇六尺除實盡得四百五十六尺合問開五乗方法
