body:
  text: 第八節一升六十六分升之二十二第九節一升六十六分升之二十九法曰此九節上下大少當以一二三四五六七八九爲今上四節下三節容爲問本用方程求之中間隱法二節差數輸之章類衰分也置四節三節爲分毋三升四升爲分子令毋互乘子三升得九四升一十六以少九減多十六餘七爲一差之實併上四節下三節得七節折半得三節半以减九節餘五節半却以三升四升相乘得一十二乘之得六十六爲一升之法實如法而一實不滿法一差得六十六分升之七上四節三升乘六十六分得一百九十八以四節差六第一節差第二節差一第三節差二第四節差三併之得六以差七乘之得四十二以減一百九十八餘一百五十六却以四節除之得三十九第一
  hash: sha256:e57f5a3a3493ff7b357b95e8ea0da8faf3ba3e443f0b991c305bfde05a0452db
