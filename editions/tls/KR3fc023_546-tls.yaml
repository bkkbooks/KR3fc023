body:
  text: 法曰置原借布長五百二十寸問二十一寸相乗得一萬九百二十寸爲實以常行布闊一十六寸爲法除之合問今有鈔五百二十五貫五百文共買木綿布七十五疋各闊二尺一寸今原布無止有闊一尺六寸布主扣箅原價貼還問該幾何答曰一百二十七貫五百文法曰置鈔五百三十四貫五百文爲實以布七十五疋以四貫通得三百文以闊二尺一寸乗之得六千三百尺爲法除之得尺價八分五厘別以闊二尺一寸減一尺六寸餘五寸以乗三百丈得一千五百尺爲不及數卻以尺價八分五厘乗之得貼還鈔合問今有原布長二百四十八尺闊二尺二寸今無原布歸還
