body:
  text: 持金出閞兄五稅初稅二分之一次稅三分之一稅四分之一次稅五分之一次稅六分之一所稅共重一斤問元持金幾何曰一斤三兩四銖五分銖之四法曰置五稅分毋相乘二三四五六分乘得七百二十稅剩餘分相乘一二三四五乘得一百二十減之餘六百爲法以稅一十六兩乘分毋相乘七百二十得一万一千五百二十爲實以法六百除之得一十九兩餘實一百二十以兩銖二十四乘之得二千八百八十仍以法六百除之得四趺不盡四百八十法實皆一百二十約之合問持米出三閞外閞三分稅一中閞五分稅一內閞七分稅一餘米五斗問元米几何曰一十斗九升八分升之三
