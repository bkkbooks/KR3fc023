body:
  text: 共四十七万七千七百五十七億四千四百万又於下法副置上啇二百四十進五位爲二千四百万列爲四位第一位三遍二十四乗得三千三百一十七億七千六百万又以十五乗之得若四万九千七百六十六億四千万爲上廉第二位二遍二十四乗得一百三十八億二千四百万又以二十乗之得二千七百六十四億八千万爲二廉第三位以二十四乗得五億七千六百万又以十五乗之得八十六億四千万爲三廉第四位以六乗得一億四千四百万爲下廉乃方法一退得四万七千七百七十五億七千四百四十万上廉再退得四百九十七億六千六百四十万二廉三退得二億七千六百四十八万三廉四退得八十六万四千下廉五退得一千四百四十下廉六退得一再啇置第三位以方廉五法共四万八千二百七十六億一
