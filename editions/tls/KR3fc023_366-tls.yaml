body:
  text: 法曰以熟菽一百二半乘粟四斗爲實以粟率五十爲法除之問粟二斗爲糳幾何荅曰七斗法曰以糳一百七十五乘粟二斗爲實以粟率五十爲法除之問糲一十五斗五升五分升之二爲粟幾何荅曰二十五斗九升法曰以粟五十乘糲一十五斗五升以分母五分通得七百七十五加分子二共七百七十七得三万八千八百五十以糲三十以原通分母五通得一百五十爲法除之合問問粺米二斗爲粟幾何荅曰三斗七升二十七分升之一法曰以粟五十乘粺米二斗爲實以粺米二十七爲法除之問糳米三斗三分升之一爲粟荅曰六斗三升三十六分升之七
