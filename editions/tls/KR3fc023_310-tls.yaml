body:
  text: 周該三步自乘得九步以圓法二十而一得七分五厘共積二步二分五厘五池每池方六步自乘得三十六步共積一百八十步十二樹每樹圍七尺五寸該一步五分自乘得二步二分半以圓法十二而一得一分八厘七毫五絲又以十二樹乘之得二步二分半屋二步自乘得積四步通共占積四百五十三步二分以畒法而一得一畒八分八厘八毫七絲五忽以減九畒六分餘得剩曰七畒七分一厘一毫二絲五忽合問一段環田徑不知二周相併最幽微一百六十不差地一畒皆知無零積只要賢家仔細推三般何以見端的荅曰經三步外周八十九步內周七十一步
