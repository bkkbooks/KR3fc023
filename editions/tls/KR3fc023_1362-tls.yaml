body:
  text: 行六十步餘四十步爲法除之合問遅者先往十里疾者追百里而遅者二十里問疾者幾何里而及之曰三十三里半里法曰置遅者先往十里乘疾者追百里得一千里爲實併先往十里追過二十里共三十里爲法除之合問尭先百步犬追二百五十步不及三十步而止問犬不止更追幾何步而及之曰一百七步七分之一法曰置不及三十步乘犬追二百五十得七千五百爲負以不及三十步減免先往一百步餘七十步爲法得百步餘實一十以法約之合問
