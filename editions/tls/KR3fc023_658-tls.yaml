body:
  text: 答曰甲五十一錢一百九分錢之四十一乙三十二錢一百九分錢之十二丙一十六錢一百九分錢之五十六法曰各列置衰甲五百六十乙三百五十丙一百八十副併得一千九十爲法以所分稅一百乘未併者甲得五万六千乙得三万五千丙得二万八千各自爲列實以法一千九十除之得不滿法者以法命之合問北鄉筭八千七百五十八西鄉筭七千二百三十六南鄉筭八千三百五十六凡三鄉發徭三百七十八人以筭數多少出之答曰北郷一百三十五人一万二千一百七十五分人之一万一千六百三十七
