body:
  text: 法曰置方田面四十九步上分母九十九通之加分子四十九共得四千九百步爲實以開平方法除之合問今有方田四步十八分步之十七問斜幾何答曰七步法曰置面分四步以分母十八通之加分子十七共得八十九自乗得七千九百二十一於上又以分母十八减分子十七餘以乗分子亦得十七併入上数共得七千九百三十八爲實以分子十八自百二十七爲法除之得二十四步半倍之得四十九開平方法除之今有方田斜七十步問方一面幾何答曰回十九步九十九分出之四十九法曰置斜七十步自乗得四千九百步率之得二千四百一十步爲
  hash: sha256:b0e4442085aa71f51de8e8ee1151156bbc7ea7b7f5836c8271ecc06c3b5cac8d
