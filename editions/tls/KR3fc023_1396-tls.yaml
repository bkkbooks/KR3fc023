body:
  text: 共得三万六千二百八十兩六二分爲實以生經緯九兩乗練熟七乑三分得六兩七乑五分却加每兩顏料三分共得六兩九乑五分二厘五毫爲法除之得通用荒絲五万二千八十兩却以紵絲一千二百四十疋除之得每疋該用㐬絲四十二兩以淨絲九乗之得二十七兩八錢又以煉熟七糸五分乗之得二十八兩三系五分又乗顏料三分得八糸五分五毫加煉熟經緯共得二十九二六五毫爲每疋重各以斤法乗之合問今有織䋭七疋八尺子疋法三丈二用絲九斤一兩三錢今欲織八十四疋一丈四尺問用絲幾何答曰一百五斤八兩一十八銖
