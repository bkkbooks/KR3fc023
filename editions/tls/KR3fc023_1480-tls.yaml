body:
  text: 三乘原曰二得六爲法除之合問三人二日四升七一十三只要粮吃三十六石六斗六不知吃了幾何日荅曰三百六十日法曰置今吃粮三十六石六斗六升以原人三乘之得一百九石九斗八升又以原日二乘之得二百一十九石九斗六升爲實以吃粮四升七合乘今人一十三口得六斗一升一合爲法除之合問今有竹筒長五節上容二升四升中間三節容多少不知差数請開明荅曰上一節二升二節二升五合三節三升四節三升五合五節四升
