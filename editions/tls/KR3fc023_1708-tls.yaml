body:
  text: 五一七百二十一一六七百二十一先以甲二爲法乗戊六得十二甲行空死減亦得戊正十二七百二十一得一千四百四十二却以戊行甲正一乗甲行七百二十一減積餘得七百二十一再以乙三爲法乗戊正十二得正三十六乙行戊空亦得戊正三十六七百二十一得二千一百六十三以戊行乙負一乗乙行七百二十一卯入積戊行得積二千八百八十四再以丙四爲法乗戊正三十六得正一百四十四丙空无減亦得戊正一百四十四二千八百八十四得一万一千五百三十六減戊行丙負一乗丙行七百二十一以減積餘得一万八百一十八五再以丁五爲法乗戊正一百四十四得正七百二十加戊正一得七万二十一爲法正一萬八百一十
