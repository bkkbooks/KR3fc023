body:
  text: 演立天源窮䆒右西江月荅曰索長一十三步法曰置踐跡田五分以畝法除之務一百二十步加零八步共一百二十八步以弧矢約之得弦長二十四步矢闊八步加離邊五步合問今有碌一顆原長四尺無疑二十五寸大頭齊小徑原高二尺如意輕推一逅碾成環樣堪稽問公能及分厘不會傍人笑你右西江月荅曰七厘二毫法曰置長四尺大頭徑二十五寸小頭徑二十寸該差五寸每尺該一寸二分半以除大頭徑二尺五寸得半圓徑二十尺倍之得
