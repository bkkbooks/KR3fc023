body:
  text: 法二十三貫除之合問今有米麥共二千石該價鈔二萬五千六百貫只云米三石價糴麥四石盈鈔一貫米五石糴麥七石不足鈔二貫問米麥石價各幾何答曰米九百石每石鈔一十五貫麥一千一百石每石價鈔一十一貫法曰此問先求石價次用貴賤差分置列三石四石盈一貫五石七石少二貫互乘盈一貫乘七石得七貸不足二實乘四石得八貫併之得米價一十五貫又以盈一貫乘五石得五貫不足二貫乘三石得六貫併之得麥價一十一貫就乘共二千石該鈔二萬二千貫以減緫鈔二萬五千六百貫餘三千六百貫爲實以來麥價十五十一以少減多餘四貫爲法除之得米九百石以減共二千石餘得麥一千一百石合問今有一都坐辯白綿不知其數人戶不知多寡只云每九家合辦六兩不足六十二兩每八家合辦士兩盈二十八兩問人戶白綿各幾何答曰人戶四百三十二家白綿三百五十兩法曰置出率盈不足各居其下先以家互乘出率兒家相相乘八家戶數爲毋出率爲子互乘列六兩九家七兩八家不足六十二兩盈二十八兩用副置相減以爲法八家乘六兩得四十八兩九家七兩得六十三兩以減多餘一十五兩爲法又以八家九家相乘
