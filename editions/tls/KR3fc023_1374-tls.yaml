body:
  text: 文因之得三十五貫以法五除之得七貫併入石價共得三十四貫除本府民一千五百六十四里得衰四十六戊府至輸所一千八百三十五里以脚錢四十文因之得七十三貫四百文以法五除之得一十四貫六百八十文併入石價共得三十七貫除本府民一千三百五十四里得衰四十二巳府至輸所一千二百四十里以脚錢四十文因之得四十九貫百文以法五除之得九貫九百二十文併入石價共得四十一貫除本府民一千九百六十八里得衰四十八庚府至輸所一千八百七十五里以脚錢四十文因之得七十五貫以法五除之得一十五貫併入石價共得四十九貫除本府民二千二百五里得衰四十五併十府衰共得三百二十爲法置共輸米以各
