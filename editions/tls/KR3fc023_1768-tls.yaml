body:
  text: 左行一釧爲法復右行一釵得一減左行四十八釧得四十七釵爲法四兩七錢得四連七乑減左行二十八兩二乑餘得二十三兩五乑爲實以法除得釵中五乑右行重四兩七乑減一釵重五乑餘得四兩二乑以釵六焦除之得釧重七乑合問甲借乙價七硯選也三管毛錐貼錢四百整八十恰好齊同了畢丙却借乙九筆選他三箇端溪一百八十貼乙齊二色價該各幾右西江月荅曰筆價五十文硯價九十文法曰列所問數硯正七筆負三價正四百八十負正三筆負九價負一百八十先以右行硯正七爲法遍乗左行硯正二得正二十一筆
