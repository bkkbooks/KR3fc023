body:
  text: 草曰置盈不足二日不足一尺五寸二日有餘一尺七寸半維乗二日乗有餘一尺七寸半得三尺五寸三日乗不足一尺五寸得四尺五寸併得八尺爲實併有餘一尺七寸半不足一尺五寸共三尺二寸半爲法除之得二日餘實一尺五寸法實皆二五約之得十三分日之六合問求蒲長以第三日長七寸半以日分子六乗之得四尺五寸爲實以日分母十爲法餘得三不盡六和前二日長四尺五寸共四尺八寸十三分寸之六合問求莞長以第三日長四尺以日分子六乗之得二十四尺爲實以日分母十三爲法除得一尺八寸不盡六加前二日長三尺共四尺八寸十三分寸之六合問
