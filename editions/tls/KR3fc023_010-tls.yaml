body:
  text: 九章筭法此類大全序有理而順有象有番而治有形若皇帝使隸首作筭數而傳扵世圖書出於河洛大術五十有五之數聖人以之成變化而行鬼神黃鐘之管九寸空圍九不之數以之制禮作樂平度量審權衡周天三百六十五度四分度之一之襄以之測盈虛候時令苟知至坂則西歲之日至可坐而奴也然至學弘
