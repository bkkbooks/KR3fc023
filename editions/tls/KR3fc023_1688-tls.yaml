body:
  text: 乙行上二爲法遍乗甲行上七得一十四斗乙行上一十四對減尽下二得四減乙行下五十六餘得下五十二十一斗得二十二斗減乙行六十三斗餘得四十一斗求出下禾五十二米四十一斗爲下禾一秉得五十二分斗之四十一乙行十一斗以分母五十一通之得五百七十二減下二得八十二餘九百九十以上七除得七十減五十二爲一斗餘十八上禾數合問賣二牛五陽實十三豕剰錢一貫賣一牛一豕買三羊適足賣六羊八豕買五牛少錢六百問牛羊豕價各幾何荅曰牛一貫二百羊五百豕三百法曰賣爲正敷家爲負教趙中借買賣爲負正文足爲問是意不亦平列所
