body:
  text: 得九下法再退得一續啇第二位以廉法從方共一十七啇實得二步下法亦置上啇二爲隅法以廉隅從方三法共三十一皆與上啇二除實盡得闊一十二步加不及九步得長二十一步合問弧田一畒積一叚更加九十七步半矢不及弦十五步弦各長怎地筭荅曰弦三十步矢一十五步法曰通田一畒加零九十七步半共得三百三十七步半以四乘三除得四百五十步爲實以不及一十五步爲從方照前開平方法除之得矢一十五步加不及一十五步得弦三十步合問梭田共積一千二又零二十有四步闊不及長三十二要
