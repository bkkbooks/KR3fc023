body:
  text: 一万八百七十石一升以約率一万乗之得一億八百七十万八百爲實以法除之二十七石乃上郷上等每戶之数九因得二十三石四斗乃中戶之数又九因得二十一石六斗乃下戶之数又列上戶二十六石折半得一十三石乃中郷上等每戶之数八因得一十石四斗乃中戶数又八因得八石二斗二升乃下戶数又列上戶一十三石折半得六石五斗乃下郷上等每戶之数七因得四石五斗五升乃中戶数又七因得三石一十八升五合乃下戶数各以每戶之率各等戶得粟合問今有官輸銀一百八十八兩一錢六分令三等人戶出之第一等三十二戶每戶七分第二等四十四戶每戶五分
