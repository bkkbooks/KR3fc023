body:
  text: 四丈八尺爲實以底徑二尺四寸爲法除之合問有井不知深共淺索又不知長和短单下到水溫三丈雙續二丈七尺短荅曰井深八丈四尺索長一十一丈四尺法曰倍雙續二十七尺得五丈四尺加水湿三丈得井深八丈四尺又加湿三丈得索長一十一丈四尺合問一條杆子一條索比杆子長一托折回索子却量杆却比杆子短一托荅曰杆長一丈五尺索長二丈法曰倍短一托得二托併長一托得杆三托加長一托得索長四托各以每托長五尺乗之合問
