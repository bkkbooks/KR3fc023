body:
  text: 下法再退得百續啇置第二位以廉法四千啇寶得三十法亦置三十進一位爲三百爲隅法以廉隅二法共四千三百皆與上啇三除寶一万二千九百餘寶二千三百二十五乃二乘隅法三百得六百併入廉法四千共四千六百一退得四百六十下法再退得一又啇置第三位以廉法四百六十啇寶得五下法亦置五爲隅法以廉隅二法共四百六十五皆與上啇五除寶盡合問積五十六萬四千七百五十二步四分步之一問平方一面幾何答曰七百五十一步半法曰置積五十六万四千七百五十二步以分毋四通之加內子一共得二百二十五万九千九又以分毋四乘之得九百三万六千三十六爲寶照前
