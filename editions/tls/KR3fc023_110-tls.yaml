body:
  text: 問九分之八比七分之六孰多幾何荅曰九分之八多六十三分之二法曰列置分毋子九分七分於右之八之六扵左毋互乗子九分乗之六得五十四七分乗之八得五十六以少五十四減多五十六餘二爲實毋相乗九分乗十分得六十三分爲法實不滿法即多六十三分之二合問問二十一分之八比五十分之十七孰多幾何荅曰二十一分之八多一千五十分之四十三法曰列置分毋子二十一分五十分扵右之八之一十七扵左毋互乗子二十一分乗之十七得三百五十七五十分乗之八得四百以少三百五十七減多四百餘四十三爲實毋相乗二十一分乗五十分得一千五十分爲法實不滿法
