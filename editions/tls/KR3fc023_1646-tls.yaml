body:
  text: 復以第四行黄負四爲法遍乗第三行仍与第四行同減異加得黑禾可爲實斗可爲法而止黄正二十二得負八十八与第四行黄負八十八同名對减尽黑正七得黑負二十八異名加入第四行黑正六百三十八得黑正六百六十六爲法正四斗得負一十六斗異加第四行正四十四斗得正六十斗爲實不滿法皆以十約之每黑禾一步得一百一十一分斗之十第三行內四斗以分母一百一十一通之得四百四十四減黑禾七束分子七十餘得三百七十四以黄禾二十二步除之每步得一百一十一分斗之十七第二行內一斗以分母通爲一百一十一減黑禾一分子一十黄禾一分子十七餘得八十四以青禾三除之每步得一百一十一分斗之二十八第一行一斗以分母通爲一百一十一減黄禾一得分子十七青禾一得分子
