body:
  text: 周幾何答曰四丈法曰置米照前以斛法乗之又以圓法乗之却以深九尺除之得三千七百尺內减下周丈自乗得九百尺餘二千八百尺爲實以下周三十尺爲從方開平方法除之合問今有圓窖上周四丈下周三丈深九尺問容粟幾何答曰三百四十二石二十七分石上一十六法曰置上周自乗得一千六百尺下周自乗得九百尺上下周相乗得一千二百尺併三位得三千七百尺以深九尺乗之得三万三千三百尺如三十六而一得九百二十五尺以斛法二尺七寸除之合問今有平地尖堆米下周三丈九尺髙四尺問容米幾何
  hash: sha256:09d823ac444c8056904126851642ff29f5e2e2ac040f05f16db150184d9931e1
