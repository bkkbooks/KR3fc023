body:
  text: 以畝步通之得三千三百步以毎邊二十步方面六十步以減毎邊二十步餘得圓徑合問二叚結角池占中央池角試步至邊方四面方八畝三分八步耕犁之數魯量外方內面數明彰彷徨一晌右西江月荅曰外方六十步內面四十步法曰置田八畝三分以畝步通之加零八步共二千步以四面方一十步約之得外方六十步自乗得三千六百步內減田積二千步餘一千六百步爲實以開平方法除之得內面四十步合問今有方田一叚中間有箇圆池步量田畝可耕犁十畝無
