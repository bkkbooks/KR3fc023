body:
  text: 啞子衝頭来買瓜手內拏錢数不差一箇少錢二十四半箇却多三十八荅曰持錢一百文瓜價一百二十四文法曰併盈三十八不足二十四共六十二爲實以瓜一个减半个餘半个爲法除之得瓜價一百二十四文以减少二十四文得持錢合問我問開店李三公衆客都来到店中一房七客多七客一房九客一房空荅曰房八間客六十三人法曰置列盈不足九客不足九客七客盈七客互乗各得六十三併之得一百二十六爲實以盈七减不足九餘二爲法除之得六十三人各加除得房合問
