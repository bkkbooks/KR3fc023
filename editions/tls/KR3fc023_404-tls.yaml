body:
  text: 荅曰二百六十二兩二錢七分六厘法曰置綿一万五千七百三十六兩五糸六分爲實以每綿六兩爲法除之得二百六十二兩二錢十分六厘合問歸除今有鈔四百一十一貫六百文共糴糯米一百七十一石五斗問每石價幾何答曰二貫四百文法曰置今有鈔四百一十一貫六百文爲實以所糴米一百七十一石五斗爲法除之合問今有鈔四百一十一貫六百文糴糯米每石二貫四百文
