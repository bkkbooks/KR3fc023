body:
  text: 答曰六步法曰置徑一十一步自乗得一百四十四步又三乗得四百三十二步於上别置田積七十二步以四乗之得二百八十八步以减上数餘一百四十四步爲實以四爲隅筭開平方法除之合問今有錢田積七十二步只云内方六步問外周幾何答曰三十六步法曰置内方六步自乗得三十六步併入積步七十二步共得一百八步以圓法十二乗之得一千二百九十六步爲實以開平方法除之合問今有錢田積七十二步只云靣徑三步問内方幾何答曰六步
