body:
  text: 法曰併上下廣半之得一十三尺一寸五分以深六尺一寸乗之得八十二尺八寸四分五厘又以袤一百三十一一寸乗之合問渠上廣一丈八尺下廣三尺六寸深一丈八尺袤五萬一千八百二十四尺問爲積幾何答曰一千七萬四千五百八十五尺六寸法曰併上下廣半之得一十尺八寸以深一十八尺乗之得一百九十四尺四寸又以袤五万一千八百二十四尺乗之合問方堢壔方一丈六尺髙一丈五尺問爲積幾何答曰三千八百四十尺法曰上下方相等形如方柱題類堆垛方一十六尺自乗得二百五十六尺以髙一十
