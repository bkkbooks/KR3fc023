body:
  text: 荅負五百四得負一十八万一千四百四十同減第四行荅負五万一千八百四十得荅正一十二万九千六百黍正二百九十七得正一十万六千九百二十同減第四行黍正三万四千二十得黍負七万二千九百價負一千八得負三十六万二千八百八十同減第四行價負一十五万二千二百八十得價正二十一万六百再以第五行菽負二百二十五爲法復遍乗第三行菽負九十得負二万二百五十与第五行菽負二万二百五十對減尽荅負五百四得負一十一万三千四百同減第五行荅負二万四千三百得荅正八万九千一百黍正二百九十七得正六万六千八百二十五同減第五行黍正三万二千四百得黍負三万四千四百二十五價負一千八得價負二十二万六千八百異加第五行價正一万二千一百五十得價正二十三万八千九百五十再相乗以第四行荅正一十二萬九千六百爲法
