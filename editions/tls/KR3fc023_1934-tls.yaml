body:
  text: 今有六角紙一張每面六寸皆爲定對角相去都一尺剪三卦輪如何徑荅曰卦輪徑四寸三分三厘三分厘之一法曰置股相去一尺以勾每面六寸半之得三寸爲法除之得三寸三分三厘三分厘之一又置勾六寸以六角除之得一寸一加入前数得卦輪徑合問圓木二尺五寸徑二丈四寸爲方桁未知桁厚得幾何若人筭得誠堪敬荅曰厚七寸法曰置弦徑二十五寸自乗得六百二十五寸以減股桁徑二尺四寸自乗得五百七十六寸餘四十九寸爲實以開平方法除之得桁厚七寸合問
  hash: sha256:e068e6a3e82414dbc90d998b55bae4b6aa30e2b600e6f72affbe650e76d33a21
