body:
  text: 即門髙以勾六尺自乗得三十六尺股八尺自乗得六十四尺併之得一百尺開平方法除之得弦長一十尺即竿長合問平地秋干未起板繩離地一尺送行二步恰杆齊五尺板髙離地仕女佳人爭蹴終朝語笑歡戲良公髙士請言知借問索長有幾右西江月答曰長一丈四尺五寸法曰勾送行十尺自乗得一百尺爲實以股弦較離地五尺减原離地尺餘四尺爲法餘得二十五尺加較四尺共得二十九尺折半得索長合問今有方池一所每邊一丈方停葭生西岸長其莖出水三
