body:
  text: 問每石價各幾何答曰芝麻六貫八百文录豆四貫五百文法曰置列左行芝麻六石录豆八石鈔四貫八百文右行芝麻四石录豆六石鈔二百文先以左中录豆八石爲法遍乘右行芝麻得三十二五录豆得四十八石鈔得一貫六百文以右中录豆六石爲法乘左行對減芝麻得三十六餘四石爲法录豆得四十八石減盡鈔得二十八貫八百文餘二十七貫二百文爲實以芝麻四石爲法除之得芝麻價六貫八百文以左行芝麻六石乘之得四十貫八百文內減盈四貫八百文餘三十六貫爲實以左中录豆八石爲法除之得录豆價四貫五百文合問今有犒軍銀每六人與七兩不足五十二兩三人與四兩不足四十一兩問軍人并銀各幾何答曰軍人六十六名銀一百二十九兩法曰置列六人七兩不足五十二兩三人四兩不足四十一兩互乘六人因四兩得二十四兩三人因七兩得二十一兩兩數相減餘三爲法以不足五十二乘二十四得一千二百四十八又以不足四十一兩乘二十一得八百六十一二數相減餘三百八十七爲銀實以法三除之得銀一百二十九兩又以人六三相乘得一十八以兩不足相減餘十一乘之得一百九十八爲人實以法三除之得軍人六十六合問盈適足
