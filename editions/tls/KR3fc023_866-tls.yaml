body:
  text: 法曰先下今年二月十二日加上年十二月減原借三月十五日餘十个月二十七日乗原借該月利三貫六百文得三十九貫二百四十文加原借鈔共一百二十九貫二百四十文減今還鈔餘爲凈欠鈔合問今有人上年四月二十日典鈔五十六貫月利二分今年二月十四日取贖問典月日并利鈔各幾何答曰計九箇月零二十四日利鈔一十貫九百七十六文法曰先置取贖二月十四日加上年十二月共十四个月十四日減原典四月二十日即得典借九个月二十四日零日以三除之得八分爲實以原典鈔以月利二分乗之得一兩一尓二分爲法乗實
