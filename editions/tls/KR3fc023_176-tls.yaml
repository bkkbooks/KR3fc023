body:
  text: 步上數餘八百四十六步爲實以畒法除之合問今有箭劉田兩畔各長一十二步中長六步闊一十四步問爲田幾何荅曰一百二十六步法曰置一畔十二步併中長六步共得一十八步以闊一十四步相乗得二百五十二步折半合問今有箭劉田兩畔各長六步中長一十二步闊一十四步問爲田幾何荅曰一百二十六步法曰置一畔八步併中長一十二步共得一十八步乗問一十四步得二百五十一步折半合問今有丘田周六百四十步徑三百八十步問爲田幾何
