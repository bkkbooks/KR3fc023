body:
  text: 答曰人參四萬三千五百斤原銀六千兩牙錢三百兩脚錢二百十七兩五錢人參價五千五百八十二兩五錢法曰置牙錢四定以定率五十兩因之得二百兩六分中取二分該原銀六千兩减牙錢二百兩餘剰五千八百兩以買參六斤因之得三万四千八百爲實却以七尔七分并脚錢三分共八尔爲法除之得人參四万三千五百斤以毎六斤歸之得七千二百五十却以毎七尓七分乗之得人參價五千五百八分二兩五尓以减原緫五千百两餘得脚錢二百一十七兩六尓合問九百九十九文錢市上梨棗買一千十一買梨得九箇
