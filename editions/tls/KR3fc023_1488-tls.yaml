body:
  text: 甲日織一丈七乙織丈三盡其令乙先織六十日次後甲織幾日及荅曰甲織一百九十五日法曰置乙織一丈三尺乘先織六十日得七十八丈爲實以甲織一十七尺减乙織一十三尺餘四尺爲法除之合問大馬每匹料五升小馬一匹四升平共関六十三石料夜喂飽剩一升荅曰大馬一百一十五匹小馬一千四百三十一匹法曰置料六十三石以减剩一升餘六十二石九斗升以約大馬一百一十五匹每匹五升乘之每五百七斗五升减餘五十七石二斗四升爲實以小馬每匹四升爲法除之得小馬合問
