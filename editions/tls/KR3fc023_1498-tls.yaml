body:
  text: 得三百六十六兩爲法除之合問今有四人來做二八日工價九錢銀二十四人做半月試問工錢該幾分荅曰一十兩一錢二分五厘法曰置人三十四以作二十五乘之得三百六千又以銀九冬因之得三百二十四兩爲實以人四東八日三十二爲法除之合問當年蘇武去北邊不知去了幾周年分明記得天邊月二百三十五番圓荅曰一十九年法曰置月圓二百三十五以周年十二月除之得一十九年不盡七乃閨月也合問二十四匹馬和驢支實斗並餘馬支五升驢支二問
