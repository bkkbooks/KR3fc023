body:
  text: 法曰置米二十三石四斗五升七合四勺折半得一十一石七斗二升八合七勺爲實以所糶鈔三十八貫折半得一十九貫爲法定身除之合問今有鈔三十七貫一百二十五文買絲四十五兩問毎兩該鈔幾何荅曰八百二十五文法曰置鈔三十七貫一百二十五文以三因得一百一十一貫三百七十五文爲實以三因所買絲四十五兩得一百三十五兩爲法定身除之合問今有布六百五十五丈二尺毎五丈二尺賣鈔一十貫問該鈔幾何荅曰一千二百六十貫法曰置所有布六百五十五丈二尺以二因得一千三百一十丈四尺爲實以二因毎五丈二尺得一十丈四尺爲法定身除之合問
