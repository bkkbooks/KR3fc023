body:
  text: 平無甲線半尺出水乙線一尺增浮六之徑線等雙周知者中少有右西江月荅曰池周四丈二尺水深八尺六分尺之五法曰併弦較出水一尺五寸自乘得二十二尺五寸堿出水一尺五寸餘二丈一尺倍之得池周四丈二尺以三而一得徑一丈四尺勾半池徑得七尺自乘得四十九尺以减弦較出水一尺五寸自乘得二十二尺五寸餘二十六尺五寸爲實信較出水一尺五寸得三尺爲法除之得水深八尺不盡二尺五寸以法約之得六分尺之五合問一叚田禾之外東邊近有荒丘五步繋其牛只爲繩長遊赱錢跡五分八步如同失弦疇索長多少是根由
