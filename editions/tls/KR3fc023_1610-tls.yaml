body:
  text: 地聽得客分銀不知銀数不知人七兩分之多四兩九兩分時少半斤荅曰六人銀四十六兩法曰置分銀七兩多四兩九兩少八兩互乗盈得三十六兩不足得五十六兩併之得九十二兩爲實以人分銀九兩七兩以少减多餘二爲法除之得銀四十六兩以减多四兩餘四十二兩以人分七兩除之得人六合問隅長堤邉搞劳夫盤堆紅果唱名呼七人八果剩二箇五人七果五人無荅曰三十五名果四十二顆法曰置盈不足互乗七人乗七果得四十九五人乗八果得四十以少减多餘九果爲法又置七人五人相乗得三十五人又爲法併盈不足
