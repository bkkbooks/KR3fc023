body:
  text: 問二分之一三分之二四分之三五分之四合之得幾何初學不識分母子多以爲疑今福斤兩俞之使其數曉二分之一即一斤中八兩也三分之二即一斤中二合五十六積也四分之三即一斤中二兩也五分之四即一斤價二百文中一百六十文也荅曰得一二斤也餘六十分比三百八十四也之四十三比一百七十五二實也法曰列置分母子二分三分四分五分扵右一之二之三之四扵左子互乗母先以之一乗三分四分五分得六十之二乗二分四分五分得八十之三二分三分五分得九自之乗二分三分四分得九十六併之得三百二十六爲實母相乗爲法四分五分自乗得一百二十實如法而一得二餘十法俱半之得數問三分之一五分之二合之得幾何
