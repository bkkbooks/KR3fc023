body:
  text: 除分法曰人數爲法錢數爲實有分者通之實如法而一即歸除法加有分者通之一句問三人三分人之均六錢三分錢之二各人得幾何荅曰二錢解題三人乃全功三分人之一乃一日六有中其人後二時六幾全文也三分錢之二爲三分中二分人上阮有分子兩於均錢亦立分子乃除分也法曰人數爲法有分者通之置三人以三分通之加分於一共得一十以錢分毋三乗得三十錢數爲實有分者通之置六錢以三分通之加分子二共得二十以人分毋三乗得六十實如法而一得二合問問七人均八錢二分錢之一各人得幾何
