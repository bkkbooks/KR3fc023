body:
  text: 今有杖鼓田四畒一十步一百六十八分步之九十七南闊二十五六分步之五北闊三十二步七分步之六中闊一十八步問正長何答曰四十一步法曰通田加零一步共得九百七十步以分母一百六十八通之加分子九十七共得一十六万三千五十七爲實别置南闊二十五步以分母六通之加分子五共得一百五十五又互乗北闊分母七千八五北闊三十五步以分母七通之加分子六共得二百三十又互乗南闊分母共得一千三百八十又置中闊一十八步以南闊分母六乗之得一百八又乗北闊分母七共得七百五十六倍之得一五百十二併入南北闊数共得三千九百七十七爲法除之合問
