body:
  text: 六尺得四百二文通減右行錢一貫二百一十九文餘得三百九十二文以羅四尺除之得羅尺價九十八文合問今有紅錦四尺青錦五尺緑錦六尺價皆過三百文只云紅錦四尺價過青錦一尺青錦五尺價過緑錦一尺緑錦六尺價過紅錦一尺問三色各尺價幾何荅曰紅錦九十三文一百一十九分文之二十三青錦七十三文一百一十九分文之一十三緑錦六十五文一百一十九分文之六十五法曰列所問數以右行紅正四爲法遍乗左行得數紅正四爲法青負一空錢正三百
