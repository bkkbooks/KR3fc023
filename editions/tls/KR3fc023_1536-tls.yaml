body:
  text: 半課於五尺有餘三尺七尺半草曰置盈不足二日不足五寸三日有餘三尺七寸半維乗二日乗有餘三尺七寸半得七尺五寸三日乗不足五寸得一尺五寸共併得九尺爲實併盈不足爲法盈三尺七寸半不足五寸共併得四尺二寸半實如法而一得二日餘實五寸法實皆二五約之得一十七分日之二求大䑕行置第三日行四以日分子二乗得八十寸爲實以日分母十七爲法除得四寸除餘實一二併前二日所行三尺共行三尺四寸十七分寸之十二求小䑕行置第三日行二寸半以日分子二乗得五寸爲實以日分母十七爲法除不滿法只得十七分寸之五併前二日
