body:
  text: 爲實以股弦較索垂地法除之得三十二尺加較二十得三十四尺半之得斜長一十七尺合問垣高一丈歌木幾垣木較去本以記之臥而遇書二尺問去本幾何答曰四十九尺五寸法曰垣高如勾遇書如股弦較勾垣高一百寸自乘得一萬寸爲實以股弦較木餘十寸爲法除之得一千寸以减較十寸餘九百九十寸折半
