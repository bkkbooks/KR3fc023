body:
  text: 之照前法啇置第一位得五百下法亦置上啇五百進二位爲五万爲方法與上啇五除寶二十五万餘寶四万一千六百乃二乘方法得一十万爲廉法一退得一万下法再迟得百續啇置第二位以廉法一万啇寶得四十下法亦置上啇四十進一位爲四百爲隅法以廉隅二法共一万四百皆與上啇四除實盡得五百四十却以分毋四爲法除之得圓周合問積三百步問爲圓周幾何答曰六十步法曰置積三百步以圓法二十乘之得三十六百步爲寶以開平方法除之上啇六十步下法亦置上啇六十進一位爲六百爲方法與上啇六除寶盡合問
