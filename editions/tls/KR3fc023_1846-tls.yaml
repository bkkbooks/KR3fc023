body:
  text: 併乘共步得二万五千五百七十八爲宵以弦和六百三十减股弦和二百二千四餘四百六爲法除得股弦和六十二步就以八乘得五百四步左下三百三十六共得八百四十以十五除得勾弦和五十四步就乘股弦和六十三步得一千五百二十八倍得七千五十六爲實以開平方法除得八十四即勾股弦和副置位上八十四以减股弦和除得勾二十下位八十四以减勾弦和五十六餘得股二十八又勾弦和五十六减勾一餘得弦三十五合問會有勾股田股長三十六步弦斜四十五步問勾闊幾何荅曰二十七步
  hash: sha256:f9dec433d5cee6344ec4738db53e511d11c69001dd59225d72106895df58aecd
