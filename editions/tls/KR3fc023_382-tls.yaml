body:
  text: 得七文實歩不滿法者爲貴率每三十文不盡之數於三十箇各增一文每箇八文以實三十箇減法七十八箇餘四十八箇各得七文爲賤率合問問出錢一十三貴九百七十文買絲一石二鈞二十八斤三兩五銖欲貴賤石率之荅曰一鈞九兩十二銖石價八千五十一文一石一均二十七斤九兩十七銖石價八千五十二文法曰以所買絲一石即一百二十斤以三百八十四銖通得四万六千八十銖以乘錢數一万三千九百七十得六餘四千三百七十三万七千六百銖爲實以所買絲一石二鈞二十八斤三兩以餘法通之加零五銖共得七万九千九百四十九銖爲法除之一石得八斤五
