body:
  text: 千九百萬一千六百以乗全步一分分子之一俱得四億七千九百萬一千六百以全步積分通畒步得一千一百四十九億六千三十八萬四千爲實各以本毋除子全步一分得四億七千九百萬一千六百其二分之一得二億三千九百五十萬八百其三分之一得一億五千九百六十六萬七千二百其四分之一得一億千九百七十五萬四百其五分之一得九千五百八十萬三百二十其大分之一得七千九百八十三萬三千六百其七分之一得六千八百四十二萬八千八百其八分之一得五千九百八十七萬五十二百其九分之一得五千三百二十二萬二千四百其十分之一得四千七百九十萬一百六十其十一分之一得四千三百一十四萬五千六百其十二分之一得三千九百九十一萬六千八百併之得一十四億八千六百四十四萬二千八百八十爲法除之得七十七步餘實五億四百二十八萬二千二百四十法實皆一千七百二十八約之合問
