body:
  text: 門以弦卒十七乘得三万加千一百步爲實再以卒十五乘得三万四千五百步亦爲實皆以勾卒八炎法除之得弦甲斜之四千八百八十七步半得乙東行四十三百一十二步半合問戶不知高廣竿不矢短長橫之不出四只從之不出二尺斜之適出問高廣褒各幾何荅曰高八尺廣六尺褒一丈縱如股橫如勾斜如弦縱之不出二尺名股弦較橫之不出四尺名勾弦較以二較求勾股
