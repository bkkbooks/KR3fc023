body:
  text: 法除之得勾闊三十五步加差九十步得弦長一百二十五步別以勾弦各自乗相减餘一万四千四百步爲實以開平方法除之得股長合問今有䑓上方四丈髙四丈八尺四隅袤斜五丈四尺四寸下方幾何答曰九丈一尺二寸法曰置䑓髙四十八尺爲股自乗得二十三万四百寸置袤斜五十四尺四寸爲弦自乗得二十九万五千九百三十六寸內减股自乗餘六万五千五百三十六寸爲實以開平方法除之得勾二十五尺六寸倍之爲兩袤共五百一十二寸加上方四丈共得下方九丈一尺二寸合問今有勾股地一叚勾闊六步股長一十二步就勾折處開
  hash: sha256:baee01c9e866d2b4632456d84d048b6b9c6cd26f2254a02326784fc06916c827
