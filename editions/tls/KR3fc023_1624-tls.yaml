body:
  text: 中二二乗得四减中行中九餘得中石下一二乗得二减中行下三餘得下一三十九斗二乗得七十八斗减中行一百二斗餘得二十四斗又以左行上一爲法復遍乗右行上三一乗得三與左行上三對减尽中二一乗得三十九斗减左行得中四下一一乗得一减左行下九餘得十八三十九斗一乗得三十九斗减左行七十八斗餘得三十九斗再以中行中五爲法遍乗左行中四得二十下八得四十三十九斗得一百九十五斗復以左行中四爲法遍乗中行中五得二十與左行中二十對减尽下一得四减左行下四十餘得三十六爲法二十四斗得九十六斗减左行一百九十各斗餘得九十九斗爲實以法除每下禾一束得米二斗爲實二十七法實皆九約之得四分斗之三中行一十兩斗减下禾一束得一斗四分斗之三餘二十一斗四分斗之
