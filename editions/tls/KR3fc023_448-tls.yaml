body:
  text: 紅絹幾何答曰四十八疋一丈三尺二寸法曰置絹六十三疋以疋法四十二尺通之加零二十四尺共得二千六百七十尺以染絹三十八尺乗之得一十万一千四百六十尺爲實併買蘇木絹一十二尺染絹三十八尺共得五丈爲法除實得二千二十尺二寸以疋法四十二尺約之合問今有車載布一千九百六十二疋三尺疋法二丈四尺毎疋車腳錢六十二文五分其布毎疋三貫九百三十七文五分今無錢就物抽布問主腳各該幾何答曰主該一千九百三十一疋一丈一尺二寸三厘一毫二絲五忽
  hash: sha256:e644c6e1dc738ec002d60cd152e0e51fbfecdfa9f829e506f722989b8fb1dc23
