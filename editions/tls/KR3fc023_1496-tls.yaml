body:
  text: 之得一十一万二千寸爲實以爲法除之合問二人推車忙辛苦徑輪該尺九五一日轉輪二萬問公数和何数荅曰一百三十里法曰置半徑輪一九寸五分倍之得五尺九寸爲全徑数是三因之得一百一十七寸为一转数却以二五乘之得二百三十四寸爲實以里步三百六十以五十寸乘之三十爲法除之合問四人五日去淘金五兩七錢零淘三秤足問公當用幾何人荅曰二十五人法曰通三秤得四十五斤求兩得七二十以四人因之得二千九百八十又以五日因之得一万四千四百兩爲實以淘金五兩七六分乘今淘百日
