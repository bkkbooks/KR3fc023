body:
  text: 荅曰大夫一鹿三分鹿之二不更一鹿三分鹿之一簮褭一鹿上造鹿三分之二公士鹿三分之一法曰五人以爵次均五鹿者大夫爲五不更爲四簮褭爲二上造爲二公士爲一各列置衰排五四三二一副併一十五爲法以所分五鹿乗未併者五得二十五四得二十三得十五二得十一得五各自爲列實以法十五除之大夫得一鹿餘十不更得一鹿餘五簮褭得一鹿上造十公士五各不滿一鹿止可爲分子法實俱五約之得數合問大夫不更簮褭上造公士五人依爵次支粟一十五斗後大夫亦支五斗倉無粟欲以六人依爵次均之荅曰大夫二人各出一斗四分斗之一
