body:
  text: 不動亦從寅位上定實却扵丑上得兩順数回寅上得尔卯上得分辰上得厘共得四厘五毫合問加法今有米一千三百五十六石三斗毎石價鈔一十五貫問該鈔幾何荅曰二萬三百四十四貫五百文法曰置米爲實以毎石價鈔爲法加之得数亦從寅上定實順数法十貫卯上得貫乃卯上得實首千仍復逆数回寅上得万貫合問減法今有鈔二萬三百四十四貫五百文毎鈔一十五貫糶米一石問該米幾何荅曰一千三百五十六石三斗法曰置鈔爲實以毎石價鈔爲法減之得数亦從寅上
