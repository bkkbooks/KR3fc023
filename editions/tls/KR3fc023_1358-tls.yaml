body:
  text: 節得六十六分升之三十九餘節遁差數一二差一四是知九節之數合問九節差形箠長五尺斬本一尺重四斤斬末一尺重二斤問次第數各重幾斤荅曰第一尺二斤第二尺二斤半第三尺三斤第四尺三斤半第五尺四斤法曰九節竹隱其差爲問金以明其差爲問置本重四斤減末重二斤餘節差率二斤又置本重四斤自乘得一十六爲下第一衰副置五位五箇十六以差二減次得十四十一一十得八各列爲衰以本重四斤遍乘列衰上得六十四次得五十六得四十八得四十得三十二各自爲實以下第一衰十六爲法除之合問差形非斤兩不十六除
  hash: sha256:61b63bbfcf27be682997aaf91e959df3fe5aedbcb434d3d4ee9337d85d781b77
