body:
  text: 有餘者上下輩之人卒不可分裂推少就多合問空車日行七十里重車日行五十里今載粟至倉五日三返問遠幾何荅曰四十八里十八万里之十一法曰置空車七十重車五十爲人分母各以一百爲分子母互乘子得一百二十以三返乘之得三百六十爲法令空車七十重車五十相乘得三千五百又以五日乘之得一万十千五百爲實以法除之得四十八里餘實百十法實皆五十約之合問今有六縣均粟六萬石皆輸甲縣六人共一車載二十万石重車日行五十里空車日行七十里粟有貴賤有以筭数勞費相等出之甲縣四萬二千筭粟
  hash: sha256:536d576bc452f142be4c83ee68e9b95b3a83d0ecd434894634ad7a02f7f399be
