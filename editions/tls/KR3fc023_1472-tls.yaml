body:
  text: 法曰置先鋒頭隊長小甲兵各逓以八因見數加統兵一將八合問客人寄酒主人家明五鬥不曾慳此家主人沒道理四升添水換三畨換時先取酒後頭添水不爲難升鬥難然合備數酒各若干答曰鬥八升九合三勺四抄四撮水鬥一升六勺五抄六撮法曰置第一酒五鬥內四升得酒四鬥六升水四升第二度盜酒四升以八因酒鬥六升得三六合八勺水四升得三合二勺止存酒四鬥二升三合二勺水七六合勺第三度盜酒四升以八因酒四鬥二升三合二
