body:
  text: 四紡訖織成布疋一百八尺曾量兩家分有要明彰莫得些兒偏向右西江月答曰張昌一疋二丈八尺二寸李德三丈八尺二寸法曰各列置衰張昌九斤十二兩李德五斤四兩以斤通兩副併爲法得二百四十兩以織布一百八尺乗未併者張得一千六百八十四丈八尺李得九百七丈二尺各自爲列實以法除之又以疋法四丈二尺約之合問今借人銀一兩年終出利三錢其中九月主任煎盡数歸還步怨七兩三錢半数連本和利斗全問公此法兩根源甚法求之可見右西江月
