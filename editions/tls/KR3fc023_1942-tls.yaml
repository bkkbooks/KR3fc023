body:
  text: 三十五步併長平得和八十五步合問今有直積開方数加和一百零五步四十五步長平差請問三般多少数荅曰長六十步平一十五步和七十五步法曰置加和得積一百五步減差四十五步餘得長六十步減差四十五步餘得平一十五步併長平得和七十五步合問八較三平有四和二百二十八無多吕得當初一畝地和較長平各幾何荅曰長二十步平一十二步和三十二步較八步
