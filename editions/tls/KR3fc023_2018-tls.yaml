body:
  text: 於實数之下啇置第一位將徔方一進得十下法二進得百以啇實得三十下法亦置上啇得三百爲方法與徔方共三百一十皆與上啇三除實九百三十餘實三百三十乃二乗方法得六百併入徔方共得六百一十俱爲方法一退得六十一下法再退得一續啇置第二位以方法六十一啇餘實得五个下法亦置上啇五爲隅法以方隅二法共六十六皆與上啇五除餘實盡得底子二十五个合問今有兵士二十二萬八千四百八十名圓寨一毎五十六名爲一小隊外圓圍二十四步毎一千一百二十名爲一中隊毎隊指揮一員千戶二員百戶一十員毎二萬
