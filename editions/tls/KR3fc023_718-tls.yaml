body:
  text: 法曰各列置衰絲一十二分半綿二十分小麥三十七分半絹五十分副併得一百二十爲法以所賦絲三千六百二十八兩八分乗未併者各自爲實絲得四万五千三百六十綿得七万二千五百七十六小麥得一十三万六千八十絹得一十八万一四百四十以法除之得數以各率除合問今有桑地一十畝六分令姑姊妹三人採之只云姑採九分姊妹採七分妹採六分問各採幾何答曰姑四畝三分三厘六毫二十二分毫之八姊三畝三分七厘二毫二十二分毫之八妹二畝八分九厘二十二分毫之二十法曰各列置衰九六副併得爲法以所採地
