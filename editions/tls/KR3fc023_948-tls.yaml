body:
  text: 法曰置孟子一部三万四千六百八十五字以一二四為七衰法除之得初一日續數各日倍之合問一百饅頭一百小和尚各幾人答曰大僧二十五人該七十五箇小僧七十五人該二十五箇法曰置一百為實以三箇一箇併之得四箇為法除之得二十五列二位以一位三乘帶七十五箇為大僧得饅頭之數一位以三乗之得七十五為小僧之數以各率乗之合問無錢借債一年期緫利都還五秤絲原議一斤息二兩問
