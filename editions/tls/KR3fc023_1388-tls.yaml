body:
  text: 法曰置米一百六十三石八斗八升以折麥九升乗之得一百四十七石四斗九升一合爲實併米八升麥九升得一斗七升爲法除之合問今有納米二千八百六十九石五斗每斗價七十五文顧搬入倉每斗脚錢五文其米已運到倉爲無腳錢就抽米折還問合與脚米及到倉米各幾何荅曰到倉米二千六百九十石一斗五升六合二勺五抄脚米一百七十九石三斗四升三合七勺五投法曰置米一千八百六十九石五斗以斗價七十五文乗之得二百一十五萬二千一百二十五爲實併二價米七十五文脚五文共八十文爲法除之得到倉
  hash: sha256:5c9ee4e3e690c7234c04636ab48d37ee33729551a39636780d58dcdec9e71651
