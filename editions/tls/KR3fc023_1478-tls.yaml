body:
  text: 減多餘二倍之得四爲法除之得小車三十五輛以減總數五十一餘得大車一十六輛合問騾行七十馬行九先放騾行六日走次後放馬去追騾不知幾日得答曰二十一日法曰置騾行七十乗先行六日得四百二十爲實以騾行七十減馬行九十餘二十爲法除之合問三人二日四升七一十三口要糧吃一年三百六十日借問該糧幾多石答曰三十六石六鬥六升法曰置今吃糧一年計三百六十日乗今人口一十三口得四千六百八十又以原吃糧四升七合乗之得二百一十九石九鬥六升爲實以原人
