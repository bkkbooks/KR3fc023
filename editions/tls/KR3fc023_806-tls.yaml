body:
  text: 逓多粮一石六斗差分今有某州所管九等稅戶甲三百六十四戶乙三百九十六戶丙四百三十二戶丁五百七十戶戊五百八十四戶已六百七十六戶庚八百五十戶辛九百二十戶壬一千六百八戶合科米六萬五千六百六十四石今作等数從甲起各差一石六斗出之問每戶及逐等各幾何答曰甲每戶一十八石五斗三升二合五勺三百六十四戶共六千七百四十五石八斗三升乙每戶一十六石九斗三升二合五勺三百九十六戶共六千七百五石二斗七升
