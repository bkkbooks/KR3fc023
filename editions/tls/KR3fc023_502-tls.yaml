body:
  text: 數各以定率約之合問今有粟豆共六百三十八石粟斗價二百五十文豆斗價一百五十文問粟豆各幾何答曰粟二百三十九石二斗五升豆三百九十八石七斗五升法曰置粟豆六百三十八石乗粟斗價二百五十文得一十五百九十五貫爲實併二價粟二百五十文豆一百五十共四百文爲法除之得豆三百九十八石以緫數餘得粟二百三十九石二斗五升合問
