body:
  text: 十四步問北廣幾何答曰四十二步法曰通積九畒加零一百四十四步共得二千三百四步爲實以六十四步折半得三十二步爲法除之得廣七十二步减南廣三十步得北廣合問今有田積一百二十步只記得下周三十步問徑幾何答曰一十六步法曰四因田積得四百八十步爲實以下周三十步爲法除合問今有弧田一畒九十七步半矢一十五步問弦幾何答曰三十步法曰通田一畒加零九十七步半共得三百三十七步半以四乗三除得四百四十步爲實以矢一十五步爲法除之合問
