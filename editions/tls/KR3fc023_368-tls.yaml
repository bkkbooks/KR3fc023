body:
  text: 法曰以粟五十乘糳米三斗以分母三分通得九十加分子一共九十一得四千五百五十爲實以糳米二十四以原通分母三通得二十二爲法除之合問問御米一十四斗爲粟荅曰三十三斗三升三分升之一法曰以粟乘御米一十四斗爲實以御米二十一爲法除之問稻穀十二斗六升十五分升之十四爲粟幾何荅曰十斗五升九分升之七法曰以粟五十乘稻穀十二斗六升以分母十五通得一千八百九十加分子十四共一千九百四得九万五千二百爲實以稻穀六十以分母十五通得九百爲法除之問糲米一十九斗二升七分升之一爲粺米幾何荅曰一十二斗二升十四分升之三
