body:
  text: 今有方垜上方六箇下方一十一箇高六箇幾何答曰四百五十一箇法曰置上方自乘得三十六箇下方自乘得一百二十一上下方相乘得六十六箇併三位得二百二十三箇又上方减下方餘五箇半之得二箇半併前共二百一十五箇半以高六箇乘之得一千三百五十三箇如三而一合問今有果子一垜下方一十六箇問該幾何答曰一千四百九十六箇法曰置下方一十六箇張三位一位添一箇得一十七相乘得二百七十二箇又以一位添半箇得一十六箇半乘之得四千四百八十八箇如三而一合問
