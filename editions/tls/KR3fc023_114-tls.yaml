body:
  text: 錢三分銖之二減三分之二求之者一母互乗子求得二十四減一即一十銖三分銖之二益二分之一求之者五毋互乗子求得十八益五即五十三銖三分銖之一各平於三十六分之二十三三十六分全斤三百八十四銖內一分即十銖三分銖之二分子二十三即二百四十五銖三分銖之一法曰列置分毋子二分三分四分扵右之一之二之三扵左毋互乗子之一乗三分四分得十二之二乗二分四分得十六之三乗二分三分得十八副併十二十六十八得四十六爲平實毋相乗二分三分四分相乗得二十四分爲法以列數乗朱併分子列数三以乗十二得三十六乗十六得四十八乗十八得五十四亦以列數三乗法二十四得七十二數繁合用約分折半法得三十六實得二十三其之一得二得二十四之三得二十七以平實二十三減列實之二
