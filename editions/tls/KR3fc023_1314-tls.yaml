body:
  text: 一十三戊縣九百三十九石二千八百七十三分石之二千二百五十三法曰以各縣戶数爲分出四遠近里億又云菜價不等今以里價之錢重求各縣戶数爲衰均其輸也大明均其均其錢也以里億相併粟石價均戶載爲衰各列衰竎爲法以賦粟木要併者各自爲賓飄飄然如法而一合各以里僦相乘一車載二十三石行道一里得一每石寶得類四厘併粟價約縣戶爲衰甲縣万輸水縣僦相乘只以夢遊症價二十約二万五百二十戶得一千二十六爲衰乙縣行二百里以四厘相乘得八併粟價一十共得一十八約本縣一万二千三百一十二戶得六百八十四爲衰丙縣行一百五十里以四厘相乘得六併粟價一十二共得一十八約縣七千一百八十二戶得三百九十九爲衰丁縣道二百五十里以顧四厘乘得一十併粟價一十七共得二十七
