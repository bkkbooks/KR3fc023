body:
  text: 法曰置毎面一十四歩以六乗得八十四歩以七而一得一十二歩爲實以毎面一十四歩折半得七歩爲法乗之合問今有六角田毎面一十五歩問爲田幾何荅曰二畒一百九十五歩法曰置毎面一十五歩自乗得二百二十五歩以二乗之得六百七十五歩以畒法除之合問今有八角田毎面一十四歩問爲田幾何荅曰四畒法曰置毎面一十四歩以五乗得七十歩七而一得一十歩倍之得二十歩加一面一十四歩共三十四歩自乗得一千一百五十六
