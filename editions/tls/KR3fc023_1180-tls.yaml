body:
  text: 今有圓錐一所下周三十六尺髙二十四尺計積八百六十四尺欲截髙輳上周與下周相等問該高幾何荅曰八尺法曰置積八百六十四尺爲實以下周三十六尺自乗得一千二百九十六尺如圓法十二而一得一百八尺爲法除之得該高八尺合問今有圓錐一所下周三十六尺髙二十四尺欲去髙八尺問上周該幾何荅曰一十二尺法曰置下周三十六尺爲實以高二十四尺爲法除之得一尺五寸以乗截去高八尺得上周一十二尺合問今有築墻上廣二尺下廣四尺高八尺今巳築上廣二尺
