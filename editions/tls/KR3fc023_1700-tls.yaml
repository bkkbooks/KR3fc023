body:
  text: 中行丙負一得二十三分石之十加入一石得二十三分共得三十斗以乙正三除得二十三分石之十一爲乙禾一秉之數右行乙負一得二十三分石之十一加入正一石得二十三共得三十四以甲正二除得二十三分石之十七爲甲禾一秉之數合問上禾六秉損一斗八升當下禾十秉下禾十五秉損五升當上禾五秉問上下禾一秉各幾何荅曰上禾一秉八升下禾一秉三升法曰此問損積爲正當禾爲負求同前法列所問數以甲行上正六爲法相乗乙行上正六爲法下負十正一斗八升上負五得負三十下正十五得正九十正五升得正三斗
