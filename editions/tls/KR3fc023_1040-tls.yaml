body:
  text: 法曰通積八畒得一千九百二十步以四乗得七千六百八十步併不及自乗得七百八十四步共得八千四百六十四步爲實以開平方法除之得廣九十二步合問今有直田八畒只云廣共九十二步問廣少如幾何答曰二十八步法曰通田八畒得一千九百二十步以四乗得七千六百八十步於上又廣九十一步自乗得八千四百六十四步以少减多餘七百八十四步爲實以開平方法除之合問今有直田三頃七十五畒方一面幾何答曰一里
