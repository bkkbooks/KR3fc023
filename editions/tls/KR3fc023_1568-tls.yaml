body:
  text: 兩盈鈔三十一貫五百文問各價幾何答曰大紅每兩一十六貫青每兩九貫五百文法曰置列六紅九兩青一十五兩鈔一貫五百文左大紅十八兩青士兩鈔一貫五百石先以左列宋青十五爲法遍乘右行大紅得二百七十兩青得四百五兩鈔得四百七十二貫五百文以右行中青二十七兩爲法乘左行大紅得二百四十三對減右行大紅餘二十士兩青得四百五兩對減盡鈔得四十貫五百文對減餘四百三十以大紅二十七貫除之得大紅價二十六貫又以左行大紅九兩乘得一百貫內減盈一貫文餘一百四十二貫五百文以左
