body:
  text: 約及畝法而一合問今有圓田徑一十八步周五十四步問爲田幾何荅曰一畝三步法曰徑求積置徑一十八步自乗得三百二十四步以三乗之得九百七十二步以四而一合問周求積置周五十四步自乗得二千九百一十六步以十二而一合問今有圓田徑六步十三分步之十二周二十步四十一分步之三十二問爲田幾何荅曰三十六步法曰徑求積置徑六步以分毋十三通之加分子十二共得九十自乗得八又以分毋十三減分子十二餘一以乗分子亦得十二
