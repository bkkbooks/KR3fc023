body:
  text: 十五異減左行豕正十六餘得豕負四十九正一貫得正五貫異減左一負一負二百餘得負三貫八百再相乗以中行羊負十一爲法遍乗左行羊正三十七得羊正四百七豕負四十九得豕負五百三十九價負三貫八百得價負四十一貫八百却以左行羊正三十七爲法復遍乗中行羊負十一得羊負四百七与左行羊正四百一異名對減尽豕正十五得豕正五百五十五異減左行豕負五百三十九餘得豕正一十六爲法正一貫得正三十七貫異減左行負四十一貫八百餘得正四貫八百爲實以法除得豕價一百中行豕正十五以價二百乗得四貫五百加正一貫共得五負五百以羊十一除得羊價五百右行豕負十三以價三百六負三百九百加入正一貫共得四貫九百減羊五價得二貫五百餘加二貫
