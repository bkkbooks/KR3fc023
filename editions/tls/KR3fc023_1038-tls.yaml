body:
  text: 今有直田六十步口兩隅斜相去六十八步問廣幾何答曰三十二步法曰置六十步自乗得三千六百步斜去六十八步自乗得四千六百二十四步以少减多餘一十二十四步以開平方法除之得廣合問今有直田廣三十二步兩隅斜去六十八步問幾何答曰六十步法曰置斜六十八步自乗得四千六百二十四步减廣三十二步自乗得一千二十四步餘三千六百步爲實以開平方法除之得合問今有直田八畒只云廣不及二十八步問廣共何答曰九十二步
