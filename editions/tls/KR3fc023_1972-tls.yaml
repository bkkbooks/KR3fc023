body:
  text: 上啇爲三十万三遍五乗得六千二百五十万爲隅法又以上啇五一遍乗上廉爲三千二百億二遍乗中廉得四百億三遍乗下廉得二十五億以方廉隅五法共一万六千四百二十五億六千二百五十万皆與上啇三除餘實八万二千一百二十八億一千二百五十万仍餘實一百二千六百三十四億三千二百八十二万三千七百七十六尺乃二乗上廉得六千四百億三乗中廉得一千二百億四乗下廉得一百億五乗隅法得三億一千二百五十万皆併入方法共二万五百三億一千二百五十万又於下法再置上啇四百五進四位爲四百五十万副置三位第一位以四十五二遍乗將九十一億一千二百五十万又以一十乗之得九百一十一億二千五百万爲上廉第二位以四十五乗之得二億二百五十万又以一十乗
  hash: sha256:d5157a6371d0112632aa25b632fbe03242ef9d23b5a838068b3ade1e8296838e
