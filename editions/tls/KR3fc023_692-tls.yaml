body:
  text: 十九又以一兩六除中絲八十一半下線六十六併三位得二百四十七半爲法以除錢鈔千一百八八百文得線兩價四貫四百八十文卻以一兩六除得絲兩介以二兩除得綿兩價今有鈔七萬五千八百四十貫買綾羅絹三色其綾疋價一百四十三貫羅疋價一百三十二貫絹疋價七十五貫卻要一停綾二停羅三停絹問各幾何答曰綾一百二十疋羅二百四十疋絹三百六十疋法曰以二乗羅價得二百六十四貫三乗絹價得二百二十五貫併入綾價共得六百三十二貫爲法置緫紗副置三位上一乗得七万五
