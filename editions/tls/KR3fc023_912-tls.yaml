body:
  text: 得牛一十二頭以减緫数得馬一十六匹以各陪油乗之合問三将屯軍五萬名賞金千兩要均平甲多乙数三千旅乙比丙多一半兵今問欲知人数目各該金数要分明雖然不是玄微数會者須還一藝精答曰甲二万一千八百名金四百三十六兩乙一萬八千八百名金三百七十六兩丙九千四百名金一百八十八兩法曰置緫軍五万名内减甲多三十餘四万七千名爲實以三分爲率内减丙半分餘二分半爲法除之得乙軍数加三千得甲軍数将乙軍折半得丙軍数每軍該金二分乗之得数合問
