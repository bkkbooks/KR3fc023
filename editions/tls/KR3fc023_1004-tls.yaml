body:
  text: 開立方法曰置積與寶別置一筭名曰下法泵下之法於寶數之下自末位常超二位約寶一下定一千下定十百万十定百上啇置第一位得數下法之上亦置上啇數自乘名曰隅法命上啇除寶法寶相呼以破積數乃三乘隅法爲方法又置上啇數以三乘之爲廉法方法一退廉法再退下法三退積啇置第二位得數下法之上亦置上啇數自乘與隅法又以上啇數乘廉法以方廉隅三法皆與上啇除寶訖乃二乘廉法三乘隅法皆併入方法再置上啇數以三乘之爲廉法方法一退廉法再退丁法三退續啇置第三位得數下法之上亦置
