body:
  text: 直田一畒無零字不知長闊如何是長中添二約之了恰當平步八分二荅曰長三十步闊八步法曰通田一畒得二百四十步以長添二歩得長八分闊二分約之得田長三十步添二步共三十二步以八約得四歩乃二因得闊八步合問今有直田不知畒兩隅相去十三歩長內減平餘有七問公此法如何取荅曰該田二分五厘法曰置兩隅相去一十三歩自乘得一百六十九歩長減平餘七歩自乘得四十九歩以少減多餘一百二十步折半畒法而一合問今有直田不知畒長闊相和十七步平不及長廿五尺請問田該多少數荅曰該由二分五厘
