body:
  text: 二十貫爲實以法十一除得一貫百一十八文十一分乑之二却以牛十一乗馬六得六十六爲法又以牛十一乗鈔四十貫得四百四十貫却以牛四乗鈔二十貫得八十貫以減餘得鈔三百六十貫爲實以法除得馬價五貫四百五十四文餘實三十六以六約得一十一分乑之六合問甲乙持錢甲添乙中半而及五十文乙添甲太半亦足五十文問各幾何荅曰甲三十七文半乙二十五文法曰甲欲乙中半乙母二分子之一乙欲甲之太半甲母是三分子乃之二以甲母三分乗乙錢五十得一百五十復以乙母二分乗甲錢五十得一百以少減
  hash: sha256:db4aa8ea7b77d5767f05c104f29ffbf85a014d81453cbf86823e23151f2f3a6f
