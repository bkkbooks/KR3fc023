body:
  text: 五戶乗一十五分得二千四百二十五分下下等一百二十戶乗七分五厘得九百分倂之得八千九百七分爲法除實四百十兩爲一分之数以乗每戶各分得每戶数却乗各等戶数得共炭数上上等每戶九十分得四万五百兩六戶得二十四万三兩中等每戶七十分得三万一千五百兩共二十五万二千兩上下等每戶六十分得二万七千兩共一十二戶得三十二万四千兩中上等每戶五十五分得二万四千七百五十兩共一十五戶得三十七万一千二百五十兩中中等每戶四十二分得二万一千六百兩共二十四戶得五十一万八千四百兩中下等每戶四十二分得一万八千九百兩共二十七戶得五十一万三百兩下上等每戶三十五分得一万五千七百五十兩共四十九戶得七十七万一千七百五十兩下中等每戶一十五分得六千七百五十兩共六十五戶得六十四万一千二百
