body:
  text: 袤六十六自乗得四千三百五十六乗之得一億二千二百九十万四十五百四十尺於上置髙三丈以廣差六尺乗之得一百八十尺爲法除之得六十八万二千八百三爲實以三因末廣一十八尺得五十四尺以袤六十六尺乗之得三千五百六十四却以廣差六尺除之得五百九十四爲從廉開立方法除之三丈三尺爲甲袤以本髙三丈乗之得九百九十尺却以本袤六十六尺除之得一丈五尺爲甲髙又置甲袤二十三尺以廣差六尺乗之得一百九十八以本袤六十六尺除之得三尺加末廣一丈八尺共得二丈一尺爲甲縣上廣合問求乙縣均給積髙袤廣置人二千三百七十八以程㓛一尺九寸八分乗之得四千七百八尺四寸四以六因得二万八千二百五十尺六寸四分以袤
  hash: sha256:8320e0f00aa976e6841ff283d42cd1e69bc34c0eec3f4c65b9b90db1a6582eac
