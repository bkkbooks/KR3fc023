body:
  text: 一文自乘得四萬三千四十六貫七日二十一文即第十六日糸數又自乘得于十二千一十八八十八百五十一貫八百四十文爲實以九除之合問俠伯子男五四三二一儂有金五秤依率要分訖答曰公一秤十斤侯一秤五斤伯一秤子一十斤男五斤法曰各列置衰公五侯四斤三子二一副併得一十五爲法以所分金七十五斤乗未併者公得三有七十五俠得三得一百二十五得一百五十男得七十五各自爲列實以法十五各除之合問甲乙丙丁戊分銀一兩五甲多戊錢三互和折半與答曰甲三錢六分乙三錢三分二厘五
