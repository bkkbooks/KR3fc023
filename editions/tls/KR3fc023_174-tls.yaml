body:
  text: 十九步爲法乗之得一千九百八十五步以畒法除之合問今有八不等田正北六步正南一十九步正東一十二步正西一十八步東北二十五步西北一十五步西南一十步東南五步問爲田幾何荅曰三畒五分二厘五毫法曰以繩量之正中長得三十六步闊得三十步相乗得直田積一千八十步扵上次量東北角勾一十五步股二十步相乗得三百西北角勾九步股一十二步相乗得一得八步西南角勾六步股八步相乗得四十八步東南角勾步股四步相乗得一十二步併四數折半得二百三十步
