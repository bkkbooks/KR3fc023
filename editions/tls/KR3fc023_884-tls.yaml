body:
  text: 互乗四瓯乗一百九十两得七百六十两九两乗一百隻得九百以少减多餘一百四十以上三盏乗之得四百二十爲實以法七兩除之得盞六十以减緫数百隻餘得甌四十各以油率乗之合問節遇元宵十五明燈幾盞堪游三停盞子二停甌呼油恰就半斤分爲五盞十兩四甌無留盞甌筭得根由端的郡中少有右西江月答曰甌五十箇盞七十五箇法曰置油二百四十五兩爲實以二甌油五兩三盞油四兩八尓併之得九兩八尓爲法除之得二十五爲一停率以乗各率合問今有数珠一串輪來仔細分明三枚無剰五無零七箇約
