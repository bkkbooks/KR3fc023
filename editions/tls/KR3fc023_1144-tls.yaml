body:
  text: 幾何答曰七千一百一十二尺法曰併上下廣半之得一十四尺以髙四尺乗之得五十六尺又以袤一百二十七尺乗之合問溝上廣一丈五尺下廣一丈深五尺袤七丈問爲積幾何答曰四千三百七十五尺法曰併上下廣半之得一十二尺五寸以深五尺乗之得六十二尺五寸又以袤七十尺乗之合問壍上廣一丈六尺三寸下廣一丈深六尺三寸袤一十三丈二尺一寸問爲積幾何答曰一萬九百四十三尺八寸二分四厘五毫
