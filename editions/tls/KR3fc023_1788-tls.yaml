body:
  text: 却以左行兎負一爲法復遍乗右行兎正七得正七与左行兎負七異名對減尽豬負一得負一左行豬空无減加得豬負一羊空无價減亦得羊正十四正一千得正一千同加左行正七千共得正八千再相乗以中行豬正四爲法遍乗左行豬負一得負四羊正十四得正五十六正八千得正三万二千却以左行豬負一爲法復遍乗中行豬正四得正四与左行雞負四異名對減尽羊負一得負一異減左行羊正五十六餘得羊正五十五爲父阿正一千得正一千同加左行正三万二千共得正三万三千爲實以法除得羊價六百中行一千加羊負一價六百共得一千六百以豬正四除得豬價四百右行正一千加豬負一價四百共得一千四百以兎除得五價合問
