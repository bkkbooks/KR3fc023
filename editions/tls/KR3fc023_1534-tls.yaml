body:
  text: 垣厚五尺兩䑕對穿大䑕日行一尺自倍小䑕日行一尺自半問何日相逢各行幾尺答曰相逢於二日十七分日之三大䑕行三尺四寸十七分寸之十二小䑕行一尺五寸十七分寸之五法曰此問亦良增駑縮之意假令二日不足五寸大䑕初日行一尺二日行二尺共行三尺小䑕初日行一尺二日行五寸共行一尺五寸二䑕共行四尺五寸課於五尺不足五寸令之三日有餘三尺七寸半大䑕初日行一尺二日行二尺三日行四尺共行七尺小䑕初日行一尺二日行五寸三日行二寸半行一尺七寸半二䑕共行八尺七寸
