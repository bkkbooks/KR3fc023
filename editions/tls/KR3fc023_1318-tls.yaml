body:
  text: 何荅曰甲縣粟八三千一百石車三千三百二十四輛乙丙縣各粟六成三千一百七十五石各車二千五百二十七輛丁縣粟四萬五百五十石車一千六百二十二輛法曰置各縣戶数以行道日数而一爲衰甲縣一万戶行道八百除得一百二十五爲衰乙縣九千五百戶行道十日除得九十五爲衰丙縣一万二千三百三十戶行一十三日除行九十五爲衰丁縣一万二千二百戶行道二十日除得六十一爲衰各列置衰甲一百二十五乙丙各九十五丁六十一副併四縣共衰三百七十六爲法以所
