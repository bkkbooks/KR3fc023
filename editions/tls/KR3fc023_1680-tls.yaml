body:
  text: 四十三万七千四百加入價正二十一万六百共得價正六十四万八千以荅正一十二万九千六百除得荅價五厼第三行黍正二百九十七以六乑乗得一千七百八十二加入價負一千八得價負二千七百九十減荅負五百四以價五厼荅得二千五百二十以減價負二千七百九十餘得價負二百七十以菽負九十除得菽價三厼第二行黍負以價六乑乗得四十八加入價正一百七十二共得價正二百二十以減荅正三十一價一百五十五菽正十五價得四十五餘價正二十以麥正五除得麥價四乑第一行價正一百四十內減黍五圓得二十荅二價得十菽三價得九麥七價得二十八餘得價六十三以麻九除之得麻價七豕合問
