body:
  text: 法曰置筸三十羽十五筈五十爲分母以一人爲分子列分母子三十五十十五扵右一人一人扵左以毋互乘子一人乘五十又乘十五得七百五十一人乘三十又乘十五得四百五十一人乘三十又乘五十得一干五百併之共得二千七百爲法以分母相乘三十乘五十得一千五百又十五乘得二万二千五百爲寶以法除之得八矢餘寶九百以法約之合問假田初歲三畝一錢次年四畝一錢後年五畝一錢兄三歲收息一百問田幾何答曰一頃二十七畒四十七分畒之三十一法曰置畒爲分母錢爲分子三畒四畒五畒右一一左以茲互乘子一乘四畒又乘五畒得二十一乑乘三畒又乘五畒得一十五一乑乘三又飛
