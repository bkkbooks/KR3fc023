body:
  text: 二步併長平得和二十步合問積減三平等二長一平一較恰相當有人先求和步出便是寰中筭最強荅曰長六步平四步較二步和一十步法曰置三平與二長適等約之得四步以三乗之得一十二步以二除之得長六步減平四步得較二步加平四步得恰相當與長六步併長平得和一十步和問今將直積開方数併入原長四十五次將長步平啓云加平二十有一步荅曰長二十五步平一十六步
