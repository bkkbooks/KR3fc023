body:
  text: 答曰三步二万二千八百三十七分步之一万五百九十三法曰置外周七十二步以分母四通之加分子三共得二百九十一互乗中周分母一千六百四十八得四十七万九千五百六十八又置中周五十一步以分母一千六百四十八通之加分子一千五百九十三共得八万五千六百四十一互乗外周分母四得三十四万二千五百六十四併之得八十二万二千一百三十二折半得四十一万一千六十六爲法别置積步二百一十六步以外周分母四乗之得八百六十四以乗中周分母一千六百四十八得一百四十一万三千八百七十一爲實以法除之得徑三步餘實一十九万六百七十四法實皆一十八約之合問今有錢田積七十二步只云通徑一十二步問内方幾何
