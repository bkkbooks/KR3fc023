body:
  text: 維乗三万乗多三万五千三百九十八分得一十餘七千一百七十五万四千又以四万乗不足一千七百三十八糸五分得六千九百五十四万併之爲實併二位得一十一三千一百二千六万四千併盈不足爲法三万五千三百八十八分不足一千七百三十八五分所得三十七万一千二百九十三分實如法而一得原本錢三万四百六十八餘八万四千八百七十六减五返歸本息錢六万餘爲利息錢二万九千五百三十一三十七万一千二百九十三万之二十八万六千四百一十七合問漆三易油四油四和漆五今有漆三斗欲令分以易油和餘漆問出漆得油和漆各幾何答曰出漆一斗一升四分升之一易油一斗五升和漆一斗八升四分升之三
