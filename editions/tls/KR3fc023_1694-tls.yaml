body:
  text: 一百以牛二除得牛價一貫二百合問一禾三秉濟六斗當下禾十秉下禾五秉添一斗當上禾一秉問上下禾每秉各幾何荅曰上禾一秉八斗下禾一秉三斗法曰此問添積爲正當禾爲負求同前法列所問數以甲行上二爲法相乗乙行得數上正三爲法下負十添正六斗上負二得負六下正五得正一十五添正一斗得正三斗却以乙行上負二爲法復遍乗甲行上正三得正六与乙行負六異對減尽下負十得負二十異減第二行下正十五餘得下正五爲法正六斗得正十二斗同加乙行正三斗得正一十五斗爲實以法除得下禾一秉三斗
