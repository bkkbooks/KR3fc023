body:
  text: 貫若布七疋價與絹五疋價適等問二價各幾何答曰絹價七貫布價五貫法曰列布七疋扵上絹五疋扵下各以不足鈔一貫乘之上得十貫下得五貫各爲實以布四疋絹疋以少減多餘一疋爲法各除上得絹價七貫下得布價五貫合問今有商經營五返初返得利加二還米一十五石次返得利加三還米二十石次返得利加四還米一十八石次返得利加五還米一十一石次返和利加六還米一十四石餘米四石五斗六升問原本米幾何答曰五十石曰置初返還米一十五石利加三得一十九石五十添次返還米二十
