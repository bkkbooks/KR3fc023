body:
  text: 答曰六十八疋二丈九尺法曰以所求率四十八尺乗麻布與錢數們爲實以麻布二疋先四十二尺通之和零三尺八十七尺卻以分十六乗得一千三百九十二爲法除之得三千二百九十三尺以紬疋四十八尺除之合問今有絲五十九斤十一兩六織絹四十七疋四尺四寸疋法宮尺三十二尺問毎疋該絲幾何答曰一斤四兩法曰以所求率三十二尺乗絲教五十九斤其十一兩六銖得二五分以求斤通得共五十九斤七分三毫一絲二忽五錢却以三十二尺乗得一千九百一十斤毕爲實以織絹四十疋以三十二尺通之加零二十四尺四寸共一千五百二十八尺四寸爲法除之合問
