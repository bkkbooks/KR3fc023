body:
  text: 五尺乃四乗隅法得八百六十四億爲方法下法再置上啇十六億副置二位第一位自乗得三十六億又以六乗得二百一十六億爲上廉第二位以四乗得二十四億爲下廉乃方法一退得八十六億四千万上廉再退得二億一千六百万下廉三退得二百四十万下法四退得万續啇置第二位以方廉三法共八十八億五千八百四十万啇餘實得七十下法亦置上啇爲七万再自乗得三百四十三万爲隅法又以上啇七一遍乗上廉得一十五億一千二百万二遍乗下廉得一億一千七百六十万以方廉隅四法共一百二億七千三百三万皆與上啇七除餘實七百一十九億一千一百二十一万仍餘實六十億八千二百九十三万六百二十五尺乃二乗上廉得三十億二千四百万
  hash: sha256:c322f6c4dc512723190644a51bd2803086f2efbd06e620b117d34d20877cebeb
