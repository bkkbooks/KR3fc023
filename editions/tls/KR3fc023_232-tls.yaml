body:
  text: 法曰置周二百一十六步徑九十三步相乗得二万八十八步以四而得五千二十二步爲實以畒法除之合問今有凹田下周一百八十六步徑七十二步問爲田幾何荅曰一十三畒九分五厘法曰置周一百八十六步徑七十二步相乗得一万三千三百九十二步以而一得三千三百四十八步爲實以畒法除之合問今有勾月田外彎一百七十二步半內彎一百二十七步半徑二十一步問爲田幾何荅曰六畒一百三十五步法曰置外彎一百七十二步半內彎一百二十七步半併之得三百步折半得一百五十步爲實以徑二十一步折半得一十
