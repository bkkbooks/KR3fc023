body:
  text: 百六十二寸五分以銅方寸重七兩五乘之得四千二百一十八兩七五分减六見斤至斤止零爲兩合問又法置周三十寸再自乘得二万七千寸以圎周求積率四十八除之得五百六十二寸五分照前乘除合問今有鉄墩面方一尺二寸底方一尺五寸高九寸別鉄方寸重六兩問重幾何答曰四百一十五斤二兩法曰置面方一十二寸自乘得一百四十四寸底方一十五寸自乘得二百二十五寸併之得三百六十九寸又以高九寸乘之得三千三百二十一寸以三而一得一千一百七寸又鉄寸重六兩乘之得六千六百四十二兩爲實以斤法十六除之登順
