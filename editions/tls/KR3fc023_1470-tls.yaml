body:
  text: 二十五是乙程甲今先到回迎乙二百里地恰相迎加減乗除誰不會此法亦須筭會能答曰俱行一十六日到程二千二百里法曰置回迎二百里爲實以乙程一百一十五里減甲程一百五十里餘二十五里折半得一十二里半爲法除之得行一十六日以甲行一百五十里乗之得二千四百里減回迎二百里餘二千二百爲到程合問諸葛親統八員將每將又分八箇營每營里回排八陣每陣先鋒有八人每人旗頭俱吧箇每箇旗頭八隊成每隊八箇甲每箇甲頭八箇兵答曰計一千九百一十七萬三千三百八十五人
  hash: sha256:9974b882b6f89c1f06b53477a5237cd415a0f6b006e1c2f23cf989402ec560c4
