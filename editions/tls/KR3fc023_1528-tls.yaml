body:
  text: 乗得八千五百二十里折半得四千二百六十里別置第十六日所行二百八十八里乗日分子一百三十一得五千二百三十八以分母一百九十一除之得二百七十四里一百九十一分里之四十六併前十五日積里四千二百六十里合問求駑馬行者初日併得第十五日行共一百八十七里以十五乗得二千八百五里折半得一千四百二里二分里之一別置第十六日所以八十九里二分里之一乗日分子一百三十五有分者通之二通八十九里得一百七十八里加內子一併一百七十九里以日子一百三十五乗得二万四千一百六十五分母除之倍母一百九十一作三百八十二不折上数故倍母除得六千三里三百八十二分里之九十九併前十五日積里一千四百二里二分里之一共得一千四百六
  hash: sha256:d00de50d4b18a1f2d371472a613fd7280bb3aba1229e1659eaafe204c05233ef
