body:
  text: 百七十六石三斗米毎斗五十四文麥毎斗三十六文問米麥各幾何答曰米六百九十一石六斗麥五百八十四石七斗法曰以貴價五十四文乗米麥一千二百七十六石二斗得六百八十九貫二百二文以原錢五百八十三貫六百五十六文減之餘一百五貫二百四十六文爲貫以貴價五十四文減錢價三十六文餘一十八文爲法除實得五百八十四石七斗即賤價麥以減都數一千二百七十六石三斗餘得貴價米六百九十一石六斗合問今有鈔一百六十三貫七百五十文共耀米麥六十七石二斗四升三合只云米比麥價毎斗多一文問二價各幾
