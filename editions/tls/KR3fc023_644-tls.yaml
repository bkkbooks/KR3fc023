body:
  text: 何如答曰四十三石一斗八升一合一勺法曰與前兩同以兩價一升二合爲法乗之合問啞子来買肉難言錢数目一斤短四十九兩多十六毎兩該幾分原錢多少肉此題能答曰可以學干祿答曰原錢八十八文原肉十一兩毎兩八文法曰置短四十加多十六共五十六爲實以多十六減九兩餘七兩爲法除之得八却以九兩因之得七十二加多十六共得原錢八十八文以八歸之得肉十一兩毎兩該錢八文合問九文買箇桃二文買箇梨一文六箇杏百文買百枚
