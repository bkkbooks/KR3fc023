body:
  text: 答曰甲鷄一兩一錢一分二厘五毫癸鷄八錢八分七厘五毫法曰置鷄十箇張二位一位减一得九箇相乗得九十折半得四十五却以轉差二分半乗之得一兩一尓二分五厘以减総賣十兩餘八兩八尓七分五厘爲實以鷄十爲法除之得癸鷄價八尓八分七厘五毫各加轉差二分半得数合問二丈四長尺八闊四兩半銀休打脫二丈六長尺六闊該銀多少要交割答曰六兩法曰置今長三丈六尺闊一尺六寸相乗得五丈七尺六寸以乗原銀四兩
