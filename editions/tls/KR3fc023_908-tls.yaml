body:
  text: 生多少数請均布筭莫躊踷右鷓鴣天答曰毛詩四十本春秋三十本周易二十四本學生三百六十名法曰各列置衰互乗五乗四得二十三乗四得一十二三乗五得一十五副併得四十七爲法又互乗三乗四得十二以乗五得六十以乗緫書九十四得五千六石四十爲實以法除之得一百二十以三除得毛詩数四除得春秋数五除得周易数以各書数仍與三四五次第乗之得各生数合問三石八斗二升強常年稅粟数明彰一斗三升三合粟圻米七升作軍粮斗五粟芝麻量八升實数赴官倉粟依本
