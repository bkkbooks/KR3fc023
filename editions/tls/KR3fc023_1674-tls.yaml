body:
  text: 一得正六百二十同減第五行麥正三百五十得荅負二百七十黍負八得負一百六十異加第五行黍正二百得黍正三百七十價正一百七十二得正三千四百四十同減第五行價正三千五百七十五得價正一百三十五再相乗以第三行菽負九十遍乘四五行乘價得數第四行菽負三百六十得負三万二千四百荅負五百七十六得負五万一千八百四十黍正三百七十八得正三万四千二十價負一千六百九十二得負一十五万二千二百八十第五行菽負二百二十五得負二万二百五十荅負二百七十得負二万四千三百黍正三百六十得正三万二千四百價正一百三十五得正一万二千一百五十却以第四行菽負三百六十爲法遍乗第三行菽負九十得負三万二千四百与第四行菽負三万二千四百對減尽
