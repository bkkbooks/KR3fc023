body:
  text: 答曰甲二十万乙一十八石四斗丙一十六石八斗丁一十五石二斗戊一十三石六斗己一十二石法曰各列置衰甲五乙四丙三丁二戊一併之得十五石乗均多一石六斗得二十四石以减緫粟九十六石餘七十二石爲實以六爲法除得一十二石爲已数逓如一石六斗得各数合問今有銅錢一百三人分豁難完乙不及甲五文錢丙不及乙稍遠然在七分之五何願疊只開言煩公計筭莫教倫甚法推之可見右西江月答曰甲四十文乙三十五文丙二十五文
