body:
  text: 二十步爲勾即甲南行十步也卒乙行三步勾弦卒甲行七步相乘得二十一步爲即乙東行十步半也以有卒十步爲法乘求勾二十得二百二十一得二百一十弦二十九得二百九十三卒爲列實以勾卒二十爲法除之得各行合問邑方十里分中開門二人同立邑之中乙出東行卒三甲出南行卒五甲乃斜之磨邑隅角與乙會問各行幾何荅曰甲邑中行一千五百步出南門八百步甲斜之四千八百八十七步半乙東行四千三百一十二步半
