body:
  text: 得二百一十四步以减外周一百二十二步餘得九十步合問今有環田二畒五十五步中周九十二步徑五步問外周幾何答曰一百二十二步法曰照前法通田倍之得一千七十步爲實以徑五步爲法除之得二百一十四步以减中周九十一步餘一百二十二步合問今有環田二百一十六步外周七十二步中周五十步一百一分步之九十二問徑幾何答曰三步二千六十九分步之一千六十五法曰置田積二百一十六步以中周分母一百一乗之得二万一千八百一十六倍之得四万三千六百三十二爲實别置中周五十步以分母一百一通之加分子九十二共得五千一百四十二又置中周分母一百一
