body:
  text: 答曰二百一十六斤法曰置金方六寸再自乘得二百一十六寸以一寸重一斤乘之合問今有金園圎二尺四寸厚一寸問重幾何答曰四十八斤法曰置園圎二尺四寸自乘得五百七十六寸以厚一寸乘之如故以圎法十二除之得四十八寸以寸斤乘之合問今有圎金一塊徑二尺四寸問重幾何答曰七千七百七十六斤法曰置徑二十四寸再自乘得一万三千八百二十四寸以立圎法九乘得一十二万四千四百一十六寸十六而一得七千七百七十六寸寸斤除之合問
