body:
  text: 丁各得三十二貫四百文法曰各列置衰甲乙丙七丁三丙七不可爲三宜以三因丙丁数生乙差甲乙四十九丙二十一丁九乙差不可爲三亦以三因乙丙丁数生甲差甲三百四十三二人得六百八十六乙一百四十七五人得七百三十五丙大十三七人得四百四十一丁二十七九人得二百四十三副倂得二千一百五爲法以所分鈔二千五百二十六貫乗未倂者各自爲列實甲得一百七十三万二千八百三十六貫乙得一百八十五万六千六百一十貫丙得一百一十一万三千九百六十六貫丁得六十一万三千八百一十八貫以法二千一百五各除之甲得八百二十三貫二百文乙得八百八十二貫丙得五百二十九貫二百文丁得二百九十一貫六百文各以人数約之合問
  hash: sha256:cd5a4fc6a65cff1da318141937f3b4976dc446d1ecf67e5ac507b0fd16cfedd1
