body:
  text: 錢唐南湖後學警民編撰方田計二百一問田畒相乗爲積方田方自乗直田廣從相乗圭田勾田梭田半梭田廣從相乗折半斜田箕田梯田箭荅田箭翎田併兩廣兩從折半畹田丘田盆田笟田碗田凹田凹問米四而一圓田一曰外問自來十二而一二曰問自染一之四而一三曰半問半徑零弧田覆用田問弦矢折半以乗矢環田併中外周折半乗問錢田自米二之內而一內自米火塘田湖方自乗內圓徑自乗三田四而一餘爲積三廣田鼓田鼓田併折半加入中長以乗正長折半二不等田併二長折半乗下問四不等田併二廣併乗八不等田以正
