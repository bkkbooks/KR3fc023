body:
  text: 得九十折半得四十五日爲相齊曰数以苽蒌五寸因之得二百二十五寸以三歸得苽蒌士尺五寸尺折日数以三寸因之得一百三十五以蒺梨九日除之得尺五寸合問昨日獨看瓜因事來家牧童盗去眼昏花信步廟東墻外過聽得争差十三俱分咱十五增加每人十六少十八借問人瓜各有幾會者先荅右浪淘沙荅曰十一人瓜一百五十八枚法曰併盈十五不足十八得三十三爲寶以各得率十三十六以少减多餘三爲法除之得人十一以各得十六乗之得一百七十六减不足十八餘得瓜一百五十八枚合問
  hash: sha256:5ddbb00873e52ec292e958a47acf6cad63d3c6a0e4fc2467c4ee5c81acfd4437
