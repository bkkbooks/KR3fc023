body:
  text: 深一十一尺六寸乗之得三千八百三十尺四寸以除之得千二百七十六尺八寸爲實以斛法二尺五寸爲法除之得五百一十石七斗二斗合問今有方窖積米五百一十石七斗二升只云上方八尺下方一丈二尺問深幾何答曰一丈二尺六寸法曰置米五百一十石七斗二升以斛法二尺五寸乗之得一千二百七十六尺八寸又以三因之得三千八百三十尺四寸爲實以上方自乗得六十四尺下方自乗得一百十四尺上下方相乗得九十六尺併之得三万四尺爲法除之得深一丈二尺六寸合問今有方窖積米五百一十石七斗二升只云上方八尺深一丈二尺六寸問下方幾何答曰一丈二尺
