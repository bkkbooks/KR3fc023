body:
  text: 答曰三十五百四十九斤法曰置面方三尺二寸自乘得一千二十四寸底方二尺八寸自乘得七百八十四寸又面方與底方相乘得八百九十六寸併三位共得三千七百四寸以厚二尺一寸乘之得五万六千七百八十四寸如三而一得一万八千九百二十八寸以寸重三兩乘之得五万六千七百八十四兩以斤法除合問詞詩一十三問今築方城一座上廣一丈八尺下多三丈更無餘高比下少丈二今已築高二丈又四尺加之城垣上廣未能知欲問城平該幾右西江月答曰二丈八尺
