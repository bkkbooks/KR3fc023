body:
  text: 負九得負六十五價一百八十得負一千二百六十却以左行硯正三爲法復遍乗右行硯正七得正二十一与左行硯正二十一同名對減尽筆負三得負九同減左行筆負六十三餘得筆負五十四爲法價正四百八十得正一千兩百四十異加左行價負一千二百六十共得二千七百爲實以法餘得筆價五十右行價正四百八十異加筆負二價一百五十共得六百三十以硯七除得硯價九十合問甲乙活酒不知孰少孰多乙錢少半甲相和二百無零看得甲錢中半亦然二百無那英賢筭得的無訛什麼法兒方可右西江月荅曰甲錢一百六十文乙錢一百二十文
