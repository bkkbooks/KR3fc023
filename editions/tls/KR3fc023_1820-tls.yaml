body:
  text: 甲乙同立甲行七乙行三其乙東行而甲南行十步斜之會乙問各行幾何荅曰甲南行十步斜之十四步半乙東行十步半法曰勾弦和卒甲行七步自澄得四十九步卒乙行三步自乘得九步併得五十八步圻豐得二十九步爲弦卒以减勾弦和四十九步餘
