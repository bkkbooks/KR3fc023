body:
  text: 法曰通田三分得七十二步以毎邊三步約之得圓徑一十二步自乗得一百四十四步三因四而一得一百八步內減田積七十二步餘三十六步爲實以開平方法除之得池方六步合問方種芝麻斜種乗勾股之田十畝無零數九十股差方爲勾差十步分明許借問賢家如何取多少黍田多少芝麻畝筭得二田無差䖏長才平取筭中舉右鳳樓梧荅曰黍田六畝二分五厘勾四十步股一百二十步芝麻田三畝七分五厘方面三十步法曰通田一十畝得二千四百步於上以股九十減勾差十步實差八十以勾股約之股得一百二十勾得四十減差十步得方面三十步
