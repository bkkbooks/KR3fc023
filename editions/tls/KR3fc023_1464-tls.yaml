body:
  text: 答曰更追八十步法曰置已追三百二十步以不及一十步乗之得三千二百步爲實以先行五十步減不及一十步餘四十步爲法除之合問三足團魚六眼龜共同山下一深池九十三足亂浮水一百二眼將人窺或出沒往東西倚欄觀看不能知有人筭得無差錯好酒重斟贈數盃右鷓鴣天答曰團魚一十五箇龜一十二箇法曰置列三足四足九十三足二眼六眼一百二眼互乗三足乗六眼得一十八四足乗二眼得八又以六眼乗九十三得五百五十八四足乗一百二眼得四百八以少減多餘一百五十爲實以十八戊八餘十一爲法除之得團魚一十五個
  hash: sha256:6ea06a79be64e2c575d94033a4c37e65b4a25d73dc82a996a7eab13fbb909b77
