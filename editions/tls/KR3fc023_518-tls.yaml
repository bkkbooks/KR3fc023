body:
  text: 貫四百文絲三分得五貫二百五十文粉七分得四貫四百八十文麫六分得五百八十八文併之得一十三貫七百一十八文爲法除實得綾一分該二十七疋三分就綾數三因得絲八十一斤九分七因得粉一百九十一褁一分六因得麫一百六十三斤八分各爲列實以各價爲法乗之綾疋價三貫四百文得九十二貫八百二十文絲斤價一貫七百五十文得一百四十三貫三百二十五文粉褁價六百四十文得一百二十二貫三百四文麫斤價九十八文得一十六貫五十二文四分疋有三分以疋法二丈八尺素得八尺四寸褁下有分以三十二乗之爲兩斤下有分加六爲兩合問置物五色米七石四斗五合四勺四抄換油蜜茶盐麫五色每
