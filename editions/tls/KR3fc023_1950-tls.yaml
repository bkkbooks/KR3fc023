body:
  text: 荅曰門廣一丈一尺法曰勾法閘十寸自乗得一百寸股弦較不合二寸半之得一寸自乗得一寸併之得一百一寸爲實倍較一寸得二寸爲法除之得五十寸五分爲一扇門廣以二乗得門廣合問今有一放戶高多廣二尺兩隅適一丈高廣如何識荅曰廣六尺高八尺法曰弦兩隅一百寸自乗得一万寸勾弦較戶高多廣二十寸折半得一十寸自乗得一百寸倍之得二百寸以減積一万寸餘九千八百寸折半得四千九百寸爲實以開平方法除之得弦七十寸以減半較一十寸餘六十寸爲勾即門廣加較二十寸得八十寸爲戶
