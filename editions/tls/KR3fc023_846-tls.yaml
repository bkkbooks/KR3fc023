body:
  text: 幾何答曰一十九斤八兩法曰置濕麫二十六斤以乗乾麫三斤得七十八斤爲實以濕麫四斤爲法除之合問因乗歸除今有荒絲一千三百八十七斤毎一兩得凈絲九錢問該凈絲幾何答曰一千二百四十八斤四兩八錢法曰置荒絲一千三百八十七斤以凈絲九因之得一千二百四十八斤三分後步成斤加六得四兩八糸合問今有凈絲一千二百四十八斤四兩八錢毎凈絲九錢用荒絲一兩問該荒絲幾何答曰一千三百八十七斤
