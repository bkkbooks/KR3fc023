body:
  text: 大頭闊幾何答曰一十八步法曰置積一百五十一步以長分母九因之得二千二百十九倍之得千五百一十六爲實以長二十七步以分母九通之加分子八得百五十一爲法除之合問今有圓田一十一畒九十步十二分步之一徑六十步二分步之一問周幾何答曰一百八十一步法曰通田一十一畒加零九十步共得二千七百三十步以分母十二通之加内子一共得三万二千七百六十爲實以徑六十步通分母三加内子一共一百八十一爲法除之得周合問今有圓田一十一畒六十步周一百八十步問徑幾何
