body:
  text: 今有屋盖垜下廣八箇長九箇高八箇問積幾何答曰三百二十四箇法曰置下廣八箇與長九箇相乘得七十二箇以高八加一箇得九箇乘之得六百四十八箇如二而一合問今有平尖草一垜底子三十五箇問積幾何答曰六百三十箇法曰置底子三十五箇張二位一位增一箇三十箇相乘得一千二百六十箇折半合問今有瓦不知數只云三十四片作一堆剩五片若三十六作一堆剩七片問該瓦幾何
