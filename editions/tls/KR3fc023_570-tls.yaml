body:
  text: 折半爲一停率以二爲細絲三因得盧絲乘價合問五瓠干梨萬棗曰銀英豪牙人估價兩平又六兩二錢無耗瓠貴梨見一倍来不差分毫梨多于倍之高三物價各多少右西江月答曰瓠價二計二錢梨價一厘計一兩東價七計五兩法曰置銀二兩六絲爲併價一萬梨二千瓠四百共一萬兩千四百爲法除之得五厘毫各價加之合問七升豐見量黍五升將粟共通量得三石六被人攪和一處九升一斗每粟量得兩石四足若還分得不差違
