body:
  text: 環田一畒無零忘了圓徑根因記得打量時語中心池占八分荅曰圓池徑一十六歩內周四十八歩外周七十二歩環徑四歩法曰通池占八分得一百九十二歩以四因三而一得二百五十六歩爲實以開平方法除之得圓徑一十六歩以三因得內周四十八歩倍之得八十六歩以三因四而一得外周七十二歩併內外周共得一百二十歩折半得六十歩以除環田一畒得環徑四歩合問直田七畒半忘了長和記得立契時長闊争一半今問俊明公此法如何荅曰長六十歩濶三十歩
