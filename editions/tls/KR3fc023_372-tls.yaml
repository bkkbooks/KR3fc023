body:
  text: 四万八千二百四十爲實以糲飰七十五以分母七通得五百二十五爲法除之問菽一斗爲熟菽幾何荅曰二斗三升法曰以熟菽一百三半乘菽一斗爲實以菽率四十五爲法除之問菽二斗爲豉幾何荅曰二斗八升法曰以豉六十三乘菽二斗爲實以菽率四十五爲法除之問麥八斗六升七分升之三爲小䵂幾何荅曰二斗五升十四分升之十三法曰以小䵂十三半乘麥八斗六升以分母七通得六百二加分子三共六百五得八千一百六十七半爲實以麥四十五以分母七通得三百一十五爲法除之合問問麥一斗爲大䵂幾何荅曰一斗二升
