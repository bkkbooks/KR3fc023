body:
  text: 三通得一百七十三貫五百五十文爲實以買漆一百六十七斤以分母三通得五百一加分子二共五百三爲法除之合問問出錢七百二十買縑六十一尺每十尺價幾何荅曰一百一十八文六十一分錢之二法曰以所求率十尺乘錢數七百二十得七千二百爲實以所求縑六十一尺爲法除之合問問出錢一十三貫六百七十買絲一百九十七斤一石價幾何荅曰八貫三百二十六文一百九十七分錢之一百七十八法曰以所求石一百二十斤乘錢數一十三貫六百七十得一千六百四十貫四百爲實以所買絲一百九十七斤爲法除之合問
