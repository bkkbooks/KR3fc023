body:
  text: 法曰置米五百七十六石爲實以毎石價鈔三貫爲法因之合問乹六石三六一十八將乹六改作坎一却將次位下艮八合依定位得八貫兊七十三七二十一將兊七改作坤二却將次位坎一改作坤二中五百三五一十五將中五改作坎一却將次位坤二改作兊七今有絲二千七百六十八兩毎兩價鈔四百六十文問該鈔幾何荅曰一千二百七十三貫二百八十文法曰置絲二千七百六十八兩爲實以毎兩價鈔四百六十文爲法乗六八四十八扵次位下異四又次位下艮八合依定位得八十文艮八兩四八三十二將艮八改作震三又將次位異四改作乹六六六三十六將次位震三改作兊七却將下位乹六改作坤二
