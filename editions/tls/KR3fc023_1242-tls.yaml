body:
  text: 答曰六十七石六斗法曰置周三十九尺自乗得一千百一十一尺又以髙四尺乗之得六千八十四尺却以圓積三十六除之得一百六十六尺爲實以斛法二尺五寸除之得米六十七石六斗合問今有平地尖堆米六十七石六斗髙四尺問下周幾何答曰三丈九尺法曰置米六十七石六斗以斛法二尺五寸乗之得一百六十九尺又以圓積三十六乗之得六千八十四尺却以髙四尺除之得一千五百二十一爲實以開平方法除之得下周三丈九尺合問今有平地尖堆米六十七石六斗下周三丈九尺問髙幾
