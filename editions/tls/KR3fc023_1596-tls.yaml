body:
  text: 便爲魁首荅曰原錢七十一文酒三升九合九分合之四每斗一十八文法曰置盈三升乗不足十九得五十七不足五升乗盈十七得八十五併之得一百四十二爲實併盈十七不足十九得三十六爲法除之得酒三升九合餘實一十六法實皆四約之得九分合之四又以五升三升相减餘二升以除併錢一百四十二得原錢七十一文再以二除併盈不足三十六得每斗價一十八文合問今携一壺酒遊春郊外走逢朋添一倍入店飲斗九相逢三處店飲盡壺中酒空問能筭士如何知原有荅曰原酒一斗六升六合二勺五抄
