body:
  text: 以分母三除得一千七百三十步十二分步之一以畆法而一合問圓田周三十步徑一十步爲田幾何荅曰七十五步法曰半周一十五步半徑五步相乗得七十五步合問晥田下周九十九步徑五十一步爲田幾何荅曰五畆六十二步四分步之一法曰置周九十九步徑五十一步相乗得五千四十九歩以四而一得一千二百六十二歩四分歩之一爲實以畆法除之合問晥田下周三十步徑一十六步爲田幾何荅曰一百二十歩法曰置周三十歩徑一十六歩相乗得四百八十歩以四而一合問
