body:
  text: 弦一百二十五步法曰置相乗四千三百七十五步爲實以相和一百六十步爲减從方開平方法除之得勾闊三十五步以减和步餘得弦長一百二十五步次以勾弦各自乗相减餘得一万四千四百步爲實以開平方法除之得股長合問今有勾股田相乗得積四千三百七十五步只云勾弦相九十步問勾股弦各幾何答曰勾三十五步股一百二十步弦一百二十五步法曰置相乗四千三百七十五步爲實以差九十步爲從方開平方
