body:
  text: 三而一圓錐下周自乗以髙乗之如三十六而一方錐同意壍堵廣袤相乗又髙乗之陽馬求積同如二而一六一尺斜觧得二堵者其積居立方二分之一陽馬求積如壍堵法如三而一一壍堵斜觧一馬陽一居立方三分之一鼈臑求積求同壍堵法如六而一立方斜觧得六鼈臑故六而一蒭甍倍下長併入上長以廣乗之又髙乗之如六而一其狀如草屋上蓋正如截方亭兩邊合之是也蒭童倍上長併入下長以上廣乗之又倍下長併入上長一下廣乗之併二位以髙乗之如六而一其狀
  hash: sha256:010da84821a2da58f8c215f94f8972268517914a96130d6eed869252104778ab
