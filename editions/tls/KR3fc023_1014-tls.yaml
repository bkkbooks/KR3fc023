body:
  text: 三位以方廉二法共四十三尺五寸六分啇寶得五下法亦置上啇五厘自乘得二分五厘爲隅法又以上啇五乘廉法得一尺八寸以方廉隅三法共四十五尺二分五厘皆與上啇五除寶盡積六萬三千四百一尺五百一十二分尺之四百四十七問爲立方幾何答曰三十九尺八分尺之七法曰置積六万三千四百一尺以分毋五百一十二通之加內子四百四十七共得三千二百四十六万一千七百五十九爲寶照前法啇置第一位母二百下法亦置上啇三百進四位爲三百万三乘得九百万爲隅法與上啇三除寶二千七百万餘寶五百四十六万一千七百五十九乃三乘隅法得二千七百万爲方法再置上啇三百進四位爲三百万以
