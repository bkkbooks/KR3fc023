body:
  text: 千五百八十五万八百八十尺爲實乃穿地積尺也下置去城五十尺倍之得一百尺加濠上廣一百四十尺共二百四十尺又加城下廣四十八尺終得二百八十八尺又三因得八百六十四尺加入城正圍一万六千三百二十尺共一万七千一百八十四尺乃濠中心正圍長於上併濠上下廣半之得一百一十尺以乗上数得一百八十九万二百四十尺爲法除之得深一丈三尺餘實一百二十六万七千七百六十與法求等得一万五百六十约之合問今有貼築城外馬靣子一料上廣二丈二尺下廣五丈二尺髙三丈六尺縱一丈六尺仍用磚包砌每磈長一尺五寸八分闊八寸二分厚二寸一分添灰貼水長加二分厚加四分每磚一十六磈用磚灰一秤每人日作常積七十
