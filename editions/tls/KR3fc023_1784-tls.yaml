body:
  text: 却以中行兎二爲法復遍乗右行兎五得一十与中行兎一十對減尽豬二得四減中行豬二十餘得豬一十六羊一得二減中行羊五餘得羊三四千得八千減中行二万餘得一万二千又以左行兎三爲法復遍乗右行兎五得一十五与左行一十五對減尽豬二得六減左行豬一十餘得豬四羊一得三減左行羊一十餘得羊七價四千得一万二千減左行二万餘得八千再相乗以中行豬十六爲法遍乗左行豬四得六十四羊七得一百一十二價八千得一十二万八千却以左行豬四爲法復遍乗中行豬一十六得六十四与左行豬六十四對減尽羊三得一十二減左行羊一百一十二餘得羊一百爲法價一萬二千得四万八千減左行一十二万八千餘得八万爲實羊價八百文中行價一萬二千減羊三價得二千四
