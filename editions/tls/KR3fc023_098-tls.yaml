body:
  text: 可半分母得二十等得工十一數不可半也一法副置分母二十七分子二以少減多先一二十一減二十七餘六更相減損以六減二十一餘十五頃兩次減六餘二仍一三減六亦餘三上一等也求其也減損皆等三以等約之以三約分母二十七得九約分于二十一即七即九分之七合問問一八分之十二約之得幾何荅曰三分之二法曰副置分母實八在上分子十二在下可半者半之分母得九分子得六數不可半也依法副置分母九分子六以少減多先以六減九餘五更相減損以三減六分散不等也求其等也減積皆等五三以等約之以三約分母九餘三分子六餘二分之二合問問九十一分之四十九約分得幾何荅曰十三分之七
