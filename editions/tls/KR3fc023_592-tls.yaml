body:
  text: 十二錠九兩交將一兩爲率四色商量白麫三斤鹽該斤斗八兩乾薑油四斤花椒四兩五般兒都要停當特問英賢良莫得荒忙筭得無差到廣名揚右折桂令答曰各買五秤九斤法曰置鈔六百九貫以各率相乗麫四十八兩乗塩二十四兩得一千一百五十二兩又薑八兩乗得九千二百一十六兩又油六十四兩乗得五十八万九千八百二十四兩又花椒四兩乗得一百三十五万九十二百九十六兩乗鈔六百九貫得一十四億三千六百八十一万一千二百六十四兩爲實又各率相乗麫四十八两乗塩二十四兩又乗薑八兩又乗油六十四兩得五十八万九千八百二十四兩二十四兩乗薑八兩油六十四兩花椒四兩得四万九千二百五十二薑八两乗得九万八千三百四兩油六千四兩乗椒塩得二十九万四千
