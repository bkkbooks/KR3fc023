body:
  text: 得差二合再置九節張二位內一位减一得八節相乘得七十二折半得三十六以差二合乘之得七升二合併二容三升六合九升九得一斗二升六合以减七升二合餘五升四合爲實以九節爲法除之得最上一節容米六合各遞以差二合加之合問今有竹筒十二節每節减米差半合共盛一斗七升七米多少最下節荅曰一升七合五勺法曰置竹筒一十二節張二位內一位减一得十一相乘得一百三十折半得產十六爲實以差半合乘之得二升三合以减米一斗七升七合餘一斗四升四合以竹筒十二除之得取上節一升二合加十一節每半合得五竹五合得最下節容米一升七合五勺合問
