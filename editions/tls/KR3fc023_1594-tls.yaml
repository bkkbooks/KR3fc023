body:
  text: 法曰以墻髙九尺爲實併二蔓長三尺一尺共四尺爲法除合問昨朝沽酒探親朋路遠迢遙有四程行過一程添一倍却被安童盗六升行到親家門裏面半點全無在酒瓶借問髙賢能筭士幾何原酒要分明荅曰五升六合二勺半法曰假令原酒五升六合不足四合若五升七合盈一升二合以盈不足互乗盈一升二合乗五升六合得六斗七升二合不足四合乗五升七合得一斗二升八合併之得九丰爲寶併盈一升二合不足四合共一升六合爲法除之合問小児拿錢一手走到街問沽酒三升剩下十七五升却少十九酒價每升幾分銅錢淺伊原有問酒沽得幾升筭得
