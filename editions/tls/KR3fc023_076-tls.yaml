body:
  text: 中長圓相乗爲會議角均成相乗併之折半成餘積角田相乗減角眉田所上下周折半以半中徑乗牛角田問乗四以六問船田蛇田併三廣三而一乗正長三角田每靣六因之而一以每靣折半乗六角田每靣自乗三問八角田置一角五因七而一供之所一爲置一角數自乗法負餘爲幞頭田小長乘小長折之鞋底田二田腰間併八北尾二闊四而乗長曲天田併內曲及一歸各折半相乗欖核田正中長自乗四而一磬田併內外爲乗術錠田中長自乗折半錠腰田倍一靣曲周自乗九而一蕭田併一乗長折半墻田問而相乗半梯田併二闊乗長折半二梯田一靣長乘中問車輞田併折半乗闊古問三十八問直田法曰廣縱相乗焉積以畒法二百四十步而甘乃畒二餘少
