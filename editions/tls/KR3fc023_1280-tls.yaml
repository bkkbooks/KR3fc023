body:
  text: 今有金印匣一箇厚一分外明方四寸二分明空徑方四寸問重幾何答曰一十斤一兩四錢八厘法曰置明方徑四寸再自乘得空積六十四寸置外明方四寸二分再自乘得全積得七十四寸八厘八毫於內减出空積餘得金積一十寸八厘八毫爲實以金方寸重一斤乘之合問今有方銀一塊高四尺三寸六十五分寸之十七廣二尺縱三尺九寸問重幾何答曰二萬九千五百二十六斤法曰置高四十三寸以分母六十五分通之加子一十七共得二千八百一十二又廣三十寸以分母六十五分通之得一千三百縱三十九寸以分母六十五通之二千五百十五以乘廣一千三百得三百二十九万五千五百
