body:
  text: 米三斗二升换盐九斤问該盐幾何答曰一千五十四斤十一兩法曰置稻糓九十三石七斗五升乗出米一斗六升得一百五十石却以毎四斗除之得三十七石五斗又以換盐九斤因之得三十三石七斗五升爲實以毎米二斗二升爲法除之得一千五十四斤六分八厘七毫五絲斤下分數加六爲兩合問今有絹六千九百七十四尺毎三尺一寸二分五厘換絲三兩二錢毎絲十二兩八錢換紗一疋長二丈八尺問該紗幾何答曰五百五十七疋二丈五尺七寸六分法曰置絹六千九百七十四尺乗換絲三兩二錢得二万二千三百一十六兩八禾卻
