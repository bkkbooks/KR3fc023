body:
  text: 法曰置酒錢一千五百以戊出一百五十約之得十為衰戊一丁半四二乙二半甲三各以一百五十為法乗之甲四百五十乙三百七十五丙三百丁二百一十五戊一百五十得轉差七十五文合問今有一文錢放債作家縁一百一倍息一月幾文錢答曰一百七萬三千一百四十一貫八百二十四文法曰以十度八因一度八因得三日數用十度八因得三十月數合問今有一文錢放債作家縁一百三倍息一月幾文錢答曰二千五十八億九千一百一十三萬二千九十四貫六百四十九文法曰置初日三用五度自乗三自乗得九自乘得八十一自乘得六貫五百六十
