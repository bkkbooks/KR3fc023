body:
  text: 錢絲以斤法通之加零四兩二方三分四毫共得三十六二千二分四毫爲法除之得一百二十五貫文爲實以開立方法除之得五十文爲每兩絲價以除總錢該絲三千七百七十四兩以絡絲錢六文乘之得二十一貫六百四十四文又以每兩五十文除之得四百五十二兩八八分又以染錢四文乘之得一貫八百一十一文五分二厘卻以每兩五十文除之得二十六兩二三分四毫各以斤法而一合問今有鈔二十一萬七千七百五十貫糯米不知其數亦不知其價只雲每糯米一石要下塘船鈔三百文爲無鈔還就將糯米准還不知其數只雲船鈔准糯米一石要過塘鈔四貫還亦將糯米還亦不知其數
