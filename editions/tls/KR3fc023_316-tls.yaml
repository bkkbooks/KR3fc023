body:
  text: 法曰置相和一十七步減不及五步餘一十二步以闊五步相乘合問今有直田一畒積長減一步闊減七兩隅相去十七步長闊何以見端的荅曰長一十六步平一十五步法曰置兩隅相去一十七步自乘得二百八十九步於上以二減一七併之得八步自乘得六十四步以減上數餘二百二十五步爲實以開平方法除之得長一十五步加一步共長一十六步以除一畒遍爲二百四十步得平一十五步合問直田二十五畒數更有三分零五厘長量九索平量四三事如何得俻知荅曰索長一十三步田長一百一十三步
