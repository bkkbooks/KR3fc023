body:
  text: 上正七得正十五下負五得負二十五正二斗五升得正一石而斗五升却以乙行上正其爲法復遍乗甲行上正五得正三十五与乙行上正三十五同名對減尽下負一得負四十九同減乙行下負一十五餘得下負二十四爲法正一斗一升得正七斗七升同減乙行正一石二斗六升餘得負四斗八升爲實以法除得一升爲下禾一秉之數甲行下負七以二升乗得一斗二升加入正一斗一升共得二斗五升以上禾五束除得五升爲上禾一秉之數合問井不知深五家同綆不等甲二借乙乙乙三借丙一丙四借丁一丁五借戊一戊六借家一皆及井深問各綆幾何荅西井深七丈二尺一寸甲綆二丈六尺五寸
  hash: sha256:a23e7c55610ca6dc631dbc7e28319e26c55b86171a1114ea21d8f34072f2f95d
