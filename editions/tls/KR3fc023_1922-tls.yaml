body:
  text: 一十四尺爲法除之合問八尺爲六尺勾內容閱徑怎生求有人識得如斯妙舉堪爲第一籌荅曰容圓徑四尺法曰置勾六尺八尺相乘得四十八尺倍之得九十六尺爲實勾求弦勾六尺自乘得三十六尺八尺自乘得六十四尺併之得一百尺以開平方法除之得一十尺加勾六尺八尺爲法除之得空圓徑四尺合問杆子一丈六尺強拴索尖頭鎖一羊踐了七厘二毫地不知其索幾多長荅曰索長二丈圓徑二丈四尺法曰置地十厘二毫以畝步通之得一十七步二分八厘又四因三除
