body:
  text: 不及合問今有牛角田積三畝一百二十五步只云北闊不及西長三十六步又不及東長四十二步問東西長北闊各幾何荅曰東長六十八步西長六十二步北闊二十六步法曰通積三畝加零一百二十五步共得八百四十五步倍之得一千六百九十步爲實半二不及得三十九步爲徔方開平方法除之於實数之下啇置第一位將徔方一進得三百九十下法二進得百以啇實得二十下法亦置上啇得二百爲方法與徔方共五百九十皆與上啇二除實一千一百八十餘實五百二十乃二乗方
  hash: sha256:b8460417429437abf9217b19de7bfecd2ae45cccdab5ef19e28e61e456db25ec
