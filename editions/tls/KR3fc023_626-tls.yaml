body:
  text: 油一百斤用布一十二疋法曰列置四疋三疋一百疋五十二十五一千二百先以上中互乗四疋乗二十五得一百三疋乗五十斤得一百五十以少减多餘五十爲法又以中下互乗三疋乗一千二百得二千六百二十五斤乗一百得二千五百以少减多餘一千一百邞以塩四疋乗之得四千四百爲實以法五十除得塩布八十八疋該塩一千一百斤以减総布百疋餘得油布一十二疋該油一百斤合問足色黃金整一斤鍜匠悞侵四兩銀斤兩雖然不曾耗借問却該幾色金答曰八成色
