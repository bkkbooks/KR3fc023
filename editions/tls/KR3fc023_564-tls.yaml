body:
  text: 實併二價石價一百七十文共得三百三十文餘一貫六百文爲法除之得客米六十六石六百七升五合以減緫米八十四石餘爲腳米合問白麪秤來九兩使油七兩相和今來有麪一斤多六兩五錢共數已用清油合和一斤五兩無訛再添多少麪米和不會應湏問我右西江月荅曰四兩五錢法曰置今用油二十一兩乘原麪九兩得一百八十九兩爲實以原用油七兩爲法除之得二十七兩以減今有麪餘爲增麪合問四十三石一斗八升一合爲餘更加一勺米無處買得淨椒有數秤斤兩皆十四又零三錢三銖不知各價是何如
