body:
  text: 一箇公公九箇兕若問生年緫不知自長排来增三嵗共該二百七年期借問長男多少嵗各児嵗数要詳推答曰長児三十五嵗次児三十二嵗三児二十九嵗四児二十六嵗五児二十三嵗六児二十嵗七児一十七嵗八児一十四嵗九児一十一嵗法曰各列置衰一二三四五六七八以三因之爲各衰副併得一百八以减緫年二百七嵗餘九十九嵗爲實以九児爲法除之得一十一嵗爲第九児之年演六第加三嵗合問
