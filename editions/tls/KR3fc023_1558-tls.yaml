body:
  text: 四十併得三百二十四爲實併盈十二不足六十得七十二爲法以少四兩減多七兩餘三二約實爲銀數法爲人數合問今有人買馬不知其數只云九人出七貫不足四貫七百七人出八貫盈一十八貫三百問爲價及人各幾何答曰馬價五十三貫七百文人六十三法曰以九人乘出八貫得七十二貫以七人乘出七貫得四十九貫以少減多餘二十三貫爲約法又以盈一十八貫三百乘四十九貫得八百九十六貫不足四貫七百乘七十一貫得三百三十八貫四百併得一千二百三十五貫一百爲馬價實又七人九人相乘得六十三以乘盈得一千一百五十二貫九百不足得二石九十六貫一百併得一千四百四千九爲人實各以約
