body:
  text: 答曰六十步法曰置田一十一畒以畒步通之加零六十步共二千七百步以四乗得一万八百步爲實以周一百八十步爲法除之合問今有環田二畒五十五步外周一百二十二步中周九十二步問徑幾何答曰五步法曰通田二畒五十五步得五百三十五步倍之得一千七十步爲實併中外二周得二百一十四爲法除之合問今有環田二畒五十五步外周一百二十二步徑五步問中周幾何答曰九十二步法曰照前法通田倍之得一千七十步爲實以徑五步爲法除之
  hash: sha256:e50147f216279123fdd85789691642aa8c77969808d88f25b1638dcd2706e60f
