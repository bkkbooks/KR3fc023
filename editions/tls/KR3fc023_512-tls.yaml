body:
  text: 七百文煮白酒如雙分身術來之內白酒三斗直一百合用通分一共價七百三因得二貫煮酒斗價共白酒一斗直三十三文三分文七以分爲三通分得九十九加內子一共得斗價一百文別置總酒九斗以貴價七百文因之得六貫三百文內減原價七百文餘價得貫六百文爲實以貴賤二價以少減多餘二貫爲法除之得白酒價二百八十文以每因得八斗四升以減總酒九斗餘得煮酒九升各以價因之合問今有粟七十四石五斗二升將一半換米每粟一斗換米六升那一半換豆麥每粟一斗換豆九升每粟九升換麥八升問換三色各該幾何荅曰米二十二石三斗五升六合三十四石二斗六升
