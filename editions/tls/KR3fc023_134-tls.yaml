body:
  text: 法曰置併縦斜一百二十八步自乗得一万六千三百八十四步廣三十一步自乗得一千二十四步以少減多餘一万五千三百六十步折半得七千六百八十步爲實以併縦斜一百二十八步爲法除之得田縦六十步以乗廣三十二步得一千九百二十步以畒法除之合問今有直田廣縦相和得九十二步兩隅斜相去六十八步問爲田幾何荅曰八畒法曰置斜去六十八步自乗得四千六百二十四步相和九十二步自乗得八千四百六十四步以少減多餘二千八百四十步折半得一千九百二十步爲實以畒法除之合問今有直田不知廣縦只記得兩隅斜相去六十八步廣少
