body:
  text: 法曰置米五百七十五石以分毋三乗之得一千七百二十五穀三百一十五石以分子二乗之得六百五十併之得二千三百七十五爲法置共鈔四万九千八百七十五貫副置二位上以三乗之得一十四万九千六百二十五下以二乗之得九万九千七百五十各以法除之合問今有鈔一千二百貫買綾毎疋七貫二百文絹毎疋四貫八百文欲買一停絹二停綾問各得幾何答曰綾一百二十五疋絹六十二疋半法曰置鈔一千二百貫爲實併絹一疋價綾二疋價共一十九貫二百文爲法除之得絹六十二疋半倍之得綾數合問今有絹布共一百三十八疋十三分疋之八共該價鈔三千四百
  hash: sha256:f9ca5092739e63434a83b772b6236f74816615274dc5e32b77bf0c365d4b87ce
