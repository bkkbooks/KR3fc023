body:
  text: 之亦得一十加入前數共得三千一百四十六爲實以分母十一自乘得一百二十一爲法除之合問今有方金裹面空方闊尺二厚三分四方一寸六兩不知該重幾何金答曰一十六秤六斤七兩二錢九分六厘法曰置方闊一十二寸再自乘得一千七百二十八寸於上又置闊一十二寸減各厚三分得六分餘闊一十五寸四分再自乘得一千四百八十一寸五分四厘四毫以減方積餘二百四十六寸四分五厘六毫以每寸一斤合問今有金空周三尺六厚四分四方一寸十六兩請問重幾何
