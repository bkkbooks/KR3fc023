body:
  text: 馬日行三百里去忘持主覺日巳三分之一備馬追及而還視日四分之三問主馬不休日行幾何曰七百八十里法曰此間本分毋于互之術以主容馬運速爲問置二馬行率去馬三分日之一主馬四分日之三互乘三分乘之二得九四分乘之一得四相減九減四餘五爲法併二馬分子主馬分子四客馬分子九併之得一十三以乘客行三百里得三千九百里爲實以法五除之合問善行者百步拙行者六十步今拙者先行百步問善行者幾步追及曰二日五十步法曰置善行百步乘拙先行百步得一万步爲實以善行百步減拙
