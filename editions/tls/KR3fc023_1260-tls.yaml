body:
  text: 今有果子一垜上長四箇廣二箇下長八箇廣六高五箇問積幾何答曰一百三十箇法曰倍上長爲八箇加入下長共得一十六箇以上廣二箇乘之得三十二箇倍下長爲一十六箇以下廣六箇乘之得一百二十箇併二倍共得一百五十二箇又以下長减上長餘四箇亦併之得一百五十六箇果子乃是比方物不同故增入山叚以五箇乘之得七万八十箇爲實如六而一合問今有三角果子一垜下方一靣二十四箇問積幾何答曰二千六百箇法曰置下一面二十四張三位一位添一箇得二十五箇相乘得六百箇又
  hash: sha256:ab00d3d38b7dd2338658a31597d0b961d2dd2d910760c16dfb2b59d396d8a164
