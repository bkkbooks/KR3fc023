body:
  text: 答曰初日八十五字次日一百七十字第三日三百四十字第四日六百八十字第五日一千三百六十字第六日二千七百二十字法曰置絰五千三百五十五字爲實以一二四八十六三十二爲衰併之得六十四爲法除之得八十五字乃初曰書數加一倍得各日數合閤各分差分法曰置各等戶以各分乗之爲衰副併爲法以所分乗未併者各自爲列實以法除之今有孫粟六萬八百七十石八升於上中下三
