body:
  text: 二文五分米斗價二百五文得七十四貫六百七十一文二分五厘各就原本錢爲實以各物買價爲法除之得各買到物數油斤價六十文得七百二十八斤八兩鹽斤價七十文得七百二十八斤八兩粉褁價八十文得五百六十九褁四兩五布疋價三百二十文得一百八十二疋三尺麻秤價三百一十二文五分得二百九十一秤六斤米斗價二百文得三十七石三斗三升五合六勺二抄五棍粉褁下有分數三十二乗之爲兩布疋下有分數二十四乗之爲尺麻秤下有分數加五爲斤卻將各物粉褁下兩布疋下尺麻秤下斤價作分數爲實以市中貨賣價爲法乘之油斤價一百五十文得一百九貫二百六十五文鹽斤價一百七十五文得一百二十七貫四百八十七文五分粉褁價三百五十文得一百九十九貫
