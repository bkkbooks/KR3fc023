body:
  text: 答曰一千一百九十五片法曰置瓦三十四片加一片得三十五片相乘得一千一百九十片半之得五百九十五却以七片乘之得四千一百六十五于上再置三十六片减一片得二十五片相乘得一千二百六十半之得六百三十却以五片乘之得三千一百五十併前共得七千三百一十五片爲實却以三十四片三十六片相乘得一千二百二十四以對减除實不滿法者即得瓦数合問今有磚一堆長四丈一尺厚二尺高一丈每五磈方一尺高二寸問該磚幾何答曰二萬一千磈法曰置長四丈一尺以厚二尺乘之得八十四尺又以高一丈乘之得八百四十尺爲實又列方一尺以乘高二寸亦得爲法除之得四
