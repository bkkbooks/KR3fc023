body:
  text: 下法再退得一再啇置第三位以方法八百一十二啇餘實得八步下法亦置上啇八爲隅法與方法共得八百二十皆與上啇八除餘實盡得闊三百四十八步合問今有直田積三千四百五十六步只云闊不及長二十四步問闊幾何荅曰四十八步法曰置積三千四百五十六步爲實以不及二十四步爲徔方開平方法除之於實数之下啇置第一位將徔方一進得二百四十下法二進得百以啇實得四十下法亦置上啇得四百爲方法與徔方共六百四十皆與上啇四除實二千五百六十餘實八百九十六乃二乗方法得八百併入徔方共一千四十俱爲方
  hash: sha256:7c951c2489e621bbbcccb101d105057a0a316be62dc4f499801d84f672e28cb8
