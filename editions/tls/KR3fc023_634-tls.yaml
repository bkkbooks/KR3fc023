body:
  text: 併二價絮十九兩給十四兩北三十三兩為法除之得綿兩價九十五文以減相併餘得絮兩價七十文合問三斗芝麻五斗厂粟共通換得兩秤竹不知斗價與根錢只言從上差十六答曰芝麻斗價四十文粟斗價二十四文竹價八文法曰置粟五十以差加之得八十為寶以粟五斗減芝麻三斗餘二斗為法除之得芝麻斗價四十文以減差十六得粟斗價二十四文又減差十六得竹價八文合問八石四斗麥和乘各價六十七貫五斗價相併三貫半
