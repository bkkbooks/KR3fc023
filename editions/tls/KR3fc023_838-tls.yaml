body:
  text: 今有縑三十二今八兩該生絲四十五斤八兩今有縑一千今問該生絲幾何答曰一十四斤法曰以所有生絲四十五斤八兩乗所用縑一十斤得四百五十五斤爲實以所有縑三十二斤八兩爲法除之得一十四斤合問今有絲二十三斤五兩耗絲一十斤三兩四銖半問毎斤耗絲幾何答曰七兩法曰以所有耗絲一十斤三兩以銖法通之加零四銖半共得三千九百一十六銖半乗所求絲一斤通爲三百八十四銖得一百五十万三千九百三十六爲實以所有絲二十三斤五兩以銖法通爲八千九百五十二錢爲法除之得一百六十八銖兩法二十四約之合問
