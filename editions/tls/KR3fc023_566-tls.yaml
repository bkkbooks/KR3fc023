body:
  text: 請問明公箅取右西江月荅曰秤價二石八斗八升斤價一斗九升二合斤兩價一升二合錢價一合二勺銖價五勺法曰置米四十三石一斗八升二合一勺爲實以椒一十四秤一十四斤十四兩三錢三銖通爲二百二十四斤九分一毫五絲六忽二微五虛爲法除之得斤價一斗九升二合以各率約之得價合問十二肥豚小豕將來賣典英賢人定價不項言每箇得添錢半総銀二十一兩九錢交足無論不知女小價糧此法如何可見
