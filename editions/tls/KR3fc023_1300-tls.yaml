body:
  text: 法曰置米四百四十一石六斗以斛法二尺五寸乘之得一千一百四尺又以二十七乘之得二万九千八百八尺爲實以不及一十三尺自乘得一百六十九尺爲從方倍下及一十三尺得二十六尺爲從廉以一爲隅筭開立方法除之得高二丈三尺加不及一丈三尺得下周合問今有酒罈一垜共積一百六十下長多廣整七枚廣少上長三隻堆積槽坊園內上下長廣難知煩公仔細用心機借問各該有幾右西江月答曰上長八箇下長一十二箇廣五箇法曰置一百六十以六乘之得九百六十爲實倍多廣七得一十四加少上長三共一十七爲從方再加少上長三共十箇爲從廉
  hash: sha256:cf4e893562bf1232eeb28e610d1cdb6fb81824e7b84b185cc85d43a366395aaa
