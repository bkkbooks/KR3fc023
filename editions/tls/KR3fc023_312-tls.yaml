body:
  text: 法曰通田一畒得二百四十步爲實半相併一百六十步得八十步爲法除之得徑三步以三因得九步以減半併八十步每七十一步爲內周以減緫步一百六十步餘得外周八十九步合問三十八萬四千歩正長端的無差悞六絲二忽五微闊不知共該多少畒荅曰一畒法曰置長三十八万四千步爲實以闊六絲二忽五微爲法乘之合問直田一畒無零字不知長闊如何是長中減二約分了平步恰當三分二荅曰長二十歩闊一十二歩法曰通田一四得二百四十步以長減二十餘該長三分平二分長一十八步加二步共二十步以除緫步得一十二步乃三分二合問
  hash: sha256:0594246b6f812f684cb6433ff99750d9c99d84f90f225dbdb500c7ec879b5a72
