body:
  text: 法曰置通徑七十四步自乗得五千四百七十六步三之得一万四百二十八步四而一得四千一一百七十步於上置孤天分田原在七十四步除得二十四步矢各二十四步弦七十四步減宽二十四步弦亦十步併矢二十五步共半十五步折半得四十起步半以矢二十五步乗之得一千一百八十七步半爲一叚孤矢田倍之得二千三百七十五步爲見在田以減通徑總田餘爲水占田合問方田一十三畝七分半數耕犁圓池在內甚希奇圓徑不知怎記方至池邊有數毎邊二十無疑外方圓徑若能知經演天源如積右西江月荅曰方面六十步圓徑二十步
  hash: sha256:e7aaf2066a30d800ab25a6bec26a7152ef6925844e80cec718c64e3897b83838
