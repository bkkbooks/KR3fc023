body:
  text: 以南闊分母六通之得一百九十二又置中闊一十八步以南闊分母六通之得一百八步倍之得二百一十六步併入南北闊数共得五百六十爲法除之合問今有杖鼓田四畒一步二十四分步之十九南闊二十五步六分步之五北闊三十二步正長四十一步問中闊幾何答曰一十八步法曰照前法通田以分母通之加分子共得二万三千八十三爲實以正長四十一步爲法除之得五百六十三乃三闊之和别置南闊二十五步以分母六通之加分子五共得一百五十五又置北闊三十二步以南闊分母六通之得一百九十二俱减三闊和步
  hash: sha256:fb2a63f8a9379afcf3196a0c747b64bf1982fe55a857bacd2f1065fc9b7655da
