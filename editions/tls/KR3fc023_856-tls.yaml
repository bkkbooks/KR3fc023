body:
  text: 原米四石八斗合問今有金不知其数只云甲取三分之二乙取四分之三丙取七分之四丁取十二分之七剰下金六兩二錢五分問原金及各得金幾何答曰原金四百二十兩甲得二百八十兩乙得一百五兩丙得二十兩丁得八兩七錢五分剰下六兩二錢五分法曰置剰下金六兩二尓五分爲實以五除之得一兩二尓五分以七因之得丁金八兩七尓五分併入餘金六兩二尓五分共得一十五兩以四因三除得丙金二十兩併入前一十五兩共得三十五兩以三因之
