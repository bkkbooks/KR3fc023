body:
  text: 價除之得絹數布疋價除之得布数合問今有絲六十二斤八兩換金一十兩內八分半五兩七分半五兩問二色金毎兩該絲幾何答曰八分半該六斤十兩二錢五分七分半該五斤十三兩七錢五分法曰置絲六十二斤以十六兩通加零八兩共一千兩爲實列五兩以八分半乗得四兩二禾半又列五兩以七分率乗得三兩七禾半併得八兩爲法除之得一百二十五兩副置二位上以八分半乗之下以七分半乗之各以斤約之合問今有稻糓九十三石七斗五升毎四斗出米一斗六升毎
