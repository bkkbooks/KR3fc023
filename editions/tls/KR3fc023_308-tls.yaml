body:
  text: 五十四步以畝法而一得二分二厘五毫爲占地以減一畝剩地七分七厘五毫以毎畝價銀二兩五錢爲法乗之得一兩九錢三分七厘三毫四方九畝六分田有路小徑四角穿三井五池十二樹自方二步屋一梯井周三步池方六樹圍七尺五寸圓道闊二步知端的問公餘剩幾何田荅曰七畝七分一厘一毫二絲五忽法曰通田九畝六分得二千三百四步爲實以開平方法除之得一方面四十八步方五歸之九步六分斜七乗之得六十七步二分以道闊二步乗之得一百三十四步四分四角穿該積二百六十八步八分減路中心闊二步自乗得四步實該積一百六十四步八分三井毎
