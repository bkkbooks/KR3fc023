body:
  text: 今有直田廣三十二步縦六十步問爲田幾何荅曰八畒法曰置廣三十二步乗縦六十步得一千九百二十步以畒法而一合問今有直田廣三十二步二尺縦六十步三尺問爲田幾何荅曰八畒一分八厘一毫法曰置廣二十二步以毎步五尺乗之加乗二尺共得一百六十二尺縦六十步毎步五尺之加零三尺其三百三尺相乗得四万九千八十六尺以畆法六千尺除之合問今有直田廣三十二步三尺四寸問爲田幾何荅曰八畒二分四厘五毫四絲四忽法曰置廣三十二步通三尺六寸爲七分二厘縦六十步通二尺四寸爲四分八厘相乗
