body:
  text: 法曰列置分母子二十一分五十分於右之十二之一十三於左母互乗子二十一分乗之二十三得四百八十三五十分乗之十二得六百以少減多六百減四百八十三餘一百一十七爲實母互乗五十分乗二十一得一千五十分爲法實不滿法以法命之即多一千五十分之一百一十七合問今有布二疋九分疋之五今用過一疋六分疋之一問尚餘幾何荅曰一疋十八分疋之七法曰置用過布一疋以分母六通之加分子一共餘七又以原布分母通之得六十三列左又置原布二疋以分母九通之加分子五共得十三又以用過布分母六通之得一百三十八內減去左位六十三餘得七十五爲實以二分母九分六分相乗得五
