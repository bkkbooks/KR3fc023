body:
  text: 以毎絹三尺一寸二分五厘除之得七千一百四十一兩三禾七分六厘爲實以毎絲一十二兩八禾爲法除之得五百五十七疋九分二厘疋下九分二厘以疋法二丈八尺乗之得一丈五尺七寸六分合問今有芝麻六十二石一斗九升毎二斗五升出油七斤毎油八斤直鈔九百二十文問該鈔幾何答曰二百二貫四百二十八文四分五厘法曰置麻六十二石一斗九升乗出油七斤得四百三十五石二斗三升却以毎麻二斗五升除之得油一千七百四十一斤三分二厘又以直鈔九百三十文乗之得一千六百一十九斤四分二厘七毫六絲爲實以毎油爲法除之二百二貫四百二十八文四分五厘合問
