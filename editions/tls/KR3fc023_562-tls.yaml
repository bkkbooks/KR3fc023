body:
  text: 荅曰米三石七斗法曰置令有小麥六石六斗乗所問芝麻五斗五升得五石二斗八升又以白米三石五斗乗之得一十八石四斗八升爲寶以換芝麻三石乘小麥八斗得二石四斗爲法除之合問客向新街糴米共量八十四石一貫二百七十知石價書依鄉例顧覔小車搬運裝錢三百三十脚言家內秧粮食只據原錢貫米右西江月荅曰客米六十六石六斗七升五合脚米一十七石三斗兩升五合法曰置米八十四石以石價一貫二百七十文乗之得一百六貫六百八十文爲
