body:
  text: 枚素者幾枚粧答曰粧斗四百八十八箇素斗五百一十二箇法曰置木方五尺再自乘得一百二千五尺每尺八箇乘之得斗一千箇又置方五尺减外園粧盡一尺再自乘得六十四尺以每尺八箇乘之得素斗五百一十二箇以减緫数餘得粧斗合問汴梁城周八十里柘縣城周十六里幾箇柘縣抵汴梁定數懸空能有幾答曰爲二十五柘縣法曰置城周八十里自乘六千里以十二而一得五百三十三里三分里之一柘縣城周十六裡自乘得二百五十六里以十二而一得二十一里三万分里之一者通汴梁城五百三十三里以分母三乘
