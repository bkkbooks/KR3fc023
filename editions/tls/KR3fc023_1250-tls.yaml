body:
  text: 法曰置米照前以斛法乘之又以倚外率乘之万九千八十八尺爲實以二丈三尺爲法除之九以開平方法除之得周三丈六尺合問今有倚壁外角聚米下周三丈六尺高二丈三尺問樍及爲米各幾何答曰積一千一百四尺爲米四百四十一石六斗法曰置下周自乘一千二百九十六尺以高二十三尺乘之得二万九千八百八尺如二十七得積一千一百四尺爲實以斛法二尺五寸爲法除之得米合問今有倚壁內角堆米下周九尺七寸五分高四尺問積米
