body:
  text: 豆三石五斗該鈔四十二貫法曰置鈔一千一百四十四貫五百文爲實併各價共得三十二貫七百文爲法除之得三十五疋半各以疋斗價乗之布疋價六貫得二百一十貫絹疋價七貫二百文得二百五十二貫綾疋價八貫二百文得二百八十七貫羅疋價六貫九百文得二百四十一貫五百文米斗價三貫二百文得一百一十二貫豆斗價一貫二百文得四十二貫合問借寬還窄今有借布一端長五丈二尺闊二尺一寸今無原布還只有常行布闊一尺六寸問合還長幾何荅曰六丈八尺二寸五分
