body:
  text: 隊共積三萬一千一百一十步兵士二十二萬八千四百八十名毎五十六名爲一隊計四千八十隊共積二十四万八千八百八十步法曰置兵士二十二万八千四百八十名以毎隊五十六名除之得四千八十隊又以外圍二十四步以圓箭法置外圍加中心六步共三十步以乗外圍二十四步得七百二十步以圓法二十除之得六十步加中心一步得毎隊積六十一步再置兵士分爲十大隊毎隊都督一貟計一十貟毎貟四隊共四十隊毎隊六十一步共積二千四百四十步都指揮二貟計二十貟毎貟二隊共四十隊毎隊六十一步共積二千四百四十步再置兵士
