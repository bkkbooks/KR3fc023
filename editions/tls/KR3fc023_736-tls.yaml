body:
  text: 下等每戶三石一斗八升五合一百八十戶共五百七十三石三斗法曰置列三郷戶数以各分乗之爲衰上郷上等五十六戶以一万乗得五十六万中等七十四戶以九千乗得六十六万六千下等九十八戶以八千一百乗得七十九万三千八百中郷上等八十二戶以五千乗得四十一万中等一百二十戶以四千乗得四十八万下等一百六十戶以三千二百乗得五十一万二千下郷上等九十五戶以二千五百乗得二十三万七千五百中等一百七十二戶以一千七百五十乗得三十万一千下等一百八十戶以一千二百二十五乗得二十万五百各列置衰上郷上等五十六万中等六十六万六千下等七十九万八百中郷上等六十一万中等四十八万下等十一万二千下郷上等二十三万七千五百中等万一千下等二十一万三百副倂百一十八万八爲法置所輸粟
