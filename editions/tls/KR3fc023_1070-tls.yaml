body:
  text: 乗外周十二步得七千二百七十二併之得一万二千四百一十四爲法除之得三步餘實六千六百九十法實皆六約之合問今有環田積二百一十六步外周七十二步徑三步二千六十九分步之一千六十五問中周幾何答曰五十步一百一分步之九十二法曰置田積二百一十六步以徑分母二千六十九乗之得四十四万六千九百四倍之得八十九万三十八百八爲實以徑三步以分母二千六十九通之加分子一千六百五共得七千二百七十二爲法除之得内外周二十二步一百一分步之九十二以减外周七十二步餘得中周数合問今有環田積二百一十六步外周七十二步四分步之三中周五十一步一千六百四十八分步之一千五百九十三問徑幾何
