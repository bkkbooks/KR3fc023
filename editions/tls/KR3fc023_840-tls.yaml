body:
  text: 今有生絲一十三斤十一兩一十銖七分銖欠二得乾絲一十二斤見有生絲三十斤問乾之耗幾何答曰三斤十二兩法曰以所有乾絲一十二斤乗見有生絲三十斤得二百六十斤銖法還得一十三万八千一百四十以分毋七零九十六万七千六百八十铢爲實以所有生絲一十二斤一十以銖法通之加零一十銖共得五千二百六十六銖以分毋七通之加分子二共得三万六千八百六十四爲法除之得乾絲二十六斤四兩以減生絲三十斤餘得耗絲三斤十二两合問今有田一頃二十六畒一百五十九步收粟入石四斗四升十二分升之五問一畒收粟幾何答曰六升三分升之二
  hash: sha256:9292f782b9d24f8fc5bf9fb112ca812864da4dbe7c486d20f63c39054057e9e2
