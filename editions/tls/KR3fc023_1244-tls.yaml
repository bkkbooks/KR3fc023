body:
  text: 何答曰四尺法曰置米照前斛法圓積乗之得六千八十四尺爲實以下周三丈九尺自乗得一千五百二十一尺爲法除之得髙四尺合問今有平地尖堆米六十七石六斗只云髙不及下周三丈五尺問髙周各幾何答曰髙四尺下周三丈九尺法曰置米以斛法乗之又以圓堆率三十六乗得六千八十四尺爲實以不及自乗得一千二百二十五尺爲從方倍不及得十尺爲從廉開立方法除之得髙四尺加不及得下周合問今有倚壁尖堆米下周一丈九尺五寸髙四尺问容米几何答曰三十三石八斗
  hash: sha256:257c539a60fe5431154918888a812fc3d18474ee22deed3f239ae8574d30d6f3
