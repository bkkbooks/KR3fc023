body:
  text: 平方法除之得四十九步餘實四十九爲分子倍本方四十九步加子一共得九十九爲分母合問今有方田斜七步十五分步之一問方一面幾何答曰五步法曰置斜七步以分母十五通之加分子一共得一百步自乗得一万一千二百三十六於上又以分母十五减分子一餘十四乗分子一亦得十四併入上数共得一万一干二百五十爲實以分母十五自乗得二百一十五爲法除之得五十半之得二十五以開平方法除之合問今有方田斜七十步一百四十一步之一百問方一面幾何答曰五十步法曰置斜七十步以分母一百四十一通之加分子一百共得九千九百
