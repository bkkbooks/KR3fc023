body:
  text: 答曰茶重一斤一兩六錢四分法曰置又有江茶八寸四分二寸一分相乗得一尺七寸六分四重又以厚九分乗之得一十五尺八寸七分六重爲實以原江茶長闊二寸八寸相乗得一尺六寸又以厚九分乗之得一十四尺四寸爲法除之合問斤二兩買油聲噴斤四兩買鹽听言今有銀二兩七錢三分六厘交足無僞要停買如何計筭兩般見秤得都全欲問英貿莫得所感爲何得保差到處名傳右折桂令答曰各一斤九兩九錢二分法曰置銀二兩七尔三分六厘以二價油一十八兩鹽二十兩相乗得三兩六十尔乗之得六十兩兩二爲實併二價爲法除之合問
  hash: sha256:e4dacdd4bf9e3119bdd59a1c54cde0ba571fec866b6a7a12247f61cfb1b15cff
