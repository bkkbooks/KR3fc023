body:
  text: 五千一百六十六乗之得六千二百五十万三千四百三十四再折半得一五百十二万五千八百五十八步半爲實以三闊分毋互乗六分乗七分得四十二分乗三分得一百二十六自乗得一万五千八百七十六爲法除之得九百八十四步餘實三千八百七十四步半法實皆九百四十五級之又畒法除合問今有杖鼓田南闊二十五步六分步之五北闊三十二步七分步之六正長四十一步四分步之三中闊一十八步三分步之二問爲田幾何荅曰四畒四十二步六百七十二分步之一百六十七法曰置南闊二十五步以分毋六通之加分子五共得一百五十五又互乗北闊分毋七得一千八十五中闊分毋三得三千二百五十五北闊三十一步以分毋七通之加分子六共得二百三十又互乗
