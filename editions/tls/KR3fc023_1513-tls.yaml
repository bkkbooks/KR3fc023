body:
  text: 維乘所出率盈八乘三分之一得八少九乘二分之一得九併以爲實得物價十七併盈分母二牙乘九不足分母三牙乘盈八得二十四併之得人四十一合問買牛七家合出一百九十文不足三百三十文其九家合聃百七十文盈三十文問戶数牛價各幾何荅曰一百二十六家牛價三貫七百五十文法曰問盈不足相與同其買物者置所出率盈不足各居其下先以家石乘出率七家相乘九家戶数爲母出率爲子出一百九十七家三百三十出二百七十九家盈三十互乘用副相减以爲約法九家乘一百九十爲一貫七百一十文七家乘二百七十爲一
  hash: sha256:36220922d6124de23df20ed1efba687c89c5178c6b4a57152e10d3265dadbb68
