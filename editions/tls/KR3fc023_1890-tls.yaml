body:
  text: 詞詩四十八問今有方池一所每邊丈二無移中心蒲長一根肥出水過於二尺斜引蒲梢至岸適然與岸方齊饒公能筭更能推蒲深各該有幾右西江月答曰蒲長一丈水深八尺法曰半池方六尺自乗得三十六尺以减股弦較出水二尺自乗得四尺餘三十二尺爲實倍水二尺得四尺爲法除得股水深八尺加出水二尺得蒲合問豎立髙杆一所不知杆何杆尖索子平途委地二尺有五平地引斜恰杆十五无餘有人達得這玄機
