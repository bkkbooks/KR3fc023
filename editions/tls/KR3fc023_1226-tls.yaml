body:
  text: 四丈七尺闊三丈一尺問髙幾何答曰九尺法曰置米五千二百四十五石二斗以斛法二尺五寸乗之得一万三千一百一十三尺爲實以長四丈七尺乗闊三丈一尺得一千四百五十七尺爲法除之得髙九尺合問今有米五千二百四十五石二斗欲造長倉收貯只云長四丈七尺髙九尺問闊幾何答曰三丈一尺法曰置米照前以斛法乗之得一万三千一百一十三尺爲實以髙九尺乗長四丈七尺得四百二十三尺爲法除之得闊三丈一尺合問今有方倉一所方一丈二尺髙九尺問容米幾何答曰五百一十八石四斗
