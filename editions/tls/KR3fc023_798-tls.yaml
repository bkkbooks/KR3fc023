body:
  text: 今有鈔一萬四千四百九十三貫五百文令五人從下作三七分之問各得幾何答曰甲八千四百三貫五百文乙三千六百一貫五百文丙一千五百四十三貫五百文丁六百六十一貫五百文戊二百八十三貫五百文法曰置鈔万四千四百九十二貫六百文爲實以各戶從戊起逓以差乗之爲衰戊得八十一丁得一百八十九丙得四百十一乙得一千二十九甲得千四百二倂之爲法除之得三百五十文
