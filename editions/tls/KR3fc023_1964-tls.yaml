body:
  text: 十五尺皆與上啇五除實盡得六百七千五尺合問開四乗方法法曰置積若干爲實別置一筭名曰下法自末位常超四位約實下法定得若干啇置第一位得若干下法亦置上啇爲若干以三遍若干乗得若干爲隅法與上啇若干除實若干餘實若干乃五乗隅法得若干爲方法下法再置上啇爲若干副置三位第一位以若干二遍乗得若干又以一十乗之得若干爲上廉第二位以若干乗得若干又以一十乗之得若干爲中廉第三位以五乗得若干爲下廉乃方法一退得若干上廉再退得若干中廉三退得若干下廉四退得若
  hash: sha256:89b52fc619e72dc298ea4695424dedc60d1436f3be592e65065695b8ae88ac35
