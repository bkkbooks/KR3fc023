body:
  text: 今有火塘田外方一十二歩內圓徑六歩問爲田幾何荅曰一百一十七歩法曰置外方一十一歩自乗得一百四十四歩減內圓徑六歩自乗得三十六歩以三乗得一百八歩四除得二十七歩餘一百一十歩合問今有三廣田南闊二十六歩北闊五十四歩中闊一十八歩正長八十五歩問爲田幾何荅曰一十畒六十五歩法曰併兩闊南二十六歩北五十四歩共八十歩折半得四十歩加中闊十八歩共五十八歩爲實以正長八十五歩爲法乗之
