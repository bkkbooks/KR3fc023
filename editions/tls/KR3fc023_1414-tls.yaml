body:
  text: 五百文今添三百六十斤行道一千三百里問與鈔幾何答曰一十二貫六百七十五文法曰置先與鈔七千五百乗今行道一千三百里得九百七十五万又乗今載重共一千五百六十千得一百五十二億一千万爲實以先行道一千里乗原載重一千二百得一百二十万爲法除之得今與腳鈔何問遲急行程今有人盜馬來馬主乃覺追一百四十五里不及二十三里的而還若二十八里十四分里之三及之問盜馬乗法巳行里幾何答曰三十七里法曰置追以分母十四通之得二千三千乗不及二三
