body:
  text: 廉四退得六十億下廉五退得一億二千万下法六退得百万續啇置第二位以方廉五法共二十一万七千六百六十一億二千万啇餘實得四十下法亦置上啇爲四百万四遍四乗得一十億二千四百万爲隅法又以上啇四一遍乗上廉得九万六千億二遍乗二廉得二万五千六百億三遍乗三廉得三千八百四十億四遍乗下廉得三百七億二千万以方廉隅六法共三十一万七千七百五十七億四千四百万皆與上啇四除餘實一百二十七万一千二十九億七千六百万仍餘實一十四万七千八百八十一億五千六百九万四千六百四十九尺乃二乗上廉得一十九二千億三乗二廉得七万六千八百億四乗三廉得一万五千三百六十億五乗下廉得一千五百三十六億六乗隅法得六十一億四千四百万皆併入方法
