body:
  text: 法曰置糯米四十石一斗三升七合五以折糙米一石二斗加之得四十八石一斗六升五合爲實以毎七斗八升爲法除之合問今有絲五十六斤十三兩六錢毎銀一錢買絲三兩問該賣銀幾何答曰三十兩三錢二分法曰置絲五十六斤以斤法十六通之加零十三兩六禾共得九百九兩六禾爲實以買絲三兩爲法除之合問買物各停今有鈔四萬三千一百一十四貫四百二十文欲耀米麥豆三色其米石價二十三貫五百文麥石價一十九貫五百文豆石價一十四貫五百文卻要均等問該幾何
  hash: sha256:c76671ff704e13f5bc611b0dd5b9e15e240f722408648ad52b2acca729e8d617
