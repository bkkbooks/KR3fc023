body:
  text: 織造各物今有織造段疋每荒絲一十兩得淨絲九兩每經緯一兩煉熟得七錢五分每熟經緯却加顏料三分今織成紵絲一千二百四十疋秤重二千二百六十三斤六錢二分問通用荒絲及每疋斤重料例各幾何答曰通用荒絲三千二百五十五斤每疋該荒絲二斤十兩得生經緯二斤五兩八錢煉熟經緯一斤十二兩三錢五分加顏料八錢五分五毫計重一斤十三兩二錢五毫法曰置秤重絲二千二百六十三斤以斤求兩法通零六乑二分
