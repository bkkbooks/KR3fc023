body:
  text: 麥一十六石五斗六升該價一十八石六斗二升豆一十六石七斗六升七合該價一十八石六斗三升法曰置粟七十四石五斗二升折半得三十七石二斗六升置二位一位以六升乘之得米二十二石三斗五升六合一位又折半得一十八石六斗三升再置二位一位以九升乘得之一十六石七斗六升七合一位以八升算的一十四石九斗四合卻以九升除之得麥一十六石五斗六升合問買物四色今有錢三百七十四貫五百一文四分欲買綾絲粉麫四色綾疋價三貫四百文疋法二丈八尺絲斤價一貫七百五十文粉褁價六百四十文麫斤價九十八文內要一分綾三
