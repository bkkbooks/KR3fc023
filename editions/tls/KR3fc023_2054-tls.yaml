body:
  text: 上得一兩子上得尔丑上得分寅上得厘合問小除大今有米一百三十二石五斗毎人分米五勺三抄問該人幾何荅曰二十五萬人法曰置米爲實以毎人分米爲法除之得数不動却扵掌上寅位上定實仍從丑上順数實米得石寅上得斗卯上得升辰上得合已上得勺乃已上得實首百人辰上得千人卯上得万人寅上得十万人共得二十五万人合問小除小今有銀二分四厘七毫五絲毎銀五厘五毫買金一厘問該買金幾何荅曰四厘五毫法曰置銀二分四厘七毫五絲爲實以毎銀五厘五毫爲法除之得数
