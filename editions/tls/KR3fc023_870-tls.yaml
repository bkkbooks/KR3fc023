body:
  text: 兩郡人皆談羨右西江月答曰甲二秤二斤十三兩三錢乙二秤十四兩七錢丙五秤一斤八兩法曰各列置衰甲一十兩三尓乙九兩七尓兩二十四兩副併得四十四兩爲法以所換絲通斤得一百四十斤二五乗未併者㙅得一千四百四十四斤五分七厘五毫乙得一千三百六十斤四分二厘五毫丙得三千三百六十六斤各自爲列實以法各除之合問官栗九十六石六般人戶分科一石六斗號均多自下而上方可頃要筭科依法分毫勿得差訛有人筭得是喽囉不會前來求我右西江月
  hash: sha256:9bf6bb1cfe49a18977772d6f239c97c4018a145defc3adad837b28a90ec0d27a
