body:
  text: 止還長二百五十六尺問折得闊幾何荅曰二尺一寸三分一厘二豪五絲法曰置原布長二百四十八尺乗闊二尺二寸得五百四十五尺六寸爲實以還長二百五十六尺爲法除之合問今有客鈔七千二百五十八貫五十文原放絹二百八十五疋二丈四尺疋法三丈二尺今止有絹二百七十三疋二丈五尺六寸問合退還客鈔幾何答曰三百三貫五百三十文法曰置放絹二百八十五疋以疋法三丈二尺通之加零二丈四尺共得九百一十四丈四尺於上又置今還絹二百七十三尺以疋法通之加零
