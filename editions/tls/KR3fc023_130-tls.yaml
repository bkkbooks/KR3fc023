body:
  text: 比類一百一十五問今有直田廣一步半三分步之一四分步之一五步之一縦一百五步一百三十七分步之一十五問爲田幾何荅曰一畆法曰置廣一步得一分之一半步得二分之一而烈置分毋子以子互乗毋一分二分三分四分五分扵右之一之一之一之一之一扵左而乗之一乗二分三分四分五分得一百二十之一分三分四分五分得六十之一乗一分二分分十之一乗一分二分三分五分得三十之一一分二分三分四分得併之得二百七十四爲實毋相乗一分二分四分分自相乗一爲法除之得廣二步餘實三十四去實皆折半得六十分之十以分毋六十乗廣二加分子一十七共得一百三十七爲廣法置縦一百五步以分毋一百三十七乗
