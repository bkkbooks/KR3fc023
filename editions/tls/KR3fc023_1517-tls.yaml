body:
  text: 先以人数互乘出率以少多餘一百为此次以盈三贯四百互乘出率三百为一千二十又以以一百互乘出率四百为四十贯以少减多餘九百八十貫爲價實兩盈以少餘爲實盈三貫四百减盈一百餘三貫三百爲人实以法一百除各實合問共買羊人出五文不足四十五文人出七文不足三文問人数羊價各幾何荅曰二十一人羊價一百五十文法曰問兩不足并所出率以少减多餘爲法實以不足四十五减不足三餘四十二爲实又以出率七减出率五餘二爲法以法二除實四十二得人二十一却以人出七乘之得一百四十七加不足三得羊價一百五十合問人出五文不足九十文人出五十文適足問人数
