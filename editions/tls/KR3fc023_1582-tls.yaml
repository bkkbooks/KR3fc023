body:
  text: 答曰四銨四十八兩四分六厘八毫七絲五忽法曰假令原本二百四十八兩不足六兩原本二百四十九兩盈一百二十二兩置盈不足二百四十九兩盈一百二十二二百四十八兩不足六兩互乘盈得三萬二百五十六兩不足得一千四百九十四兩併之得三萬一下七百五十兩爲實併盈一百二十二兩不足六兩共一百二十八兩爲法除之合問幾箇牧童閑耍張家園內偷瓜將來林下共分割三人七枚使罷分訖剩餘一箇中有伴哥答四人九箇再分拿餘兩箇廝打右西江月答曰一十二人瓜二十九箇法曰置人瓜三人乘九個得二十七個四人乘七個得二十八個併之相抵
  hash: sha256:e025e5ec7b2757da331c4b355590b8855e11991c1263ccc73234d4f2995abd02
