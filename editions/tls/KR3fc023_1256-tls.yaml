body:
  text: 今有方箭一束外圍四十四雙問共幾何答曰一百四十四隻法曰置外圍四十四隻加中圍八雙共得五十二隻以外圍四十四隻乘之得二千二万八十八隻爲實以方法十六除之得一百四十三隻加中心一隻共得百四十四隻合問又法外圍一面一十二雙自乘合問今有圓箭一束外周四十二隻問共幾何答曰一百六十九隻法曰置外周四十二隻加中圍六隻共得四十八隻以外周四十二隻乘之得二千一十六隻爲實以圓法十二除之得一百六十八隻加中心一隻共得一百六十九隻合問
