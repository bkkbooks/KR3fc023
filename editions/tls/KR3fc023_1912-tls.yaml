body:
  text: 幕等爲勾數問賢家先取如何做你敢不得敢麼立天源一舉手無能措右叨叨令荅曰長二十步平一十二步和三十二步較八步法曰以併零和較幕等約之得較八步自乘得六十四步折半得和三十二步减較八步折半得平一十步加較八步得長二寸步以長二十步乘平一十二步得二百四十步積加差八步共二百四十八步减和三十二步餘二百一十六步以開立方法除之得半廣六步倍之得平一十二步合問春節遇清明忽有童開放風箏托量來九百五十
