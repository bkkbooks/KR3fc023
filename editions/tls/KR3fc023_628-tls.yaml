body:
  text: 法曰置金十六雨為寶以加入原金十六雨二十雨為法除之合問色黃金十二雨欲作八成預忖量分兩雖添得重入銀多少得相當答曰入銀三兩法曰置金十二兩以八成約之得一十五兩以減原金十二兩餘該入银三兩合問丈六生綾二丈羅價錢適等無差訛只知每尺差十二綾羅尺價各幾何答曰綾尺價六十文羅尺價四十八文
