body:
  text: 答曰積五億九千九百四萬尺二十四日工畢法曰置長一百六十日以里尺一千八百尺通之得一十八万八千尺以乗深二十二尺得九百二十一万六千尺又以上廣八十尺併入下廣五十尺共得一百三十尺折半得六十五尺乗之得積五億九千九百四万尺爲實以只有夫二十万八千人以一日自穿運一百二十尺乗之得二十四百九十六万尺爲法除之得二十四日工畢合問今有方錐一所下方二丈髙三丈今欲於上方八尺截成方䑓問截去髙幾何答曰一丈二尺法曰置上方八尺以乗髙三丈得二百四十尺爲實以下方二千尺爲法除之得一丈二尺合問
  hash: sha256:b2ca9d6044f4ae38568711bc4dabd184f2ec2383028a630e70796a9f570dc390
