body:
  text: 錢唐南湖後學吳敬信民編集啇功計一百三十五問求積法用乗除題以物類求積以象而立積者方之寶周徑髙闊深長者方之法圓斜曲直皆其方益其虛而張其積折其積所其方此啇功築積之要也其壘土與聚米求積用法則同若鋼鉼瓜采求箇用法稍異何者其形雖似而髙或有不齊虛實或有削故領其形而不同其法也穿地四尺爲壤五尺爲堅三尺也壤者虛土穿地求壤五之求堅三之皆四而一堅者實土壤地求穿四之求堅三之皆五而一虛實互問以堅求穿四之求壤五之皆三而一同前即要乗比
  hash: sha256:b84ca5f43ddd6af37e57c8d2f8f8b8c6915e17bf8184daeda4cbaf1c36cdc45d
