body:
  text: 金一定之價買銀七定二色兩價差七百五十文問金銀并兩價各該幾何答曰金二十八定三十七兩毎兩價鈔八百七十五文銀七十一定一十三兩毎兩價鈔一百二十五文法曰列銀七定五十兩通之得三百五十兩以差七百五十乗之得二十六万二千五爲實以七定減一定六定得三百爲法除之得八百七十五文爲兩價以減差七百五十文餘得銀兩價一百二十五文又置一百定五十兩通得共五千兩以金兩價八百七十五文乗之得四千三百七十五貫以減直鈔一千七百二貫五十文餘二千六百七十二貫二百五十文爲差實以差七百五十爲法除之得銀數以減共五千兩餘得金
