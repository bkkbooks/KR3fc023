body:
  text: 爲中行五束之實除之一束得四斗四分斗之一右行十九斗減中禾二束下禾一束共實一十一斗四分斗之一餘二十七斗四分斗之三爲上禾三束之實除之每一束得九斗四分斗之一合問五牛二羊直銀十兩二牛五羊直銀八兩問牛羊價幾何荅曰一牛直一兩二十一分兩之十三一羊直二十一分兩之二十法曰置列牛五羊二銀十兩於右行牛二羊五銀八兩於左行先以左行牛五爲法遍乗右行牛得一十羊得二十五銀得四十兩却以左行牛二爲法復遍乗右行牛得一十對減盡羊得四減二十五餘二十一爲法銀得二十減右行四十餘二十爲實以法除之羊得二十一分兩之二十却以分母二十一乗右行銀一兩得二百一十減
