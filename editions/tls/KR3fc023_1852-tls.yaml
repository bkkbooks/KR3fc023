body:
  text: 乘得一百六十九步二位相减餘八千一一十二步爲實倍較添長得二十六步爲法除之得股長三百一十二步自乘得九万七千三百四十步又以勾闊九十一步自乘得八千二八十一步併之得一十万五千六百二十五步爲實以開平方法除之得弦長合問今有勾股田長三百一十二步不知勾弦只云勾較再添二百三十四步與弦步適等問勾弦步各幾何荅曰勾九十一步弦三百二十五步法曰置股長三百一十二步自乘得九万七十三百四十四步勾較再添二百三十四步自乘得五万四千七百五十六步二位相减餘四万二千五百八十八步爲實勾較再添得四百十八爲法除之得勾闊九十一步
  hash: sha256:8739c089c84df56daac1b9049aa133b42ba2d05aeaa7d03abba7e49ffa5385b4
