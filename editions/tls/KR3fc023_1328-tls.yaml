body:
  text: 乙縣一萬八百二十七石一百三十三人石之九丙縣七千二百一十八石一百三十三分石之六丁縣六千七百六十六石一百三十三分石之一百二十二戊縣九千二十二石一百三十三分石之七十四已縣七千二百一十八石一百三十三分石之六法曰以六縣筭數均則衰分今燕杰傭高下輸所遠近名曰均輸加空重車爲問不得以筭士之志各以空重人車里僦相乘粟價又以重車乘併約縣筭爲衰甲縣自輸本縣無空重車遠近里數只以粟價二十以一日重車五十里相乘得一千約四万一千筭得四千二爲實乙縣空重車乘除得日行百加輸各一日空車七十車五十共一百二十以六人乘得一千三百二十以傭一日十文乘一万三千二百爲實都以一
