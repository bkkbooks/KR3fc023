body:
  text: 得四十下法亦置上啇得四百爲方法與徔方共四百八十皆與上啇四除實一千九百二十餘實三千六百八十乃二乗方法得八百併入從方共得八百八十俱爲方法一退得八十八下法再退得一續啇置第二位以方法八十八啇餘實得四下法亦置上啇四爲隅法以方隅二法共九十二皆與上啇四除餘實盡得外周四十四隻合問今有圓箭積一百六十九隻問外周幾何荅曰四十二隻法曰置積減一得一百六十八以圓法十二乗之得二千一十六爲實半圓法得六爲徔方開平方法除之於實数之下啇置第
