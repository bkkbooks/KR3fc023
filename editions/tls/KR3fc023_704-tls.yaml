body:
  text: 貫五百文厚朴三百二十七斤該價鈔二百六十一貫六百文法曰置蒼木斤價二百五十文因之得二貫甘草斤價六百文以三斤因之得一貫八百文陳皮斤價五百文以五斤因之得二貫五百文厚朴斤價八百文以五斤因之得四貫副併得一十貫三百文爲法置総六百七十三貫六百二十文列爲三位以上以八八因之得五千二百八十八貫九百六十文以法一十貫三百文除之得蒼木五百二十三斤三兩一中以三斤因之得二千二十貫八百六十文以法一十貫三百文除之得甘草一百九十六斤三兩二下以五斤因之得二千三百六八貫一百文以法一
