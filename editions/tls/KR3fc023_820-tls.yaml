body:
  text: 實併分毋二人三人得五折半得二半以減総人七八餘得四人半却以分毋二人三人相乗得六乗之得二十七爲一差之法實如法而一得三貫爲一差之数置甲乙矷均七十七貫加一差三貫共八十貫折半得四十貫爲甲所得之數逓減二貫得各数合問今有馬軍七人給腿裙給二疋二丈歩軍六人給胖襖絹四疋三丈二尺疋法三十八尺今共有絹六千六百二十二疋四尺欲給馬步軍適等問各幾何答曰各五千六百七十人法曰置人爲分毋絹爲分子互乗七八乗一百八十四尺得一千二百八十八六人乗九十六尺得五百七十六併之得一千八百六十四爲法置絹六千六百
