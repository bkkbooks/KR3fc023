body:
  text: 以三爲隅筭開立言法除之得下廣五箇各圓滿及合問紅桃堆起一盤中八百一十有九箇四角堆之尖上一未知底子如何垜答曰底子一十三箇法曰置積八百一十九箇以三乘得二千四百五十七箇爲實以半箇爲從方一箇半爲從廉一爲隅筭開立言法除之合問紅橉一垜積難知共該六百八十枚三角垜來尖上一每面底子幾何爲答曰底子一十五筭法曰置積六百八十箇以六乘得四千八十爲實以二爲從方三爲從廉一爲隅筭開立方法除之合問一株槐木五尺方六面練粧外傍五寸截成方斗子幾
