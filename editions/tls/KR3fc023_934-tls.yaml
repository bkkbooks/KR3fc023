body:
  text: 四錢丁五秤六斤九兩六錢法曰各列置衰丁四十丙六十乙九十甲一百三十五副併得三百二十五爲法以所分銀以秤通斤共六百六十二斤以斤求兩得一万六百八兩乗禾併者甲得一百四十三万二千八十兩乙得九十五万四千七百二十丙得六十二万六千四百八十丁得四十二万四千二百二十各自爲列實以法各除之得数定身减六爲斤减五爲秤合問七秤一十一斤銀四箇啇人照本分原銀逓以三七出休得七折熟瞞人答曰甲四秤八斤九兩六錢乙一秤一十四斤六兩四錢丙一十二斤九兩六錢
