body:
  text: 之所謂正者正数也負者欠数也使學者參題取用依法布筭古問一十八問上禾三束中禾二束下禾一束共米三十九斗上禾二束中禾三束下禾一束共米三十四斗上禾一束中禾二束下禾三束共米二十六斗問上中下禾一束各米幾何荅曰上禾一束得九斗四分斗之一中禾一束得四斗四分斗之一下禾一束得二斗四分斗之三法曰此問銀物隱互其實問三禾之数欲分其實當求出工中十个各見一位之数如啇除之法
