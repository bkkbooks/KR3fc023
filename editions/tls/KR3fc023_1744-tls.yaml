body:
  text: 法曰此問亦同借不之意列所問數先以右行硃二爲法遍乗左行得數右硃二爲法粉一空二貫五百文中空粉三丹一二貫五百文左硃一得二空丹四得八二貫五百得五百却以左行硃一爲法復遍乗右硃二得二与左行硃二對減尽粉一得一左行中空无減加入得粉負一丹空左行遠丹八无加減得丹正八價二貫五百文得正二貫五百文減左行價正五貫餘得正二貫五百文再以中行粉三爲法遍乗左行粉負一得負三丹正八得正二十四正二貫五百得正七貫五百文却以左行粉負一爲法復遍乗中行粉三得負三与左行粉負三同名對減尽丹一得負一異加左行丹正二十四得丹三二二
