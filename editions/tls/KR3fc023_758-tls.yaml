body:
  text: 一秤一十三斤二兩下下等一百二十戶每戶七分五厘該一十四秤十五兩共一千六百八十七秤七斤八兩法曰置木炭一万六千八百二十秤加五增零九斤共得二十五万二千三百九斤又加六增零六兩共得四百三万六千九百五十兩爲實以各戶乗各分上上等六戶乗九十分得五百四十分上中等八戶乗七十分得五百六十分上下等一十二戶乗六十分得七百二十分中上等一十五戶乗五十五分得八百五十五分中中等二十四戶乗四十八分得一千一百五十二分中下等一十七戶乗十二分得一千一百三十四分下上等四十九戶乗三十五分得一千七百一十五分下中等九十
