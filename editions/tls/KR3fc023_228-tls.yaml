body:
  text: 二爲實以分毋三十四自乗得一千一百五十六爲法除之得七十二折半合問又法併兩旁半周自乗九而一合問今有欖核田三角正中長一十六步三十三分步之三十二右邊周一十八步左邊半周九步問爲田幾何荅曰五十四步法曰置正中長一十六步以分毋三十三通之加分子三十二共五百六十自乗得三十一万三千六百又以分毋三十三減分子三十二餘一以乗分子亦得三十二併二數共得三十一万三千六百二十二爲實以分毋三十三自乗得一千八十九爲法除
  hash: sha256:1ef2aa25ab2398251e53f678310c59aac3066fbca3b938bb24127b92185532f0
