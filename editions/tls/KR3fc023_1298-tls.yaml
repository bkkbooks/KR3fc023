body:
  text: 多三尺今要依数置造方闊高低聞公能筭必先知此法如何辨取右西江月答曰倉方一丈高九尺法曰置米五百一十八百四斗以斛法二尺五寸乘之得一千二百九十六尺爲實以多三尺自乘得九尺爲從方倍多三得六尺爲從廉以一爲隅筭開立方法除之利市九尺加二尺得倉方合問今有秋粮白米四百四十一石更加六斗共堆積停聚外角倚壁高比下周缺少計該一丈三尺煩公推筭問端的要見高周各幾右江西月答曰高二丈三尺下周三丈六尺
