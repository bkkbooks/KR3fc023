body:
  text: 西郷一百一十二人一万二千一百八十五分人之四千四南郷一百二十九人一万二千一百七十五分之八千七百九法曰各列置衰北郷八千七百五十八西郷七千二百三十六南郷八千三百五十六副併得二万四千三百五十爲法以所分徭三百七十八乘未併者得三百三十一万五百二十四西郷得二百七十三万五千二百八南郷得三百一十五万八千五百六十八各自爲列實以法二万四千三百五十除之不滿者法者法實皆折半合問大夫不雯簮褭上造公士五人均錢一百文欲令高爵出少以次漸多大夫出五分之一不更出四分之一簮褭出三分之一上造出二分之一公士一分之一問各出幾何
