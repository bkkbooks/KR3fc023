body:
  text: 二百左行正二千以城兎一得二百錢一千八百以犬六除得犬價三百中行正二千以城犬四價一倩兒百餘八百以豬二除得豬價四百合問六犬共三豬八兎數無盧各該一貫價錢餘犬餘外二豬豬餘外却買一箇兎兎餘二犬無差悮犬豬兎價怎生呼演縱橫認取右醉太平荅曰兎價二百犬價三百豬價四百法曰見數并乑爲正外餘數爲負列所問數以右行犬正六爲法遍乗中行得數右犬正六爲法豬負二兎空正一千中犬負二得負十二豬空兎正八得正四十八正一千得六千
