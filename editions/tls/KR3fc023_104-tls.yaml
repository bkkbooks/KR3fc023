body:
  text: 荅曰十五分之十一法曰列置分母子三分五分扵右之一之二扵左母互乗子三分乗之二得五分乗之一得五併之得十一爲實母相乗三分乗五分得十五爲法實不滿法以法命之合問周三分之二七分之四九分之五合之得幾何荅曰得一餘六十三分之五十法曰置分母子三分七分九分扵右之二之四之五扵左子互乗母之二乗七分九分得一百二十六之四乗三分九分得一百八之五乗三分七分得一百五餘之得三百十九爲實母相乗三分七分九分相乗得一百八十九爲法實如法而一得一餘一百五十與法皆三餘之得六十三分之五十合問
