body:
  text: 選項問数以右行首位上数爲法遍乗中二行禾米以中左二行上数爲法復遍乘右行禾米得数仍與中左二行禾米對减爲中左二行数仍行排列再以中行中数爲法遍乗左行禾米得数却以左行中数爲法復遍乗中行禾米仍與左行禾米對减價可爲實物可爲法而止法實皆一位也以法除之排列逐項問数以右行上三爲法遍乘中左二行禾米右上三爲法中二下一三十九斗中上二得六中三得九下一得三三十四斗得一百二斗左上一得三中二得六下三得九二十六斗得七十八斗復以中行上二爲法遍乗右行上三二乗得六與中行上六對减尽
