body:
  text: 截廣䖏該得幾右西江月荅曰田積二百二步半幾廣䖏一十五步法曰置二廣十二十八以少減多餘左六步以梯長三十步除之得二分却以半長一十五步乗之得一步併北廣一十二步共一十五步爲截廣又併北廣一十二步得二十七步折半得一十三步半以秉截廣一十五步得田積二百二九半合問今有梯田一叚一十四畝一分比北闊有差爭二十八步無剩又量長多南闊七十二步無零問公長閣要以闊筭得人前荅應右西江月荅曰南闊二十二步北闊五十步
