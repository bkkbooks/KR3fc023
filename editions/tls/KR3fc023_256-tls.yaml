body:
  text: 法曰列置分母子二分三分四分五分於右之一之二之三之四於左母互乗子之一分二分四分五分得六十之二乗二分四分五分得八十一乗二分三分五分得九十之四乗一分三分四分得六十六爲平實六十八十九十九九十六併得三百二十六母相乗爲法一分分四分五分得一百二十分以列數乗未併分子列數四乗六十得二百四十八十得三百二十九十得三百六十九十六得三百八十四亦以列數四乗分一百二十得四百八十數合問約分折半法得二百四十實得一百六十五其之一得一百二十之二得一百六十之三得一百八十之四一百九十二以平實一百六十三減列實上二求出一百八十餘十六四求出一百九十二餘二十九以列實之一求出一百一十八平實少四十三之二求出一百二十八平實少三也併所減之三餘十七之四餘二十就併得四十六以益少之一少四十三之二少三共四
