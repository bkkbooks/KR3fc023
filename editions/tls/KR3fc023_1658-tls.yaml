  text: 犬鷄兔價二負七爲法負一正七負六百六十七得負七千六百五十八三負八得負五十六負八得負五十六正二得正一十四負一千九十四得負九千一百九十一四負七得負四十九負十九得負十三負一得負七負一千三百一十三復以第三行犬負八爲法遍乗第二行犬負七得負五十六与第一行犬負五十六對减尽鷄負一得負八同减第三行雞負五十六得雞負四十八兔正七得正五十六同减第三行兔正一十四餘得兔負四十二價負六百六十七得負五千三百三十六同减第三行價負七千六百五十八餘得價負二千三百二十二又以第四行犬負七爲法遍乗第二行犬負七得負四十九与第二行犬負四十九對减尽鷄負一得負七同减第四行雞負一百三十三餘得雞負一百二
