body:
  text: 二羊價四十餘一百七十爲實以分母二十一乗牛五得一百五爲法除之得牛價一兩餘實六十五法實皆五約之得二十一分兩之十三合問上禾二束中禾三束下禾四束實各不滿斗上禾取中禾一束中禾取下禾一束下禾取上禾一束而實滿斗問上中下禾實一束幾何荅曰上禾一束二十五分斗之九中禾一束二十五分斗之七下禾一束二十五分斗之四法曰此問乃偕上中下禾揍數而方滿斗爲說文其實上禾二中禾十中禾三下禾一滿斗下禾四
