body:
  text: 餘三爲法除之得二十人以人五乗盈三十二得一百六十又人八乗二十八得二百二十四併得三百八十四以人相减餘三爲法除之得兔價一百二十八文合問本粟年年倍債主日日煎一年還五斗三年本利完荅曰原本四斗三升七合五勺法曰假令原本四斗三升不足六升四斗四升盈二升互乗不足得一石六斗四升盈看八斗六升併之得三石四斗爲實併盈不足共八升爲法除之合問九童詳註比類盈不足筭法大全卷第七
