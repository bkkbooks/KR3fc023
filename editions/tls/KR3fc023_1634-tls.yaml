body:
  text: 列所問数以右行四雀爲法遍乗左行物兩得数右四雀爲法一燕重八兩左一雀得四雀五燕得二十燕重八兩得三十一兩復以左行一雀爲法遍乗右行四雀得四雀与左行四雀對減尽一燕得一燕减左行二十燕餘得一十九燕爲法八兩得八兩減左行三十二兩餘得二十四兩爲實以法除之每一燕得一兩十九分兩之五右行八兩减一燕之重餘六兩十九分兩之十四以分母十九通兩得一百一十四加入分子十四共一百二十八爲雀實以四雀爲法除之得三十二以分母十九約之得一兩十九分兩之十三一雀之重合問武馬一匹中馬二匹下馬三匹皆載四十石至坂下皆不
