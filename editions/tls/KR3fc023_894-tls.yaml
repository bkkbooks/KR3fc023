body:
  text: 法曰置銀四十四兩爲實以利四分乘八月得三乑二分爲法除之合問甲趕群羊逐草茂乙拽肥羊一隻隨其後戲問甲及一百否甲云所説無差謬又得這般二群輳再得半群少半群來和你一隻方得就玄機與妙誰參透右鳳棲梧答曰羊三十六隻法曰置云羊一百减和你一隻餘九十九雙爲實併群率二群半群又少半群共二十七群半爲法除之合問碓上三人爭炒閙糙米各持一斗分明道九一吾觀張大王婆三其宲麄糙二八牛婆心更操奪碓齋傾曰內相了借問各人分多少煩公計筭如何考右鳳棲梧
