body:
  text: 法曰勾弦較不出四尺弦較後不凡二尺相乘得八尺倍之得十六尺爲弦和較積以開平方法除得四尺爲弦和較加弦較二得六爲勾戶廣仍以弦和較四加勾弦較四共得八爲即戶高以勾六自乘得三十六八自乘得大十四併得一百以開平方法除得十爲褒合問勾六步十二步問容方幾何荅曰方四步容方白積十六與容直黑積十步等大小二勾白積與大小二勾黑積等
