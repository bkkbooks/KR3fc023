body:
  text: 得言乎九敞端的處步產訛休誇會筭還嘍啰此般小数非雞事敢問賢家會得麼右鷓鴣天答曰以買鍋言得鍋三千以賣鍋言得米三千二百六十七石法曰置鍋九千九百米三斗三升各以四除之米得八升二合五勺鍋得二千四百七十五个以買鍋言二千四百七十五爲實以米八升二合五勺爲法除之得鍋三千以賣鍋言置二千四百七十五爲實以四因米三斗三升得一石三斗二升爲法乗之得米三千二百六十七石合問三兩絲錢價步偏其綿四兩减都金外餘剰下五分半十一两綿以價言絲五兩减張綿一錢九五是餘錢若知二
