body:
  text: 今有長倉一所長四丈七尺闊三丈一尺髙九尺問容米幾何答曰五千二百四十五石二斗法曰置長四丈七尺以乗闊三丈一尺得一千四百五十七尺又以髙九尺乗之得一万三千一百一十三尺爲實以斛法二尺五寸爲法除之合問今有米五千二百四十五石二斗欲造長倉盛貯只云闊三丈一尺髙九尺問長幾何答曰四丈七尺法曰置髙九尺以乗闊三丈一尺得二百七十九尺爲法置米五千二百四十五石二斗以斛法二尺五寸乗之得一万三千一百一十三尺爲實以法除之得長四丈七尺合問今有米五千二百四十五石二斗欲造長倉盛貯只云長
