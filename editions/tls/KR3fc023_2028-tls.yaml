body:
  text: 方法與徔方共二万六百皆與上啇二除實四万一千二百餘實一万七千八百四十乃二乗方法得四万併入從方共得四万六百俱爲方法一退得四千六十下法而退得百續啇置第二位以方法四千六十啇實得四十下法亦置上啇得四百爲隅法以方隅二法共四千四百六十皆與上啇四除實盡得外圍一百四十隊毎隊外圍二十四步該徑八步加中心一步共九步乗之得外圓圍二千一百六十步合問今有盜馬乗去馬主乃覺追之不及而還若要追二百七十八里十六分里之七及之只云馬主追之里数與追不及里数多一百三十八又云盜馬乗去已行里数內馬主追
