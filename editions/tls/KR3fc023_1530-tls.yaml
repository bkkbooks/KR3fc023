body:
  text: 十五里其二分里之一當依三百八十二爲母作二百九十一併九十九得二百九十皆與母半之得一百九十一分日之一百四十五合問蒲長三尺日自半莞長一尺日自倍問幾何日等長答曰二日十三分日之六各長四尺八寸十三分寸之六法曰假令二日不足一尺五寸此問即前良駑之意二日內蒲初日長三尺二日止長一尺五寸共長四尺五寸莞初日長一尺二日長二尺共長三尺蒲莞相减不足一尺五寸令之三日有餘一尺七寸半三日內蒲初日長三尺二寸長一尺五寸三日長七寸半共長五尺二寸半莞初日長一尺二日長二尺三日長四尺共長七尺蒲相减乃餘一尺七寸半求等長故以蒲莞相較
