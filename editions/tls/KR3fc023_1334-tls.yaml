body:
  text: 法除之合問一人日造化三十八枚一人日造素七十六枚今令一人一日作花素問共造幾何答曰二十五枚三分枚之一法曰置花素三十八枚七十六枚相乘得二干八百八十八爲寶併花素三十八枚七十六枚共一百一十四爲法除之得二十五枚餘寶三十八以法約之合問造箭一人爲筸三十隻一人爲羽五十隻一人爲筈一十五隻今令一人一日自造筸羽筈問成箭幾何答曰八矢少半矢
