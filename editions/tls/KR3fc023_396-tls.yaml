body:
  text: 百八十以三羽乗得一千一百四十釵三羽得一水合問比類計一百三問乘法今有金五十四兩七錢五分每兩價鈔二十四貫問該鈔幾何答曰一千三百一十四貫法曰置金五十四兩七糸五分爲實以每兩二十四貫爲法乗之合問今有金五百三十八兩每兩家鈔六十四貫七百五十文問該金幾何答曰三萬四千八百三十五貫五百文置金爲實兩價六十四貫七百五十文乗之合問
