body:
  text: 得乙金一百五兩併入前三十五兩共一百一十兩倍之得甲金二兩八十兩併入前一百四十兩得原金四百二十兩合問今有物不知緫数只云三数剰二五数剰三七数剰二問緫幾何答曰二十三法曰三数剰二緫一該七十剰二該一百四十五数剰三剰以該二十一剰三該六十三七数剰二剰一該一十五剰二該三十併之共二百三十三滿数一百五則去之凢兩次共去二百一十餘二十三合問今有錢不知緫只云七数剰一八数剰二九数剰三問緫幾何答曰四百九十八法曰七数剰下二百八十八数剰二剰一該四百四十一剰二下八百八十二
