body:
  text: 法曰此問与第一問根同列所問數貫加右行緫三爲法遍乗左中二行得數右緫三爲法小二軍一七石九斗中緫二得六小三得九軍一得三七石六斗得二十二石八斗左緫一得三小二得六軍三得九六石九斗得二十石七斗却以中行緫二爲法復遍乗右行緫三得六与中行捴六對減尽小二得四減中行小九餘得小五軍一得二減中行軍三餘得一七石九斗得一十五石八斗減中行二十二石八斗餘得七石又以左行緫一爲法復遍乗右行緫三得三与左行捴三對減尽小二得二減左行小六餘得小四軍一得一減左行軍九餘得八七石九斗得七石九斗減左行二十石七斗餘得一十二石八斗再相乗以中行小五爲法遍乗左行小四得二十軍八
