body:
  text: 以一千一百二十名爲一中隊計二百四隊毎隊指揮一貟計二百四貟毎二貟合一隊共一百二隊毎隊六十一步共積六千二百二十二步千戶二貟計四百八貟毎三貟合一隊共一百三十六隊毎隊六十一步共積八千二百九十六步百戶一十貟計二千四十貟毎四貟合一隊共五百一十隊毎隊六十一步共積三万一千一百一十步兵士四千八十隊毎隊六十一步共積二十四万八千八百八十步通共四千九百二十一隊毎隊六十一步共積三十万一百八十一步求外圍置通共四千九百二十一隊減中心一隊餘四千九百二十隊以圓法十二乗之得五万九千四十爲實半圓法得六爲徔方開平方法除之於實数之下啇置第一位將徔方二進得六百下法四進得万以啇實得二百下法亦置上啇得二万爲
