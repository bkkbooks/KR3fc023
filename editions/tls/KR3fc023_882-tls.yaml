body:
  text: 十九日與三十日相乗得八百七十折半得四百三十五却以添九丈乗得八十二丈六尺五寸加前六十丈共一百四十二丈六尺五寸疋法除之合問節遇元宵十五明燈百盞堪游兩秤五斤十兩油三夜神前如書三盞添油五兩九兩四甌無留要知多少盞和甌筭得湏當敬酒右西江月答曰盞六十箇一夜油六斤四兩三夜共油一秤三斤二兩甌四十箇一夜油五斤十兩三夜共油一秤一斤十四兩法曰列置三盞四一百八五九兩一百九十先以上中互乗三盞乗九兩得二十七兩的諫乗五兩得二十四以少减多餘七两爲法再以中下
