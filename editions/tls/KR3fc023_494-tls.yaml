body:
  text: 分毋十三分乗三分共三十九乗之得四十万七千一百九十九以減除計積餘五万五千八百九再以分毋三分二十八分相乗得八十四乗之得四而六十八七千九百五十六爲實仍以減餘六百一十三再以各分毋絹布共十三分乗價三分又乗布二分相乗得一百十七乗之得七万一千七百二十一爲法除之得絹六十五疋餘實二万六千九十一法實皆一百一十七約之得六百一十三分疋之二百二十三合問今有西瓜毎箇三文梨子毎十箇五文桃子毎十箇二文今瓜各食別客桃子二百五十五箇梨子二百二十六箇將瓜准還問各價瓜幾何答曰合價梨瓜二十一箇
