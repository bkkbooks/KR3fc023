body:
  text: 法曰置上方八尺以乗髙一丈八尺得一百四十四尺爲實以下方二丈减上方八尺餘一丈二尺爲法除之合問今有仰觀䑓上廣二丈五尺上袤三丈八尺下廣三丈二尺下袤五丈六尺髙四丈二尺問積幾何答曰五萬六千七百尺法曰倍上袤得七丈六尺加入下袤共得一百三十二尺以上廣二十五尺乗之得三千三百尺倍下袤得一百一十二尺加入上袤共一百九十尺以下廣三十二尺乗之得四千八百尺併二位得八千一百尺以髙四十二尺乗之得三十四万一百尺爲實如六而一合問今有築堤一所東頭上廣一丈下廣一丈六尺髙九尺西
  hash: sha256:113456ac0cb2b09e1c910ff475f813e6b556c4f4d09777967dfccdfc4897bd58
