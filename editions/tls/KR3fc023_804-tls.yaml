body:
  text: 第四等戶出数就八因得一石二升四合乃第五等戶出数各以本等戶数得逐等米数合問今有銀七千三百八十七兩令五人從下作二八分之問各得幾何答曰甲一千七百九十二兩乙四百四十八兩丙一百一十二兩丁二十八兩戊七兩法曰置二千三百八十七兩爲實以各戶從戊起逓以二八差乗之爲衰戊得二丁得八丙得三十二乙得一百二十八甲得五百一十二倂之得六百八十二爲法除之得三兩五粟爲一分之数以乗各衰合問
