body:
  text: 法曰置銀四百二十五兩爲實各每兩價鈔四十五貫列置二位倍一位作九十貫各爲法除實除雙二百兩前位下倍數九千又除雙二百兩又前位下倍數九千共一万八千除雙二十前位下倍數九百除雙二兩前位下倍數九十又除雙二兩又前位下倍數九十共一万九千八十去二兩前位下添原四十五貫除實盡得一万九千一百三十五貫合問今有鈔一萬九千一百二十五貫每鈔四十五貫買銀一兩問該銀幾何荅曰四百二十五兩法曰置鈔一万九千一百二十五爲實將每兩價鈔四十五貫列置二位折一位作二十二貫五百文又爲法除實蒲法除四千五百前
