body:
  text: 法曰排列問數以右行首位遍乗左行得數右二貫四二貫一貫一貫四百九十百爲法一百八百六百九貫二百左一得一貫一得二貫一得二貫二百四得五百七十疋四百疋四百疋四百疋四百十一疋八貫四百却以左行對減上盡次餘三百爲上法又次餘六百爲中法次三餘八百爲下法下餘七十九貫二百爲實以上法商除之得羅七十二疋減實二十一貫六百餘殘實五十八貫六百又以中法商除之得絹四十八疋減實二十八貫八百餘殘實二十八貫八百再以下法商除之得布三十六疋以羅七十二疋以價二貫一百文乗之得一百五十一貫二百文絹四十八疋以價一貫八百文乗之得八十六貫四百文布三十六疋以價一貫六百文乗之得五十七貫六百文倂三數得二百六十五貫二百
  hash: sha256:23ce2be7fe82efec1a86acb96f541a6c9522a4b3217cf9294f69024763db8da7
