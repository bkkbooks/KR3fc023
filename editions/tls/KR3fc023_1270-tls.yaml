  text: 斤十兩八錢云鉛金銀十三分之十二銀如金十一分之二銅如鉛十六分之九問四色重幾何答曰金五十五寸重五十五斤銀一十寸重八斤十二兩鉛三十八寸四分重二十二斤十二兩八錢銅二十一寸六分重一十斤二兩法曰併金銀十三分鉛銅十二分共二十五分爲法置方五寸再自乘得一百二十五寸以分母十三乘之得一千六百二十五寸以法二十五除之得金銀積六十五寸以减緫積餘得鉛銅積六十寸併金銀分母十一分子二共十三除積六十五寸得五寸以乘分母十一得
