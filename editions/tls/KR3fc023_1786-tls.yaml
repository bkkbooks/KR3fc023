body:
  text: 百餘得九千六百以豬一十六除得豬價六百文右行千減羊一價八百豬二價一千二百餘得價二千以兎五除得兎價四百合問七兎四豬二羊言各價一千有剩錢兎減一豬無少剩豬減一羊也一般羊除一兎却得就減説餘錢整一千有人筭得無差錯堪把隹名四海傳荅曰兎價二百豬價三百羊價六百法曰見有數并乑爲正減除數爲負列所問數以右行兎正七爲法過乗左行得數右兎正七爲法豬負一羊空正一千中兎空豬正四羊負一正一千左兎負一得負七豬空羊正二得正十四正一千得正七千
