body:
  text: 法曰置金爲實以毎兩價錢爲法乗之得数亦從寅位上定兩順数法錢卯上得千万辰上得百万已上得十万合問小乗小今有金四厘五毫毎厘價銀五厘五毫問該銀幾何荅曰二分四厘七毫五絲法曰置金爲實以毎厘價銀爲法乗之得数亦從寅位上定實順数卯上得兩辰上得尔已上得分合問大除大今有錢一百四十二億九千四百五十萬文共買金五萬六千五百兩問毎兩該銀幾何荅曰二十六萬三千文法曰置錢爲實以共買金爲法除之得数却從寅位上
