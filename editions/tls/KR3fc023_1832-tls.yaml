body:
  text: 法曰以容積爲實立四表方一百寸自乘得一万寸爲實以餘勾人左行去表三寸爲法除得餘股即荅木邊合問邑方不知大小各中開門出北門三十步有木出西門七百五十步見木問方幾何荅曰三里法曰餘勾出北門三十步餘股出西門七百五十步相乘得二万二千五百步爲半邑方積四乘得全邑九万步爲實以開平方法除得三百步爲一里合問邑方二百步各中開門東門外十五步有木問出南門幾步見木荅曰六百六十六步三分步之二法曰以容積半邑方一百步自乘得一万步爲實以餘勾東門外十五步爲法除之得餘股即荅木去邑達步合問井徑五尺不知其深直立五尺木於井上從木末望水人目入徑四寸問徑深幾何荅曰五丈七尺五寸
  hash: sha256:86476ecb3415eea94e2e1616ba218748ab772cd4d60275f68b6866bc18f891fc
