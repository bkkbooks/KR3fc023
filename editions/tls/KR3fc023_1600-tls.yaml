body:
  text: 人九兩恰無三荅曰一十五人銀三十兩法曰置列三人五兩五人九兩互乗三人得二十七兩五人得二十五兩各加不足三兩五兩得銀二十兩以三人五人相乗得一十五人合問牧童分杏各争競不知人数不知杏三人五箇多十枚四人八枚兩箇剩荅曰二十四人杏五十枚法曰置列三人五枚四人八枚互乗三人得二十四四人得二十以少减多餘四枚爲法又以三人四人相乗一十二人却以兩盈十枚兩个以少减多餘八枚乗得九十六人以法四枚除之得人二十四又以盈十个乗二十四枚得二百四十枚盈二乗二十得四十以少减多餘二百爲杏實以法四枚除之得人五十枚合問
