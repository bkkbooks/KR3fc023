body:
  text: 上啇若干以退爲数爲方法與徔方共得若干皆與上啇若干除實若干餘實若干乃二乗方法得若干併入徔方共得若干俱爲方法一退得若干下法再退得百續啇置第二位以方法若干啇餘實得若干下法亦置上啇若干以退爲数爲隅法與方法共得若干皆與上啇若干除餘實若干仍餘實若干乃二乗隅法得若干併入方法一退得若干下法再退得一再啇置第三位以方法若干啇餘實得若干下法亦置上啇若干爲隅法與方法共若干皆與上啇若干除實盡得闊若干合問今有直田六頃九十六畝只云闊不及長一百三十二步問闊幾何荅曰三百四十八步
  hash: sha256:60305b831b1c83953ad63e2f6c917bc14458ad74a518006f17b20e468b57b3e9
