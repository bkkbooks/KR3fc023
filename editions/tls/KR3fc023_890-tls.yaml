body:
  text: 答曰本銀六兩利銀一兩三錢半法曰置総銀七兩三尓五分爲實以毎月利銀二分五厘乗九月得二尓二分五厘併借銀一兩共一兩二尓二分五尓爲法除之得本銀六兩以减緫銀餘爲利銀合問甲向乙家取債元本不知分毫四分月利兩中包此法叮嚀要考七月終還本利一十五兩無饒本銀利息問根苗各要共該右西江月答曰本銀一十一兩七錢一分八厘七毫五絲息銀三兩二錢八分一厘二毫五絲法曰置緫銀一十五兩爲實以毎月銀一兩加七月利銀得二尓八
