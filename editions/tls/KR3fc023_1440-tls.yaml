body:
  text: 每員一方五步得三十五步共積五千一百步千戶二十員共四百八員每員一方四步得一十六步共積六千五百二十八半百戶一百員共二千四十員每員一方三步得九步共積一万八千三百六十步併前旗軍積步共得三十五万七千三百六十四步以闊四百八十步除之得長七百四十四步餘實以法曰之合問有官兵五萬四千八百人築柵圍周人各相去三步今內縮除一萬三千四百步問兵各相去幾何答曰二步只分步之三法曰置兵數以相去三步乘之得一十六万四千四百步內減縮除一万三千七百步餘一十五万七百步爲實以官兵五万四千八百爲法除之
  hash: sha256:649af4bc0b39391049cc95fb3832e11266beebc42de9f8ca4fc8ad84fe255df2
