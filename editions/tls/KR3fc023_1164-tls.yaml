body:
  text: 法曰倍上袤一百六十又如下袤共二百二十尺以上廣六十尺乗之得一万三千二百尺倍下袤爲一百二十尺加入上袤共二百尺以下廣四十尺乗之得八二尺併二位得二万一千二百尺以深二十尺乗之得四十二万四千尺如六而一得一万六百六十六尺不盡四法約之合問冥谷上廣二丈袤七丈下廣八尺袤四丈深六丈五尺問積幾何答曰五萬二千尺法曰形如正面碾砑石穿地之也倍上袤爲一百四十尺加入下袤得一百八十尺以上廣二十尺乗之得三千六百尺倍下袤爲八十尺加入上袤得一百五十尺以下廣八尺乗之得一千二百尺併二位得四千八百尺以深十十五尺乗之得三十一万二千尺如六而一合問
  hash: sha256:ec57f8f239db078032d80dfe11baeabd3888532b46b42736404c8dc9d35ef0da
