body:
  text: 法曰三数剰一下三百一十五五数剰二剰一該一百二十六剰二下二百五十二七数剰三剰一該五百四十剰二下一千六百二十九数剰四剰一該二百八十剰四下一千一百二十併之共三千三百零七滿数六百三十則去之凢五次減去共三千一百五十餘一百五十七合問借本還利今有人借鈔共還本利九百九十六貫六百五十六文只云毎貫月利三十五文今九箇月十八日問原借鈔幾何答曰七百四十六貫法曰置共還鈔九百九十六貫六百五十六文爲實列月剰九箇月六日以三十五文乗之加本鈔一貫共得一貫三百三十六文爲法除之合
