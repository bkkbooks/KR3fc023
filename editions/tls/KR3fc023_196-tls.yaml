body:
  text: 法曰併内曲一十四歩外曲二十二歩共三十六歩以頭廣乗之得一百四十四歩折半得七十二歩合問今有曲尺田東長五十歩南闊六歩北闊長四十歩西闊八歩問爲田幾何荅曰二畒五分零二十法曰置東長五十歩乗南闊六歩得三百又列北長四十歩乗西闊八歩得三百二十歩併之得六百二十歩爲實以畒法而一得二畒份一十合問今有鞋底田頭闊一十七歩腰闊一十四歩尾闊一十五歩底長四十八歩問爲田幾何荅曰三畒法曰二乗腰闊一十四歩得二十八歩實頭闊一十七歩尾
  hash: sha256:714dafd3c8d4476f22196a58223304dad08bfb182541a1d6b49ff35201d7055f
