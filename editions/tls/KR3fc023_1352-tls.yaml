body:
  text: 法曰置粺米十斗乘糲米十斗得一百斗又乘惡粟二十斗得二千斗爲實以糲米九斗乘得米九斗得八十一斗爲法除之合問米一菽二準粟二石問各幾何曰米五斗一升七分升之三菽一石二升七分升之六法曰置米率三十乘菽率四十五得一千三百五十以乘米一得一千三百五十菽二得二千七百爲列衰求本粟併之爲法米一千三百三十粟率五十乘之米車三十除得二千二百五十菽二千七百以粟率乘之以菽率四十五除得二千之得五千二百五十以準粟二百升乘列衰各自爲實朱得二十七万得五十四万實如浃而一米得五十一升餘實二千二百五十得一石一升四千五百法實皆約餘實合問
  hash: sha256:22a43329f21fe6d27bc78921ee8b19ff45c146d6e1e80f05921d7323f7104c5e
