body:
  text: 甲行下負十以三斗乗得三石以減添正六斗餘得二十四斗以上禾三秉除得八斗爲上禾一秉之數合問甲禾二秉乙三秉丙禾四秉重背過石甲二重多乙乙三重多丙一丙四重多甲一問各幾何荅曰甲禾一秉二十三分石之十七乙禾一秉二十三分石之十一丙禾一秉二十三分石之十法曰此問不可損益而以多爲負本重爲正求同前法甲正二爲法乙負一丙空正一石甲空乙正三丙負一正一石
