body:
  text: 顧率行道今有顧車一輛行道一千里載重一千二百斤與鈔七貫五百文今減重四百八十斤行道一千七百里問與鈔幾何答曰七貫六百五十文法曰置原與鈔七千三百乘今行道一千七百得一千二百七十五万又乗今幾何七百二十得九一千一億八千万爲實以原載重一千二百斤乗原行道一千四百得一百一十万爲法除之合問今有顧車一輛行道一千里載重一千二百斤與鈔七貫五百文今減重四百九十二斤與鈔六貫七百六十八文問合行道幾何答曰六百口四十里
