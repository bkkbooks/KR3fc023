body:
  text: 法曰假令原本二十五貫少十貫一百二十五四十貫多六貫七百五十文互乗盈得二百三十六貫二百五十文不足得四百五貫併之得六百四十一貫二百五十文爲實併盈六貫七百五十不足一十貫一百二十五文共一十六貫八百七十五文爲法除之今有利錢息加六每嵗還時心不欲一年歸還四百文四年本利俱齊足荅曰原本五百六十四文二万五千六百分文之二百四十一法曰假令原本二百七十盈三十三文一分五厘二毫五百七十少三十二文三分八厘四毫互乗盈得一十八貫五百六十五文一分二厘不足得一十八貫四百五十八文八分八厘得之得十七貫二十四文爲實得盈不足得六十五文五分三厘六毫爲法除之得五百六十四文分一厘六毫六忽法實皆二毫五六忽約
  hash: sha256:ebb3ac3c9de0b27c945def5ee499e4a294ec453906a6e0d66cef46f26008960e
