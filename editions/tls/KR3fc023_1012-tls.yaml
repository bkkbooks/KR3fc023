body:
  text: 亦得一千爲隅法與上啇除寶一千餘寶九百五十三尺一寸二分五至乃三乘隅法得三千爲方法再置上啇一十進二位爲一千以三乘之得三千爲廉法方法一退得三百廉法再退得三十下法三退得一尺續啇置第二位以方廉二法共二百三十啇寶得二尺下法亦置上啇二尺自乘得四尺爲隅法又以上啇二乘廉法得六十以方廉隅三法共三百大十四皆與上啇二除寶七百二十八尺餘寶二百二十五尺一寸二分五厘乃二乘廉法得一百二十三乘隅法得一十二皆併入方法共四百三十二再置上啇一十二尺以三乘之得三十六尺爲廉法方法一退得四十三尺二寸廉法再退得三寸六分下法三退續啇置第
