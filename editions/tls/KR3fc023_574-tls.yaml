body:
  text: 法曰置銀六十四錠每錠五十兩乗之得三千二百兩又以椒折五十兩乗之得一十六萬兩爲寶以稅約之得共椒一萬六千兩減六得一千斤以除總銀三百得椒斤價二兩一絲合問二斗精糧爲率換錦六兩時若言七兩換新絲九兩絮依商市客米五石七斗三合依買俱齊照依分數細推之錦二絲三絮四右西江月荅曰錦二斤十五兩二錢半絲四斤六兩八錢七分半絮五斤十四兩五錢法曰置米二十爲寶一錦除得三升六分升之一絲七四除得二升七分升四文絮九兩除得二升九分六二依率併之錦二得六升六分升之四
