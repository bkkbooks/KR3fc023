body:
  text: 開平方法除之得勾闊五十六步加不及得股長一百四十二步合問今有股弦相乗得六萬步只云股弦相和四百九十步問勾股弦各幾何答曰勾七十步股二百四十步弦二百五十步法曰置相乗六万步爲實以和步四百九十步爲從方開平方法除之得股長二百四十步减和步餘得弦長二百五十步次置股弦各自乗相减餘四千九百步以開平方法除之得勾闊七十步合問今有勾股相乗得六千四十八步只云勾股相和一百八
