body:
  text: 甲負一得負二乙空丙正四得正八正一石正一石先以右行甲正二爲法遍乗左行甲負一得負二丙正四得正八正一石胃正二石却以左行甲負一爲法復遍乗右行甲正二得正二子左行甲負二異名對減尽乙負一得負一左行乙空无減加入得之負一丙空先乗无減左行亦得丙正八正一石得正一石同加左行正二石得正三石再相乗以中行乙正三爲法遍乗左行乙負一得負三丙正八得正二十四正三石得正九石却以左行乙負一爲法復遍乗中行乙正三得正三与左行乙負三異名對減尽丙負一得負一異減左行丙正一十四餘得丙正二十三正一石得正一石同加左行正九石得正一十五求出丙正二十三正十石得丙禾一秉二十三分石之十
