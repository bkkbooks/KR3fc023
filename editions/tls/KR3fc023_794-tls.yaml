body:
  text: 一十三位者九二十四十九倂得七十九四位者二十七六十三一百四十七三百四十三倂得五百八十五位者八十一一百八十九四百四十一一千二十九二千四百一倂得四千一百四十一各爲法除實如有位数多者皆以三因首数次第取之三歸七因以陞其位倂以爲法除實得一分之数今有鈔二千五百二十六貫令甲二人乙五人丙七人丁九人欲逓以三七分之問各人得幾何答曰甲各得四百一十一貫六百文乙各得一百七十六貫四百文丙各得七十五貫六百文
