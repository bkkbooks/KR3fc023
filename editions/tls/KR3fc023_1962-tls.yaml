body:
  text: 三乗下廉得三億五千二百八十万四乗隅法得一千三百七十二万皆併入方法共一百二十億三千五十二万又於下法再置上啇六百七十進三位爲六十七万副置二位第一位自乗得四千四百八十九万又以六乗得二億六千九百三十四万爲上廉第二位以四乗得二百六十八万爲下廉乃方法一退得一十二億三百五万二千上廉再退得二百六十九万三千四百下廉三退得二千六百八十下法四退得一再啇置第三位以方廉三法共一十二億五百七十四万八千八十啇餘實得五尺下法亦置上啇五尺再自乗得一百二十五尺爲隅法又以上啇五尺一遍乗上廉得一千三百四十六万七千二遍乗下廉得六万七千以方廉隅四法共一十二億一千六百五十八万六千一百二
