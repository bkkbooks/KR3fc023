body:
  text: 荅曰相逢於十五日一百九十一分日之一百三十五良馬行四千五百三十四里一百九十一分之四十六駑馬行一千四百六十五里一百九十一分一百四十五法曰假令十五日不足三百三十七里半良馬初日行一百九十三里第十五日行三百七十五里乃每日加十三里併始終程得五百六十八里半得二百八十四里以十五日乘得四千二百六十里駑馬初日行九十七里每日减半里第十五日該行里併始發程得一百八十七里折半得九十三里半以十五日乘之得一千四百二里半併二馬共行得五千六百六十二里半課六千里不足二万三十里半良駑馬圖
