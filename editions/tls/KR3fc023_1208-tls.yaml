body:
  text: 尺加入少髙袤相併六十尺共六十二尺爲從廉以一爲隅筭開立方法除之将從方一進得六千九百六十從廉二進得六千二百隅法三進得一千上啇一十乗得筭得一千自乗亦得一千爲隅法一囡從豪亦得六十二万以方廉隅三法共一万四千一百六十皆與上啇一除實餘二万四千一百八十八乃二因從袤得一万二千四百三因隅法得三千皆得入從方共二万二千三百六十爲方法又置上啇一十進二位得一千以三因得三千併入從廉得九千二百爲法乃方法一退得二千二百三十六廉法一退得九十二隅法三退得一續啇得八尺下法亦置八尺自乗得六十四尺爲隅法八因廉法得七百二十六以方廉隅三法共三千三十六皆與上啇八又除實得宋廣丈八尺各加一个及合問求甲縣均給積尺受髙袤廣置人二千三百七十五以程㓛一尺七寸八分乗之得四千七百尺五寸以六因得二万八千二百一十五又以
