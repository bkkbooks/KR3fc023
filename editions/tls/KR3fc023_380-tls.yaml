body:
  text: 爲貴率以實減法爲賤率法即貴賤都數實減法即之以貴率減都數餘皆賤率也問出錢一貫一百二十買絲一百九十八斤欲貴賤率之荅曰六十八斤一斤五文一百三十斤一斤六文法曰以出錢一貫一百二十爲實以所買絲一百九十八斤爲法除之一斤得五文實不滿法者爲貴率一百三十文乃均不盡之數指爲一百三十斤每斤增一文通是六文一斤以實一百三十斤減去一百九十八斤餘賤率六十八斤各得五文合問問出錢五百七十六文買竹七十八箇欲其大小率之荅曰四十八箇每箇七文三十箇每箇八文法曰以出錢五百七十六文爲實以所買竹七十八箇爲法除之一箇
  hash: sha256:b58832bdebe8c6042eacb1ac4b86c1226f25165c0f821005a92dc2dced3821d6
