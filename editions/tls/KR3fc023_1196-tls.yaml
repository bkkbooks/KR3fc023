body:
  text: 爲一十二尺加零二尺共一十四尺爲法除之合問今有築䑓一所上廣二丈五尺長三丈八尺下廣三丈二尺長五丈六尺積五萬六千七百尺問髙幾何答曰四丈二尺法曰倍上長得七十六尺併入下長共得一百三十二尺以上廣二十五尺乗之得三千三百尺倍下長得一百一十二尺併入上長共得一百五十尺以下廣三十二尺乗之得四千六百尺併二数共得八千一百尺爲法置積五万六千七百尺以六因之得三十四万二百尺爲實以法除合問今有築室一所上廣二丈五尺長三丈八尺下廣五丈尺長丈二尺倍五萬六千七百尺問下䑓幾何
