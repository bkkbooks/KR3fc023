body:
  text: 船行一千三百七十五里法曰置計程四千二百二十五里爲實併船行二百五十里馬行二百里共四百五十里爲法除之得九日半爲相會日數各以原行里數除之得合問今有慢使臣已共八日績令緊使臣趕去七日追至中途及之其程已一千八百四十八里問緊慢使各日行幾何答曰緊使臣日行二百六十里慢使臣日行一百二十三里五分里之一法曰置其程一千八百四十八里爲實已趕去七日爲法除之得緊使臣日行二百七十四別併七日八日共得一十五日爲法除之得
