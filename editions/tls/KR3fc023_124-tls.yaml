body:
  text: 法曰置貴七分從五分相乗得三十五分爲法置分子之三之四相乗得一十二爲實不滿法以法命之合問問田廣九分步之七縦十一分步之五爲田幾何荅曰十一分步之七法曰置廣九万縦十一分相乗得九十九爲法置分子之七之九相乗得六十三爲實不滿法以九約之合問問田廣五分步之四縦九分步之五爲田幾何荅曰九分步之四法曰置分子之四之五相乗得二十爲實以廣五芝九分絲分相乗得四十五爲法實不滿法以法命五約之合問
