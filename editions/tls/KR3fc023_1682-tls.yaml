body:
  text: 二萬一千價過千貫外所平馬之價一馬二牛價不滿十貫內少牛之價問牛馬價各幾何荅曰馬五貫四百五十四錢十一分乑之六牛一貫八百一十八錢十一分乑之二法曰未知牛馬半價者當損益秋斉二馬一牛價過十貫外多半馬之價當損半馬爲一馬半一牛直十貫文一馬二牛價不滿十貫內少半牛之價當益半牛爲一馬二牛半直十貫排列問數半者倍之三馬二牛二十貫扵右二馬五牛二十貫扵左先以石行三馬爲法遍乘左行二馬得六五牛得十五價二十貫得六十貫却以左行二馬復遍乘右行三馬得六馬子左行六馬對減尽二牛得四牛減左行詩五牛餘得十一牛爲法價二十貫得四十貫減左行六十貫餘得
