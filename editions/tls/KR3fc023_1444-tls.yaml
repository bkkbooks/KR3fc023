body:
  text: 十畝見又有九十八頃昨朝遍謁鄉賢四十五具壯黃犍偣問幾朝耕遍右西江月答曰三十五日法曰置有田九十八頃乗借犍四十五具得四千四百一十爲實以原犍九具乗原耕日五日得四十五日又乗耕田二頃八十畝得一百二十丈爲法除之合問鶴起南朝七日飛臨北海波津北溟雁起又南行九日南陽避令鶴雁同時飛起不知何日相侵諸人通筭會縱橫莫要佯推不醒右西江月答曰三日一十六分日之一十五
