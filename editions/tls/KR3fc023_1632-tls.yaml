body:
  text: 得下正二十五爲法正一斗一負乘得負一斗加左行正三斗得四斗爲實不滿法以法命之每下禾一束得二十五分斗之四中行一斗以分母通爲二十五減下禾二十五分斗之四餘二十五分斗之二十一以中禾三束除之一束得二十五分斗之七右行一斗以分母通爲二十五減中禾一束二十五分斗之七餘二十五分斗之十八以上禾二束除之一束得二十五分斗之九合問六燕共重一斤雀重燕軽交易一枚其重適等門童幾何荅曰雀一兩十九分兩之十三燕一兩十九分兩之五法曰此問五六共重一斤交易其一適等實四一燕重半斤一五重半斤法
  hash: sha256:c46fc5a31d3a28038ba8af0eb5862e78b6a6fc92bfad2aa7773567c284e0d57e
