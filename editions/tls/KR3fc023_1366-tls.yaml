body:
  text: 法曰以三閞所稅分毋三分五分七分乘存米五斗得五百二十五爲實以稅剩餘分二分稅一餘二五分稅一餘四七分稅一餘六相乘四十八爲法除之得一十斗九升餘實一十八法實皆三約之合問金稅十分之一今持金一十二斤稅過二斤餘錢五貫文問一斤價錢幾何曰六貫二百五十文法曰置餘錢五以樂十分得五十爲實以巳稅金二斤乘十分得二十斤減原持金一十二斤餘八斤爲法除之合問比類四十一問輸運粺米今有七府㘦輸米二十八萬五千四百六十石一毋石行道
