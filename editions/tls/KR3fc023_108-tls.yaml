body:
  text: 荅曰十五分之三十一法曰列置分母子九分五分扵右之八之一扵左母互乗子九分乗之一得九五分八四十以少九減多四十餘三十一爲實母相乗五分乗九分併以十五爲法實不滿法以法命之得四十五分之三十一合問問八分之五比二十五分之十六孰多幾何荅曰二十五分之十六多二百分之三法曰列置分母子八分二十五分扵右之五之一十六扵左母互乗子八分乗之十六得一百二十八二十五分乗之五得一百二十五以少一百二十五減多一百二十八餘三爲實母相乗八分乗二十五分得二實不滿法即多二百分之二數也合問
