body:
  text: 疋法四十八尺毎二十尺問價鈔幾何答曰六貫四百文法曰以所求率二十尺乗鈔一百九十五貫二百文得三千九百四貫爲實以所買羅一十二疋以疋法四十八尺通之加零三十四尺共得六百一十尺爲法除之合問今有鈔一百九十五貫二百文買羅毎二十尺價鈔六貫四百文疋法四十八尺問該買羅幾何答曰一十二疋三丈四尺法曰以所求率二十尺乗鈔數一百九十五貫二百文得三千九百四貫爲實以所買羅價六貫四百文爲法除之得六百一十尺以疋法四十八尺除之合問
