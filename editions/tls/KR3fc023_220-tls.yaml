body:
  text: 又正面斜長二十自乗得五百七十六以四而一合問今有錠腰田半邊正面長二十四步正中一十二歩兩旁曲各周一十八步問爲田幾何荅曰七十二歩法曰置正面長二十四步自乗得五百七十六以八而一合問又法正中闊一十二歩自乗得一百四十四歩折半合問又法兩旁曲周一十八步自乗得三百二十四倍九而一今有錠腰田半曲周一十八歩兩旁半周各九步問爲四幾何荅曰七十二步法曰置曲周一十八步自乗得三百十四倍之九而一合問又法併兩旁半周得一十十八步自乗倍之九而一
