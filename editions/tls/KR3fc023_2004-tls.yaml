body:
  text: 續啇置第二位以方法五千六百二十啇餘實得八十下法亦置上啇得八百爲隅法以方隅二法共六千四百二十皆與上啇八除餘實五万一千三百六十仍餘實七百二十三乃二乗隅法得一千六百併入徔方共七千二百二十爲方法一退得七百二十二下法再退得一再啇置第三位以方法七百二十二啇餘實得一步下法亦置上啇一爲隅法以方隅二法共七百二十三皆與上啇一除餘實盡得周一百八十一步以三除之得徑六十步三分步之一合問今有環田積六畝九十六步只云徑不及外周一百二十八步又不及內周三十二問內外周徑各幾何
