body:
  text: 載二十五石除得五百二十八加粟價一十八一日重車除得九百共一千四百二十八的三万四千二百二算得二十四爲衰丙縣空重車乘除得日行一百加載愉各二日重車一百空車一百四十共三百四十以六人乘得二千四十又以陳一日五文乘得一万二百爲寶都以一車載二十五石除得四百八粟價一十六文以一日重車五十乘得八百共一千二百八約一万九千三百二十八得一十六空重車乘处得日行一百加載輸各二日半空车一百七十五重車一百二十五共四百以六人乘得二千四百又以一日五文乘得一万二千以一车载二十五除得四百八十加粟價一十四文以一日重車五十乘得七百共一千一百八十約一万七千七百算得一十五为衰戊空重車乘除得日行一百加載輸谷三日重車一百五十空車二百一十共四百六十以六人乘得二千七百六十又以一日五文乘得一万三千八百却以一车載二十五石除得五百五十二加粟價一十二文以一日空车五十乘得六百共一千一百五十二約二万三千四十算得二十为衰已
