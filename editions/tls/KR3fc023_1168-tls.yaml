body:
  text: 法曰以垣求積者還源法反用垣求積之術也四乗積得二千三百四尺爲實以深一十尺乗袤一十六尺得一百六十尺又以三乗之得四百八十尺爲法除之得四尺八寸倍之得九尺六寸以减上廣六尺餘三尺六寸合問比類九十五問今有築墻上廣二尺下廣四尺髙八尺長二百四十八尺每人一日自穿運築常積六十四尺問積用人各幾何答曰九十三人積五千九百五十二尺法曰併上下廣折半得三尺以髙八尺乗之得二十四尺以乗長二百四十八尺得五千九百五十二尺爲實以常積六十四尺除之合問今有方亭一所上方八尺下方一十四尺髙一十二尺
  hash: sha256:e6b4a1685adcef1f5e8f2463465ec6420d81d29fdb96b47fd64364ed6cc01a85
