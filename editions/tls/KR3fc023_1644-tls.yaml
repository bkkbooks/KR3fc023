body:
  text: 四青正一得正三黄負一得負三黑正十得正三十正一斗得正三斗復以第三行青負一爲法遍乗第二行仍与三行同減異加得數青三得青負三与第三行青負三同名對减尽黄一得黄負一異加入第三行黄正二十一得黄正二十二黑一得黑負一異加第三行黑正六得黑正七一斗得負一斗異加第三行正三斗得正四斗再以第四行青正一爲法遍乗第二行仍与第三行同減異加得数青三得青正三与第四行青正三同名對减尽黄一得黄正一異加第四行黄負三得黄負四黑一得正一同减第四行黑正三十得黑正二十九一斗得正一斗同减第四行正三斗餘得正二斗再列相乗以第三行黄正二十二爲法遍乗第四行得数三黄正二十二爲法黑正七正四斗四黄負四得負八十八黑正二十九得正六百三十八正二斗得正四百四十
