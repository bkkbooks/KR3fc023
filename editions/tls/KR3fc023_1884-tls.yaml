body:
  text: 髙及前去竿各幾何答曰竿髙三十六丈前表去竿隔水二十五尺法曰置表髙六尺乗表間相去一十五尺得九十尺爲實以二表退行八尺五尺相减餘三尺爲法除之得三十尺加表髙六尺得三十六尺又法置前表退行五尺乗相去一十五尺得七十五尺爲實以二表退行相减餘三尺爲法除之得前表去竿二十五尺合問今有隔水有竿不知其髙立二表各髙一丈前後相去一十五尺從前表退行五尺人目髙四尺望竿與前表末齊平又從後表退行八尺人目髙四尺望竿與後表末齊平問竿髙及前表去竿各幾何
