body:
  text: 並從方四十八步皆與上啇五步除實盡得徑五步以六乗得三十步併中周二十四步得截外周合問今有梯田長一百步南闊三十步北闊五十步今欲截南頭賣九畝問截長闊各幾何荅曰截長六十步截闊䖏四十二步法曰通截田九畝得二千一百六十步倍之得四千三百二十步乗原長一百步得四十三万二千以闊差二十步除之得二万一千六百爲實倍小頭闊二十步得六十步以原長一百步乗之得六千步却以闊差二十步除之得三百步爲從方開平方法除之得截長六十步求廣以闊差二十步乗截長六十步得
  hash: sha256:380314f48695685f2ec05dd2a759f1b22bf98181583de3df305181331ecd7421
