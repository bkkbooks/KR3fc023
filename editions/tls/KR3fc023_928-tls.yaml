  text: 布得五兩四糸以各疋除之合問六八絹十二布四十三兩七錢銀三色價銀該七折各物該銀筭要真答曰一疋該銀二兩五錢半共一十五兩絹一疋該銀一兩七錢半共一十四兩布一疋該銀一兩二錢二分半共一十四兩七錢法曰各列置衰續六百絹五百六十布三百八十八副併得一千七百四十八爲法以所賣銀四十三兩七糸乗未併者續得一千六百二十二得二千四百四十七兩二糸布得二千三百六十九兩五糸六分各自爲列實以法一千七百四十八
