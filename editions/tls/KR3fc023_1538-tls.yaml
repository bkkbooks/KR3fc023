body:
  text: 所行一尺五寸合問垣髙九尺瓜生其上蔓日長七寸瓠生其下蔓日長一尺問幾何日相逢各長多少答曰相逢於五日十七分日之五瓜蔓長三尺七寸十七分寸之一瓠蔓長五尺二寸十七分寸之十六法曰此問乃合率商除之法置垣髙九尺爲實併瓜蔓長七寸瓠蔓長一尺併共一尺七寸爲法除得五日不尽五約得十七分日之五求瓜蔓長置日長七寸以日分子五乗得三尺五寸爲實以日分母十七爲法除得二寸餘實一併前五日所長三尺五
