body:
  text: 答曰三丈二尺法曰置積五万六千七百尺以六因之得三十四万二百尺以髙四十二尺除之得八千一百尺内减倍上長併入下長乗上廣得三千三百尺餘四千八百尺爲實倍下長併入上長得一百五十尺爲法除合問今有築䑓上廣一丈四尺下廣三丈髙四丈巳築髙一丈二尺五寸問築上幾何答曰二丈法曰置上廣一丈四尺减下廣三丈餘一丈六尺以乗築髙一丈二尺五寸得十丈却以原髙四丈除之得五丈內减下廣三丈餘二丈合問今有方䑓一所上方八尺下方二丈髙一丈八尺今欲接成方錐問接髙幾何答曰一丈二尺
