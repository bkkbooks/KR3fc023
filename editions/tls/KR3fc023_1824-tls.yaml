body:
  text: 法曰勾弦和卒甲行五自乘得二十五卒乙行三自乘得九併得三十四折半得十七爲弦卒以和卒乙三相乘得十五爲卒弦卒十七減和幕二十五餘八即勾卒鐵有卒数却未見真数當以五换求之半邑方一千五百步係小直数以勾卒八乘得一万二千步爲却以股卒十五爲法除之得八百步南門外小勾之数加半邑方一千五百步共得二千三百步爲大勾之数邑出
