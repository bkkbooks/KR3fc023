body:
  text: 乗甲行羊三得一十二与乙行羊一十二對減尽豕二得八見乙行豕一十五餘得豕七爲法價一百五十五得六百二十減乙行價七百九十五餘得價一百七十五爲實以法除得豕價二十五貫甲行豕二價得五十貫以減一百五十五貫餘得價一百五貫以羊三除得羊價三十五貫合問今有綾三尺絹四尺直鈔二貫八百文又綾七尺絹二尺直鈔四貫二百六十文問綾絹尺價各幾何荅曰綾五百二十文絹三百一十文法曰列所問數先以甲行綾三爲法遍乗乙行得數綾三爲法絹四價二貫八百文綾七得二十一絹二得六價四貫二百六十得十二貫七百八十
  hash: sha256:43d299e0b88a59d9a0dfa0782715e768fcc02accfe43fc034f56b111384a3452
