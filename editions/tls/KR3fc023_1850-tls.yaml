body:
  text: 今有勾股田四畝一百六十二步只勾少如股三十二步問勾闊股長各幾何荅曰勾闊三十四步股長六十六步法曰通田四畝得九六十步併零一百六十千一百步共一二步倍之得二千二百四十四步爲實以少二十二歩爲從方開平方法除之得勾闊三十四步加少如股得長六十步合問今有勾股田勾闊九十一步不知股弦云股較再添長一十三步與弦步適等問股弦各幾何荅曰股三百一十二步弦三百二十五步法曰置勾闊九十一步自乘得八千二百八十一步股較添長一十三步自
  hash: sha256:ab160d329e90e2d8e738659d13067a638d4340feeed1c70b45b1b7ca3eddf051
