body:
  text: 續啇置第二位以方廉三法共若干啇餘實得若干下法亦置上啇爲若干再自乗得若干爲隅法又以上啇若干一遍乗上廉得若干二遍乗下廉得若干以方廉隅四法共若干皆與上啇若干除餘實若干仍餘實若干乃二乗上廉得若干三乗下廉得若干四乗隅法得若干皆併入方法共得若干又於下法再置上啇共若干進二位爲若干副置二位第一位自乗得若干又以六乗得若干爲上廉第二位以四乗得若干爲下廉乃方法一退得若干上廉再退得若干下廉三退得若干下法四退得若干再啇置第三位以方廉四法共若干啇餘實得若干下法亦置上啇若干再自
