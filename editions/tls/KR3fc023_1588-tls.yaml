body:
  text: 乘之以乘率一百除之得五斗四升加令來八斗共一百三斗四升比令春米一石三斗乃多四升故曰盈盈不足互乘盈得二斗四升足得三斗二升併之得五斗六升爲實併盈四升不足四升共八升爲法除之得米七斗以減瓮盛一石七斗得粟一石合問今有墧高一所量來九尺無疑苽篓下長一根枝上有一株蒺梨苽篓三日五寸九日三寸蒺梨問公幾日兩相齊苽篓秧觸著蒺梨右西江月答曰四十五日蒺一尺五寸苽七尺五寸法曰置墻高九尺以苽篓三日因之得二十七尺又以蒺梨九日因之得二百四十三尺爲實以二長三日九日相因得二十七爲法除之
  hash: sha256:796cd3a3c409d7e605bb736a109de638de15463adf459c45729969a1d82c1324
