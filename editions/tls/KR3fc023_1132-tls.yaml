body:
  text: 答曰立方面三步二十七分步之四法曰置積三十一步爲實上啇三步下法之上亦置三自乗得九爲隅法與上啇三步除實二十七步餘實四步乃三因隅法九得二十七乃二十七分步之四合問假有平積二十六步借問方面如何步数答曰平方面五步一十一分步之一法曰置積二十六步爲實上啇五步下法之上亦置五爲隅法與上啇五步除實二十五步餘實一步乃二因隅法五步得一十加一共得一十一乃一十一分步之一合問九章詳註比類少廣筭法大全卷第四
