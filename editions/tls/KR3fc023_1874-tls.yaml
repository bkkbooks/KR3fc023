body:
  text: 實以八十五寸减入下股九十一尺餘六寸爲法除之百五十寸內减勾髙六十寸餘得谷深四千一百九十寸合問又法以矩間相去三百寸乗入下股九十一寸得一万七千三百寸爲實以入上下股相减餘寸爲法除之得四千五百五十寸內减勾爲六十寸及矩間相去三百寸餘得谷深四十一丈九尺合問今有東南望波口立兩表南北相去九丈以索薄地連之當北表之西却行去表六丈薄地遙望波口南岸入索北端四丈二寸以望北岸入前所望表裏一丈二尺又却行後去表一十三丈五尺薄地遙望波口南岸與南表參合問波口廣幾何答曰一里二百四十步
