body:
  text: 法曰併上下廣半之得九十尺以深二十五尺乗之得二千百五十尺又以長二十里每里三百步每步六尺得一十八百尺過里共得三万六千尺乗之得八千一百万爲河積又置常積一百二十五尺以三箇月得九十日乗之得一万一千二百五十尺爲法除之合問今有開渠長一千八百尺上廣九尺下廣七尺深四尺每人日自穿運一百四十四尺令二百人開之問積及幾日工畢答曰積五萬七千六百尺二日工畢法曰置上廣九尺併入下廣七尺共得一丈六尺折半得八尺以乗深四尺得三十二尺又乗長一千九百尺得五万七千六百尺爲實以人二百乗日自穿運一百四十四尺得二万八千八百尺爲法除之合問
  hash: sha256:ba700d1fa57ef774fcf9d9f95b2bf417f33a56581c39ba905ef4d55c36c116ac
