body:
  text: 得一十九百七十八步九分五毫六絲爲實以畆法除之合問今有直田縦一百步廣四十二步中有圓池周二十步徑一十步問除池占外該田幾何荅曰一十七畆一分八厘七毫五絲法曰置縦一百步以乗廣四十二步得四千二百步爲緫積半池周得一十五步徑得五步相乗得七十五步以減緫積餘四十一百二十五步爲實以畆法除之合問今有方田積八万八千一百八十二步問諛田幾何荅曰三頃六十七畒四分二厘五毫法曰置田積八万八千一百八十二步爲實以畒法除之合問
  hash: sha256:45666ff47e56b2807d1d7491d50fe4d773b2b6be0b8e6ef5b8798ef2ad95097f
