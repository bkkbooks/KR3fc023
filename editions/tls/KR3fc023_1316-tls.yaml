body:
  text: 七約本縣一万三千三百三十八戶得四百九十四爲衰戊縣行道一百五十里以顧四厘相乘得六併粟價一十三共得一十九約木縣五千一百三十戶得二百七十爲衰各列置衰甲一千二十六乙六百八十四丙三百九十九丁四百九十四戊二百七十副併五乘決二千八百七十三爲法以賦粟一万石乘未併者各自爲實甲一千二十六万乙六百八十四万丙三百九十九万丁四百九十四万戊二百七十万爲衰以法一千八百七十三除之合問今有四縣均輸粟二十五萬石用車一萬輛以各縣遠近戶数衰出之甲縣一萬戶行道八日乙縣九千五百戶行道十日丙縣一萬二千三百五十戶行道一十三日丁縣一萬二千二百戶行道二十日問各輸車粟幾
