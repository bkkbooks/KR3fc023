body:
  text: 退得一續啇置第五位以廉法一十二万六千四十啇寶得五下法亦置上啇五爲隅法以廉隅二法共一十二万六千四十五皆與上啇五除寶盡合問開平圓法曰置積問周以十二乘積爲寶問徑四乘積三而一爲寶以開平方法同積一千五百一十八步四分步之三問爲圓周幾何答曰一百三十五步法曰以方改圓國居方四分之三也置積一千五百一十八步以分毋四乘之得六千七十二加入內子三共得六千七千五以圓法十二乘之得七万二千九百又以分毋四乘之得二十九万一千六百爲寶以開平方法除
