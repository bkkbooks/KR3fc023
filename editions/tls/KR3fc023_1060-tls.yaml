body:
  text: 答曰十一步法曰二乗積得二百五十二步爲實以廣一十二步爲法除合問今有圭田積一百二十六步只云正長二十一步問闊幾何答曰一十二步法曰二乗田積得二百五十二步爲實以長二十一步爲法除之合問今有圭田積二百二十四步小頭尖大頭闊一十六步問正中長幾何答曰二十八步法曰倍積百二十四步得四百四十八步以闊一十六步爲法除之合問今有圭田積八百四十六步大頭闊三十一步五十三分步之四十九問正中長幾何答曰五十三步
