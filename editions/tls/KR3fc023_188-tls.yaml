body:
  text: 得四千九百三十歩折半得二千四百六十五歩以畒法除之合問今有抹角田西南闊二十五歩東北長三十二歩問爲田幾何荅曰四畒三十九歩半法曰置東北長自乗爲實减西南闊餘十歩自乗折半減餘以畒法之合問今有眉田上周四十九歩下周四十五歩中徑一十四歩問爲田幾何荅曰一畒八十九歩法曰併二周上四十九歩下四十五歩得九十四歩折半得四十七歩爲實以中徑一十四歩折半得七歩爲法乗之得三百二十九歩以畒法除之合問
