body:
  text: 子箇只云桃子一箇價比李子八箇比棗子四十箇問三色價各該幾何答曰桃子毎十箇八文李子毎十箇一文棗子毎十箇二分法曰置李子六千箇以八除之得七百五十棗子四千箇以四十除之得一百併入桃子共得八千八百五十爲法置鈔七貫八十文爲實以法除之得八文爲桃子毎十箇價又以八除得一文爲李子十箇價足以四十除八文得二分爲棗子十箇價合問今有米石價五十七貫五百文芝麻石價四十貫豆石價三十三貫今三主以價物准之均出問各該物價幾何
