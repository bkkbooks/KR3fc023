body:
  text: 有田九畒二分五厘每畒科米二斗乗之得米一石八斗五升將二項田米以減原科米六石三升五合餘米二石一斗八升七合五分爲實以站田每畒科米一斗五升爲法除之得田八畒七分五厘合問今有綾羅娟布共二百四十一疋共價鈔四百九十九貫二百文只云綾疋價二貫四百文羅疋價二貫一百文絹疋價一貫八百文布疋價一貫六百文問四色各幾疋價幾何荅曰綾八十五疋該鈔二百四貫羅七十二疋該鈔一百五十一貫二百文絹四十八疋該鈔八十六貫四百文布三十六疋該鈔五十七貫六百文
