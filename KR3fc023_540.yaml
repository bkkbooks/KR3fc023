body:
  text: 炭五百五十稱該錢二十三貫一百文法曰置錢六百五十四貫二百二十五文為實以各分乘各價油一分得一百貫十文鹽二分得三百六十文蜜三分得六貫三十文絹六分得五貫四十文布四分得三貫炭八分得三百三十六文併之得九貫五百一十六文為法除實得油一分該六十八斤七分五釐就將油數二因得鹽一百三十七斤半三因得蜜二百六斤二分五釐六因得絹四百一十二匹半四因得布二百七十五匹八因得炭五百五十稱各為列實以各價為法乘之油斤價一百五十文得一十貫三百一十二文五分鹽斤價一百八十文得二十四貫七百五十文蜜斤價二百一十文得四十三貫二百一十二文五分絹匹價八百四十文得三百四十六貫五百文布匹價七百五十文得二百六貫二百五十文炭稱價四十
