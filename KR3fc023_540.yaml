body:
  text: 炭五百五十秤該錢二十三貫一百文法曰置錢六百五十四貫二百二十五文爲實以各分乗各價油一分得一百貫十文鹽二分得三百六十文蜜三分得六貫三十文絹六分得五貫四十文布四分得三貫炭八分得三百三十六文併之得九貫五百一十六文爲法除實得油一分該六十八斤七分五厘就將油數二因得鹽一百三十七斤半三因得蜜二百六斤二分五厘六因得絹四百一十二疋半四因得布二百七十五疋八因得炭五百五十秤各爲列實以各價爲法乘之油斤價一百五十文得一十貫三百一十二文五分鹽斤價一百八十文得二十四貫七百五十文蜜斤價二百一十文得四十三貫二百一十二文五分絹疋價八百四十文得三百四十六貫五百文布疋價七百五十文得二百六貫二百五十文炭秤價四十
