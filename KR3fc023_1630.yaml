body:
  text: 上禾一滿斗本與第一問同意排列逐項問數先以右行上二爲遍乗左行右上二爲法中一空一斗中空中三下一一斗左上一得二空下四得八一斗得二斗復以左行上一爲法遍乗右行上二得二與右行二對減盡中一得一左行中空無減加又得中負一下空左行原下八無加減得下正八一斗一乗得止一斗減右行二斗餘得正一斗再以中行中正三爲法遍乗左行中負一得負三下正八得正二十四正一斗得正三斗却以左行中負一爲法復遍乗中行禾米仍與左行禾米同減異加中正三一乗得正三與左行中正三對減盡下正一一負乗得負一加左行下正二十四
