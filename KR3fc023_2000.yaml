body:
  text: 爲七較即七長內減一平置田一十九畝六分以畝步通之得四千七百四步爲實以較二十八步爲徔方開平方法除之於實数之下啇置第一位將徔方一進得二百八十下法二進得百以啇實得五十下法亦置上啇得五百爲方法與徔方共七百八十皆與上啇五除實三千九百餘實八百四步乃二乗方法得一千併入徔方共得一千二百八十俱爲方法一退得一百二十八下法再退得一續啇置第二位得六步下法亦置上啇六爲隅法以方隅二法共一百三十四皆與上啇六步除餘實盡得平五十六步加較二十八步得長八十四步合問今有圓田積一十一畝九十步一十二分步之一只云徑不及
  hash: sha256:9c0cf87472c30dc87c364c6ff4e17333dfb9e3d8ed749797bd23fdafe61fea40
