body:
  text: 四白一得二青一得二空黑五得十一斗得二斗復以第三行白一爲法遍乗第一行白二得三与第三行白二對减尽青一得一第三行青空合加一爲青負一黄一得一减第三行黄八得黄正七黑空加第三行行黑正二一斗得一斗减第三行二斗得正一斗再以第四行白一爲法遍乗第一行白二得二与第四行白二對减尽青一得一减第四行青二餘得青正一黄一得一第四行黄空旡减今加得黄負一黑空旡减第四行亦得黑正十一斗得一斗减第四行二斗餘得正一斗再相乗以第二行青三爲法遍乗第三四行得数二青三爲法黄一黑一一斗三青負一得負一黄正七得正二十一黑正二得正六正一斗得正二斗
