body:
  text: 法曰以麻四十五乘粟五斗以分母三通得一百五十加分子二共一百五十二得六千八百四十為實以粟率五十以原通分母三通得一百五十為法除之問粟十斗八升五分升之二為麥答曰九斗七升二十五分升之十四法曰以麥四十五乘粟十斗八升以分母五通得五百四十加分子二共五百四十二得二万四千三百九十為實以粟五十以原通分母五通得二百五十為法除之問粟七斗八升為䜴答曰九斗八升二十五分升之七法曰以䜴六十三乘粟七斗一升為實以粟率五十為法除之問粟五斗五升為飱答曰九斗九升法曰以飱九十乘粟五斗五升為實以粟率五十為法除之問粟四斗為熟菽答曰八斗二升五分升之四
