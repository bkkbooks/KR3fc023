body:
  text: 乙各得二十二貫八百文丙各得三十四貫二百文丁各得五十一貫三百文法曰各列置衰四六衰分遞以加五甲得二十六乙得四十二丙得四十五丁得五十四副並得一百七十七為法以所分鈔六百六十二貫六百文乘未並者各自為列實甲得万四十二万十貫六百文乙得二万八千二百四十九貫二百文丙得三万二百六十七貫丁得万六十三百二十貫四百文以法一百七十七除之甲得一百二十六貫八百文乙得百五十九貫六百文丙得一百七十一貫丁得二百五貫二百文各以人數約之合問今有米一千八百七十七石九斗令五人從下作四六分
