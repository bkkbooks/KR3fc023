body:
  text: 答曰麥二斗半斗價二百四十文粟七斗半斗價八十文法曰置粟一石以共錢三百二十文乘之得三貫二百文却以四因各價六百得二貫四百文減之餘八百文乃賤石價得每斗粟價八十文以減共錢三百二十文餘得麥斗價二百四十文各除共錢六百文麥得二斗半粟得七斗半以各斗價乘之合問一斤半鹽換斤油五萬白鹽載一舟斤兩內除相易換須教二色一般籌答曰各二萬斤法曰置總鹽五万斤為實併鹽一斤半油一斤共得二斤半為法除之得二万斤合問
  hash: sha256:76b6cca088a135ac5c72a2857022b863254103c2946c9f4857f5308ec56a9c63
