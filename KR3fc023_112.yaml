body:
  text: 即多一千五十分之四十三合問平分法曰毋互乗子其於也副併諸子爲平實列諸分子爲平實此意先其命平數毋相乗爲法有諸子爲平實以乗爲法以列數乗未併分子列数列分毋之位数也既併諸子爲平實而未併書却以列数乗之亦以列数乗法平實乃數位併法乃自乗本位數不及平實所以列數乗法以平實減列實餘爲所減列實減平實餘爲所益併所減以益少以法命平各其平也取用並見各題法曰問二分之一三分之二四分之三減多益少幾何而平四分之一比斤即一百九十二三分之二比二百五十六四分之三比十二両即二百八十八荅曰減四分之三求之者四毋互子求得二十七減四也即四十二
