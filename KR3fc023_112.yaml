body:
  text: 即多一千五十分之四十三合問平分法曰毋互乘子其於也副併諸子為平實列諸分子為平實此意先其命平數毋相乘為法有諸子為平實以乘為法以列數乘未併分子列數列分毋之位數也既併諸子為平實而未併書却以列數乘之亦以列數乘法平實乃數位併法乃自乘本位數不及平實所以列數乘法以平實減列實餘為所減列實減平實餘為所益併所減以益少以法命平各其平也取用並見各題法曰問二分之一三分之二四分之三減多益少幾何而平四分之一比斤即一百九十二三分之二比二百五十六四分之三比十二兩即二百八十八答曰減四分之三求之者四毋互子求得二十七減四也即四十二
