body:
  text: 法曰置勾闊六步自乗得三十六步弦斜一十步自乗得一百步內減勾餘六十四步爲實以開平方法除之得股長八步以乗勾闊六步得四十八步折半全問今有梭田中闊二十四步直長四十六步問爲田幾何荅曰二畆三分法曰置中闊二十四步乗直長四十六步得一千一百四步折半得五百五十二步爲實以畆法除之合問今有半梭田闊一十一步直長五十二步問爲田幾何荅曰一畆四十六步法曰置中闊一十一步乗直長五十二步得五百七十二步折半
