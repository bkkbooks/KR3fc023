body:
  text: 法曰置勾闊六步自乘得三十六步弦斜一十步自乘得一百步內減勾餘六十四步為實以開平方法除之得股長八步以乘勾闊六步得四十八步折半全問今有梭田中闊二十四步直長四十六步問為田幾何答曰二畝三分法曰置中闊二十四步乘直長四十六步得一千一百四步折半得五百五十二步為實以畝法除之合問今有半梭田闊一十一步直長五十二步問為田幾何答曰一畝四十六步法曰置中闊一十一步乘直長五十二步得五百七十二步折半
  hash: sha256:84160155e10f9111e6fa5c3a8a9b8b9febd3980cfd7c1498b5253ff72618818a
