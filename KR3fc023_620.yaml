body:
  text: 買淨椒得何幾答曰一十四稱一十四斤十四兩三錢三銖法曰置米四十三石一斗八升一合一勺為實以兩一升二合為法除之得三千五百九十八兩四爾二分五厘以兩求斤稱銖法約之合問四十三石一斗米八升一合又一勺斤價一斗九升二欲買淨椒得合幾答曰一十四稱一十四斤十四兩三錢三銖法曰照前法以斤價一斗九升二合除之合問十箇雞兒賣十兩每箇轉差二分半十般價列請伊言仔細從頭用心算
