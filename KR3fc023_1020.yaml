body:
  text: 千七百万爲方法再置上啇三百進四位得三百万以三乘之得九百万爲廉法方法一退得二百七十万廉法再退得九万下法三退得千績啇置第二位以方廉二法共二百七十九万啇寶得七十下法亦置上啇七十進二位爲七千以七乘之得九万九千爲隅法又以上啇七乘廉法得六十三万以方廉隅三法共三百三十七万九千皆與上啇七除寶二千三百六十五万三千餘寶一百六十六万六百二十四乃二乘廉法得一百二十六万三乘隅法得一十四万七千皆併入方法共百八十万七千再置上啇三百七十進二位爲三万七千以三乘之得一千一万一千爲廉法方法一退得四十一万七百廉法再迟得一千一百一十下法三退得一續啇置
