body:
  text: 種麥庒西每日看四驢三馬五猪餐驢餐馬半猪驢半陪麥三牲總若干該四石怎難攤余編此法未為難英賢不醒緞橫法再拜明師用意觀右鷓鴣天答曰猪一斗六升共八斗驢二斗二升共一石二斗八升馬六斗四升共一石九斗二升法曰各列置衰猪五驢八馬十二副併得二十五為法以所陪四石承未併者豬得二十石驢得三十二石馬得四十八石各自為列實以法二十五各除之合問一時春秋周易書九十四冊共無餘毛詩一冊三人看春一本四人呼一周易五人讀要分三者幾多書就見學
