body:
  text: 千一百八十四步爲實開平方法除之得截長七十二步長求闊以比闊三十六步乗今截長七十二步得二千五百九十二步爲實却以原長一百二十步爲法除之得闊五十步六分合問今有斜田南廣三十步比廣五十步縱一百步今從南頭截賣田九畒問截長闊各幾何荅曰截長六十步闊四十二步法曰通截田九畒得二千一百六十步倍之得四千三百二十步以乗原縱一百步得四十三万二千以廣差二十步除之得二万一千六百步爲實倍南廣得六十步乗原縱一百得六千步却以廣
