body:
  text: 左令五得五吏十得十從一得一鷄六得六復以中行令十爲法遍乗右行令一得十与中行令十對减尽吏五得五十减中行吏一餘得四十九從十得一百减中行五餘得九十五鷄十得一百减中行鷄八餘得九十二又以左行令五爲法遍乗右行令一得五与左行令五對减尽吏五得二十五减左行吏十餘得一十五從十得五十减左行從一餘得四十九鷄十得五十减左行鷄六餘得四十四再以中行吏四十九爲法遍乗左行吏一十五得七百三十五從四十九得二千四百一鷄四十四得二千一百五十六復以左行吏十五爲法遍乗中行吏四十九得七百三十五与左行吏七百三十五對减尽從九十五得一千四百二十五减左行從二千四百一餘得九百七十六爲法鷄九十二得一千三百八十减
