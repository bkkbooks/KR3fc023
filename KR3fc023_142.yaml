body:
  text: 今有方田三頃六十七畝四分二釐五毫問該步幾何答曰八万八千一百八十二步法曰置田三頃六十七畒四分二釐五毫為實以畒法乘之合問今有方田桑生中央從隅至桑一百四十七步問田幾何答曰三頃六十畝一分五釐法曰倍隅至桑一百四十七步得二百九十四步自乘得八万六千四百二十六步為實以畒法除之合問今有田方二里問為田幾何答曰一十五頃法曰通田二里萬六百步自乘得三十六万步為實以畒法除之合問今有勾股田勾闊二十六步股長四十八步問為田幾何
