body:
  text: 今有方田三頃六十七畆四分二厘五毫問該步幾何荅曰八万八千一百八十二步法曰置田三頃六十七畒四分二厘五毫爲實以畒法乗之合問今有方田桑生中央從隅至桑一百四十七步問田幾何荅曰三頃六十畆一分五厘法曰倍隅至桑一百四十七步得二百九十四步自乗得八万六千四百二十六步爲實以畒法除之合問今有田方二里問爲田幾何荅曰一十五頃法曰通田二里萬六百步自乗得三十六万步爲實以畒法除之合問今有勾股田勾闊二十六步股長四十八步問爲田幾何
