body:
  text: 以二十四步除之為分或以六十步除之為角者便云幾畒幾步零幾何田廣十五步縱十六步為田幾何答曰一畝田廣除也縱長也長問相乘得數以旬法二百四十步之問按乘除初學田一長問知山人田為簡易乘折之也法曰置廣十七縱十六步相乘得一四十步一合問田廣十二步縱十四步需田幾何答曰一百六十八步法曰置廣十二步縱十四步相乘得一百六十八步合問田廣二里縱三里為田幾何答曰二十二頃五十畒法曰通廣二里為六百步縱三里何加百步相乘得五十四万步以畒法除之合問田方一里為田幾何答曰三頃七十五畒
