body:
  text: 併前共得八千一百一十二以三乗得二万四千三百三十六四而一得六千八十四爲實以分毋十三自乗得一百六十九爲法除之合問周求積置周二十步以分毋四十一通之加分子三十二得八百五十二自乗得七十二分五千九百四又以分毋二一減分子三十二餘九以乗分子三十二得二百八十八併入前數共得七十二万六千一百九十二却以十二除之得六万五百一十六爲實以分毋四十一自乗得一十六百八十一爲法除之合問今有圓田周一百八十一步問爲田幾何荅曰一十一畒九十步十二分步之一法曰置半周九十步半自乗得八千一百九十步二分五厘爲實以三爲法
  hash: sha256:f71ebb4f74b771d4102ae93e7cf3850d5fb50c1a55f79db1495ff860934f72d5
