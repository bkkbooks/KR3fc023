body:
  text: 併前共得八千一百一十二以三乘得二万四千三百三十六四而一得六千八十四為實以分毋十三自乘得一百六十九為法除之合問周求積置周二十步以分毋四十一通之加分子三十二得八百五十二自乘得七十二分五千九百四又以分毋二一減分子三十二餘九以乘分子三十二得二百八十八併入前數共得七十二万六千一百九十二却以十二除之得六万五百一十六為實以分毋四十一自乘得一十六百八十一為法除之合問今有圓田周一百八十一步問為田幾何答曰一十一畒九十步十二分步之一法曰置半周九十步半自乘得八千一百九十步二分五厘為實以三為法
  hash: sha256:b59bdab978f99fbd24d9e4ffaf68b0ecf41de212645b8a2a8965056824629d5f
