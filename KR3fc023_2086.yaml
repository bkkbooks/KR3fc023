body:
  text: 法曰置鈔爲實以毎疋價鈔爲法除之七一加三不動一位一十只扵二位六万內增三作九見七進一十將二位作九內除七存二却進前位一十內增一合定位作二百貫七二下加六將二位四千內增六作十見七進一十將三位作十內除七存三却進前二位存二內增一作三合定作三十貫七三四十二將三位存三內增一合定位作四貫更扵四位一百內增二作三七三四十二將四位作三內增一作四更將五位九十內增二作一十見七進一十將五位作十一內除七存四却進前四位作四內增一合定作五百文七四五十五將五位存四內增一作五更扵六位七貫內增五作十二見七進一十將六位作十二內除七存五却進前五位作五內增一合定作六十文七五七十一將六位存五內增二合定作七文更扵七位五百內增一作六七六八十四將七位作六內增二合定作八分更扵
