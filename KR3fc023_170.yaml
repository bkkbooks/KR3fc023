body:
  text: 法曰併外周六十一步中周四十六步共一百七步折半得十三步半為實以徑五步為法乘之合問今有環田三角外周九十一步半中周六十九步徑五步問為田幾何答曰一畝一百六十一步四分步之一法曰併外周九十一步半中周六十九步共得一百六十步半折半得八十步二分半為實以徑五步為法乘之合問今有環田一角外周三十步半中周二十三步徑五步問為田幾何答曰一百三十三步四分步之三法曰併外周三十步半中周二十三步共五十三步半折半得二十六步七分半為實以徑五步為法乘之合問
