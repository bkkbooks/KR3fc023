body:
  text: 答曰一千二百四十八斤四兩八錢法曰置練熟絲九百二十六斤以斤法十六兩通之加零三兩六糸共得一万四千九百七十九兩六爾為實法練熟絲七糸五分為法除之得一万九千九百七十二兩八糸以定身減六見斤合問今有錢六百三十三文五分文之三貿縑一匹九尺五寸問一丈該錢幾何答曰一百二十八文法曰以所有錢六百三十三文以分毋五通之加分子二共得三千二百六十八乘所求縑一十尺得二万一千六百八十為實以所買縑一匹通為四丈零九尺五寸以原分毋五乘得二十四丈七尺五寸為法除之得一百二十八文合問物不知繞
  hash: sha256:3276d4f8a574f91a40615badc9deadc706c14711351dd45fe8506190b973da5e
