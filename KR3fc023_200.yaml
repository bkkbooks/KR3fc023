body:
  text: 今有蛇田頭廣一十八步闊四十三步尾闊一十六步長八十五步問為田幾何答曰一十畒六十五步法曰併三闊得八十七步以三而一得二十九步以乘長八十五步得二千四百六十五步以畒法而一合問今有牆田方周七百二十步問為田幾何答曰一頃三十五畒法曰置周步七百二十以四而一得一百八十步自乘得三万二千四百步以畒法而一合問今有鼓田南北闊二十步中闊二十五步正長五十步問為田幾何答曰四畒一百六十五步
