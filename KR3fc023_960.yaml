body:
  text: 錢唐南胡後敬信民編集少廣計一百五問法曰一畝之田廣一步長二百四十步今截步以益廣故曰少廣古術曰置全步及分毋子以最下分母遍乘諸分子及全步各以其毋除其子置之于左命通分者又以毋遍乘諸分子及已通者皆通而同之併之為法置所求步數以全步積分乘之為實法有分者當同其毋齊其子以同乘法實而併齊于今以分毋乘全步及子子如毋而一實如法而一得縱
