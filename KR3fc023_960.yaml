body:
  text: 錢唐南胡後敬信民編集少廣計一百五問法曰一畝之田廣一步長二百四十步今截步以益廣故曰少廣古術曰置全步及分毋子以㝡下分母遍乗諸分子及全步各以其毋除其子置之于左命通分者又以毋遍乗諸分子及已通者皆通而同之併之爲法置所求步數以全步積分乗之爲實法有分者當同其毋齊其子以同乗法實而併齊于今以分毋乗全步及子子如毋而一實如法而一得縦
