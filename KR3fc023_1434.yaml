body:
  text: 今有旗軍二十二萬八千四百八十名削寨一所每五十六名爲一隊所居之地長一十步關八步每一萬一千二百名用管軍頭目都指揮一員指揮一十員千戶二十貟百戶一百員帳房所居之地俱方大將軍中軍帳每面關一十六步都指揮每面闊六步指揮每靣闊五步千戶每靣闊四步百戶每靣闊三步其寨通闊四百八十步問長步及長闊各列隊伍并指揮千百戶員數同積步各幾何答曰通積三十五萬七千三百六十四步長七百四十四步一百二十分步之六十一闊四百八十步
