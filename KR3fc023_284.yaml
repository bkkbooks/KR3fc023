body:
  text: 先生一晌右西江月答曰截長一百二十步截闊三十六步法曰置截田九畝以畝步二百四十步通之得二千一百六十步以直長一百八十步乘之得三十八万八千八百步却以半闊二十七步除之得一万四千四百步為實以開平方法除之得截長一百二十步求截闊以闊五十四步乘截長一百二十步得六千四百八十步為實却以原長一百八十步為法除之得闊合問今有圭田一假相期乙買啇量一百八十正中長五十四南廣截積一十一畝二分半數休忘有人算得是高興得臨時謙讓右西江月
