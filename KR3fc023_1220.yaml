body:
  text: 今有開渠長一百六十里上廣八丈下廣五丈深三丈二尺今已開渠二丈四尺問下廣幾何答曰五丈七尺五寸法曰置上廣八丈减下廣五丈餘二十尺乗已開深二十四尺得七百二十尺却以原深三十尺除之得二十二尺五寸與上廣八丈相减餘五丈七尺五寸合問今有穿渠一百六十里上廣八丈下廣五丈深三丈二尺每人一日自穿運一百二十尺計用人夫三十三萬二千八百人限半箇月開畢今只有夫二十萬八千人問積及幾日工畢
