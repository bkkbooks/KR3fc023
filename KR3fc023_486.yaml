body:
  text: 法曰先求尺價置差一百五十文乗絹九尺得一千三百五十爲實羅四尺減絹九尺餘五尺爲法除之得二百七十文爲羅尺價以減差一百五十文餘一百二十文爲絹尺價又置羅絹二十三疋半以疋法四十尺通之得九百四十尺以羅尺價二百七十文乗之得二百五十三貫八百文內減共鈔一百八十六貫餘六十七貫八百文爲實以差一百五十文爲法除之得四百五十二尺以疋法約得一十一疋一丈二尺爲絹以減共數餘一十二疋八尺爲羅之數合問今有米五百七十五石穀三百二十五石共價鈔四萬九千八百七十五貫只云穀石價比米石價三分之二問米穀石價各幾何答曰米石價六十三貫穀石價四十二貫
