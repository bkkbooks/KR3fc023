body:
  text: 下廣三丈袤四丈上袤二丈無廣髙一丈問積幾何答曰五千尺法曰七狀如草屋上盖如截方亭兩邊合之是也倍下袤爲八十尺又加上袤共一百尺以下廣三丈乗之得三千尺又髙一十尺乗得三万尺六而一合問羨除上廣一丈下廣六尺深三尺末廣八尺無深袤七尺問積幾何答曰八十四尺法曰其狀上平下斜以兩鼈臑夾一壍堵穿地遂道也併三廣得二十四尺以深三尺乗之得七十二尺又乗袤七尺得五百四尺如六而一合問穿地爲垣五百七十六尺袤一十六尺深一十尺上廣六尺問下廣幾何答曰三尺六寸
