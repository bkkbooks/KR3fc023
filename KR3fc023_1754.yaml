body:
  text: 行弱正二看不清一得正一加左行若正六得正七爲是正八十石得正八十石左行空加入得正八十石爲實以法七除之得老軍一名力引一十一石七分石之三中行八十石內除老軍一名力引一十一石七分石之三餘重八十八石七分石之四以弱軍二除之每名得力引二十四石七分石之一右行八十石內除弱軍一力引三千四石七分石之二餘得壯軍一名力引四十五石七分石之五合問今有上中下田一十四畒五分共納夏稅絲一兩五錢二分二厘五毫只云每畒科絲上田一錢二分五厘中田一錢一分下田八分五厘問三色天并絲各幾何荅曰上田二畒五分該絲三錢一分二厘五毫
