body:
  text: 緫通該十兩八錢問先生本利兩根源右水仙子答曰原本八兩一錢利息二兩七錢法曰置緫銀十两八乑爲實以年息五乑用八个月歸之得六分二厘玉毫却以十二月乘之得七乑五分爲法乘之得原本銀八兩一分以年息五乑承之得四十兩五乑却以十二月除之得三兩三乑七分五厘又以八月乘之得利二兩七乑合問元霄十五閙縀橫來往觀燈街上行我見燈上下紅光映遶三遭數不頁從頭見三數無零無數時四甌不盡七數時六盞不停端的是幾盞明燈右水仙子答曰六十九盞
