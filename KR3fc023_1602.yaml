body:
  text: 衆戶分金務要均不知金数不知人六人七兩多二兩八人九兩却分勾荅曰四十八人金五十四兩法曰置列六人七兩八人九兩以盈六人乗不足九兩得金五十四兩以人六八相乗得四十八人合問林下牧童鬧如簇不知人数不知竹每人六竿多十四人分八竿恰齊足荅曰七人竹五十六竿法曰以剩十四爲實以分六竿八竿以少减多餘二爲法除之得十人以適足八竿乗之得竹五十六竿合問揭借利錢本不知每年只納五分息一年還錢二十七還了三年本利畢荅曰原本三十八貫
