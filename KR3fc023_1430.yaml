body:
  text: 爲實以原食米八升乘今三十口得二百四十爲法除之得一百一十二日半以月三十除之得三個月零二十二日半合問今有一工舂米三石一工篩米二十七石今令一工自舂篩幾何答曰二十七斗法曰置舂米二石乗二十七石得八十一石爲實併舂篩二米得三十石爲法除之合問支給綃布今有官軍一千人共給布一千匹只云四軍一疋四疋一官問各得幾何答曰官二百貟給布八百疋軍八百名給布二百疋
