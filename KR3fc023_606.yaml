body:
  text: 價該多少堪把住名四海傅右鷓鴣天答曰絲兩價一錢一分半綿兩價七分法曰置綿四尓减外餘五分半该剰二尓四分半以絲三两除之得絲兩價一尓一分半以乗絲五兩得五尓七分半加餘錢一尓九分半共七尓七分以綿十一兩除之得綿兩價七分合問折絹將綾欲度量折綾度絹上餘強度綾過絹三十寸度絹過綾丈五長綾不及絹雖忘請公於此細推詳絹若得知長知堪作明師遠播㨶右鷓鴣天答曰綾長三丈六尺絹長六丈六尺法曰倍還綾右倍過絹三尺得六尺得長三尺六尺
