body:
  text: 千四十八第三層四千九十六第二層八千一百九十二第一層一萬六千三百八十四法曰置油八十三釣以釣法三十通之得二千四百九十斤一稱得一十五斤又七斤共得二千五百十二斤加六見兩加零六兩共得四万一百九十八兩以誅法二十四通之加零一十六銖共得九十六万四千七百六十八銖為實別置油十兩五以銖法通之得二百五十銖以甌九除之得二十八乃一甌油數以五分因之得一百四十乃甌五分之數又置油以銖法二四通之得一百九十二銖以盞六除之得三十二乃一盞油數以三分因之得九十六是盞三分之數併入甌一百四十百
