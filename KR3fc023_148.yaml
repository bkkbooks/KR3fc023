body:
  text: 得百八十步為實以畝法除之合問今有梯田南闊二十二步北闊五十步長九十四步問為田幾何答曰一十四畝一分法曰併二闊得七十二步以乘長九十四步得六千七百六十八步折半得三千三百八十四步為實以畝法除之合問今有梯田南闊二十四步七分步之五北闊三十六步長四十步問為田幾何答曰五畝一十七步七分步之一法曰置南闊二十四步以分毋七通之加分子六共得一百七十四又置北闊二十六步以南闊分毋七通之得二百五十二併二闊共四百二十六又置長四十步以南闊分毋七通之得二百八十以乘
  hash: sha256:f989d1092ee1bfca4a1aa6083e4ab548a62d9ccfa592699663173ad8a4c8ac94
