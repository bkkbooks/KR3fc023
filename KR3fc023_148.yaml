body:
  text: 得百八十步爲實以畆法除之合問今有梯田南闊二十二步北闊五十步長九十四步問爲田幾何荅曰一十四畆一分法曰併二闊得七十二步以乗長九十四步得六千七百六十八步折半得三千三百八十四步爲實以畆法除之合問今有梯田南闊二十四步七分步之五北闊三十六步長四十步問爲田幾何荅曰五畆一十七步七分步之一法曰置南闊二十四步以分毋七通之加分子六共得一百七十四又置北闊二十六步以南闊分毋七通之得二百五十二併二闊共四百二十六又置長四十步以南闊分毋七通之得二百八十以乗
  hash: sha256:fae2f9bff642ca64a22be9445dfa7fd5cb6dd8980654584b14d6e43661953b90
