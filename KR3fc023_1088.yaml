body:
  text: 六分步之五北闊三十二步七分步之正長四十一步問中闊何答曰一十八步法曰通田六畒加零一十步共得九百七十步以分母一百六十八通之分子九十七共得一十六万三千五十七爲實以正長四十一步爲法除得三千九百七十七乃三闊之和别置南闊二十五步以分母六之加分子五共得一百五十五又互乗北闊分母七得一千八十五闊三十二步以分母七通之加分子六共得二百三十又互乗闊分母六得一千三百八十併二闊得二千四百六十五以减三闊之餘一千五百一十二半之得七百五十六以南闊二分母七分六分相得四十二除之得一十八步合問
