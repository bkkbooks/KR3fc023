body:
  text: 實徑一十二步為法乘之合問今有錢田通徑一十二步內方六步問為田幾何答曰七十二步法曰置徑一十二步自乘得一百四十四步以三乘得四百三十二步四除得一百八步減內方六步自乘得二十六步餘七十二步合問今有錢田外周三十六步內方六步問為田幾何答曰七十二步法曰置外周三十六步自乘得千二百九十六步以十二除之得一頻八減內方六步自乘得三十六步餘七十一步合問今有錢田外周二十七步徑三步內方周一十二步問為
