body:
  text: 一疋賣幾何尺只言每疋長四十右王樓春答曰一貫二百文法曰置布三百疋以稅二尺乗之得六百尺於上以收布一十五疋半每疋四十尺乗之得六百二十尺減該稅六百尺餘二十尺以除貼錢大每尺得三十文以疋法四十尺乗之合問今年秋糧都納米顧船該倉去未知共該幾隻船裝完五萬七千六河中濕漏船一隻每船負帶一石去止剩一石帶不了請問原船多少數右王樓春答曰二百四十只法曰置未五萬七千六百石以開平方法除之合問
  hash: sha256:7a2f84bdd280b697aeb322f9e30d24f2fe247b7f5a7fd7b046157cb72490a3c5
