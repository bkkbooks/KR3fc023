body:
  text: 均車一万輛乘未併者各自爲實甲一百二十五万乙丙九十五万丁六十一万以法三百七十六除之甲得三千三百二十四輛除實一百七千六乙丙各得二千五百二十六輛除實二百二十四丁得一千六百二十二輛除實一百二十八有餘者上下輩之輩者配也車牛不可分裂推少就多甲丁除少乙丙餘多以甲丁餘就乙丙除多爲一車乙丙各增合得二千五百二十七輛以粟二十五石乘各得車数爲粟合問今有均卒一月一千二百人甲縣一千二百人乙縣一千五百五十人行道一日丙縣一千二百八十人行道二日丁縣九百九十人行道三日戊縣一千七百五十人行道五日欲以五縣遠迫害戶数衰出問各幾何
