body:
  text: 今有錠腰田角正主斜長一十二步兩旁曲周各九步問為田幾何答曰三十六步法曰置正中斜長一十二步自乘得一百四十四步以四而一又法兩旁曲周併得一十八步自乘九而一合問今有錠腰田一角正面闊一十二步長一十二步周一十八步問為田幾何答曰三十六步法曰置闊一十二步以乘長一十二步得一百四十四步以四百一又法周一十八步自乘得三百二十四步以九而一合問又法闊一十二步以乘周一十八步得二百一十六六而一合問今有錠腰田半角正面長一十二步半周九部問為田幾
  hash: sha256:e6b4a7cd57455bfbd4bedd855dc23753031a2a0a0ac7621accad4ee31aaca85a
