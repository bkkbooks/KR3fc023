body:
  text: 今有官糴米一百三十六石各於甲乙丙丁富戶內依稅糧多寡而均差甲有糧二百八十七石乙有糧二百三十六石丙有糧一百六址八石丁有糧一百四十九石問各該米幾何答曰甲四十六石一百五石六四十九乙三十八石一百五分石之二十二丙二十七石一百五分石之二十一丁二十四石一百五分石之一十三法曰各列置衰甲二百八十七石乙二百三十六石丙一百六十八石丁一百四十九石副併得八百四十石為法以所輸米一百三十六乘未併者甲得三万九千三十二乙得三万二千九十六丙得二万二千八百四十八丁得二万二百六十四各自為列
