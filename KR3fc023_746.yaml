body:
  text: 人得一十副並得五十為法以所分三百六十貫乘未並者各自為列實甲得八千六百四十乙得五千七百六十丙得三千六百以法五十除之甲得一百七十二貫八百文乙得一百一十五貫二百文丙得五十二貫以人數甲六人乙八人丙十人約之合問今有官配米四千七十二石五斗令九等人戶出之各等戶額分數不等問各該米幾何答曰上上等一十五戶每戶七十分該米二十一石共三百一十五石上中等四十二戶每戶六十分該米一十八石共七百五十六石
