body:
  text: 今有客至不知数只云二人共飯二分之一三人共羙三分之一四人共肉四分之一緫用碗六十五隻問客幾何答曰六十人法曰置分爲毋之爲子二分三分四分之一之一之一子互乗毋之一乗三分四分得一十二分之一乗二分四分得八分之一乗二分三分得六分併之得二十六折半得一十三爲法分毋相乗二分乗三分得六分又乗四分得二十四半之得一十二以乗碗六十五隻得七百八十隻爲實以法一十三除之合問今有客至不知数只云三人共飯四人共羙共碗三百一隻問客幾何答曰五百一十六人羙碗一百二十九隻
