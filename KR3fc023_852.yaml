body:
  text: 今有客至不知數只云二人共飯二分之一三人共美三分之一四人共肉四分之一總用碗六十五隻問客幾何答曰六十人法曰置分為毋之為子二分三分四分之一之一之一子互乘毋之一乘三分四分得一十二分之一乘二分四分得八分之一乘二分三分得六分併之得二十六折半得一十三為法分毋相乘二分乘三分得六分又乘四分得二十四半之得一十二以乘碗六十五隻得七百八十隻為實以法一十三除之合問今有客至不知數只云三人共飯四人共美共碗三百一隻問客幾何答曰五百一十六人美碗一百二十九隻
