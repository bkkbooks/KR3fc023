body:
  text: 左犬空豬正三兎負一正一千却以中行犬負二爲法復遍乗右行犬正六得正十二与中行犬負十二異名對減尽豬負二得負四中行豬空无減價入得豬負四兎空无減亦得兎正四十八正一千得正二千同加中行正六千得正八千再相乗以中行豬負四爲法遍乗左行豬正三得正十二兎負一得負四正一千得正四千却以左行豬正三爲法復遍乗中行豬負四得負十二与左行豬正十二異名對減尽兎正四十八得正一百四十四異減左行兎負四餘正一百四十爲法正八千得正二万四千同加左行正四千共得正二万八千爲實以法遍得兎價二百中行兎正四十八以甲二百乗得九千六百以兎正八千餘得負一千六百以豬負四除得豬
