body:
  text: 今有貸錢七百五十文於九日歸之得息六錢四分尓之問貸錢一貫該月息幾何答曰三十文法曰以所有貸錢七百五十乗歸之九日得六千七百五十又票所求一月三十日得二十万二千五百以原分毋四通得八十一万爲實以所有息錢六小以分毋四通之加分子三共得二十七乗貸錢一貫得二万七千爲法除之合問今有乾麫三斤得濕麫四斤却有乾麫九斤十二兩問得濕麫幾何答曰一十三斤法曰置乾麫九斤通十二兩作七五以乗濕麫四斤得三十九斤爲實以乾麫三斤爲法除之合問今有濕麫四斤該乾麫三斤却有濕麫二十六斤該乾麫
  hash: sha256:a4ee0c327e2dc59afb03711117aad8e88a8f9d93cc8ec327aadf68b03d9f31e2
