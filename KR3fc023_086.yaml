body:
  text: 五步得二万二千五百四十五步折半為實以畝法除之合問圓田周一百八十步徑六十步為田幾何答曰一十一畝六十步周徑步問積半周半徑相乘得積或周徑相乘四面一周步闊積周自乘十二而一或半周自乘三而一徑步問積徑自乘三之四而一半徑自乘三之法曰半周九十步半徑三十步相乘得二千七百步畝法而一合問圓田周一百十一步徑六十步三分步之一為田幾何答曰一十一畝九十步十二分步之一法曰置徑六十步以分母三通之加分子一共一百八十一步折半得九十步半半周一百八十一步得九十步半相乘得八千一百九十二分五厘却
