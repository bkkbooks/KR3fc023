body:
  text: 異母少减多求等數而用之乃菈其通分之法先只乗其全後染子母不同者安互乗子母亦相乗爲分母站子其之約之有分荅同而之則定亦立乗分分委爲式不傳分母乗全分子從子加爲實法乗通仍將墳墓而除實餘實約之數便同重有分者同而通法實相乗爲積功分母自乗爲法數除訖餘皆用約同今以九乗二十一五分之三問得幾何荅曰一百九十四五分之二法曰分母通其全分母五通其全二十一得一百五分子從之加分子三一百八爲實以法九乗之得九百七十二爲積復以分母五除之
