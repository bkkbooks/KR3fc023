body:
  text: 約實下法得百億啇置第一位得四百下法亦置上啇爲四百億以三遍四乗得二万五千六百億爲隅法與上啇四除實一十万二千四百億餘實九万四千七百六十二億四千五百三十二万三千七百七十六尺乃五乗隅法得一十二万八千億爲方法下法再置上啇爲四百億副置三位第一位以四二遍乗得六千四百億又以一十乗之得六万四千億爲上廉第二位以四乗得一千六百億又以一十乗之得一万六千億爲中廉第三位以五乗得二千億爲下廉乃方法一退得一万二千八百億上廉再退得六百四十億中廉三退得一十六億下廉四退得二千万下法五退得十万續啇置第二位以方廉四法共一万三千四百五十六億二千万啇餘實得五十下法亦置
