body:
  text: 法曰通田七畒半得一千八百歩折半得九百歩爲實以開平方法除之得闊三十歩以除緫田得長六十歩合問長不及十六歩有餘十五長闊若相乘無零恰一畒荅曰長一十五歩六分二厘五毫闊一十五歩三分六厘法曰通田二百四十八歩爲實以闊一十五三分六厘除之得長合問九章詳註比類方田筭法大全卷第一
