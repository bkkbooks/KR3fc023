body:
  text: 法曰通田七畒半得一千八百步折半得九百步為實以開平方法除之得闊三十步以除總田得長六十步合問長不及十六步有餘十五長闊若相乘無零恰一畒答曰長一十五步六分二釐五毫闊一十五步三分六釐法曰通田二百四十八步為實以闊一十五三分六釐除之得長合問九章詳注比類方田算法大全卷第一
