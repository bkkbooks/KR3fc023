body:
  text: 長三尺七寸十七分寸之一求瓠蔓長置日長一尺以日分子五乗得五尺爲實以日分母十七爲法除得二寸餘實一十六併前五日所長五尺共長五尺二寸十七分寸之十六玉方一寸重七兩石方一寸重六兩今石中有玉立方三寸共重一十一斤問玉石各幾何答曰玉十四寸重六斤二兩石十三寸重四斤十四兩法曰此問乃貴賤分率之法置立方三寸再自乗得二十七寸以玉重七兩乗得一百八十九兩减共重一十一斤得一百七十六兩餘一十
