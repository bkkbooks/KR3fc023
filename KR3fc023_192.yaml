body:
  text: 法曰置每面一十四步以六乘得八十四步以七而一得一十二步為實以每面一十四步折半得七步為法乘之合問今有六角田每面一十五步問為田幾何答曰二畒一百九十五步法曰置每面一十五步自乘得二百二十五步以二乘之得六百七十五步以畒法除之合問今有八角田每面一十四步問為田幾何答曰四畒法曰置每面一十四步以五乘得七十步七而一得一十步倍之得二十步加一面一十四步共三十四步自乘得一千一百五十六
