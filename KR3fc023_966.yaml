body:
  text: 十四以全步積分二十四通畒步二百四十步得五千七百六十為實各以本毋除子全步一分得二十四其二分之一得一十二共三分之一得八其四分之一得六併之得五十為法除之得一百一十五步餘實十法實皆十約之得五分步之一合問以後田廣問八問法曰皆同田一畒廣一步半二分步之一四分步之一五分步之一問幾何答曰一百五步一百三十七分步之十五法曰列置全步及分毋子照前列置而副併分毋自乘得一百二十以乘全步一分得一百二十分子之一得一百二十以全步積分一百一千通畒步二百四十得二井萬八千八百為實各以本毋除子照前併之得二百七十為法除之餘實三十法實皆折半合問
