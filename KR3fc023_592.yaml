body:
  text: 十二錠九兩交將一兩為率四色商量白麵三斤鹽該斤斗八兩乾薑油四斤花椒四兩五般兒都要停當特問英賢良莫得荒忙算得無差到廣名揚右折桂令答曰各買五稱九斤法曰置鈔六百九貫以各率相乘麵四十八兩乘鹽二十四兩得一千一百五十二兩又薑八兩乘得九千二百一十六兩又油六十四兩乘得五十八万九千八百二十四兩又花椒四兩乘得一百三十五万九十二百九十六兩乘鈔六百九貫得一十四億三千六百八十一万一千二百六十四兩為實又各率相乘麵四十八兩乘鹽二十四兩又乘薑八兩又乘油六十四兩得五十八万九千八百二十四兩二十四兩乘薑八兩油六十四兩花椒四兩得四万九千二百五十二薑八兩乘得九万八千三百四兩油六千四兩乘椒鹽得二十九万四千
