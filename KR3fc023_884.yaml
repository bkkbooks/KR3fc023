body:
  text: 互乘四甌乘一百九十兩得七百六十兩九兩乘一百隻得九百以少減多餘一百四十以上三盞乘之得四百二十為實以法七兩除之得盞六十以減總數百隻餘得甌四十各以油率乘之合問節遇元宵十五明燈幾盞堪遊三停盞子二停甌呼油恰就半斤分為五盞十兩四甌無留盞甌算得根由端的郡中少有右西江月答曰甌五十箇盞七十五箇法曰置油二百四十五兩為實以二甌油五兩三盞油四兩八尓併之得九兩八尓為法除之得二十五為一停率以乘各率合問今有數珠一串輪來仔細分明三枚無剩五無零七箇約
