body:
  text: 問雖微甚難省答曰甲一錢六分糸之二乙一錢六分糸之一丙一錢丁六分糸之五戊六分糸之四法曰各列置衰甲八乙七丙六丁五戊四副併得三十為法以所分金五糸乘未併者甲得四十乙得三十五丙得三十丁得二十五戊得二十各自為列實以法除之甲得一糸餘實一十乙得一糸餘實五丙得一糸丁不端法得二十五戊不端法得二十餘實與法皆五約之合問九百九十六斤綿衰分八子做盤纏次第每人多十七要將各得數來言答曰長男一百八十四斤次男一百六十七
