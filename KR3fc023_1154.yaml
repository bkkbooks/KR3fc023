body:
  text: 圓錐下周三丈五尺髙五丈一尺問爲積幾何答曰一千七百三十五尺一十二分尺之五法曰形圓上方類粟置下周自乗得一千二百二十五尺以髙五十一尺乗之得六万二千四百七十五尺如三十六而一餘實三約之合問委粟平地下周一十二丈髙二丈問積尺及爲粟各幾何答曰積八千尺爲粟二千九百六十二石二十七分石之二十六法曰置下周自乗得一万四千四百尺以髙二十尺乗之得二十八万八千尺如三十六而一得八千尺以斛法二尺七寸除之得粟合問委菽倚垣下周三丈髙七尺問積尺及爲菽各幾何
