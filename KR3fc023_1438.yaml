body:
  text: 旗軍四千八十隊每隊積八十步共積三十二萬六千四百步隊長六百八十步該列六十八隊闊四百八十步該列六十隊法曰置旗軍二十二万八千四百八十名以每隊五十六名除之得四千八十隊以一隊長十步闊八步相乗得八十步乗之得三十一万六千四百步爲實以闊四百八十步爲法除之得長六百八十步以長一十步除之得六十八隊又置闊四百八十步以闊八步除之得六十隊在置旗軍数以每大隊一万一千一百名約之得二十隊四分每隊都指揮共二十隊每員一方六步共六步共積七百二十步指揮一千員二百
