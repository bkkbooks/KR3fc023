body:
  text: 自乘得八千二百八十一併入股自九万七千三百四十四步共一十万五千六百二十五步为实以开平方除之得弦长合问今有勾股田勾股相乘得二万千三百九十二步只云勾股相差二百二十一步問勾股弦各幾何荅曰股三百一十二步勾九十一步弦三百二十五步法曰置相乘二万八千三百九十一步爲實以相差二百二十八步爲後方開平方法除之得勾闊九十步加入相差二百二十一步得股長三百一十二步別置勾闊九十一步自乘得八千二百八十一步股自乘得九万七千三百四十四步併二位共得一千万五千六百二十五步爲實以
  hash: sha256:89c3a8cb280cd220a03e2b75d235beeb3845bc6204a1fa6a0219d81f945480f6
