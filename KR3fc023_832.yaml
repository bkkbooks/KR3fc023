  text: 答曰上田一頃八十五畒七分該絲二十三兩二錢一分二厘五毫中田一頃二十九畒三分該絲一十四兩二錢二分三厘法曰置田三頃一十五畒以上田科絲一糸二分五毫乘之得三十九兩三糸七分五毫以減共絲三十七兩四糸三分五厘五毫餘一兩九糸三分九厘五毫為實却以上田科絲一糸二分五厘減中田科絲一糸一分餘一分五厘為法除之得中田一頃二十九畒三分以減總田餘為上田一頃八十五畒七分各以每畒科絲得數合問異乘同除
