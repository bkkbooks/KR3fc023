body:
  text: 止還長二百五十六尺問折得闊幾何答曰二尺一寸三分一釐二豪五絲法曰置原布長二百四十八尺乘闊二尺二寸得五百四十五尺六寸為實以還長二百五十六尺為法除之合問今有客鈔七千二百五十八貫五十文原放絹二百八十五匹二丈四尺匹法三丈二尺今止有絹二百七十三匹二丈五尺六寸問合退還客鈔幾何答曰三百三貫五百三十文法曰置放絹二百八十五匹以匹法三丈二尺通之加零二丈四尺共得九百一十四丈四尺於上又置今還絹二百七十三尺以匹法通之加零
