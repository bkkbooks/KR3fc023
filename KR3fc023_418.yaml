body:
  text: 今有米六石二斗四升糴鈔四十六貫八百文只有米二石六斗三升問該鈔幾何答曰一十九貫七百二十五文法曰以只有米二石六斗三升乘糴鈔四十六貫八百文得一百二十三貫八十四文為實以原米六石二斗四升為法除之合問今有鈔一十九貫七百二十五文糴米二石六斗三升只有鈔四十六貫八百文問該糴米幾何答曰六石二斗四升法曰以只有鈔四十六貫八百文乘糴米二石六斗三升得一石二十三貫八十四文為實以原鈔一十九貫七百二十五文為法除之合問
