body:
  text: 二丁民田五十六畝只云每田四十畝作一丁當差問各該出鈔幾何答曰長兄三百二十四貫次兄二百四十三貫三弟一百五十三貫法曰置共用鈔七百二十貫為實以田四十畝作一丁分數為衰長兄四丁田一頃二十八畝得七十二分次兄三丁四九十六畝得五丁四分三弟二石十六畝得三丁四分併之得一十六丁為法除之得四十五貫為一丁該出之數以乘各衰合問今有善書者日增一倍六日書道德經一卷計五千三百五十五字問各日書幾何
