body:
  text: 尺問截去髙幾何荅曰八尺法曰置截上周一十二尺乗髙二十四尺得二百八十八尺爲實以下周三十六尺爲法除之得截去髙八尺合問今有方錐下方二十四尺髙三十二尺欲截去上錐一十二尺問上方該幾何荅曰九尺法曰置下方二十四尺以髙三十二尺除之得七寸五分以乗截去上錐一十二尺得上方九尺合問今有圓䑓上周一十二尺下周三十六尺髙一十六尺欲築成圓錐問接髙幾何荅曰八尺法曰置髙一十六尺以乗上周一十二尺得一百九十一尺爲實以上周
