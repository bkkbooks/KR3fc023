body:
  text: 十六兔正七得正四十九異加第四行兔負七得兔負五十六價負六百六十七得負四千六百六十九同减第四行價負九千一百九十一餘得價負四千五百二十二再以第三行鷄負四十八爲法遍乗第四行鷄負一百二十六得六千四十八兔負五十六得二千六百八十八價負四千五百二十二得二十一万七千五十六復以第四行鷄負一百二十六爲法遍乗第三行鷄負四十八得負六千四十八同减第四行雞負六千四十八對减尽兔負四十二得五千二百九十二同减第四行兔負二千六百八十八餘得兔負二千六百四爲法價負二千三百二十二得負二十九万二千五百七十一同减第四行價負二十一万七千五十六餘得價負七万五千五百一十六爲實以法除之得兔價二十九第三行兔負四十二以價二十九
