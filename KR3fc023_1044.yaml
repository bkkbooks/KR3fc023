body:
  text: 答曰七十步一百一分步百法曰置方面五十步自乗千少倍之得五千步爲實以開平方法除之得七十步餘實百爲分子倍方法七十加子一共得一百四十一爲分母合問今有方田面五步問斜幾何答曰十步十五分步之一法曰置方面五步自乗得二十五步十倍之得五十步爲實以開平方法除之得七步餘實二爲分子倍方法七步加子一共得一十五爲分母合問今有方田面四十九步九十九分步四十九問斜幾何答曰七十步
